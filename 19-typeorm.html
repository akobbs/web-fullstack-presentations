<!DOCTYPE html><html lang="uk"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>TypeORM: основи</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css"><style>* {

#presentation-container:fullscreen,#presentation-container:-webkit-full-screen,#presentation-container:-moz-full-screen,#presentation-container:-ms-fullscreen{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%)!important;}</style></head><body><div id="presentation-container"><div class="progress"><div class="progress-bar" id="progress-bar"></div></div><button id="sidebar-toggle" onclick="toggleSidebar()" title="Навігація слайдами (S)">☰</button><div id="sidebar"><div id="sidebar-header"><h3>📑 Слайди</h3><button id="sidebar-close" onclick="toggleSidebar()">✕</button></div><div id="sidebar-content"></div></div><div class="slide-container"><div class="slide" id="current-slide"></div></div><div class="controls"><button class="control-btn" onclick="previousSlide()" title="Попередній (←)">←</button><button class="control-btn" onclick="nextSlide()" title="Наступний (→)">→</button><button class="control-btn" onclick="toggleFullscreen()" title="Повноекранний режим (F)">⛶</button><button class="control-btn" onclick="toggleHelp()" title="Допомога (?)">?</button></div><div class="slide-number" id="slide-number">1 / 21</div><div id="help-overlay" class="hidden"><strong>Гарячі клавіші:</strong><br><kbd>←</kbd> <kbd>→</kbd> Навігація<br><kbd>F</kbd> Повноекранний режим<br><kbd>S</kbd> Sidebar<br><kbd>?</kbd> Допомога<br><kbd>Esc</kbd> Закрити</div></div><script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script><script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script><script>const slides=["<h1>TypeORM: основи</h1>\n<p><strong>Сучасні технології Internet-програмування</strong></p>\n<p>Лектор: Кобилянський Антон</p>\n","<h1>📋 План лекції</h1>\n<ol>\n<li>🎯 Проблема взаємодії з базою даних</li>\n<li>🗺️ ORM: концепція та призначення</li>\n<li>🏛️ TypeORM: огляд та інтеграція з Nest.js</li>\n<li>📦 Entities (сутності) та їх декоратори</li>\n<li>🗃️ Repository Pattern</li>\n<li>🔄 Migrations (міграції)</li>\n<li>🔗 Relations: OneToOne, OneToMany, ManyToOne</li>\n<li>🔀 Relations: ManyToMany</li>\n<li>✅ Ключові висновки та контрольні питання</li>\n</ol>\n","<h1>🎯 Проблема взаємодії з базою даних</h1>\n<div class=\"info\"><strong>ℹ️ Контекст</strong> <p>Реляційні бази даних оперують <strong>таблицями, рядками та SQL-запитами</strong>, а застосунок працює з <strong>об'єктами, класами та методами</strong>. Між цими світами існує концептуальний розрив.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> пряма робота з SQL-запитами в коді призводить до численних проблем: дублювання, помилок типізації, складнощів супроводу.</p>\n<h2>⚠️ Приклад прямої роботи з SQL</h2>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">Pool</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"pg\"</span>;\n<span class=\"hljs-keyword\">const</span> pool = <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Pool</span>({\n  <span class=\"hljs-comment\">/* конфігурація */</span>\n});\n\n<span class=\"hljs-keyword\">async</span> <span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">getUserById</span>(<span class=\"hljs-params\">id: <span class=\"hljs-built_in\">number</span></span>) {\n  <span class=\"hljs-keyword\">const</span> result = <span class=\"hljs-keyword\">await</span> pool.<span class=\"hljs-title function_\">query</span>(\n    <span class=\"hljs-string\">\"SELECT id, email, first_name, last_name FROM users WHERE id = $1\"</span>,\n    [id]\n  );\n  <span class=\"hljs-keyword\">return</span> result.<span class=\"hljs-property\">rows</span>[<span class=\"hljs-number\">0</span>];\n}\n\n<span class=\"hljs-keyword\">async</span> <span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">createUser</span>(<span class=\"hljs-params\">email: <span class=\"hljs-built_in\">string</span>, firstName: <span class=\"hljs-built_in\">string</span>, lastName: <span class=\"hljs-built_in\">string</span></span>) {\n  <span class=\"hljs-keyword\">const</span> result = <span class=\"hljs-keyword\">await</span> pool.<span class=\"hljs-title function_\">query</span>(\n    <span class=\"hljs-string\">\"INSERT INTO users (email, first_name, last_name) VALUES ($1, $2, $3) RETURNING *\"</span>,\n    [email, firstName, lastName]\n  );\n  <span class=\"hljs-keyword\">return</span> result.<span class=\"hljs-property\">rows</span>[<span class=\"hljs-number\">0</span>];\n}</code></pre><div class=\"warning\"><strong>⚠️ Проблеми такого підходу</strong> <ul>\n<li><strong>Відсутність типізації</strong>: <code>result.rows[0]</code> має тип <code>any</code></li>\n<li><strong>SQL-рядки в коді</strong>: помилки виявляються тільки під час виконання</li>\n<li><strong>Mapping вручну</strong>: <code>first_name</code> (БД) ↔ <code>firstName</code> (TypeScript)</li>\n<li><strong>Дублювання</strong>: однакові запити пишуться в різних місцях</li>\n<li><strong>Складність рефакторингу</strong>: зміна схеми вимагає правок у всіх SQL-рядках</li>\n</ul>\n</div>\n\n","<h1>🗺️ ORM: концепція та призначення</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>ORM</strong> (Object-Relational Mapping / Об'єктно-реляційне відображення) це техніка програмування, що дозволяє працювати з реляційною базою даних через об'єкти мови програмування, автоматично перетворюючи між цими двома моделями даних.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> ORM створює абстракцію над SQL, де таблиця представлена класом, рядок це екземпляр об'єкта, а стовпець це властивість.</p>\n<h2>🔄 Концепція відображення</h2>\n\n<div class=\"mermaid\" data-source=\"graph LR\n    OOP[&quot;🧩 Об'єктна модель&quot;] &lt;--&gt; ORM[&quot;🗺️ ORM шар&quot;]\n    ORM &lt;--&gt; SQL[&quot;🗄️ Реляційна модель&quot;]\n    OOP -.-&gt; CLASS[&quot;Class User&quot;]\n    OOP -.-&gt; INST[&quot;Instance user1&quot;]\n    OOP -.-&gt; PROP[&quot;Property email&quot;]\n    SQL -.-&gt; TABLE[&quot;Table users&quot;]\n    SQL -.-&gt; ROW[&quot;Row id=1&quot;]\n    SQL -.-&gt; COL[&quot;Column email&quot;]\n    style ORM fill:#fff9c4,stroke:#f9a825\n    style OOP fill:#e3f2fd,stroke:#1565c0\n    style SQL fill:#e8f5e9,stroke:#388e3c\"><svg id=\"exp-1777311881156-3-0\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" class=\"flowchart\" style=\"max-width: 875.15625px;\" viewBox=\"0 0 875.15625 407\" role=\"graphics-document document\" aria-roledescription=\"flowchart-v2\"><style>#exp-1777311881156-3-0{font-family:system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,Arial,sans-serif;font-size:16px;fill:#333;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#exp-1777311881156-3-0 .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#exp-1777311881156-3-0 .edge-animation-fast{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 20s linear infinite;stroke-linecap:round;}#exp-1777311881156-3-0 .error-icon{fill:#552222;}#exp-1777311881156-3-0 .error-text{fill:#552222;stroke:#552222;}#exp-1777311881156-3-0 .edge-thickness-normal{stroke-width:1px;}#exp-1777311881156-3-0 .edge-thickness-thick{stroke-width:3.5px;}#exp-1777311881156-3-0 .edge-pattern-solid{stroke-dasharray:0;}#exp-1777311881156-3-0 .edge-thickness-invisible{stroke-width:0;fill:none;}#exp-1777311881156-3-0 .edge-pattern-dashed{stroke-dasharray:3;}#exp-1777311881156-3-0 .edge-pattern-dotted{stroke-dasharray:2;}#exp-1777311881156-3-0 .marker{fill:#333333;stroke:#333333;}#exp-1777311881156-3-0 .marker.cross{stroke:#333333;}#exp-1777311881156-3-0 svg{font-family:system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,Arial,sans-serif;font-size:16px;}#exp-1777311881156-3-0 p{margin:0;}#exp-1777311881156-3-0 .label{font-family:system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,Arial,sans-se e(-41.2890625, -12)\"><rect></rect><foreignObject width=\"82.578125\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>Table users</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1777311881156-3-0-flowchart-ROW-13\" data-look=\"classic\" transform=\"translate(794.0625, 130)\"><rect class=\"basic label-container\" style=\"\" x=\"-56.515625\" y=\"-24\" width=\"113.03125\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-32.515625, -12)\"><rect></rect><foreignObject width=\"65.03125\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>Row id=1</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1777311881156-3-0-flowchart-COL-15\" data-look=\"classic\" transform=\"translate(794.0625, 228)\"><rect class=\"basic label-container\" style=\"\" x=\"-73.09375\" y=\"-24\" width=\"146.1875\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-49.09375, -12)\"><rect></rect><foreignObject width=\"98.1875\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>Column email</p></span></div></foreignObject></g></g></g></g></g><defs><filter id=\"exp-1777311881156-3-0-drop-shadow\" height=\"130%\" width=\"130%\"><feDropShadow dx=\"4\" dy=\"4\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs><defs><filter id=\"exp-1777311881156-3-0-drop-shadow-small\" height=\"150%\" width=\"150%\"><feDropShadow dx=\"2\" dy=\"2\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs></svg></div>\n<h2>📊 Відповідність концепцій</h2>\n<table>\n<thead>\n<tr>\n<th>Об'єктна модель</th>\n<th>Реляційна модель</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Клас</td>\n<td>Таблиця</td>\n</tr>\n<tr>\n<td>Екземпляр класу</td>\n<td>Рядок таблиці</td>\n</tr>\n<tr>\n<td>Властивість</td>\n<td>Стовпець</td>\n</tr>\n<tr>\n<td>Тип властивості</td>\n<td>Тип стовпця</td>\n</tr>\n<tr>\n<td>Посилання на об'єкт</td>\n<td>Зовнішній ключ (FK)</td>\n</tr>\n<tr>\n<td>Колекція об'єктів</td>\n<td>Зв'язана таблиця</td>\n</tr>\n</tbody></table>\n<div class=\"tip\"><strong>💡 Переваги ORM</strong> <ul>\n<li>🛡️ <strong>Типобезпека</strong>: помилки виявляються на етапі компіляції</li>\n<li>🔄 <strong>Автоматичний mapping</strong>: між snake_case у БД та camelCase у коді</li>\n<li>🎯 <strong>Запити через методи</strong>: <code>userRepo.findOne({ where: { id: 1 } })</code> замість SQL</li>\n<li>📜 <strong>Міграції</strong>: версіонування схеми бази даних</li>\n<li>🗄️ <strong>Незалежність від СУБД</strong>: один код для PostgreSQL, MySQL, SQLite</li>\n</ul>\n</div>\n\n","<h1>🏛️ TypeORM: огляд</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>TypeORM</strong> це ORM-бібліотека для TypeScript та JavaScript, яка підтримує патерни Active Record та Data Mapper, працює з PostgreSQL, MySQL, SQLite, MS SQL Server та іншими СУБД.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> TypeORM використовує можливості TypeScript (декоратори, метадані, рефлексію) для опису схеми бази даних безпосередньо у коді класів.</p>\n<h2>🔑 Ключові особливості</h2>\n<table>\n<thead>\n<tr>\n<th>Особливість</th>\n<th>Опис</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Декоратори</td>\n<td>Опис схеми через <code>@Entity</code>, <code>@Column</code>, <code>@OneToMany</code></td>\n</tr>\n<tr>\n<td>Active Record</td>\n<td>Методи збереження безпосередньо в сутності</td>\n</tr>\n<tr>\n<td>Data Mapper</td>\n<td>Окремі repository-класи для роботи з сутностями</td>\n</tr>\n<tr>\n<td>Query Builder</td>\n<td>Програмне конструювання SQL-запитів</td>\n</tr>\n<tr>\n<td>Міграції</td>\n<td>Версіонування змін схеми БД</td>\n</tr>\n<tr>\n<td>Підтримка транзакцій</td>\n<td>Атомарні операції з кількома таблицями</td>\n</tr>\n</tbody></table>\n<h2>🔌 Інтеграція з Nest.js</h2>\n<p>Nest.js надає офіційний модуль <code>@nestjs/typeorm</code>, який забезпечує інтеграцію через Dependency Injection.</p>\n<pre><code class=\"language-bash hljs\" data-highlighted=\"yes\">npm install @nestjs/typeorm typeorm pg</code></pre><pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// app.module.ts</span>\n<span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">Module</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"@nestjs/common\"</span>;\n<span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">TypeOrmModule</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"@nestjs/typeorm\"</span>;\n\n<span class=\"hljs-meta\">@Module</span>({\n  <span class=\"hljs-attr\">imports</span>: [\n    <span class=\"hljs-title class_\">TypeOrmModule</span>.<span class=\"hljs-title function_\">forRoot</span>({\n      <span class=\"hljs-attr\">type</span>: <span class=\"hljs-string\">\"postgres\"</span>,\n      <span class=\"hljs-attr\">host</span>: <span class=\"hljs-string\">\"localhost\"</span>,\n      <span class=\"hljs-attr\">port</span>: <span class=\"hljs-number\">5432</span>,\n      <span class=\"hljs-attr\">username</span>: <span class=\"hljs-string\">\"postgres\"</span>,\n      <span class=\"hljs-attr\">password</span>: <span class=\"hljs-string\">\"secret\"</span>,\n      <span class=\"hljs-attr\">database</span>: <span class=\"hljs-string\">\"tasks_db\"</span>,\n      <span class=\"hljs-attr\">entities</span>: [__dirname + <span class=\"hljs-string\">\"/**/*.entity{.ts,.js}\"</span>],\n      <span class=\"hljs-attr\">synchronize</span>: <span class=\"hljs-literal\">true</span>, <span class=\"hljs-comment\">// тільки для розробки!</span>\n    }),\n  ],\n})\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">class</span> <span class=\"hljs-title class_\">AppModule</span> {}</code></pre><div class=\"danger\"><strong>🚫 Застереження щодо synchronize</strong> <p>Опція <code>synchronize: true</code> автоматично оновлює схему БД відповідно до сутностей. Це <strong>зручно для розробки</strong>, але <strong>категорично заборонено в продакшені</strong>, оскільки призводить до втрати даних. Для продакшену використовуються міграції.</p>\n</div>\n\n","<h1>🔧 Конфігурація через ConfigModule</h1>\n<div class=\"info\"><strong>ℹ️ Контекст</strong> <p>Параметри підключення до БД (хост, пароль, ім'я бази) це чутливі дані, які повинні зберігатися у змінних середовища, а не в коді.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> комбінація <code>ConfigModule</code> та <code>TypeOrmModule.forRootAsync</code> дозволяє безпечно завантажувати конфігурацію БД зі змінних середовища.</p>\n<h2>📄 Файл .env</h2>\n<pre><code class=\"language-plaintext hljs\" data-highlighted=\"yes\">DB_HOST=localhost\nDB_PORT=5432\nDB_USERNAME=postgres\nDB_PASSWORD=secret\nDB_NAME=tasks_db</code></pre><h2>⚙️ Асинхронна конфігурація</h2>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">Module</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"@nestjs/common\"</span>;\n<span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">ConfigModule</span>, <span class=\"hljs-title class_\">ConfigService</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"@nestjs/config\"</span>;\n<span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">TypeOrmModule</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"@nestjs/typeorm\"</span>;\n\n<span class=\"hljs-meta\">@Module</span>({\n  <span class=\"hljs-attr\">imports</span>: [\n    <span class=\"hljs-title class_\">ConfigModule</span>.<span class=\"hljs-title function_\">forRoot</span>({ <span class=\"hljs-attr\">isGlobal</span>: <span class=\"hljs-literal\">true</span> }),\n    <span class=\"hljs-title class_\">TypeOrmModule</span>.<span class=\"hljs-title function_\">forRootAsync</span>({\n      <span class=\"hljs-attr\">imports</span>: [<span class=\"hljs-title class_\">ConfigModule</span>],\n      <span class=\"hljs-attr\">inject</span>: [<span class=\"hljs-title class_\">ConfigService</span>],\n      <span class=\"hljs-attr\">useFactory</span>: <span class=\"hljs-function\">(<span class=\"hljs-params\">config: ConfigService</span>) =&gt;</span> ({\n        <span class=\"hljs-attr\">type</span>: <span class=\"hljs-string\">\"postgres\"</span>,\n        <span class=\"hljs-attr\">host</span>: config.<span class=\"hljs-property\">get</span>&lt;<span class=\"hljs-built_in\">string</span>&gt;(<span class=\"hljs-string\">\"DB_HOST\"</span>),\n        <span class=\"hljs-attr\">port</span>: config.<span class=\"hljs-property\">get</span>&lt;<span class=\"hljs-built_in\">number</span>&gt;(<span class=\"hljs-string\">\"DB_PORT\"</span>),\n        <span class=\"hljs-attr\">username</span>: config.<span class=\"hljs-property\">get</span>&lt;<span class=\"hljs-built_in\">string</span>&gt;(<span class=\"hljs-string\">\"DB_USERNAME\"</span>),\n        <span class=\"hljs-attr\">password</span>: config.<span class=\"hljs-property\">get</span>&lt;<span class=\"hljs-built_in\">string</span>&gt;(<span class=\"hljs-string\">\"DB_PASSWORD\"</span>),\n        <span class=\"hljs-attr\">database</span>: config.<span class=\"hljs-property\">get</span>&lt;<span class=\"hljs-built_in\">string</span>&gt;(<span class=\"hljs-string\">\"DB_NAME\"</span>),\n        <span class=\"hljs-attr\">entities</span>: [__dirname + <span class=\"hljs-string\">\"/**/*.entity{.ts,.js}\"</span>],\n        <span class=\"hljs-attr\">synchronize</span>: <span class=\"hljs-literal\">false</span>,\n      }),\n    }),\n  ],\n})\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">class</span> <span class=\"hljs-title class_\">AppModule</span> {}</code></pre><div class=\"tip\"><strong>💡 Чому forRootAsync</strong> <p><code>forRootAsync</code> дозволяє отримати залежність (<code>ConfigService</code>) до створення модуля. Це критично, коли значення відомі лише на момент запуску застосунку.</p>\n</div>\n\n","<h1>📦 Entities: визначення сутностей</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>Entity</strong> (сутність) це клас TypeScript, позначений декоратором <code>@Entity()</code>, який представляє таблицю в базі даних. Кожен екземпляр такого класу відповідає одному рядку.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> entity-клас одночасно описує структуру таблиці та надає типізований об'єкт для роботи з даними.</p>\n<h2>🏗️ Структура entity</h2>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-keyword\">import</span> {\n  <span class=\"hljs-title class_\">Entity</span>,\n  <span class=\"hljs-title class_\">PrimaryGeneratedColumn</span>,\n  <span class=\"hljs-title class_\">Column</span>,\n  <span class=\"hljs-title class_\">CreateDateColumn</span>,\n  <span class=\"hljs-title class_\">UpdateDateColumn</span>,\n} <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"typeorm\"</span>;\n\n<span class=\"hljs-meta\">@Entity</span>(<span class=\"hljs-string\">\"tasks\"</span>)\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">class</span> <span class=\"hljs-title class_\">Task</span> {\n  <span class=\"hljs-meta\">@PrimaryGeneratedColumn</span>()\n  <span class=\"hljs-attr\">id</span>: <span class=\"hljs-built_in\">number</span>;\n\n  <span class=\"hljs-meta\">@Column</span>({ <span class=\"hljs-attr\">length</span>: <span class=\"hljs-number\">200</span> })\n  <span class=\"hljs-attr\">title</span>: <span class=\"hljs-built_in\">string</span>;\n\n  <span class=\"hljs-meta\">@Column</span>({ <span class=\"hljs-attr\">type</span>: <span class=\"hljs-string\">\"text\"</span>, <span class=\"hljs-attr\">nullable</span>: <span class=\"hljs-literal\">true</span> })\n  <span class=\"hljs-attr\">description</span>: <span class=\"hljs-built_in\">string</span> | <span class=\"hljs-literal\">null</span>;\n\n  <span class=\"hljs-meta\">@Column</span>({ <span class=\"hljs-attr\">default</span>: <span class=\"hljs-literal\">false</span> })\n  <span class=\"hljs-attr\">completed</span>: <span class=\"hljs-built_in\">boolean</span>;\n\n  <span class=\"hljs-meta\">@CreateDateColumn</span>()\n  <span class=\"hljs-attr\">createdAt</span>: <span class=\"hljs-title class_\">Date</span>;\n\n  <span class=\"hljs-meta\">@UpdateDateColumn</span>()\n  <span class=\"hljs-attr\">updatedAt</span>: <span class=\"hljs-title class_\">Date</span>;\n}</code></pre><h2>📊 Основні декоратори колонок</h2>\n<table>\n<thead>\n<tr>\n<th>Декоратор</th>\n<th>Призначення</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>@PrimaryGeneratedColumn</code></td>\n<td>Автоматично генерований первинний ключ</td>\n</tr>\n<tr>\n<td><code>@PrimaryColumn</code></td>\n<td>Первинний ключ зі значенням, що задається</td>\n</tr>\n<tr>\n<td><code>@Column</code></td>\n<td>Звичайний стовпець з опціями</td>\n</tr>\n<tr>\n<td><code>@CreateDateColumn</code></td>\n<td>Автоматична дата створення</td>\n</tr>\n<tr>\n<td><code>@UpdateDateColumn</code></td>\n<td>Автоматична дата останнього оновлення</td>\n</tr>\n<tr>\n<td><code>@DeleteDateColumn</code></td>\n<td>Дата soft-delete (м'яке видалення)</td>\n</tr>\n</tbody></table>\n<h2>⚙️ Опції @Column та типи даних</h2>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// Базові опції</span>\n<span class=\"hljs-meta\">@Column</span>({\n  <span class=\"hljs-attr\">type</span>: <span class=\"hljs-string\">'varchar'</span>,         <span class=\"hljs-comment\">// тип у БД</span>\n  <span class=\"hljs-attr\">length</span>: <span class=\"hljs-number\">100</span>,             <span class=\"hljs-comment\">// обмеження довжини</span>\n  <span class=\"hljs-attr\">nullable</span>: <span class=\"hljs-literal\">false</span>,         <span class=\"hljs-comment\">// дозволяє NULL?</span>\n  <span class=\"hljs-attr\">unique</span>: <span class=\"hljs-literal\">true</span>,            <span class=\"hljs-comment\">// унікальне значення</span>\n  <span class=\"hljs-attr\">default</span>: <span class=\"hljs-string\">'pending'</span>,      <span class=\"hljs-comment\">// значення за замовчуванням</span>\n  <span class=\"hljs-attr\">name</span>: <span class=\"hljs-string\">'user_email'</span>,      <span class=\"hljs-comment\">// явне ім'я стовпця в БД</span>\n})\n<span class=\"hljs-attr\">email</span>: <span class=\"hljs-built_in\">string</span>;\n\n<span class=\"hljs-comment\">// Числа з фіксованою точністю (для грошей)</span>\n<span class=\"hljs-meta\">@Column</span>({ <span class=\"hljs-attr\">type</span>: <span class=\"hljs-string\">'decimal'</span>, <span class=\"hljs-attr\">precision</span>: <span class=\"hljs-number\">10</span>, <span class=\"hljs-attr\">scale</span>: <span class=\"hljs-number\">2</span> })\n<span class=\"hljs-attr\">price</span>: <span class=\"hljs-built_in\">number</span>;\n\n<span class=\"hljs-comment\">// Структуровані дані</span>\n<span class=\"hljs-meta\">@Column</span>({ <span class=\"hljs-attr\">type</span>: <span class=\"hljs-string\">'jsonb'</span>, <span class=\"hljs-attr\">nullable</span>: <span class=\"hljs-literal\">true</span> })\n<span class=\"hljs-attr\">metadata</span>: <span class=\"hljs-title class_\">Record</span>&lt;<span class=\"hljs-built_in\">string</span>, <span class=\"hljs-built_in\">any</span>&gt;;</code></pre><div class=\"tip\"><strong>💡 UUID замість числового ID</strong> <p>Для розподілених систем та публічних API часто використовують UUID: <code>@PrimaryGeneratedColumn(\"uuid\") id: string;</code>. UUID не розкриває порядок створення записів і не конфліктує між різними БД.</p>\n</div>\n\n","<h1>🗃️ Repository Pattern</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>Repository</strong> (репозиторій) це об'єкт, що інкапсулює логіку доступу до даних для конкретної сутності. У TypeORM репозиторій надає типізовані методи для CRUD-операцій.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> репозиторій це посередник між сервісним шаром та базою даних, що приховує складність SQL-запитів за зрозумілим API.</p>\n<h2>🔄 Місце Repository в архітектурі</h2>\n\n<div class=\"mermaid\" data-source=\"graph LR\n    CTRL[🎮 Controller] --&gt; SVC[⚙️ Service]\n    SVC --&gt; REPO[🗃️ Repository]\n    REPO --&gt; DB[🗄️ Database]\n    CTRL -.HTTP.-&gt; SVC\n    SVC -.методи.-&gt; REPO\n    REPO -.SQL.-&gt; DB\n    style REPO fill:#fff9c4,stroke:#f9a825\n    style SVC fill:#e3f2fd,stroke:#1565c0\n    style DB fill:#e8f5e9,stroke:#388e3c\"><svg id=\"exp-1777311881180-7-0\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" class=\"flowchart\" style=\"max-width: 866.3125px;\" viewBox=\"0 0 866.3125 66.5\" role=\"graphics-document document\" aria-roledescription=\"flowchart-v2\"><style>#exp-1777311881180-7-0{font-family:system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,Arial,sans-serif;font-size:16px;fill:#333;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#exp-1777311881180-7-0 .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#exp-1777311881180-7-0 .edge-animation-fast{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 20s linear infinite;stroke-linecap:round;}#exp-1777311881180-7-0 .error-icon{fill:#552222;}#exp-1777311881180-7-0 .error-text{fill:#552222;stroke:#552222;}#exp-1777311881180-7-0 .edge-thickness-normal{stroke-width:1 ite-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>🗄️ Database</p></span></div></foreignObject></g></g></g></g></g><defs><filter id=\"exp-1777311881180-7-0-drop-shadow\" height=\"130%\" width=\"130%\"><feDropShadow dx=\"4\" dy=\"4\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs><defs><filter id=\"exp-1777311881180-7-0-drop-shadow-small\" height=\"150%\" width=\"150%\"><feDropShadow dx=\"2\" dy=\"2\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs></svg></div>\n<h2>📥 Реєстрація сутності у модулі</h2>\n<p>Щоб використати репозиторій у сервісі, сутність має бути зареєстрована у відповідному модулі через <code>forFeature</code>.</p>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// tasks.module.ts</span>\n<span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">Module</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"@nestjs/common\"</span>;\n<span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">TypeOrmModule</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"@nestjs/typeorm\"</span>;\n<span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">Task</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"./task.entity\"</span>;\n<span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">TasksService</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"./tasks.service\"</span>;\n<span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">TasksController</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"./tasks.controller\"</span>;\n\n<span class=\"hljs-meta\">@Module</span>({\n  <span class=\"hljs-attr\">imports</span>: [<span class=\"hljs-title class_\">TypeOrmModule</span>.<span class=\"hljs-title function_\">forFeature</span>([<span class=\"hljs-title class_\">Task</span>])],\n  <span class=\"hljs-attr\">controllers</span>: [<span class=\"hljs-title class_\">TasksController</span>],\n  <span class=\"hljs-attr\">providers</span>: [<span class=\"hljs-title class_\">TasksService</span>],\n})\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">class</span> <span class=\"hljs-title class_\">TasksModule</span> {}</code></pre><div class=\"note\"><strong>📝 forRoot vs forFeature</strong> <ul>\n<li><strong><code>forRoot</code></strong> викликається один раз у головному модулі, налаштовує підключення до БД</li>\n<li><strong><code>forFeature</code></strong> викликається у кожному feature-модулі, реєструє сутності цього модуля</li>\n</ul>\n</div>\n\n","<h1>💉 Інжекція репозиторію в сервіс</h1>\n<p><strong>Головна ідея:</strong> репозиторій інжектується в сервіс через декоратор <code>@InjectRepository</code>, після чого стає доступний як типізована залежність.</p>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// tasks.service.ts</span>\n<span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">Injectable</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"@nestjs/common\"</span>;\n<span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">InjectRepository</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"@nestjs/typeorm\"</span>;\n<span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">Repository</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"typeorm\"</span>;\n<span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">Task</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"./task.entity\"</span>;\n\n<span class=\"hljs-meta\">@Injectable</span>()\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">class</span> <span class=\"hljs-title class_\">TasksService</span> {\n  <span class=\"hljs-title function_\">constructor</span>(<span class=\"hljs-params\">\n    <span class=\"hljs-meta\">@InjectRepository</span>(Task)\n    <span class=\"hljs-keyword\">private</span> <span class=\"hljs-keyword\">readonly</span> tasksRepository: Repository&lt;Task&gt;\n  </span>) {}\n\n  <span class=\"hljs-title function_\">findAll</span>(): <span class=\"hljs-title class_\">Promise</span>&lt;<span class=\"hljs-title class_\">Task</span>[]&gt; {\n    <span class=\"hljs-keyword\">return</span> <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">tasksRepository</span>.<span class=\"hljs-title function_\">find</span>();\n  }\n\n  <span class=\"hljs-keyword\">async</span> <span class=\"hljs-title function_\">findOne</span>(<span class=\"hljs-attr\">id</span>: <span class=\"hljs-built_in\">number</span>): <span class=\"hljs-title class_\">Promise</span>&lt;<span class=\"hljs-title class_\">Task</span> | <span class=\"hljs-literal\">null</span>&gt; {\n    <span class=\"hljs-keyword\">return</span> <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">tasksRepository</span>.<span class=\"hljs-title function_\">findOne</span>({ <span class=\"hljs-attr\">where</span>: { id } });\n  }\n\n  <span class=\"hljs-title function_\">create</span>(<span class=\"hljs-attr\">data</span>: <span class=\"hljs-title class_\">Partial</span>&lt;<span class=\"hljs-title class_\">Task</span>&gt;): <span class=\"hljs-title class_\">Promise</span>&lt;<span class=\"hljs-title class_\">Task</span>&gt; {\n    <span class=\"hljs-keyword\">const</span> task = <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">tasksRepository</span>.<span class=\"hljs-title function_\">create</span>(data);\n    <span class=\"hljs-keyword\">return</span> <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">tasksRepository</span>.<span class=\"hljs-title function_\">save</span>(task);\n  }\n\n  <span class=\"hljs-keyword\">async</span> <span class=\"hljs-title function_\">update</span>(<span class=\"hljs-attr\">id</span>: <span class=\"hljs-built_in\">number</span>, <span class=\"hljs-attr\">data</span>: <span class=\"hljs-title class_\">Partial</span>&lt;<span class=\"hljs-title class_\">Task</span>&gt;): <span class=\"hljs-title class_\">Promise</span>&lt;<span class=\"hljs-title class_\">Task</span> | <span class=\"hljs-literal\">null</span>&gt; {\n    <span class=\"hljs-keyword\">await</span> <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">tasksRepository</span>.<span class=\"hljs-title function_\">update</span>(id, data);\n    <span class=\"hljs-keyword\">return</span> <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-title function_\">findOne</span>(id);\n  }\n\n  <span class=\"hljs-keyword\">async</span> <span class=\"hljs-title function_\">remove</span>(<span class=\"hljs-attr\">id</span>: <span class=\"hljs-built_in\">number</span>): <span class=\"hljs-title class_\">Promise</span>&lt;<span class=\"hljs-built_in\">boolean</span>&gt; {\n    <span class=\"hljs-keyword\">const</span> result = <span class=\"hljs-keyword\">await</span> <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">tasksRepository</span>.<span class=\"hljs-title function_\">delete</span>(id);\n    <span class=\"hljs-keyword\">return</span> (result.<span class=\"hljs-property\">affected</span> ?? <span class=\"hljs-number\">0</span>) &gt; <span class=\"hljs-number\">0</span>;\n  }\n}</code></pre><div class=\"warning\"><strong>⚠️ create vs save</strong> <p><code>create()</code> лише створює об'єкт у пам'яті (без SQL-запиту), <code>save()</code> виконує <code>INSERT</code> або <code>UPDATE</code>. Ці методи розділені, щоб дозволити проміжну валідацію або модифікацію перед збереженням.</p>\n</div>\n\n","<h1>🔍 Методи Repository</h1>\n<p><strong>Головна ідея:</strong> репозиторій надає набір методів для всіх типових операцій з даними, від простого пошуку до складних фільтрацій.</p>\n<h2>📚 Основні методи</h2>\n<table>\n<thead>\n<tr>\n<th>Метод</th>\n<th>Призначення</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>find(options)</code></td>\n<td>Знайти всі записи за умовами</td>\n</tr>\n<tr>\n<td><code>findOne(options)</code></td>\n<td>Знайти один запис</td>\n</tr>\n<tr>\n<td><code>findOneBy(where)</code></td>\n<td>Знайти один запис тільки за умовою (where)</td>\n</tr>\n<tr>\n<td><code>create(data)</code></td>\n<td>Створити екземпляр (без збереження)</td>\n</tr>\n<tr>\n<td><code>save(entity)</code></td>\n<td>Зберегти (INSERT або UPDATE)</td>\n</tr>\n<tr>\n<td><code>update(criteria, data)</code></td>\n<td>Оновити без завантаження</td>\n</tr>\n<tr>\n<td><code>delete(criteria)</code></td>\n<td>Видалити без завантаження</td>\n</tr>\n<tr>\n<td><code>count(options)</code></td>\n<td>Підрахувати кількість записів</td>\n</tr>\n</tbody></table>\n<h2>🎯 Приклади використання</h2>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">Like</span>, <span class=\"hljs-title class_\">MoreThan</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"typeorm\"</span>;\n\n<span class=\"hljs-comment\">// Усі задачі</span>\n<span class=\"hljs-keyword\">const</span> all = <span class=\"hljs-keyword\">await</span> <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">tasksRepository</span>.<span class=\"hljs-title function_\">find</span>();\n\n<span class=\"hljs-comment\">// З умовою</span>\n<span class=\"hljs-keyword\">const</span> completedTasks = <span class=\"hljs-keyword\">await</span> <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">tasksRepository</span>.<span class=\"hljs-title function_\">find</span>({\n  <span class=\"hljs-attr\">where</span>: { <span class=\"hljs-attr\">completed</span>: <span class=\"hljs-literal\">true</span> },\n});\n\n<span class=\"hljs-comment\">// З сортуванням та обмеженням</span>\n<span class=\"hljs-keyword\">const</span> recent = <span class=\"hljs-keyword\">await</span> <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">tasksRepository</span>.<span class=\"hljs-title function_\">find</span>({\n  <span class=\"hljs-attr\">order</span>: { <span class=\"hljs-attr\">createdAt</span>: <span class=\"hljs-string\">\"DESC\"</span> },\n  <span class=\"hljs-attr\">take</span>: <span class=\"hljs-number\">10</span>,\n});\n\n<span class=\"hljs-comment\">// Складніші умови з операторами</span>\n<span class=\"hljs-keyword\">const</span> filtered = <span class=\"hljs-keyword\">await</span> <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">tasksRepository</span>.<span class=\"hljs-title function_\">find</span>({\n  <span class=\"hljs-attr\">where</span>: {\n    <span class=\"hljs-attr\">title</span>: <span class=\"hljs-title class_\">Like</span>(<span class=\"hljs-string\">\"%urgent%\"</span>),\n    <span class=\"hljs-attr\">completed</span>: <span class=\"hljs-literal\">false</span>,\n    <span class=\"hljs-attr\">createdAt</span>: <span class=\"hljs-title class_\">MoreThan</span>(<span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Date</span>(<span class=\"hljs-string\">\"2025-01-01\"</span>)),\n  },\n});\n\n<span class=\"hljs-comment\">// Вибір тільки потрібних полів</span>\n<span class=\"hljs-keyword\">const</span> titles = <span class=\"hljs-keyword\">await</span> <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">tasksRepository</span>.<span class=\"hljs-title function_\">find</span>({\n  <span class=\"hljs-attr\">select</span>: [<span class=\"hljs-string\">\"id\"</span>, <span class=\"hljs-string\">\"title\"</span>],\n});</code></pre><div class=\"tip\"><strong>💡 Оператори запитів</strong> <p>TypeORM надає функції-оператори для умов: <code>Like</code>, <code>In</code>, <code>Not</code>, <code>IsNull</code>, <code>Between</code>, <code>MoreThan</code>, <code>LessThan</code>. Імпортуються з пакету <code>typeorm</code>.</p>\n</div>\n\n","<h1>🔄 Migrations: концепція</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>Migration</strong> (міграція) це версійований опис зміни схеми бази даних. Кожна міграція це окремий файл, що містить дві операції: <code>up</code> (застосувати зміну) та <code>down</code> (відкотити її).</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> міграції замінюють небезпечний <code>synchronize: true</code> контрольованим, відтворюваним процесом еволюції схеми.</p>\n<h2>⚖️ Чому міграції важливі</h2>\n<table>\n<thead>\n<tr>\n<th>Підхід</th>\n<th>Проблема</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>synchronize: true</code></td>\n<td>Може видалити стовпці з даними при зміні entity</td>\n</tr>\n<tr>\n<td>Ручне написання SQL</td>\n<td>Розсинхронізація між середовищами розробників</td>\n</tr>\n<tr>\n<td>Зміни через інтерфейс БД</td>\n<td>Немає історії змін, неможливо відтворити</td>\n</tr>\n<tr>\n<td><strong>Міграції</strong></td>\n<td>Версійовані, відтворювані, ревьюовані як звичайний код</td>\n</tr>\n</tbody></table>\n<h2>🔄 Життєвий цикл міграції</h2>\n\n<div class=\"mermaid\" data-source=\"graph LR\n    DEV[&quot;👨‍💻 Розробник змінює entity&quot;] --&gt; GEN[⚙️ generate]\n    GEN --&gt; FILE[📄 Файл міграції]\n    FILE --&gt; REV[🔍 Code review]\n    REV --&gt; RUN[▶️ run]\n    RUN --&gt; DB[🗄️ База даних]\n    RUN --&gt; LOG[📋 Запис у migrations]\n    style FILE fill:#fff9c4,stroke:#f9a825\n    style DB fill:#e8f5e9,stroke:#388e3c\n    style LOG fill:#e3f2fd,stroke:#1565c0\"><svg id=\"exp-1777311881194-10-0\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" class=\"flowchart\" style=\"max-w dow\" height=\"130%\" width=\"130%\"><feDropShadow dx=\"4\" dy=\"4\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs><defs><filter id=\"exp-1777311881194-10-0-drop-shadow-small\" height=\"150%\" width=\"150%\"><feDropShadow dx=\"2\" dy=\"2\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs></svg></div>\n<div class=\"note\"><strong>📝 Таблиця migrations</strong> <p>TypeORM автоматично створює службову таблицю (зазвичай <code>migrations</code>), де зберігає список вже виконаних міграцій. Це дозволяє при наступному запуску застосовувати лише нові.</p>\n</div>\n\n","<h1>🛠️ Робота з міграціями</h1>\n<p><strong>Головна ідея:</strong> TypeORM CLI надає команди для створення, генерації, виконання та відкату міграцій.</p>\n<h2>🧰 DataSource для CLI</h2>\n<p>CLI потребує окремого файлу з конфігурацією <code>DataSource</code>:</p>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// data-source.ts</span>\n<span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">DataSource</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"typeorm\"</span>;\n<span class=\"hljs-keyword\">import</span> { config } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"dotenv\"</span>;\n\n<span class=\"hljs-title function_\">config</span>();\n\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">const</span> <span class=\"hljs-title class_\">AppDataSource</span> = <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">DataSource</span>({\n  <span class=\"hljs-attr\">type</span>: <span class=\"hljs-string\">\"postgres\"</span>,\n  <span class=\"hljs-attr\">host</span>: process.<span class=\"hljs-property\">env</span>.<span class=\"hljs-property\">DB_HOST</span>,\n  <span class=\"hljs-attr\">port</span>: <span class=\"hljs-title class_\">Number</span>(process.<span class=\"hljs-property\">env</span>.<span class=\"hljs-property\">DB_PORT</span>),\n  <span class=\"hljs-attr\">username</span>: process.<span class=\"hljs-property\">env</span>.<span class=\"hljs-property\">DB_USERNAME</span>,\n  <span class=\"hljs-attr\">password</span>: process.<span class=\"hljs-property\">env</span>.<span class=\"hljs-property\">DB_PASSWORD</span>,\n  <span class=\"hljs-attr\">database</span>: process.<span class=\"hljs-property\">env</span>.<span class=\"hljs-property\">DB_NAME</span>,\n  <span class=\"hljs-attr\">entities</span>: [<span class=\"hljs-string\">\"src/**/*.entity.ts\"</span>],\n  <span class=\"hljs-attr\">migrations</span>: [<span class=\"hljs-string\">\"src/migrations/*.ts\"</span>],\n});</code></pre><h2>⚡ Основні команди</h2>\n<pre><code class=\"language-bash hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\"># Згенерувати міграцію на основі змін у entities</span>\nnpx typeorm-ts-node-commonjs migration:generate \\\n  src/migrations/CreateTasksTable -d src/data-source.ts\n\n<span class=\"hljs-comment\"># Створити порожню міграцію (для нестандартних змін)</span>\nnpx typeorm-ts-node-commonjs migration:create \\\n  src/migrations/SeedInitialData\n\n<span class=\"hljs-comment\"># Застосувати всі непримінені міграції</span>\nnpx typeorm-ts-node-commonjs migration:run -d src/data-source.ts\n\n<span class=\"hljs-comment\"># Відкотити останню міграцію</span>\nnpx typeorm-ts-node-commonjs migration:revert -d src/data-source.ts</code></pre><h2>📄 Структура файлу міграції</h2>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">MigrationInterface</span>, <span class=\"hljs-title class_\">QueryRunner</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"typeorm\"</span>;\n\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">class</span> <span class=\"hljs-title class_\">CreateTasksTable1700000000000</span> <span class=\"hljs-keyword\">implements</span> <span class=\"hljs-title class_\">MigrationInterface</span> {\n  <span class=\"hljs-keyword\">public</span> <span class=\"hljs-keyword\">async</span> <span class=\"hljs-title function_\">up</span>(<span class=\"hljs-attr\">queryRunner</span>: <span class=\"hljs-title class_\">QueryRunner</span>): <span class=\"hljs-title class_\">Promise</span>&lt;<span class=\"hljs-built_in\">void</span>&gt; {\n    <span class=\"hljs-keyword\">await</span> queryRunner.<span class=\"hljs-title function_\">query</span>(<span class=\"hljs-string\">`\n      CREATE TABLE tasks (\n        id SERIAL PRIMARY KEY,\n        title VARCHAR(200) NOT NULL,\n        completed BOOLEAN NOT NULL DEFAULT false\n      )\n    `</span>);\n  }\n\n  <span class=\"hljs-keyword\">public</span> <span class=\"hljs-keyword\">async</span> <span class=\"hljs-title function_\">down</span>(<span class=\"hljs-attr\">queryRunner</span>: <span class=\"hljs-title class_\">QueryRunner</span>): <span class=\"hljs-title class_\">Promise</span>&lt;<span class=\"hljs-built_in\">void</span>&gt; {\n    <span class=\"hljs-keyword\">await</span> queryRunner.<span class=\"hljs-title function_\">query</span>(<span class=\"hljs-string\">`DROP TABLE tasks`</span>);\n  }\n}</code></pre><div class=\"tip\"><strong>💡 Іменування міграцій</strong> <p>TypeORM автоматично додає timestamp до назви класу та імені файлу (наприклад, <code>1700000000000-CreateTasksTable.ts</code> із класом <code>CreateTasksTable1700000000000</code>). Це гарантує правильний порядок виконання міграцій навіть при паралельній розробці кількома людьми.</p>\n</div>\n\n","<h1>🔗 Relations: типи зв'язків</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>Relation</strong> (зв'язок) це посилання між сутностями, що відображає реальний зв'язок між таблицями через зовнішні ключі (foreign keys).</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> TypeORM автоматично створює зов w\" height=\"130%\" width=\"130%\"><feDropShadow dx=\"4\" dy=\"4\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs><defs><filter id=\"exp-1777311881212-12-0-drop-shadow-small\" height=\"150%\" width=\"150%\"><feDropShadow dx=\"2\" dy=\"2\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs></svg></div>\n<h2>🎯 Реальні приклади з домену задач</h2>\n<table>\n<thead>\n<tr>\n<th>Зв'язок</th>\n<th>Приклад</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>OneToOne</td>\n<td>Користувач має один профіль</td>\n</tr>\n<tr>\n<td>OneToMany</td>\n<td>Користувач має багато задач</td>\n</tr>\n<tr>\n<td>ManyToOne</td>\n<td>Кожна задача належить одному користувачу</td>\n</tr>\n<tr>\n<td>ManyToMany</td>\n<td>Задача має багато тегів, тег має багато задач</td>\n</tr>\n</tbody></table>\n<div class=\"note\"><strong>📝 Дві сторони одного зв'язку</strong> <p><code>OneToMany</code> та <code>ManyToOne</code> це <strong>той самий зв'язок</strong>, описаний з різних сторін. Якщо у <code>User</code> є багато <code>Task</code>, то у кожного <code>Task</code> є один <code>User</code>.</p>\n</div>\n\n","<h1>1️⃣ OneToOne: один-до-одного</h1>\n<p><strong>Головна ідея:</strong> один запис у таблиці A пов'язаний рівно з одним записом у таблиці B. Зовнішній ключ зберігається тільки на одній стороні: на стороні з декоратором <code>@JoinColumn</code>.</p>\n<h2>💼 Приклад: User та Profile</h2>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-keyword\">import</span> {\n  <span class=\"hljs-title class_\">Entity</span>,\n  <span class=\"hljs-title class_\">PrimaryGeneratedColumn</span>,\n  <span class=\"hljs-title class_\">Column</span>,\n  <span class=\"hljs-title class_\">OneToOne</span>,\n  <span class=\"hljs-title class_\">JoinColumn</span>,\n} <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"typeorm\"</span>;\n\n<span class=\"hljs-comment\">// profile.entity.ts</span>\n<span class=\"hljs-meta\">@Entity</span>()\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">class</span> <span class=\"hljs-title class_\">Profile</span> {\n  <span class=\"hljs-meta\">@PrimaryGeneratedColumn</span>()\n  <span class=\"hljs-attr\">id</span>: <span class=\"hljs-built_in\">number</span>;\n\n  <span class=\"hljs-meta\">@Column</span>()\n  <span class=\"hljs-attr\">bio</span>: <span class=\"hljs-built_in\">string</span>;\n\n  <span class=\"hljs-meta\">@Column</span>({ <span class=\"hljs-attr\">nullable</span>: <span class=\"hljs-literal\">true</span> })\n  <span class=\"hljs-attr\">avatarUrl</span>: <span class=\"hljs-built_in\">string</span>;\n}\n\n<span class=\"hljs-comment\">// user.entity.ts</span>\n<span class=\"hljs-meta\">@Entity</span>()\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">class</span> <span class=\"hljs-title class_\">User</span> {\n  <span class=\"hljs-meta\">@PrimaryGeneratedColumn</span>()\n  <span class=\"hljs-attr\">id</span>: <span class=\"hljs-built_in\">number</span>;\n\n  <span class=\"hljs-meta\">@Column</span>()\n  <span class=\"hljs-attr\">email</span>: <span class=\"hljs-built_in\">string</span>;\n\n  <span class=\"hljs-meta\">@OneToOne</span>(<span class=\"hljs-function\">() =&gt;</span> <span class=\"hljs-title class_\">Profile</span>)\n  <span class=\"hljs-meta\">@JoinColumn</span>()\n  <span class=\"hljs-attr\">profile</span>: <span class=\"hljs-title class_\">Profile</span>;\n}</code></pre><h2>📋 Згенерована схема</h2>\n<pre><code class=\"language-sql hljs\" data-highlighted=\"yes\"><span class=\"hljs-keyword\">CREATE</span> <span class=\"hljs-keyword\">TABLE</span> profile (\n  id SERIAL <span class=\"hljs-keyword\">PRIMARY</span> KEY,\n  bio TEXT <span class=\"hljs-keyword\">NOT</span> <span class=\"hljs-keyword\">NULL</span>,\n  \"avatarUrl\" <span class=\"hljs-type\">VARCHAR</span>\n);\n\n<span class=\"hljs-keyword\">CREATE</span> <span class=\"hljs-keyword\">TABLE</span> \"user\" (\n  id SERIAL <span class=\"hljs-keyword\">PRIMARY</span> KEY,\n  email <span class=\"hljs-type\">VARCHAR</span> <span class=\"hljs-keyword\">NOT</span> <span class=\"hljs-keyword\">NULL</span>,\n  \"profileId\" <span class=\"hljs-type\">INTEGER</span> <span class=\"hljs-keyword\">REFERENCES</span> profile(id)\n);</code></pre><div class=\"tip\"><strong>💡 Призначення @JoinColumn</strong> <p>Декоратор <code>@JoinColumn</code> вказує, <strong>на якій стороні зберігати зовнішній ключ</strong>. Без нього TypeORM не знає, в якій з двох таблиць створити стовпець <code>profileId</code>.</p>\n</div>\n\n\n\n\n\n<div class=\"note\"><strong>📝 Cascade-операції</strong> <p>Опція <code>cascade: true</code> дозволяє автоматично зберігати/видаляти пов'язану сутність:</p>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-meta\">@OneToOne</span>(<span class=\"hljs-function\">() =&gt;</span> <span class=\"hljs-title class_\">Profile</span>, { <span class=\"hljs-attr\">cascade</span>: <span class=\"hljs-literal\">true</span> })\n<span class=\"hljs-meta\">@JoinColumn</span>()\n<span class=\"hljs-attr\">profile</span>: <span class=\"hljs-title class_\">Profile</span>;</code></pre><p>При <code>userRepository.save(user)</code> profile збережеться автоматично.</p>\n</div>\n\n","<h1>1️⃣➡️🔢 OneToMany та ManyToOne</h1>\n<p><strong>Головна ідея:</strong> найпоширеніший тип зв'язку — один батьківський запис має багато дочірніх. Зовнішній ключ завжди зберігається на стороні <code>Many</code> (дочірній).</p>\n<h2>💼 Приклад: User та Tasks</h2>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// task.entity.ts</span>\n<span class=\"hljs-meta\">@Entity</span>()\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">class</span> <span class=\"hljs-title class_\">Task</span> {\n  <span class=\"hljs-meta\">@PrimaryGeneratedColumn</span>()\n  <span class=\"hljs-attr\">id</span>: <span class=\"hljs-built_in\">number</span>;\n\n  <span class=\"hljs-meta\">@Column</span>()\n  <span class=\"hljs-attr\">title</span>: <span class=\"hljs-built_in\">string</span>;\n\n  <span class=\"hljs-meta\">@ManyToOne</span>(<span class=\"hljs-function\">() =&gt;</span> <span class=\"hljs-title class_\">User</span>, <span class=\"hljs-function\">(<span class=\"hljs-params\">user</span>) =&gt;</span> user.<span class=\"hljs-property\">tasks</span>)\n  <span class=\"hljs-attr\">user</span>: <span class=\"hljs-title class_\">User</span>;\n}\n\n<span class=\"hljs-comment\">// user.entity.ts</span>\n<span class=\"hljs-meta\">@Entity</span>()\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">class</span> <span class=\"hljs-title class_\">User</span> {\n  <span class=\"hljs-meta\">@PrimaryGeneratedColumn</span>()\n  <span class=\"hljs-attr\">id</span>: <span class=\"hljs-built_in\">number</span>;\n\n  <span class=\"hljs-meta\">@Column</span>()\n  <span class=\"hljs-attr\">email</span>: <span class=\"hljs-built_in\">string</span>;\n\n  <span class=\"hljs-meta\">@OneToMany</span>(<span class=\"hljs-function\">() =&gt;</span> <span class=\"hljs-title class_\">Task</span>, <span class=\"hljs-function\">(<span class=\"hljs-params\">task</span>) =&gt;</span> task.<span class=\"hljs-property\">user</span>)\n  <span class=\"hljs-attr\">tasks</span>: <span class=\"hljs-title class_\">Task</span>[];\n}</code></pre><h2>📋 Згенерована схема</h2>\n<pre><code class=\"language-sql hljs\" data-highlighted=\"yes\"><span class=\"hljs-keyword\">CREATE</span> <span class=\"hljs-keyword\">TABLE</span> \"user\" (\n  id SERIAL <span class=\"hljs-keyword\">PRIMARY</span> KEY,\n  email <span class=\"hljs-type\">VARCHAR</span> <span class=\"hljs-keyword\">NOT</span> <span class=\"hljs-keyword\">NULL</span>\n);\n\n<span class=\"hljs-keyword\">CREATE</span> <span class=\"hljs-keyword\">TABLE</span> task (\n  id SERIAL <span class=\"hljs-keyword\">PRIMARY</span> KEY,\n  title <span class=\"hljs-type\">VARCHAR</span> <span class=\"hljs-keyword\">NOT</span> <span class=\"hljs-keyword\">NULL</span>,\n  \"userId\" <span class=\"hljs-type\">INTEGER</span> <span class=\"hljs-keyword\">REFERENCES</span> \"user\"(id)\n);</code></pre><div class=\"warning\"><strong>⚠️ ManyToOne не потребує @JoinColumn</strong> <p>На відміну від <code>OneToOne</code>, у парі <code>OneToMany</code>/<code>ManyToOne</code> зовнішній ключ <strong>завжди</strong> зберігається на стороні <code>Many</code>. TypeORM автоматично створює стовпець на стороні <code>ManyToOne</code>, тому <code>@JoinColumn</code> тут не потрібен.</p>\n</div>\n\n\n\n<h2>🎯 Робота з зв'язками</h2>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// Створення задачі з посиланням на користувача</span>\n<span class=\"hljs-comment\">// (достатньо передати об'єкт лише з id — TypeORM збереже саме його у FK)</span>\n<span class=\"hljs-keyword\">const</span> task = <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">tasksRepository</span>.<span class=\"hljs-title function_\">create</span>({\n  <span class=\"hljs-attr\">title</span>: <span class=\"hljs-string\">\"Підготувати презентацію\"</span>,\n  <span class=\"hljs-attr\">user</span>: { <span class=\"hljs-attr\">id</span>: <span class=\"hljs-number\">5</span> } <span class=\"hljs-keyword\">as</span> <span class=\"hljs-title class_\">User</span>,\n});\n<span class=\"hljs-keyword\">await</span> <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">tasksRepository</span>.<span class=\"hljs-title function_\">save</span>(task);\n\n<span class=\"hljs-comment\">// Завантаження користувача з усіма задачами</span>\n<span class=\"hljs-keyword\">const</span> userWithTasks = <span class=\"hljs-keyword\">await</span> <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">usersRepository</span>.<span class=\"hljs-title function_\">findOne</span>({\n  <span class=\"hljs-attr\">where</span>: { <span class=\"hljs-attr\">id</span>: <span class=\"hljs-number\">5</span> },\n  <span class=\"hljs-attr\">relations</span>: { <span class=\"hljs-attr\">tasks</span>: <span class=\"hljs-literal\">true</span> },\n});\n\n<span class=\"hljs-comment\">// Завантаження задачі з її користувачем</span>\n<span class=\"hljs-keyword\">const</span> taskWithUser = <span class=\"hljs-keyword\">await</span> <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">tasksRepository</span>.<span class=\"hljs-title function_\">findOne</span>({\n  <span class=\"hljs-attr\">where</span>: { <span class=\"hljs-attr\">id</span>: <span class=\"hljs-number\">1</span> },\n  <span class=\"hljs-attr\">relations</span>: { <span class=\"hljs-attr\">user</span>: <span class=\"hljs-literal\">true</span> },\n});</code></pre><div class=\"tip\"><strong>💡 Опція relations</strong> <p>За замовчуванням TypeORM <strong>не завантажує</strong> пов'язані сутності — це називається lazy/explicit loading. Опція <code>relations</code> явно вмикає завантаження потрібних зв'язків через <code>JOIN</code>.</p>\n</div>\n\n","<h1>🔢🔢 ManyToMany: багато-до-багатьох</h1>\n<p><strong>Головна ідея:</strong> обидві сутності можуть мати багато екземплярів іншої. Реалізується через <strong>проміжну (junction) таблицю</strong>, яка містить пари зовнішніх ключів.</p>\n<h2>💼 Приклад: Tasks та Tags</h2>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// tag.entity.ts</span>\n<span class=\"hljs-meta\">@Entity</span>()\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">class</span> <span class=\"hljs-title class_\">Tag</span> {\n  <span class=\"hljs-meta\">@PrimaryGeneratedColumn</span>()\n  <span class=\"hljs-attr\">id</span>: <span class=\"hljs-built_in\">number</span>;\n\n  <span class=\"hljs-meta\">@Column</span>()\n  <span class=\"hljs-attr\">name</span>: <span class=\"hljs-built_in\">string</span>;\n}\n\n<span class=\"hljs-comment\">// task.entity.ts</span>\n<span class=\"hljs-meta\">@Entity</span>()\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">class</span> <span class=\"hljs-title class_\">Task</span> {\n  <span class=\"hljs-meta\">@PrimaryGeneratedColumn</span>()\n  <span class=\"hljs-attr\">id</span>: <span class=\"hljs-built_in\">number</span>;\n\n  <span class=\"hljs-meta\">@Column</span>()\n  <span class=\"hljs-attr\">title</span>: <span class=\"hljs-built_in\">string</span>;\n\n  <span class=\"hljs-meta\">@ManyToMany</span>(<span class=\"hljs-function\">() =&gt;</span> <span class=\"hljs-title class_\">Tag</span>)\n  <span class=\"hljs-meta\">@JoinTable</span>()\n  <span class=\"hljs-attr\">tags</span>: <span class=\"hljs-title class_\">Tag</span>[];\n}</code></pre><h2>📋 Згенерована схема</h2>\n<pre><code class=\"language-sql hljs\" data-highlighted=\"yes\"><span class=\"hljs-keyword\">CREATE</span> <span class=\"hljs-keyword\">TABLE</span> task (\n  id SERIAL <span class=\"hljs-keyword\">PRIMARY</span> KEY,\n  title <span class=\"hljs-type\">VARCHAR</span> <span class=\"hljs-keyword\">NOT</span> <span class=\"hljs-keyword\">NULL</span>\n);\n\n<span class=\"hljs-keyword\">CREATE</span> <span class=\"hljs-keyword\">TABLE</span> tag (\n  id SERIAL <span class=\"hljs-keyword\">PRIMARY</span> KEY,\n  name <span class=\"hljs-type\">VARCHAR</span> <span class=\"hljs-keyword\">NOT</span> <span class=\"hljs-keyword\">NULL</span>\n);\n\n<span class=\"hljs-comment\">-- Junction-таблиця створюється автоматично</span>\n<span class=\"hljs-keyword\">CREATE</span> <span class=\"hljs-keyword\">TABLE</span> task_tags_tag (\n  \"taskId\" <span class=\"hljs-type\">INTEGER</span> <span class=\"hljs-keyword\">REFERENCES</span> task(id),\n  \"tagId\" <span class=\"hljs-type\">INTEGER</span> <span class=\"hljs-keyword\">REFERENCES</span> tag(id),\n  <span class=\"hljs-keyword\">PRIMARY</span> KEY (\"taskId\", \"tagId\")\n);</code></pre><h2>🔄 Візуалізація</h2>\n\n<div class=\"mermaid\" data-source=\"graph LR\n    T1[Task 1] --- TT1[task_tags_tag]\n    T2[Task 2] --- TT1\n    T3[Task 3] --- TT1\n    TT1 --- TG1[Tag urgent]\n    TT1 --- TG2[Tag work]\n    TT1 --- TG3[Tag home]\n    style TT1 fill:#fff9c4,stroke:#f9a825\n    style T1 fill:#e3f2fd,stroke:#1565c0\n    style T2 fill:#e3f2fd,stroke:#1565c0\n    style T3 fill:#e3f2fd,stroke:#1565c0\n    style TG1 fill:#e8f5e9,stroke:#388e3c\n    style TG2 fill:#e8f5e9,stroke:#388e3c\n    style TG3 fill:#e8f5e9,stroke:#388e3c\"><svg id=\"exp-1777311881232-15-0\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" class=\"flowchart\" style=\"max-width: 488.046875px;\" viewBox=\"0 0 488.046875 260\" role=\"graphics-document document\" aria-roledescription=\"flowchart-v2\"><style>#exp-1777311881232-15-0{font-family:system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,Arial,sans-serif;font-size:16px;fill:#333;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#exp-1777311881232-15-0 .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#exp-1777311881232-15-0 .edge-animation-fast{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 20s linear infinite;stroke-linecap:round;}#exp-1777311881232-15-0 .error-icon{fill:#552222;}#exp-1777311881232-15-0 .error-text{fill:#552222;stroke:#552222;}#exp-1777311881232-15-0 .edge-thickness-normal{stroke-width:1px;}#exp-1777311881232-15-0 .edge-thickness-thick{stroke-width:3.5px;}#exp-1777311881232-15-0 .edge-pattern-solid{stroke-dasharray:0;}#exp-1777311881232-15-0 .edge-thickness-invisible{stroke-width:0;fill:none;}#exp-1777311881232-15-0 .edge-pattern-dashed{stroke-dasharray:3;}#exp-1777311881232-15-0 .edge-pattern-dotted{stroke-dasharray:2;}#exp-1777311881232-15-0 .marker{fill:#333333;stroke:#333333;}#exp-1777311881232-15-0 .marker.cross{strok ass=\"hljs-keyword\">await</span> <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">tasksRepository</span>.<span class=\"hljs-title function_\">findOne</span>({\n    <span class=\"hljs-attr\">where</span>: { <span class=\"hljs-attr\">id</span>: taskId },\n    <span class=\"hljs-attr\">relations</span>: { <span class=\"hljs-attr\">tags</span>: <span class=\"hljs-literal\">true</span> },\n  });\n  <span class=\"hljs-keyword\">if</span> (!task) <span class=\"hljs-keyword\">return</span> <span class=\"hljs-literal\">null</span>;\n\n  <span class=\"hljs-keyword\">const</span> tags = <span class=\"hljs-keyword\">await</span> <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">tagsRepository</span>.<span class=\"hljs-title function_\">findBy</span>({ <span class=\"hljs-attr\">id</span>: <span class=\"hljs-title class_\">In</span>(tagIds) });\n  task.<span class=\"hljs-property\">tags</span> = [...task.<span class=\"hljs-property\">tags</span>, ...tags];\n\n  <span class=\"hljs-keyword\">return</span> <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">tasksRepository</span>.<span class=\"hljs-title function_\">save</span>(task);\n}\n\n<span class=\"hljs-keyword\">async</span> <span class=\"hljs-title function_\">findTasksByTag</span>(<span class=\"hljs-attr\">tagName</span>: <span class=\"hljs-built_in\">string</span>): <span class=\"hljs-title class_\">Promise</span>&lt;<span class=\"hljs-title class_\">Task</span>[]&gt; {\n  <span class=\"hljs-keyword\">return</span> <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">tasksRepository</span>.<span class=\"hljs-title function_\">find</span>({\n    <span class=\"hljs-attr\">where</span>: { <span class=\"hljs-attr\">tags</span>: { <span class=\"hljs-attr\">name</span>: tagName } },\n    <span class=\"hljs-attr\">relations</span>: { <span class=\"hljs-attr\">tags</span>: <span class=\"hljs-literal\">true</span> },\n  });\n}</code></pre><div class=\"warning\"><strong>⚠️ Двосторонній зв'язок ManyToMany</strong> <p>За потреби доступу з обох сторін, опишіть зв'язок симетрично. <code>@JoinTable</code> залишається тільки на одній стороні:</p>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// task.entity.ts</span>\n<span class=\"hljs-meta\">@ManyToMany</span>(<span class=\"hljs-function\">() =&gt;</span> <span class=\"hljs-title class_\">Tag</span>, <span class=\"hljs-function\">(<span class=\"hljs-params\">tag</span>) =&gt;</span> tag.<span class=\"hljs-property\">tasks</span>)\n<span class=\"hljs-meta\">@JoinTable</span>()\n<span class=\"hljs-attr\">tags</span>: <span class=\"hljs-title class_\">Tag</span>[];</code></pre><pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// tag.entity.ts</span>\n<span class=\"hljs-meta\">@ManyToMany</span>(<span class=\"hljs-function\">() =&gt;</span> <span class=\"hljs-title class_\">Task</span>, <span class=\"hljs-function\">(<span class=\"hljs-params\">task</span>) =&gt;</span> task.<span class=\"hljs-property\">tags</span>)\n<span class=\"hljs-attr\">tasks</span>: <span class=\"hljs-title class_\">Task</span>[];</code></pre></div>\n\n","<h1>🛡️ Безпека та оптимізація запитів</h1>\n<p><strong>Головна ідея:</strong> TypeORM автоматично використовує параметризовані запити, але правильна робота з зв'язками та індексами критична для продуктивності.</p>\n<h2>🔒 Захист від SQL-injection</h2>\n<p>TypeORM автоматично екранує всі значення в методах <code>find</code>, <code>findOne</code>, <code>update</code>, <code>delete</code> та query builder. Прямий запит без параметризації — антипатерн.</p>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// ❌ Уразливе до SQL-injection</span>\n<span class=\"hljs-keyword\">const</span> users = <span class=\"hljs-keyword\">await</span> dataSource.<span class=\"hljs-title function_\">query</span>(\n  <span class=\"hljs-string\">`SELECT * FROM users WHERE email = '<span class=\"hljs-subst\">${email}</span>'`</span>\n);\n\n<span class=\"hljs-comment\">// ✅ Параметризований запит</span>\n<span class=\"hljs-keyword\">const</span> users = <span class=\"hljs-keyword\">await</span> dataSource.<span class=\"hljs-title function_\">query</span>(\n  <span class=\"hljs-string\">`SELECT * FROM users WHERE email = $1`</span>,\n  [email]\n);\n\n<span class=\"hljs-comment\">// ✅ Безпечно через repository</span>\n<span class=\"hljs-keyword\">const</span> users = <span class=\"hljs-keyword\">await</span> usersRepository.<span class=\"hljs-title function_\">findBy</span>({ email });</code></pre><h2>⚡ Проблема N+1 запитів</h2>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// ❌ N+1 проблема: 1 запит на users + N запитів на tasks</span>\n<span class=\"hljs-keyword\">const</span> users = <span class=\"hljs-keyword\">await</span> <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">usersRepository</span>.<span class=\"hljs-title function_\">find</span>();\n<span class=\"hljs-keyword\">for</span> (<span class=\"hljs-keyword\">const</span> user <span class=\"hljs-keyword\">of</span> users) {\n  <span class=\"hljs-keyword\">const</span> userTasks = <span class=\"hljs-keyword\">await</span> <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">tasksRepository</span>.<span class=\"hljs-title function_\">find</span>({\n    <span class=\"hljs-attr\">where</span>: { <span class=\"hljs-attr\">user</span>: { <span class=\"hljs-attr\">id</span>: user.<span class=\"hljs-property\">id</span> } },\n  });\n  <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(user.<span class=\"hljs-property\">email</span>, userTasks.<span class=\"hljs-property\">length</span>);\n}\n\n<span class=\"hljs-comment\">// ✅ Один JOIN-запит — пов'язані задачі завантажуються разом</span>\n<span class=\"hljs-keyword\">const</span> usersWithTasks = <span class=\"hljs-keyword\">await</span> <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">usersRepository</span>.<span class=\"hljs-title function_\">find</span>({\n  <span class=\"hljs-attr\">relations</span>: { <span class=\"hljs-attr\">tasks</span>: <span class=\"hljs-literal\">true</span> },\n});\n<span class=\"hljs-keyword\">for</span> (<span class=\"hljs-keyword\">const</span> user <span class=\"hljs-keyword\">of</span> usersWithTasks) {\n  <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(user.<span class=\"hljs-property\">email</span>, user.<span class=\"hljs-property\">tasks</span>.<span class=\"hljs-property\">length</span>);\n}</code></pre><h2>🎯 Індекси для швидкого пошуку</h2>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-meta\">@Entity</span>()\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">class</span> <span class=\"hljs-title class_\">User</span> {\n  <span class=\"hljs-meta\">@PrimaryGeneratedColumn</span>()\n  <span class=\"hljs-attr\">id</span>: <span class=\"hljs-built_in\">number</span>;\n\n  <span class=\"hljs-meta\">@Index</span>()\n  <span class=\"hljs-meta\">@Column</span>({ <span class=\"hljs-attr\">unique</span>: <span class=\"hljs-literal\">true</span> })\n  <span class=\"hljs-attr\">email</span>: <span class=\"hljs-built_in\">string</span>;\n\n  <span class=\"hljs-meta\">@Index</span>()\n  <span class=\"hljs-meta\">@Column</span>()\n  <span class=\"hljs-attr\">status</span>: <span class=\"hljs-built_in\">string</span>;\n\n  <span class=\"hljs-meta\">@CreateDateColumn</span>()\n  <span class=\"hljs-attr\">createdAt</span>: <span class=\"hljs-title class_\">Date</span>;\n}</code></pre><div class=\"tip\"><strong>💡 Коли ставити індекс</strong> <p>Індекси прискорюють пошук (<code>SELECT</code>) але уповільнюють запис (<code>INSERT</code>/<code>UPDATE</code>). Додавайте індекси на стовпці, за якими часто виконується фільтрація або сортування.</p>\n</div>\n\n","<h1>✅ Ключові висновки</h1>\n<div class=\"success\"><strong>✅ Підсумок лекції</strong> <p><strong>📌 Основні поняття:</strong></p>\n<ol>\n<li><p><strong>ORM</strong> — техніка, що відображає об'єкти коду на таблиці БД, забезпечуючи типобезпеку та автоматичний mapping</p>\n</li>\n<li><p><strong>TypeORM</strong> — ORM для TypeScript з декораторами; інтегрується з Nest.js через <code>@nestjs/typeorm</code></p>\n</li>\n<li><p><strong>Entity</strong> — клас з декоратором <code>@Entity()</code>, що описує структуру таблиці через декоратори колонок</p>\n</li>\n<li><p><strong>Repository</strong> — типізований об'єкт для CRUD-операцій; інжектується в сервіс через <code>@InjectRepository</code></p>\n</li>\n<li><p><strong>Migrations</strong> — версійовані файли змін схеми; обов'язкові у продакшені замість <code>synchronize: true</code></p>\n</li>\n<li><p><strong>Relations</strong> — зв'язки між сутностями: OneToOne, OneToMany/ManyToOne, ManyToMany</p>\n</li>\n<li><p><strong>JoinColumn та JoinTable</strong> — визначають, де зберігається зовнішній ключ або junction-таблиця</p>\n</li>\n<li><p><strong>Завантаження зв'язків</strong> — за замовчуванням не виконується; вмикається через опцію <code>relations</code></p>\n</li>\n</ol>\n</div>\n\n","<h1>❓ Контрольні питання</h1>\n<ol>\n<li><p>🤔 Які проблеми вирішує ORM порівняно з прямим написанням SQL-запитів у коді застосунку?</p>\n</li>\n<li><p>🤔 У чому різниця між <code>forRoot</code> та <code>forFeature</code> у <code>TypeOrmModule</code>? Коли використовується кожен?</p>\n</li>\n<li><p>🤔 Чому опція <code>synchronize: true</code> неприпустима у продакшені? Як її замінює механізм міграцій?</p>\n</li>\n<li><p>🤔 У чому різниця між методами <code>create()</code> та <code>save()</code> репозиторію? Чому вони розділені?</p>\n</li>\n<li><p>🤔 У парі <code>OneToMany</code> / <code>ManyToOne</code> на якій стороні зберігається зовнішній ключ? Чому?</p>\n</li>\n<li><p>🤔 Яке призначення декораторів <code>@JoinColumn</code> та <code>@JoinTable</code>? Чим вони відрізняються?</p>\n</li>\n<li><p>🤔 Що таке проблема N+1 запитів і як її уникнути в TypeORM?</p>\n</li>\n</ol>\n","<h1>📖 Глосарій термінів</h1>\n<table>\n<thead>\n<tr>\n<th>Термін</th>\n<th>English</th>\n<th>Визначення</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Об'єктно-реляційне відображення</td>\n<td>Object-Relational Mapping</td>\n<td>Техніка перетворення між об'єктною та реляційною моделями</td>\n</tr>\n<tr>\n<td>Сутність</td>\n<td>Entity</td>\n<td>Клас, що представляє таблицю в БД</td>\n</tr>\n<tr>\n<td>Репозиторій</td>\n<td>Repository</td>\n<td>Об'єкт для виконання CRUD-операцій над сутністю</td>\n</tr>\n<tr>\n<td>Міграція</td>\n<td>Migration</td>\n<td>Версіонована зміна схеми БД</td>\n</tr>\n<tr>\n<td>Зв'язок</td>\n<td>Relation</td>\n<td>Посилання між сутностями через зовнішні ключі</td>\n</tr>\n<tr>\n<td>Зовнішній ключ</td>\n<td>Foreign Key</td>\n<td>Стовпець, що посилається на первинний ключ іншої таблиці</td>\n</tr>\n<tr>\n<td>Проміжна таблиця</td>\n<td>Junction Table</td>\n<td>Таблиця для реалізації зв'язку ManyToMany</td>\n</tr>\n<tr>\n<td>Каскадні операції</td>\n<td>Cascade</td>\n<td>Автоматичне поширення операцій на пов'язані сутності</td>\n</tr>\n<tr>\n<td>Параметризований запит</td>\n<td>Parameterized Query</td>\n<td>Запит зі значеннями, переданими окремо від SQL</td>\n</tr>\n<tr>\n<td>Індекс</td>\n<td>Index</td>\n<td>Структура для прискорення пошуку у таблиці</td>\n</tr>\n</tbody></table>\n","<h1>📖 Глосарій абревіатур</h1>\n<table>\n<thead>\n<tr>\n<th>Абревіатура</th>\n<th>Розшифровка</th>\n<th>Переклад</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>ORM</td>\n<td>Object-Relational Mapping</td>\n<td>Об'єктно-реляційне відображення</td>\n</tr>\n<tr>\n<td>SQL</td>\n<td>Structured Query Language</td>\n<td>Мова структурованих запитів</td>\n</tr>\n<tr>\n<td>DB</td>\n<td>Database</td>\n<td>База даних</td>\n</tr>\n<tr>\n<td>DBMS</td>\n<td>Database Management System</td>\n<td>Система керування базами даних</td>\n</tr>\n<tr>\n<td>CRUD</td>\n<td>Create, Read, Update, Delete</td>\n<td>Створення, читання, оновлення, видалення</td>\n</tr>\n<tr>\n<td>FK</td>\n<td>Foreign Key</td>\n<td>Зовнішній ключ</td>\n</tr>\n<tr>\n<td>PK</td>\n<td>Primary Key</td>\n<td>Первинний ключ</td>\n</tr>\n<tr>\n<td>UUID</td>\n<td>Universally Unique Identifier</td>\n<td>Універсальний унікальний ідентифікатор</td>\n</tr>\n<tr>\n<td>DI</td>\n<td>Dependency Injection</td>\n<td>Інжекція залежностей</td>\n</tr>\n<tr>\n<td>CLI</td>\n<td>Command Line Interface</td>\n<td>Інтерфейс командного рядка</td>\n</tr>\n</tbody></table>\n"];let currentSlideIndex=0;
function renderMath(root){if(typeof renderMathInElement!=="function"||!root)return;try{renderMathInElement(root,{delimiters:[{left:"$$",right:"$$",display:true},{left:"\\[",right:"\\]",display:true},{left:"$",right:"$",display:false},{left:"\\(",right:"\\)",display:false}],throwOnError:false,strict:"ignore",ignoredTags:["script","noscript","style","textarea","pre","code"]});}catch(e){console.warn("Math render error:",e);}}
function showSlide(i){if(i<0||i>=slides.length)return;currentSlideIndex=i;const el=document.getElementById("current-slide");el.innerHTML=slides[i];el.scrollTop=0;renderMath(el);document.getElementById("progress-bar").style.width=((i+1)/slides.length*100)+"%";document.getElementById("slide-number").textContent=(i+1)+" / "+slides.length;updateSidebarActive();}
function nextSlide(){if(currentSlideIndex<slides.length-1)showSlide(currentSlideIndex+1);}
function previousSlide(){if(currentSlideIndex>0)showSlide(currentSlideIndex-1);}
function toggleSidebar(){document.getElementById("sidebar").classList.toggle("open");}
function toggleHelp(){document.getElementById("help-overlay").classList.toggle("hidden");}
function toggleFullscreen(){if(!document.fullscreenElement){const pc=document.getElementById("presentation-container");if(pc.requestFullscreen)pc.requestFullscreen();else if(pc.webkitRequestFullscreen)pc.webkitRequestFullscreen();else if(pc.msRequestFullscreen)pc.msRequestFullscreen();else if(pc.mozRequestFullScreen)pc.mozRequestFullScreen();}else{if(document.exitFullscreen)document.exitFullscreen();else if(document.webkitExitFullscreen)document.webkitExitFullscreen();else if(document.msExitFullscreen)document.msExitFullscreen();else if(document.mozCancelFullScreen)document.mozCancelFullScreen();}}
function generateSidebar(){const sc=document.getElementById("sidebar-content");sc.innerHTML="";slides.forEach((html,idx)=>{const t=document.createElement("div");t.className="slide-thumbnail";if(idx===0)t.classList.add("active");const tmp=document.createElement("div");tmp.innerHTML=html;const title=tmp.querySelector("h1,h2");const titleText=title?title.textContent:("Слайд "+(idx+1));const textContent=tmp.textContent.replace(/s+/g," ").trim();const preview=textContent.substring(0,100)+(textContent.length>100?"...":"");t.innerHTML="<div class=\"slide-thumbnail-number\">"+(idx+1)+"</div><div class=\"slide-thumbnail-title\">"+titleText+"</div><div class=\"slide-thumbnail-content\">"+preview+"</div>";t.onclick=()=>{showSlide(idx);if(window.innerWidth<1024)toggleSidebar();};sc.appendChild(t);});}
function updateSidebarActive(){document.querySelectorAll(".slide-thumbnail").forEach((th,idx)=>{if(idx===currentSlideIndex){th.classList.add("active");th.scrollIntoView({behavior:"smooth",block:"nearest"});}else th.classList.remove("active");});}
document.addEventListener("keydown",e=>{switch(e.key){case"ArrowLeft":previousSlide();break;case"ArrowRight":case" ":e.preventDefault();nextSlide();break;case"f":case"F":toggleFullscreen();break;case"s":case"S":toggleSidebar();break;case"?":toggleHelp();break;case"Escape":const sb=document.getElementById("sidebar");const ho=document.getElementById("help-overlay");if(sb.classList.contains("open"))toggleSidebar();else if(!ho.classList.contains("hidden"))ho.classList.add("hidden");break;}});
generateSidebar();showSlide(0);</script></body></html>
