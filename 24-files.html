<!DOCTYPE html><html lang="uk"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Робота з файлами</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css"><style>* {

#presentation-container:fullscreen,#presentation-container:-webkit-full-screen,#presentation-container:-moz-full-screen,#presentation-container:-ms-fullscreen{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%)!important;}</style></head><body><div id="presentation-container"><div class="progress"><div class="progress-bar" id="progress-bar"></div></div><button id="sidebar-toggle" onclick="toggleSidebar()" title="Навігація слайдами (S)">☰</button><div id="sidebar"><div id="sidebar-header"><h3>📑 Слайди</h3><button id="sidebar-close" onclick="toggleSidebar()">✕</button></div><div id="sidebar-content"></div></div><div class="slide-container"><div class="slide" id="current-slide"></div></div><div class="controls"><button class="control-btn" onclick="previousSlide()" title="Попередній (←)">←</button><button class="control-btn" onclick="nextSlide()" title="Наступний (→)">→</button><button class="control-btn" onclick="toggleFullscreen()" title="Повноекранний режим (F)">⛶</button><button class="control-btn" onclick="toggleHelp()" title="Допомога (?)">?</button></div><div class="slide-number" id="slide-number">1 / 24</div><div id="help-overlay" class="hidden"><strong>Гарячі клавіші:</strong><br><kbd>←</kbd> <kbd>→</kbd> Навігація<br><kbd>F</kbd> Повноекранний режим<br><kbd>S</kbd> Sidebar<br><kbd>?</kbd> Допомога<br><kbd>Esc</kbd> Закрити</div></div><script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script><script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script><script>const slides=["<h1>Робота з файлами</h1>\n<p><strong>Сучасні технології Internet-програмування</strong></p>\n<p>Лектор: Кобилянський Антон</p>\n","<h1>📋 План лекції</h1>\n<ol>\n<li>🧩 Чому файли потребують окремого формату передачі</li>\n<li>🌐 Способи кодування тіла HTTP-запиту</li>\n<li>📦 multipart/form-data: анатомія та мережевий рівень</li>\n<li>🧱 FormData: збирання запиту на клієнті</li>\n<li>🖥️ Frontend: вибір, попередній перегляд та відправлення</li>\n<li>📊 Frontend: відстеження прогресу завантаження</li>\n<li>⚙️ Backend: прийом файлів у Nest.js</li>\n<li>🛡️ Валідація та безпека завантаження</li>\n<li>🔁 Зберігання, роздача файлів та повний потік</li>\n</ol>\n","<h1>🧩 Чому файли потребують окремого формату</h1>\n<div class=\"info\"><strong>ℹ️ Проблема</strong> <p>Запити, з якими ми працювали досі, переносили <strong>текстові</strong> дані: JSON або рядки форм. Файли (зображення, документи, відео) є <strong>бінарними</strong> даними, тобто послідовністю байтів, яку не можна напряму вкласти у JSON.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> Текстовий формат JSON не призначений для бінарного вмісту. Щоб передати файл усередині JSON, його довелося б закодувати у текст за допомогою Base64, а це збільшує обсяг приблизно на 33% і додає зайву обробку для клієнта та сервера.</p>\n<h2>⚖️ Два підходи</h2>\n<table>\n<thead>\n<tr>\n<th>Підхід</th>\n<th>Як працює</th>\n<th>Недолік</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>JSON + Base64</td>\n<td>Файл кодується у текстовий рядок</td>\n<td>Зростання розміру, зайва обробка</td>\n</tr>\n<tr>\n<td><code>multipart/form-data</code></td>\n<td>Бінарні дані передаються «як є»</td>\n<td>Потребує окремого розбору на сервері</td>\n</tr>\n</tbody></table>\n<div class=\"tip\"><strong>💡 Висновок</strong> <p>Для завантаження файлів у вебі стандартом де-факто є формат <code>multipart/form-data</code>. Саме його ми розберемо на рівні мережі далі.</p>\n</div>\n\n","<h1>🌐 Як кодується тіло HTTP-запиту</h1>\n<p><strong>Головна ідея:</strong> Заголовок <code>Content-Type</code> повідомляє серверу, у якому форматі закодоване тіло запиту. Від цього значення залежить, як саме сервер розбиратиме отримані байти.</p>\n<h2>📑 Основні формати тіла</h2>\n<table>\n<thead>\n<tr>\n<th><code>Content-Type</code></th>\n<th>Призначення</th>\n<th>Бінарні дані</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>application/json</code></td>\n<td>Структуровані текстові дані</td>\n<td>❌ лише через Base64</td>\n</tr>\n<tr>\n<td><code>application/x-www-form-urlencoded</code></td>\n<td>Прості пари ключ-значення з форми</td>\n<td>❌ неефективно</td>\n</tr>\n<tr>\n<td><code>multipart/form-data</code></td>\n<td>Текстові поля та файли одночасно</td>\n<td>✅ напряму</td>\n</tr>\n</tbody></table>\n<div class=\"note\"><strong>📝 Деталь</strong> <p>Формат <code>application/x-www-form-urlencoded</code> кодує дані як <code>key=value&amp;key2=value2</code> з URL-екрануванням. Для бінарного вмісту кожен службовий байт довелося б екранувати, що різко збільшує розмір. Саме тому для файлів застосовують <code>multipart/form-data</code>.</p>\n</div>\n\n","<h1>📦 multipart/form-data: анатомія</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>multipart/form-data</strong> є форматом кодування тіла запиту, який дозволяє об'єднати в одному запиті декілька окремих частин (parts): текстові поля та файли. Кожна частина має власні заголовки.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> Тіло запиту ділиться на частини за допомогою унікального рядка-роздільника, що зветься <strong>boundary</strong>. Boundary оголошується в заголовку <code>Content-Type</code> і повторюється перед кожною частиною.</p>\n<h2>🧷 Структура частини</h2>\n\n<div class=\"mermaid\" data-source=\"graph TD\n    Request[&quot;HTTP POST запит&quot;] --&gt; Headers[&quot;Заголовок Content-Type з boundary&quot;]\n    Request --&gt; Body[&quot;Тіло запиту&quot;]\n    Body --&gt; PartText[&quot;Частина: текстове поле title&quot;]\n    Body --&gt; PartFile[&quot;Частина: файл report.pdf&quot;]\n    PartFile --&gt; FileMeta[&quot;Заголовки частини: name, filename, Content-Type&quot;]\n    PartFile --&gt; FileData[&quot;Бінарний вміст файлу&quot;]\n    style Request fill:#fff9c4,stroke:#f9a825\n    style Headers fill:#e3f2fd,stroke:#1565c0\n    style Body fill:#e8f5e9,stroke:#388e3c\n    style PartFile fill:#fce4ec,stroke:#c2185b\n    style PartText fill:#f3e5f5,stroke:#7b1fa2\"><svg id=\"exp-1780378010108-4-  width=\"182.1171875\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-67.05859375, -12)\"><rect></rect><foreignObject width=\"134.1171875\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>HTTP POST запит</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1780378010108-4-0-flowchart-Headers-1\" data-look=\"classic\" transform=\"translate(132, 142)\"><rect class=\"basic label-container\" style=\"fill:#e3f2fd !important;stroke:#1565c0 !important\" x=\"-124\" y=\"-36\" width=\"248\" height=\"72\"></rect><g class=\"label\" style=\"\" transform=\"translate(-100, -24)\"><rect></rect><foreignObject width=\"200\" height=\"48\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;\"><span class=\"nodeLabel \"><p>Заголовок Content-Type з boundary</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1780378010108-4-0-flowchart-Body-3\" data-look=\"classic\" transform=\"translate(373.7890625, 142)\"><rect class=\"basic label-container\" style=\"fill:#e8f5e9 !important;stroke:#388e3c !important\" x=\"-67.7890625\" y=\"-24\" width=\"135.578125\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-43.7890625, -12)\"><rect></rect><foreignObject width=\"87.578125\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>Тіло запиту</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1780378010108-4-0-flowchart-PartText-5\" data-look=\"classic\" transform=\"translate(227.9140625, 264)\"><rect class=\"basic label-container\" style=\"fill:#f3e5f5 !important;stroke:#7b1fa2 !important\" x=\"-124\" y=\"-36\" width=\"248\" height=\"72\"></rect><g class=\"label\" style=\"\" transform=\"translate(-100, -24)\"><rect></rect><foreignObject width=\"200\" height=\"48\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;\"><span class=\"nodeLabel \"><p>Частина: текстове поле title</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1780378010108-4-0-flowchart-PartFile-7\" data-look=\"classic\" transform=\"translate(519.6640625, 264)\"><rect class=\"basic label-container\" style=\"fill:#fce4ec !important;stroke:#c2185b !important\" x=\"-117.75\" y=\"-24\" width=\"235.5\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-93.75, -12)\"><rect></rect><foreignObject width=\"187.5\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>Частина: файл report.pdf</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1780378010108-4-0-flowchart-FileMeta-9\" data-look=\"classic\" transform=\"translate(379.48828125, 398)\"><rect class=\"basic label-container\" style=\"\" x=\"-124\" y=\"-48\" width=\"248\" height=\"96\"></rect><g class=\"label\" style=\"\" transform=\"translate(-100, -36)\"><rect></rect><foreignObject width=\"200\" height=\"72\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;\"><span class=\"nodeLabel \"><p>Заголовки частини: name, filename, Content-Type</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1780378010108-4-0-flowchart-FileData-11\" data-look=\"classic\" transform=\"translate(659.83984375, 398)\"><rect class=\"basic label-container\" style=\"\" x=\"-106.3515625\" y=\"-24\" width=\"212.703125\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-82.3515625, -12)\"><rect></rect><foreignObject width=\"164.703125\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>Бінарний вміст файлу</p></span></div></foreignObject></g></g></g></g></g><defs><filter id=\"exp-1780378010108-4-0-drop-shadow\" height=\"130%\" width=\"130%\"><feDropShadow dx=\"4\" dy=\"4\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs><defs><filter id=\"exp-1780378010108-4-0-drop-shadow-small\" height=\"150%\" width=\"150%\"><feDropShadow dx=\"2\" dy=\"2\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs></svg></div>\n","<h1>🔬 multipart-запит на мережевому рівні</h1>\n<p><strong>Головна ідея:</strong> Так виглядає реальний запит на завантаження файлу разом із текстовим полем. Зверніть увагу на роздільники між частинами.</p>\n<pre><code class=\"language-http\">POST /api/files HTTP/1.1\nHost: api.example.com\nContent-Type: multipart/form-data; boundary=----TaskBoundary8sd7\nContent-Length: 1287\n\n------TaskBoundary8sd7\nContent-Disposition: form-data; name=\"title\"\n\nЗвіт за квартал\n------TaskBoundary8sd7\nContent-Disposition: form-data; name=\"file\"; filename=\"report.pdf\"\nContent-Type: application/pdf\n\n%PDF-1.7 ... (бінарні байти файлу) ...\n------TaskBoundary8sd7--</code></pre><div class=\"warning\"><strong>⚠️ Чому boundary критично важливий</strong> <p><strong>boundary</strong> має бути унікальним рядком, якого гарантовано немає у вмісті файлів. Браузер генерує його автоматично. Саме тому заголовок <code>Content-Type</code> для такого запиту <strong>не можна</strong> задавати вручну: інакше boundary загубиться, і сервер не зможе розділити тіло на частини.</p>\n</div>\n\n","<h1>🧱 FormData: збирання запиту на клієнті</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>FormData</strong> є вбудованим у браузер інтерфейсом для формування набору пар ключ-значення, що автоматично кодується у <code>multipart/form-data</code> під час відправлення.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> Ми не складаємо multipart-тіло вручну. Ми наповнюємо об'єкт <code>FormData</code>, а браузер сам генерує boundary та кодує всі частини.</p>\n<pre><code class=\"language-ts hljs language-typescript\" data-highlighted=\"yes\"><span class=\"hljs-keyword\">const</span> formData = <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">FormData</span>();\nformData.<span class=\"hljs-title function_\">append</span>(<span class=\"hljs-string\">\"title\"</span>, <span class=\"hljs-string\">\"Звіт за квартал\"</span>); <span class=\"hljs-comment\">// текстове поле</span>\nformData.<span class=\"hljs-title function_\">append</span>(<span class=\"hljs-string\">\"file\"</span>, selectedFile); <span class=\"hljs-comment\">// об'єкт File</span>\n\n<span class=\"hljs-comment\">// formData далі передається у fetch або axios як тіло запиту</span></code></pre><div class=\"warning\"><strong>⚠️ Поширена помилка</strong> <p>Не встановлюйте заголовок <code>Content-Type</code> вручну під час відправлення <code>FormData</code>. Браузер додає його сам разом із коректним boundary. Будь-яке ручне значення (наприклад, <code>application/json</code>) зламає завантаження.</p>\n</div>\n\n","<h1>🖥️ Frontend: вибір файлу</h1>\n<p><strong>Головна ідея:</strong> Файли вибираються через елемент <code>&lt;input type=\"file\"&gt;</code>. Вибрані файли доступні як об'єкти <code>File</code> у властивості <code>event.target.files</code>.</p>\n<pre><code class=\"language-tsx hljs language-typescript\" data-highlighted=\"yes\"><span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">FileSelect</span>(<span class=\"hljs-params\"></span>) {\n  <span class=\"hljs-keyword\">const</span> <span class=\"hljs-title function_\">handleChange</span> = (<span class=\"hljs-params\">e: React.ChangeEvent&lt;HTMLInputElement&gt;</span>) =&gt; {\n    <span class=\"hljs-keyword\">const</span> file = e.<span class=\"hljs-property\">target</span>.<span class=\"hljs-property\">files</span>?.[<span class=\"hljs-number\">0</span>];\n    <span class=\"hljs-keyword\">if</span> (!file) <span class=\"hljs-keyword\">return</span>;\n\n    <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(file.<span class=\"hljs-property\">name</span>); <span class=\"hljs-comment\">// \"report.pdf\"</span>\n    <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(file.<span class=\"hljs-property\">size</span>); <span class=\"hljs-comment\">// розмір у байтах</span>\n    <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(file.<span class=\"hljs-property\">type</span>); <span class=\"hljs-comment\">// \"application/pdf\" (заявлений MIME-тип)</span>\n  };\n\n  <span class=\"hljs-keyword\">return</span> (\n    <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">input</span>\n      <span class=\"hljs-attr\">type</span>=<span class=\"hljs-string\">\"file\"</span>\n      <span class=\"hljs-attr\">accept</span>=<span class=\"hljs-string\">\"image/png, image/jpeg, .pdf\"</span>\n      <span class=\"hljs-attr\">onChange</span>=<span class=\"hljs-string\">{handleChange}</span>\n    /&gt;</span></span>\n  );\n}</code></pre><div class=\"warning\"><strong>⚠️ Атрибут accept не є валідацією</strong> <p>Атрибут <code>accept</code> лише підказує діалогу вибору операційної системи, які файли пропонувати. Користувач все одно може надіслати файл іншого типу, тому валідація на клієнті та сервері є обов'язковою.</p>\n</div>\n\n","<h1>🗃️ Об'єкт File та FileList</h1>\n<p><strong>Головна ідея:</strong> Об'єкт <code>File</code> успадковує <code>Blob</code> і містить метадані про файл. Для вибору декількох файлів використовують атрибут <code>multiple</code>.</p>\n<h2>📋 Властивості об'єкта File</h2>\n<table>\n<thead>\n<tr>\n<th>Властивість</th>\n<th>Опис</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>name</code></td>\n<td>Початкова назва файлу</td>\n</tr>\n<tr>\n<td><code>size</code></td>\n<td>Розмір у байтах</td>\n</tr>\n<tr>\n<td><code>type</code></td>\n<td>Заявлений MIME-тип</td>\n</tr>\n<tr>\n<td><code>lastModified</code></td>\n<td>Час останньої зміни</td>\n</tr>\n</tbody></table>\n<pre><code class=\"language-tsx hljs language-typescript\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// З атрибутом multiple files містить декілька елементів</span>\n<span class=\"hljs-keyword\">const</span> files = <span class=\"hljs-title class_\">Array</span>.<span class=\"hljs-title function_\">from</span>(e.<span class=\"hljs-property\">target</span>.<span class=\"hljs-property\">files</span> ?? []);\n<span class=\"hljs-keyword\">const</span> totalSize = files.<span class=\"hljs-title function_\">reduce</span>(<span class=\"hljs-function\">(<span class=\"hljs-params\">sum, f</span>) =&gt;</span> sum + f.<span class=\"hljs-property\">size</span>, <span class=\"hljs-number\">0</span>);</code></pre><div class=\"note\"><strong>📝 Нотатка:</strong> <p><code>event.target.files</code> є структурою <code>FileList</code> (схожою на масив, але не масивом). Щоб застосувати методи масиву, її перетворюють через <code>Array.from</code>.</p>\n</div>\n\n","<h1>🖼️ Frontend: попередній перегляд</h1>\n<p><strong>Головна ідея:</strong> Щоб показати прев'ю зображення до відправлення, об'єкт <code>File</code> треба перетворити на URL, придатний для атрибута <code>src</code>.</p>\n<pre><code class=\"language-tsx hljs language-typescript\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// Спосіб 1: createObjectURL дає швидке посилання на файл у пам'яті</span>\n<span class=\"hljs-keyword\">const</span> url = <span class=\"hljs-variable constant_\">URL</span>.<span class=\"hljs-title function_\">createObjectURL</span>(file);\n<span class=\"hljs-comment\">// &lt;img src={url} /&gt;</span>\n<span class=\"hljs-comment\">// Обов'язково звільнити пам'ять, коли прев'ю більше не потрібне:</span>\n<span class=\"hljs-variable constant_\">URL</span>.<span class=\"hljs-title function_\">revokeObjectURL</span>(url);\n\n<span class=\"hljs-comment\">// Спосіб 2: FileReader читає вміст у Base64 (data URL)</span>\n<span class=\"hljs-keyword\">const</span> reader = <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">FileReader</span>();\nreader.<span class=\"hljs-property\">onload</span> = <span class=\"hljs-function\">() =&gt;</span> {\n  <span class=\"hljs-keyword\">const</span> dataUrl = reader.<span class=\"hljs-property\">result</span>; <span class=\"hljs-comment\">// \"data:image/png;base64,...\"</span>\n};\nreader.<span class=\"hljs-title function_\">readAsDataURL</span>(file);</code></pre><table>\n<thead>\n<tr>\n<th>Підхід</th>\n<th>Перевага</th>\n<th>Що врахувати</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>URL.createObjectURL</code></td>\n<td>Миттєвий, мало пам'яті</td>\n<td>Треба викликати <code>revokeObjectURL</code></td>\n</tr>\n<tr>\n<td><code>FileReader.readAsDataURL</code></td>\n<td>Дає сам вміст у Base64</td>\n<td>Більше пам'яті, повільніше</td>\n</tr>\n</tbody></table>\n<div class=\"tip\"><strong>💡 Порада:</strong> <p>У React зручно зберігати URL прев'ю у стані та викликати <code>URL.revokeObjectURL</code> у функції очищення <code>useEffect</code>, щоб уникнути витоку пам'яті при зміні файлу.</p>\n</div>\n\n","<h1>📤 Frontend: відправлення файлу</h1>\n<p><strong>Головна ідея:</strong> Об'єкт <code>FormData</code> передається як тіло POST-запиту. Бібліотека axios автоматично виставляє коректний заголовок <code>Content-Type</code> з boundary.</p>\n<pre><code class=\"language-ts hljs language-typescript\" data-highlighted=\"yes\"><span class=\"hljs-keyword\">import</span> axios <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"axios\"</span>;\n\n<span class=\"hljs-keyword\">async</span> <span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">uploadFile</span>(<span class=\"hljs-params\">file: File, title: <span class=\"hljs-built_in\">string</span></span>) {\n  <span class=\"hljs-keyword\">const</span> formData = <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">FormData</span>();\n  formData.<span class=\"hljs-title function_\">append</span>(<span class=\"hljs-string\">\"title\"</span>, title);\n  formData.<span class=\"hljs-title function_\">append</span>(<span class=\"hljs-string\">\"file\"</span>, file);\n\n  <span class=\"hljs-keyword\">const</span> response = <span class=\"hljs-keyword\">await</span> axios.<span class=\"hljs-title function_\">post</span>(<span class=\"hljs-string\">\"/api/files\"</span>, formData);\n  <span class=\"hljs-keyword\">return</span> response.<span class=\"hljs-property\">data</span>;\n}</code></pre><div class=\"success\"><strong>✅ Чому тут немає Content-Type</strong> <p>axios побачить, що тіло запиту є <code>FormData</code>, і виставить заголовок з boundary самостійно. Ручне втручання тут лише зашкодить.</p>\n</div>\n\n\n\n\n\n<div class=\"note\"><strong>📝 Узгодження назв полів</strong> <p>Назва поля у <code>append(\"file\", ...)</code> має збігатися з тим, що очікує сервер. Якщо сервер чекає поле <code>file</code>, а клієнт надсилає <code>document</code>, файл не буде прийнято.</p>\n</div>\n\n","<h1>📊 Frontend: прогрес завантаження</h1>\n<p><strong>Головна ідея:</strong> axios надає колбек <code>onUploadProgress</code>, який викликається під час передачі тіла та повідомляє, скільки байтів уже надіслано.</p>\n<pre><code class=\"language-ts hljs language-typescript\" data-highlighted=\"yes\"><span class=\"hljs-keyword\">await</span> axios.<span class=\"hljs-title function_\">post</span>(<span class=\"hljs-string\">\"/api/files\"</span>, formData, {\n  <span class=\"hljs-attr\">onUploadProgress</span>: <span class=\"hljs-function\">(<span class=\"hljs-params\">event</span>) =&gt;</span> {\n    <span class=\"hljs-keyword\">if</span> (!event.<span class=\"hljs-property\">total</span>) <span class=\"hljs-keyword\">return</span>; <span class=\"hljs-comment\">// загальний розмір може бути невідомий</span>\n    <span class=\"hljs-keyword\">const</span> percent = <span class=\"hljs-title class_\">Math</span>.<span class=\"hljs-title function_\">round</span>((event.<span class=\"hljs-property\">loaded</span> / event.<span class=\"hljs-property\">total</span>) * <span class=\"hljs-number\">100</span>);\n    <span class=\"hljs-title function_\">setProgress</span>(percent); <span class=\"hljs-comment\">// оновлюємо стан React</span>\n  },\n});</code></pre><ul>\n<li><code>event.loaded</code> показує, скільки байтів уже надіслано</li>\n<li><code>event.total</code> містить загальний розмір тіла запиту</li>\n<li>Відсоток зручно зберігати у стані та показувати у <code>&lt;progress&gt;</code> або смузі прогресу</li>\n</ul>\n<div class=\"tip\"><strong>💡 Важливий нюанс</strong> <p>Прогрес стосується саме <strong>відправлення</strong> даних на сервер. Обробка файлу сервером (валідація, збереження) відбувається вже після завершення передачі, тому смуга прогресу може «застигнути» на 100% до отримання відповіді.</p>\n</div>\n\n","<h1>⚙️ Backend: прийом файлів у Nest.js</h1>\n<div class=\"info\"><strong>ℹ️ Як це працює</strong> <p>Nest.js обробляє завантаження файлів за допомогою бібліотеки <strong>Multer</strong> через пакет <code>@nestjs/platform-express</code>. Multer розбирає тіло <code>multipart/form-data</code> і надає файли контролеру у зручному вигляді.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> Щоб контролер прийняв файл, на метод навішують <strong>інтерсептор</strong> <code>FileInterceptor</code>, який вказує назву поля з файлом. Сам файл отримують через декоратор <code>@UploadedFile()</code>.</p>\n<div class=\"note\"><strong>📝 Типи для TypeScript</strong> <p>Тип <code>Express.Multer.File</code> стає доступним після встановлення типів: <code>npm i -D @types/multer</code>.</p>\n</div>\n\n","<h1>🧰 Backend: один та декілька файлів</h1>\n<pre><code class=\"language-ts hljs language-typescript\" data-highlighted=\"yes\"><span class=\"hljs-keyword\">import</span> {\n  <span class=\"hljs-title class_\">Controller</span>,\n  <span class=\"hljs-title class_\">Post</span>,\n  <span class=\"hljs-title class_\">UseInterceptors</span>,\n  <span class=\"hljs-title class_\">UploadedFile</span>,\n  <span class=\"hljs-title class_\">UploadedFiles</span>,\n} <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"@nestjs/common\"</span>;\n<span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">FileInterceptor</span>, <span class=\"hljs-title class_\">FilesInterceptor</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"@nestjs/platform-express\"</span>;\n\n<span class=\"hljs-meta\">@Controller</span>(<span class=\"hljs-string\">\"files\"</span>)\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">class</span> <span class=\"hljs-title class_\">FilesController</span> {\n  <span class=\"hljs-comment\">// Один файл з поля \"file\"</span>\n  <span class=\"hljs-meta\">@Post</span>(<span class=\"hljs-string\">\"single\"</span>)\n  <span class=\"hljs-meta\">@UseInterceptors</span>(<span class=\"hljs-title class_\">FileInterceptor</span>(<span class=\"hljs-string\">\"file\"</span>))\n  <span class=\"hljs-title function_\">uploadOne</span>(<span class=\"hljs-params\"><span class=\"hljs-meta\">@UploadedFile</span>() file: Express.Multer.File</span>) {\n    <span class=\"hljs-keyword\">return</span> { <span class=\"hljs-attr\">name</span>: file.<span class=\"hljs-property\">originalname</span>, <span class=\"hljs-attr\">size</span>: file.<span class=\"hljs-property\">size</span> };\n  }\n\n  <span class=\"hljs-comment\">// Декілька файлів з поля \"files\", максимум 5</span>\n  <span class=\"hljs-meta\">@Post</span>(<span class=\"hljs-string\">\"many\"</span>)\n  <span class=\"hljs-meta\">@UseInterceptors</span>(<span class=\"hljs-title class_\">FilesInterceptor</span>(<span class=\"hljs-string\">\"files\"</span>, <span class=\"hljs-number\">5</span>))\n  <span class=\"hljs-title function_\">uploadMany</span>(<span class=\"hljs-params\"><span class=\"hljs-meta\">@UploadedFiles</span>() files: Express.Multer.File[]</span>) {\n    <span class=\"hljs-keyword\">return</span> { <span class=\"hljs-attr\">count</span>: files.<span class=\"hljs-property\">length</span> };\n  }\n}</code></pre><div class=\"note\"><strong>📝 Нотатка:</strong> <p>Рядок у <code>FileInterceptor(\"file\")</code> є назвою поля у <code>FormData</code>. Вона повинна точно збігатися з тим, що надсилає клієнт.</p>\n</div>\n\n","<h1>🗂️ Backend: об'єкт файлу та сховище</h1>\n<p><strong>Головна ідея:</strong> Multer надає файл як об'єкт із метаданими. Де саме зберігається вміст, залежить від обраного типу сховища (storage).</p>\n<h2>📦 Поля об'єкта файлу</h2>\n<table>\n<thead>\n<tr>\n<th>Поле</th>\n<th>Опис</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>originalname</code></td>\n<td>Початкова назва файлу від клієнта</td>\n</tr>\n<tr>\n<td><code>mimetype</code></td>\n<td>MIME-тип, визначений Multer</td>\n</tr>\n<tr>\n<td><code>size</code></td>\n<td>Розмір у байтах</td>\n</tr>\n<tr>\n<td><code>buffer</code></td>\n<td>Вміст файлу (лише для memory storage)</td>\n</tr>\n<tr>\n<td><code>path</code>, <code>filename</code></td>\n<td>Шлях та назва на диску (лише для disk storage)</td>\n</tr>\n</tbody></table>\n<h2>💾 Типи сховища</h2>\n<table>\n<thead>\n<tr>\n<th>Сховище</th>\n<th>Де зберігається</th>\n<th>Коли застосовувати</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>memoryStorage</code></td>\n<td>У пам'яті як <code>Buffer</code></td>\n<td>Невеликі файли, обробка, відправлення у хмару</td>\n</tr>\n<tr>\n<td><code>diskStorage</code></td>\n<td>Одразу на диск, є <code>path</code></td>\n<td>Великі файли; потребує керування очищенням</td>\n</tr>\n</tbody></table>\n<div class=\"warning\"><strong>⚠️ Ризик memoryStorage</strong> <p>memoryStorage тримає весь файл в оперативній пам'яті. Без обмеження розміру великі або численні завантаження можуть вичерпати пам'ять сервера.</p>\n</div>\n\n","<h1>🛡️ Backend: валідація файлів</h1>\n<p><strong>Головна ідея:</strong> Nest.js надає <code>ParseFilePipe</code> із вбудованими валідаторами розміру та типу. Якщо файл не проходить перевірку, запит відхиляється автоматично.</p>\n<pre><code class=\"language-ts hljs language-typescript\" data-highlighted=\"yes\"><span class=\"hljs-meta\">@Post</span>(<span class=\"hljs-string\">\"avatar\"</span>)\n<span class=\"hljs-meta\">@UseInterceptors</span>(<span class=\"hljs-title class_\">FileInterceptor</span>(<span class=\"hljs-string\">\"file\"</span>))\n<span class=\"hljs-title function_\">uploadAvatar</span>(\n  <span class=\"hljs-meta\">@UploadedFile</span>(\n    <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">ParseFilePipe</span>({\n      <span class=\"hljs-attr\">validators</span>: [\n        <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">MaxFileSizeValidator</span>({ <span class=\"hljs-attr\">maxSize</span>: <span class=\"hljs-number\">5</span> * <span class=\"hljs-number\">1024</span> * <span class=\"hljs-number\">1024</span> }), <span class=\"hljs-comment\">// 5 МБ</span>\n        <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">FileTypeValidator</span>({ <span class=\"hljs-attr\">fileType</span>: <span class=\"hljs-regexp\">/image\\/(jpeg|png|webp)/</span> }),\n      ],\n    }),\n  )\n  <span class=\"hljs-attr\">file</span>: <span class=\"hljs-title class_\">Express</span>.<span class=\"hljs-property\">Multer</span>.<span class=\"hljs-property\">File</span>,\n) {\n  <span class=\"hljs-keyword\">return</span> { <span class=\"hljs-attr\">name</span>: file.<span class=\"hljs-property\">originalname</span> };\n}</code></pre><div class=\"tip\"><strong>💡 Подвійний захист</strong> <p>Окрім перевірки у пайпі, варто задати жорсткий ліміт розміру на рівні самого Multer через опцію <code>limits.fileSize</code>, щоб сервер не зчитував надмірно великий файл повністю.</p>\n</div>\n\n","<h1>🚨 Безпека завантаження файлів</h1>\n<div class=\"danger\"><strong>🚫 Критично</strong> <p>Завантаження файлів є одним із найнебезпечніших векторів атак: користувач керує і вмістом, і назвою, і заявленим типом файлу.</p>\n</div>\n\n\n\n<ul>\n<li><strong>Підробка типу (MIME spoofing):</strong> заголовок <code>Content-Type</code> та розширення задаються клієнтом, тому їх можна підробити. Сучасний <code>FileTypeValidator</code> у Nest.js перевіряє <strong>сигнатуру файлу (magic numbers)</strong> через пакет <code>file-type</code>, що надійніше за порівняння рядка mimetype.</li>\n<li><strong>Path traversal:</strong> використання <code>originalname</code> у шляху збереження дозволяє назви на кшталт <code>../../etc/passwd</code>. Завжди генеруйте власну безпечну назву, наприклад UUID.</li>\n<li><strong>Виконувані файли:</strong> зберігайте завантажене так, щоб його не можна було випадково виконати на сервері.</li>\n<li><strong>Зберігання поза webroot:</strong> файли користувачів не повинні лежати у каталозі, який роздається як статика без контролю доступу.</li>\n<li><strong>Ліміти розміру та кількості:</strong> завжди задавайте обмеження, щоб уникнути відмови в обслуговуванні (DoS).</li>\n</ul>\n","<h1>🔁 Backend: зберігання та роздача файлів</h1>\n<p><strong>Головна ідея:</strong> Після валідації файл зберігають, а в базі даних записують лише метадані та шлях або ідентифікатор, а не сам бінарний вміст.</p>\n<pre><code class=\"language-ts hljs language-typescript\" data-highlighted=\"yes\"><span class=\"hljs-keyword\">import</span> { randomUUID } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"node:crypto\"</span>;\n<span class=\"hljs-keyword\">import</span> { extname } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"node:path\"</span>;\n\n<span class=\"hljs-comment\">// Генерація безпечної унікальної назви</span>\n<span class=\"hljs-keyword\">const</span> safeName = <span class=\"hljs-string\">`<span class=\"hljs-subst\">${randomUUID()}</span><span class=\"hljs-subst\">${extname(file.originalname)}</span>`</span>;\n<span class=\"hljs-comment\">// Зберегти вміст під цією назвою; у БД записати safeName, size, mimetype</span></code></pre><pre><code class=\"language-ts hljs language-typescript\" data-highlighted=\"yes\"><span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">Get</span>, <span class=\"hljs-title class_\">Param</span>, <span class=\"hljs-title class_\">Res</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"@nestjs/common\"</span>;\n<span class=\"hljs-keyword\">import</span> <span class=\"hljs-keyword\">type</span> { <span class=\"hljs-title class_\">Response</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"express\"</span>;\n\n<span class=\"hljs-meta\">@Get</span>(<span class=\"hljs-string\">\":name\"</span>)\n<span class=\"hljs-title function_\">download</span>(<span class=\"hljs-params\"><span class=\"hljs-meta\">@Param</span>(<span class=\"hljs-string\">\"name\"</span>) name: <span class=\"hljs-built_in\">string</span>, <span class=\"hljs-meta\">@Res</span>() res: Response</span>) {\n  <span class=\"hljs-comment\">// Content-Disposition керує тим, відкривати чи завантажувати файл</span>\n  res.<span class=\"hljs-title function_\">set</span>(<span class=\"hljs-string\">\"Content-Disposition\"</span>, <span class=\"hljs-string\">`attachment; filename=\"<span class=\"hljs-subst\">${name}</span>\"`</span>);\n  <span class=\"hljs-comment\">// далі файл надсилається потоком</span>\n}</code></pre><div class 619\" y2=\"245\" class=\"messageLine0\" data-et=\"message\" data-id=\"i2\" data-from=\"React\" data-to=\"Nest\" stroke-width=\"2\" stroke=\"none\" marker-end=\"url(#exp-1780378010168-18-0-arrowhead)\" style=\"fill: none;\"></line><text x=\"624\" y=\"309\" text-anchor=\"middle\" dominant-baseline=\"middle\" alignment-baseline=\"middle\" class=\"messageText\" dy=\"1em\" style=\"font-size: 16px; font-weight: 400;\">Розбір multipart та валідація</text><path d=\"M 624,344 C 684,334 684,374 624,364\" class=\"messageLine0\" data-et=\"message\" data-id=\"i4\" data-from=\"Nest\" data-to=\"Nest\" stroke-width=\"2\" stroke=\"none\" marker-end=\"url(#exp-1780378010168-18-0-arrowhead)\" style=\"fill: none;\"></path><text x=\"775\" y=\"389\" text-anchor=\"middle\" dominant-baseline=\"middle\" alignment-baseline=\"middle\" class=\"messageText\" dy=\"1em\" style=\"font-size: 16px; font-weight: 400;\">Зберігання з безпечною назвою</text><line x1=\"624\" y1=\"424\" x2=\"926\" y2=\"424\" class=\"messageLine0\" data-et=\"message\" data-id=\"i5\" data-from=\"Nest\" data-to=\"Storage\" stroke-width=\"2\" stroke=\"none\" marker-end=\"url(#exp-1780378010168-18-0-arrowhead)\" style=\"fill: none;\"></line><text x=\"778\" y=\"439\" text-anchor=\"middle\" dominant-baseline=\"middle\" alignment-baseline=\"middle\" class=\"messageText\" dy=\"1em\" style=\"font-size: 16px; font-weight: 400;\">Шлях або ідентифікатор</text><line x1=\"929\" y1=\"474\" x2=\"627\" y2=\"474\" class=\"messageLine1\" data-et=\"message\" data-id=\"i6\" data-from=\"Storage\" data-to=\"Nest\" stroke-width=\"2\" stroke=\"none\" marker-end=\"url(#exp-1780378010168-18-0-arrowhead)\" style=\"stroke-dasharray: 3, 3; fill: none;\"></line><text x=\"494\" y=\"489\" text-anchor=\"middle\" dominant-baseline=\"middle\" alignment-baseline=\"middle\" class=\"messageText\" dy=\"1em\" style=\"font-size: 16px; font-weight: 400;\">201 Created з метаданими</text><line x1=\"622\" y1=\"524\" x2=\"365\" y2=\"524\" class=\"messageLine1\" data-et=\"message\" data-id=\"i7\" data-from=\"Nest\" data-to=\"React\" stroke-width=\"2\" stroke=\"none\" marker-end=\"url(#exp-1780378010168-18-0-arrowhead)\" style=\"stroke-dasharray: 3, 3; fill: none;\"></line><text x=\"220\" y=\"539\" text-anchor=\"middle\" dominant-baseline=\"middle\" alignment-baseline=\"middle\" class=\"messageText\" dy=\"1em\" style=\"font-size: 16px; font-weight: 400;\">Підтвердження та посилання</text><line x1=\"360\" y1=\"574\" x2=\"79\" y2=\"574\" class=\"messageLine1\" data-et=\"message\" data-id=\"i8\" data-from=\"React\" data-to=\"User\" stroke-width=\"2\" stroke=\"none\" marker-end=\"url(#exp-1780378010168-18-0-arrowhead)\" style=\"stroke-dasharray: 3, 3; fill: none;\"></line></svg></div>\n<div class=\"success\"><strong>✅ Цілісна картина</strong> <p>Клієнт відповідає за вибір, перегляд і відправлення; сервер відповідає за розбір, валідацію та безпечне зберігання. Бінарний вміст рухається один раз, а застосунок далі оперує лише метаданими.</p>\n</div>\n\n","<h1>⚠️ Поширені помилки</h1>\n<table>\n<thead>\n<tr>\n<th>Помилка</th>\n<th>Наслідок</th>\n<th>Рішення</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Ручне <code>Content-Type: application/json</code> для FormData</td>\n<td>boundary губиться, розбір падає</td>\n<td>Не задавати заголовок вручну</td>\n</tr>\n<tr>\n<td>Різні назви поля на клієнті та в <code>FileInterceptor</code></td>\n<td>Файл не прийнято</td>\n<td>Узгодити назву (наприклад, <code>file</code>)</td>\n</tr>\n<tr>\n<td>Довіра до <code>mimetype</code> та розширення</td>\n<td>Підробка типу файлу</td>\n<td>Перевірка сигнатури (magic numbers)</td>\n</tr>\n<tr>\n<td>Збереження під <code>originalname</code></td>\n<td>path traversal, перезапис файлів</td>\n<td>Генерувати унікальну безпечну назву</td>\n</tr>\n<tr>\n<td>Відсутність ліміту розміру</td>\n<td>Вичерпання пам'яті чи диска</td>\n<td>Задати ліміти у Multer та у пайпі</td>\n</tr>\n<tr>\n<td>Невикликаний <code>revokeObjectURL</code></td>\n<td>Витік пам'яті у браузері</td>\n<td>Звільняти URL після перегляду</td>\n</tr>\n</tbody></table>\n","<h1>✅ Ключові висновки</h1>\n<div class=\"success\"><strong>✅ Підсумок лекції</strong> <ol>\n<li><p>Файли є бінарними даними; для їх передачі у вебі застосовують формат <code>multipart/form-data</code>, а не JSON.</p>\n</li>\n<li><p>multipart ділить тіло запиту на частини за допомогою boundary; кожна частина має власні заголовки.</p>\n</li>\n<li><p>На клієнті файли збирає об'єкт <code>FormData</code>; браузер сам виставляє <code>Content-Type</code> з boundary, тому вручну його задавати не можна.</p>\n</li>\n<li><p>Прев'ю роблять через <code>URL.createObjectURL</code> або <code>FileReader</code>; прогрес відстежують через <code>onUploadProgress</code>.</p>\n</li>\n<li><p>У Nest.js файли приймає Multer через <code>FileInterceptor</code> та декоратор <code>@UploadedFile</code>.</p>\n</li>\n<li><p>Обов'язкові кроки безпеки: перевірка типу за сигнатурою, ліміт розміру, безпечна назва файлу, зберігання поза вільним доступом.</p>\n</li>\n</ol>\n</div>\n\n","<h1>❓ Контрольні питання</h1>\n<ol>\n<li><p>🤔 Чому для передачі файлів використовують <code>multipart/form-data</code>, а не JSON?</p>\n</li>\n<li><p>🤔 Що таке boundary і яку роль він відіграє у multipart-запиті?</p>\n</li>\n<li><p>🤔 Чому при відправленні <code>FormData</code> не можна вручну задавати заголовок <code>Content-Type</code>?</p>\n</li>\n<li><p>🤔 Яка різниця між <code>URL.createObjectURL</code> та <code>FileReader</code> для прев'ю?</p>\n</li>\n<li><p>🤔 Як у Nest.js контролер приймає один файл і як приймає декілька файлів?</p>\n</li>\n<li><p>🤔 Чим небезпечна довіра до <code>mimetype</code> та розширення файлу і як перевіряти тип надійно?</p>\n</li>\n<li><p>🤔 Які кроки потрібні, щоб зберігання завантажених файлів було безпечним?</p>\n</li>\n</ol>\n","<h1>📖 Глосарій термінів</h1>\n<table>\n<thead>\n<tr>\n<th>Термін</th>\n<th>English</th>\n<th>Визначення</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>multipart-запит</td>\n<td>Multipart request</td>\n<td>Запит, тіло якого поділене на частини з власними заголовками</td>\n</tr>\n<tr>\n<td>Роздільник</td>\n<td>Boundary</td>\n<td>Унікальний рядок, що відокремлює частини multipart-тіла</td>\n</tr>\n<tr>\n<td>Бінарні дані</td>\n<td>Binary data</td>\n<td>Дані у вигляді послідовності байтів, а не тексту</td>\n</tr>\n<tr>\n<td>Прев'ю</td>\n<td>Preview</td>\n<td>Локальний попередній перегляд файлу до відправлення</td>\n</tr>\n<tr>\n<td>Сигнатура файлу</td>\n<td>Magic numbers</td>\n<td>Перші байти файлу, що визначають його справжній тип</td>\n</tr>\n<tr>\n<td>Інтерсептор</td>\n<td>Interceptor</td>\n<td>Механізм Nest.js, що обгортає обробку запиту</td>\n</tr>\n<tr>\n<td>Сховище</td>\n<td>Storage</td>\n<td>Місце зберігання файлів: пам'ять, диск або хмара</td>\n</tr>\n</tbody></table>\n","<h1>📖 Глосарій абревіатур</h1>\n<table>\n<thead>\n<tr>\n<th>Абревіатура</th>\n<th>Розшифровка</th>\n<th>Переклад</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>HTTP</td>\n<td>HyperText Transfer Protocol</td>\n<td>Протокол передачі гіпертексту</td>\n</tr>\n<tr>\n<td>MIME</td>\n<td>Multipurpose Internet Mail Extensions</td>\n<td>Стандарт позначення типів вмісту</td>\n</tr>\n<tr>\n<td>API</td>\n<td>Application Programming Interface</td>\n<td>Програмний інтерфейс застосунку</td>\n</tr>\n<tr>\n<td>RAM</td>\n<td>Random Access Memory</td>\n<td>Оперативна пам'ять</td>\n</tr>\n<tr>\n<td>UUID</td>\n<td>Universally Unique Identifier</td>\n<td>Універсальний унікальний ідентифікатор</td>\n</tr>\n<tr>\n<td>DoS</td>\n<td>Denial of Service</td>\n<td>Відмова в обслуговуванні</td>\n</tr>\n<tr>\n<td>URL</td>\n<td>Uniform Resource Locator</td>\n<td>Уніфікований локатор ресурсу</td>\n</tr>\n</tbody></table>\n"];let currentSlideIndex=0;
function renderMath(root){if(typeof renderMathInElement!=="function"||!root)return;try{renderMathInElement(root,{delimiters:[{left:"$$",right:"$$",display:true},{left:"\\[",right:"\\]",display:true},{left:"$",right:"$",display:false},{left:"\\(",right:"\\)",display:false}],throwOnError:false,strict:"ignore",ignoredTags:["script","noscript","style","textarea","pre","code"]});}catch(e){console.warn("Math render error:",e);}}
function showSlide(i){if(i<0||i>=slides.length)return;currentSlideIndex=i;const el=document.getElementById("current-slide");el.innerHTML=slides[i];el.scrollTop=0;renderMath(el);document.getElementById("progress-bar").style.width=((i+1)/slides.length*100)+"%";document.getElementById("slide-number").textContent=(i+1)+" / "+slides.length;updateSidebarActive();}
function nextSlide(){if(currentSlideIndex<slides.length-1)showSlide(currentSlideIndex+1);}
function previousSlide(){if(currentSlideIndex>0)showSlide(currentSlideIndex-1);}
function toggleSidebar(){document.getElementById("sidebar").classList.toggle("open");}
function toggleHelp(){document.getElementById("help-overlay").classList.toggle("hidden");}
function toggleFullscreen(){if(!document.fullscreenElement){const pc=document.getElementById("presentation-container");if(pc.requestFullscreen)pc.requestFullscreen();else if(pc.webkitRequestFullscreen)pc.webkitRequestFullscreen();else if(pc.msRequestFullscreen)pc.msRequestFullscreen();else if(pc.mozRequestFullScreen)pc.mozRequestFullScreen();}else{if(document.exitFullscreen)document.exitFullscreen();else if(document.webkitExitFullscreen)document.webkitExitFullscreen();else if(document.msExitFullscreen)document.msExitFullscreen();else if(document.mozCancelFullScreen)document.mozCancelFullScreen();}}
function generateSidebar(){const sc=document.getElementById("sidebar-content");sc.innerHTML="";slides.forEach((html,idx)=>{const t=document.createElement("div");t.className="slide-thumbnail";if(idx===0)t.classList.add("active");const tmp=document.createElement("div");tmp.innerHTML=html;const title=tmp.querySelector("h1,h2");const titleText=title?title.textContent:("Слайд "+(idx+1));const textContent=tmp.textContent.replace(/s+/g," ").trim();const preview=textContent.substring(0,100)+(textContent.length>100?"...":"");t.innerHTML="<div class=\"slide-thumbnail-number\">"+(idx+1)+"</div><div class=\"slide-thumbnail-title\">"+titleText+"</div><div class=\"slide-thumbnail-content\">"+preview+"</div>";t.onclick=()=>{showSlide(idx);if(window.innerWidth<1024)toggleSidebar();};sc.appendChild(t);});}
function updateSidebarActive(){document.querySelectorAll(".slide-thumbnail").forEach((th,idx)=>{if(idx===currentSlideIndex){th.classList.add("active");th.scrollIntoView({behavior:"smooth",block:"nearest"});}else th.classList.remove("active");});}
document.addEventListener("keydown",e=>{switch(e.key){case"ArrowLeft":previousSlide();break;case"ArrowRight":case" ":e.preventDefault();nextSlide();break;case"f":case"F":toggleFullscreen();break;case"s":case"S":toggleSidebar();break;case"?":toggleHelp();break;case"Escape":const sb=document.getElementById("sidebar");const ho=document.getElementById("help-overlay");if(sb.classList.contains("open"))toggleSidebar();else if(!ho.classList.contains("hidden"))ho.classList.add("hidden");break;}});
generateSidebar();showSlide(0);</script></body></html>
