#presentation-container:fullscreen,#presentation-container:-webkit-full-screen,#presentation-container:-moz-full-screen,#presentation-container:-ms-fullscreen{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%)!important;}</style></head><body><div id="presentation-container"><div class="progress"><div class="progress-bar" id="progress-bar"></div></div><button id="sidebar-toggle" onclick="toggleSidebar()" title="Навігація слайдами (S)">☰</button><div id="sidebar"><div id="sidebar-header"><h3>📑 Слайди</h3><button id="sidebar-close" onclick="toggleSidebar()">✕</button></div><div id="sidebar-content"></div></div><div class="slide-container"><div class="slide" id="current-slide"></div></div><div class="controls"><button class="control-btn" onclick="previousSlide()" title="Попередній (←)">←</button><button class="control-btn" onclick="nextSlide()" title="Наступний (→)">→</button><button class="control-btn" onclick="toggleFullscreen()" title="Повноекранний режим (F)">⛶</button><button class="control-btn" onclick="toggleHelp()" title="Допомога (?)">?</button></div><div class="slide-number" id="slide-number">1 / 20</div><div id="help-overlay" class="hidden"><strong>Гарячі клавіші:</strong><br><kbd>←</kbd> <kbd>→</kbd> Навігація<br><kbd>F</kbd> Повноекранний режим<br><kbd>S</kbd> Sidebar<br><kbd>?</kbd> Допомога<br><kbd>Esc</kbd> Закрити</div></div><script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script><script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script><script>const slides=["<h1>Docker: основи</h1>\n<p><strong>Сучасні технології Internet-програмування</strong></p>\n<p>Лектор: Кобилянський Антон</p>\n","<h1>📋 План лекції</h1>\n<ol>\n<li>🤔 Проблема середовищ та навіщо потрібна контейнеризація</li>\n<li>📦 Що таке Docker та контейнери</li>\n<li>⚖️ Контейнери проти віртуальних машин</li>\n<li>🏗️ Архітектура Docker та ключові поняття</li>\n<li>🖼️ Образи та контейнери: команди керування</li>\n<li>📝 Dockerfile: збірка власних образів</li>\n<li>💾 Volumes, мережі та Docker Compose</li>\n<li>✅ Ключові висновки та контрольні питання</li>\n</ol>\n","<h1>🤔 Проблема: \"у мене працює\"</h1>\n<p><strong>Головна ідея:</strong> один і той самий код може поводитися по-різному на різних комп'ютерах через відмінності в оточенні.</p>\n<h2>⚠️ Типові причини збоїв</h2>\n<table>\n<thead>\n<tr>\n<th>Джерело відмінностей</th>\n<th>Приклад проблеми</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Версія середовища</td>\n<td>Node.js 18 локально, Node.js 22 на сервері</td>\n</tr>\n<tr>\n<td>Системні залежності</td>\n<td>Відсутня бібліотека або інша версія PostgreSQL</td>\n</tr>\n<tr>\n<td>Змінні середовища</td>\n<td>Шлях чи ключ, який існує лише на одній машині</td>\n</tr>\n<tr>\n<td>Операційна система</td>\n<td>Різниця між Windows, macOS та Linux</td>\n</tr>\n</tbody></table>\n<div class=\"danger\"><strong>🚫 Наслідок</strong> <p>Класична фраза \"але ж у мене все працює\" виникає тоді, коли застосунок залежить від стану конкретної машини, а не лише від власного коду. Це робить розгортання непередбачуваним.</p>\n</div>\n\n\n\n\n\n<div class=\"tip\"><strong>💡 Рішення</strong> <p>Потрібен спосіб запакувати застосунок разом з усім його оточенням: середовищем виконання, залежностями та конфігурацією, щоб він працював однаково всюди. Саме це забезпечує контейнеризація.</p>\n</div>\n\n","<h1>📦 Що таке Docker та контейнери</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>Контейнеризація</strong> : це спосіб упакування застосунку разом з усіма його залежностями в ізольований, переносний пакунок, який запускається однаково на будь-якій системі з підтримкою контейнерів.</p>\n</div>\n\n\n\n\n\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>Docker</strong> : це платформа для створення, запуску та керування контейнерами. Вона стала фактичним стандартом контейнеризації.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> контейнер містить усе необхідне для роботи застосунку, тому результат не залежить від машини, на якій він запущений.</p>\n<h2>🎯 Що дає контейнеризація</h2>\n<ul>\n<li>🔁 <strong>Відтворюваність:</strong> однакова поведінка на машині розробника, тестовому та промисловому серверах</li>\n<li>🧳 <strong>Переносність:</strong> контейнер запускається там, де є Docker, без ручного налаштування</li>\n<li>🧩 <strong>Ізоляція:</strong> кожен контейнер має власне оточення, що не впливає на інші</li>\n<li>⚡ <strong>Швидкість запуску:</strong> контейнер стартує за секунди</li>\n</ul>\n<div class=\"note\"><strong>📝 Аналогія</strong> <p>Контейнер можна порівняти з морським вантажним контейнером: незалежно від вмісту, він має стандартну форму, тому будь-який кран, корабель чи вантажівка можуть з ним працювати однаково.</p>\n</div>\n\n","<h1>⚖️ Контейнери проти віртуальних машин</h1>\n<p><strong>Головна ідея:</strong> контейнери та віртуальні машини вирішують схожу задачу ізоляції, але роблять це на різних рівнях, тому суттєво відрізняються за вагою.</p>\n<h2>🔍 Ключова відмінність</h2>\n\n<div class=\"mermaid\" data-source=\"graph TB\n    subgraph VM[&quot;Віртуальні машини&quot;]\n        HW1[&quot;Апаратне забезпечення&quot;] --&gt; HOST1[&quot;Хостова ОС&quot;]\n        HOST1 --&gt; HYP[&quot;Гіпервізор&quot;]\n        HYP --&gt; GOS1[&quot;Гостьова ОС 1&quot;]\n        HYP --&gt; GOS2[&quot;Гостьова ОС 2&quot;]\n        GOS1 --&gt; APP1[&quot;Застосунок A&quot;]\n        GOS2 --&gt; APP2[&quot;Застосунок B&quot;]\n    end\n    subgraph CT[&quot;Контейнери&quot;]\n        HW2[&quot;Апаратне забезпечення&quot;] --&gt; HOST2[&quot;Хостова ОС&quot;]\n        HOST2 --&gt; ENG[&quot;Docker Engine&quot;]\n        ENG --&gt; C1[&quot;Контейнер A&quot;]\n        ENG --&gt; C2[&quot;Контейнер B&quot;]\n    end\n    style HYP fill:#fff3e0,stroke:#ef6c00\n    style ENG fill:#e3f2fd,stroke:#1565c0\n    style GOS1 fill:#fce4ec,stroke:#c2185b\n    style GOS2 fill:#fce4ec,stroke:#c2185b\"><svg id=\"exp-1780982954781-4-0\" width=\"100%\" xmlns=\"http: остями. <strong>Контейнер</strong> : це запущений екземпляр образу.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> співвідношення між образом та контейнером схоже на співвідношення між класом та об'єктом: з одного образу можна створити багато контейнерів.</p>\n\n<div class=\"mermaid\" data-source=\"graph LR\n    IMG[&quot;🖼️ Образ (шаблон)&quot;] --&gt; C1[&quot;📦 Контейнер 1&quot;]\n    IMG --&gt; C2[&quot;📦 Контейнер 2&quot;]\n    IMG --&gt; C3[&quot;📦 Контейнер 3&quot;]\n    style IMG fill:#e8f5e9,stroke:#388e3c\n    style C1 fill:#e3f2fd,stroke:#1565c0\n    style C2 fill:#e3f2fd,stroke:#1565c0\n    style C3 fill:#e3f2fd,stroke:#1565c0\"><svg id=\"exp-1780982954848-6-0\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" class=\"flowchart\" style=\"max-width: 420.1015625px;\" viewBox=\"0 0 420.1015625 260\" role=\"graphics-document document\" aria-roledescription=\"flowchart-v2\"><style>#exp-1780982954848-6-0{font-family:system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,Arial,sans-serif;font-size:16px;fill:#333;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#exp-1780982954848-6-0 .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#exp-1780982954848-6-0 .edge-animation-fast{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 20s linear infinite;stroke-linecap:round;}#exp-1780982954848-6-0 .error-icon{fill:#552222;}#exp-1780982954848-6-0 .error-text{fill:#552222;stroke:#552222;}#exp-1780982954848-6-0 .edge-thickness-normal{stroke-width:1px;}#exp-1780982954848-6-0 .edge-thickness-thick{stroke-width:3.5px;}#exp-1780982954848-6-0 .edge-pattern-solid{stroke-dasharray:0;}#exp-1780982954848-6-0 .edge-thickness-invisible{stroke-width:0;fill:none;}#exp-1780982954848-6-0 .edge-pattern-dashed{stroke-dasharray:3;}#exp-1780982954848-6-0 .edge-pattern-dotted{stroke-dasharray:2;}#exp-1780982954848-6-0 .marker{fi 48,154L147.592,166.333C162.703,178.667,192.926,203.333,211.537,215.667C230.148,228,237.148,228,240.648,228L244.148,228\" id=\"exp-1780982954848-6-0-L_IMG_C3_0\" class=\" edge-thickness-normal edge-pattern-solid edge-thickness-normal edge-pattern-solid flowchart-link\" style=\";\" data-edge=\"true\" data-et=\"edge\" data-id=\"L_IMG_C3_0\" data-points=\"W3sieCI6MTMyLjQ4MDE0OTg3MjQ0ODk4LCJ5IjoxNTR9LHsieCI6MjIzLjE0ODQzNzUsInkiOjIyOH0seyJ4IjoyNDguMTQ4NDM3NSwieSI6MjI4fV0=\" data-look=\"classic\" marker-end=\"url(#exp-1780982954848-6-0_flowchart-v2-pointEnd)\"></path></g><g class=\"edgeLabels\"><g class=\"edgeLabel\"><g class=\"label\" data-id=\"L_IMG_C1_0\" transform=\"translate(0, 0)\"><text y=\"-10.1\" text-anchor=\"middle\"><tspan class=\"text-outer-tspan row\" x=\"0\" y=\"-0.1em\" dy=\"1.1em\" text-anchor=\"middle\"></tspan></text></g></g><g><rect class=\"background\" style=\"stroke: none\"></rect></g><g class=\"edgeLabel\"><g class=\"label\" data-id=\"L_IMG_C2_0\" transform=\"translate(0, 0)\"><text y=\"-10.1\" text-anchor=\"middle\"><tspan class=\"text-outer-tspan row\" x=\"0\" y=\"-0.1em\" dy=\"1.1em\" text-anchor=\"middle\"></tspan></text></g></g><g><rect class=\"background\" style=\"stroke: none\"></rect></g><g class=\"edgeLabel\"><g class=\"label\" data-id=\"L_IMG_C3_0\" transform=\"translate(0, 0)\"><text y=\"-10.1\" text-anchor=\"middle\"><tspan class=\"text-outer-tspan row\" x=\"0\" y=\"-0.1em\" dy=\"1.1em\" text-anchor=\"middle\"></tspan></text></g></g><g><rect class=\"background\" style=\"stroke: none\"></rect></g></g><g class=\"nodes\"><g class=\"node default  \" id=\"exp-1780982954848-6-0-flowchart-IMG-0\" data-look=\"classic\" transform=\"translate(103.07421875, 130)\"><rect class=\"basic label-container\" style=\"fill:#e8f5e9 !important;stroke:#388e3c !important\" x=\"-95.07421875\" y=\"-24\" width=\"190.1484375\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-71.07421875, -12)\"><rect></rect><foreignObject width=\"142.1484375\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>🖼️ Образ (шаблон)</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1780982954848-6-0-flowchart-C1-1\" data-look=\"classic\" transform=\"translate(330.125, 32)\"><rect class=\"basic label-container\" style=\"fill:#e3f2fd !important;stroke:#1565c0 !important\" x=\"-80.671875\" y=\"-24\" width=\"161.34375\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-56.671875, -12)\"><rect></rect><foreignObject width=\"113.34375\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>📦 Контейнер 1</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1780982954848-6-0-flowchart-C2-3\" data-look=\"classic\" transform=\"translate(330.125, 130)\"><rect class=\"basic label-container\" style=\"fill:#e3f2fd !important;stroke:#1565c0 !important\" x=\"-81.7890625\" y=\"-24\" width=\"163.578125\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-57.7890625, -12)\"><rect></rect><foreignObject width=\"115.578125\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>📦 Контейнер 2</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1780982954848-6-0-flowchart-C3-5\" data-look=\"classic\" transform=\"translate(330.125, 228)\"><rect class=\"basic label-container\" style=\"fill:#e3f2fd !important;stroke:#1565c0 !important\" x=\"-81.9765625\" y=\"-24\" width=\"163.953125\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-57.9765625, -12)\"><rect></rect><foreignObject width=\"115.953125\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>📦 Контейнер 3</p></span></div></foreignObject></g></g></g></g></g><defs><filter id=\"exp-1780982954848-6-0-drop-shadow\" height=\"130%\" width=\"130%\"><feDropShadow dx=\"4\" dy=\"4\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs><defs><filter id=\"exp-1780982954848-6-0-drop-shadow-small\" height=\"150%\" width=\"150%\"><feDropShadow dx=\"2\" dy=\"2\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs></svg></div>\n<h2>🏷️ Назва та тег образу</h2>\n<p>Образ має ім'я та тег у форматі <code>назва:тег</code>. Тег зазвичай позначає версію.</p>\n<pre><code class=\"language-bash hljs\" data-highlighted=\"yes\">node:20-alpine    <span class=\"hljs-comment\"># образ Node.js версії 20 на базі легкого Alpine Linux</span>\npostgres:16       <span class=\"hljs-comment\"># образ PostgreSQL версії 16</span>\nnginx:latest      <span class=\"hljs-comment\"># latest: тег за замовчуванням, якщо версію не вказано</span></code></pre><div class=\"warning\"><strong>⚠️ Застереження</strong> <p>Тег <code>latest</code> не означає \"завжди найновіша версія на момент запуску\". Це лише тег за замовчуванням, значення якого може змінитися з часом. Для передбачуваності у промислових середовищах краще явно вказувати конкретну версію.</p>\n</div>\n\n","<h1>🛠️ Команди для роботи з образами</h1>\n<p><strong>Головна ідея:</strong> базовий набір команд дозволяє завантажувати, переглядати та видаляти образи.</p>\n<pre><code class=\"language-bash hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\"># Завантажити образ зі сховища</span>\ndocker pull node:20-alpine\n\n<span class=\"hljs-comment\"># Переглянути локальні образи</span>\ndocker images\n\n<span class=\"hljs-comment\"># Видалити локальний образ</span>\ndocker rmi node:20-alpine</code></pre><h2>📦 Робота з контейнерами</h2>\n<pre><code class=\"language-bash hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\"># Запустити контейнер у фоновому режимі (-d), зіставивши порт хоста</span>\n<span class=\"hljs-comment\"># з портом контейнера (-p) та задавши ім'я. Образ nginx містить</span>\n<span class=\"hljs-comment\"># готовий веб-сервер, що слухає порт 80 всередині контейнера</span>\ndocker run -d -p 8080:80 --name web nginx\n\n<span class=\"hljs-comment\"># Переглянути запущені контейнери</span>\ndocker ps\n\n<span class=\"hljs-comment\"># Переглянути всі контейнери, зокрема зупинені</span>\ndocker ps -a\n\n<span class=\"hljs-comment\"># Зупинити та видалити контейнер</span>\ndocker stop web\ndocker <span class=\"hljs-built_in\">rm</span> web</code></pre><div class=\"tip\"><strong>💡 Діагностика</strong> <p>Дві команди корисні щодня:<br><code>docker logs web</code> : показує вивід застосунку всередині контейнера.<br><code>docker exec -it web sh</code> : відкриває інтерактивну оболонку всередині запущеного контейнера для перевірки його стану.</p>\n</div>\n\n","<h1>📝 Dockerfile: основи</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>Dockerfile</strong> : це текстовий файл з послідовністю інструкцій, на основі яких Docker автоматично будує образ.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> кожна інструкція описує один крок підготовки образу, від вибору базового середовища до команди запуску застосунку.</p>\n<h2>🧩 Основні інструкції</h2>\n<table>\n<thead>\n<tr>\n<th>Інструкція</th>\n<th>Призначення</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>FROM</code></td>\n<td>Задає базовий образ, на якому будується новий</td>\n</tr>\n<tr>\n<td><code>WORKDIR</code></td>\n<td>Встановлює робочу директорію всередині образу</td>\n</tr>\n<tr>\n<td><code>COPY</code></td>\n<td>Копіює файли з машини збірки в образ</td>\n</tr>\n<tr>\n<td><code>RUN</code></td>\n<td>Виконує команду під час збірки, наприклад встановлення залежностей</td>\n</tr>\n<tr>\n<td><code>ENV</code></td>\n<td>Задає змінну середовища</td>\n</tr>\n<tr>\n<td><code>EXPOSE</code></td>\n<td>Документує порт, який слухає застосунок</td>\n</tr>\n<tr>\n<td><code>CMD</code></td>\n<td>Задає команду, що виконується під час запуску контейнера</td>\n</tr>\n</tbody></table>\n<div class=\"note\"><strong>📝 CMD проти RUN</strong> <p><code>RUN</code> виконується один раз під час збірки образу, а <code>CMD</code> визначає, що запускається щоразу під час старту контейнера. Це різні етапи життєвого циклу.</p>\n</div>\n\n","<h1>🏭 Dockerfile та шари образу</h1>\n<p><strong>Головна ідея:</strong> образ складається з шарів, де кожна інструкція Dockerfile додає новий шар. Docker кешує шари, тому правильний порядок інструкцій пришвидшує повторні збірки.</p>\n<h2>💻 Приклад для серверного застосунку</h2>\n<pre><code class=\"language-dockerfile\"># Базовий образ із середовищем виконання Node.js\nFROM node:20-alpine\n\n# Робоча директорія всередині образу\nWORKDIR /app\n\n# Спочатку копіюємо лише описи залежностей\nCOPY package*.json ./\n\n# Встановлюємо залежності суворо за lock-файлом\nRUN npm ci\n\n# Тепер копіюємо решту коду\nCOPY . .\n\n# Збираємо застосунок\nRUN npm run build\n\n# Документуємо порт застосунку\nEXPOSE 3000\n\n# Команда запуску контейнера\nCMD [\"node\", \"dist/main.js\"]</code></pre><pre><code class=\"language-bash hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\"># Зібрати образ із Dockerfile у поточній директорії (.) та призначити ім'я</span>\ndocker build -t my-api .\n\n<span class=\"hljs-comment\"># Запустити контейнер на основі зібраного образу</span>\ndocker run -d -p 3000:3000 --name my-api my-api</code></pre><div class=\"tip\"><strong>💡 Чому копіюємо package.json окремо</strong> <p>Залежності змінюються рідше за код. Якщо спочатку скопіювати лише <code>package*.json</code> та встановити залежності, цей шар кешується. Тоді під час зміни лише вихідного коду повторне встановлення залежностей не виконується, і збірка значно пришвидшується.</p>\n</div>\n\n","<h1>🧹 .dockerignore та багатоетапна збірка</h1>\n<p><strong>Головна ідея:</strong> до образу слід включати лише потрібне. Це зменшує розмір образу, пришвидшує збірку та підвищує безпеку.</p>\n<h2>📄 Файл .dockerignore</h2>\n<p>Файл <code>.dockerignore</code> вказує, які файли не копіювати в образ. Він працює аналогічно до <code>.gitignore</code>.</p>\n<pre><code class=\"language-plaintext hljs\" data-highlighted=\"yes\">node_modules\ndist\n.git\n.env</code></pre><div class=\"warning\"><strong>⚠️ Безпека</strong> <p>Не варто копіювати в образ файли із секретами, наприклад <code>.env</code> з паролями чи ключами. Секрети передають через змінні середовища під час запуску контейнера, а не вшивають в образ.</p>\n</div>\n\n\n\n<h2>🏗️ Багатоетапна збірка (multi-stage build)</h2>\n<p>Багатоетапна збірка дозволяє використати один етап для збірки, а до фінального образу включити лише результат. Це різко зменшує розмір.</p>\n<pre><code class=\"language-dockerfile\"># Етап збірки\nFROM node:20-alpine AS builder\nWORKDIR /app\nCOPY package*.json ./\nRUN npm ci\nCOPY . .\nRUN npm run build\n\n# Фінальний образ містить лише потрібне для запуску\nFROM node:20-alpine\nWORKDIR /app\nCOPY package*.json ./\nRUN npm ci --omit=dev\nCOPY --from=builder /app/dist ./dist\nEXPOSE 3000\nCMD [\"node\", \"dist/main.js\"]</code></pre><div class=\"success\"><strong>✅ Результат</strong> <p>Інструменти збірки та проміжні файли залишаються на першому етапі та не потрапляють до фінального образу. Це робить образ меншим та безпечнішим.</p>\n</div>\n\n","<h1>💾 Volumes: зберігання даних</h1>\n<div class=\"info\"><strong>ℹ️ Проблема</strong> <p>Контейнери є тимчасовими: коли контейнер видаляють, усі зміни в його файловій системі зникають. Це неприйнятно для даних, які мають зберігатися, наприклад вмісту бази даних.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> <strong>volume</strong> (том) : це механізм збереження даних поза життєвим циклом контейнера. Дані у volume переживають перестворення контейнера.</p>\n<h2>🗂️ Типи зберігання</h2>\n<table>\n<thead>\n<tr>\n<th>Тип</th>\n<th>Опис</th>\n<th>Типове застосування</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Named volume</td>\n<td>Том з іменем, яким керує Docker</td>\n<td>Дані бази даних</td>\n</tr>\n<tr>\n<td>Bind mount</td>\n<td>Пряме зіставлення директорії хоста з директорією контейнера</td>\n<td>Розробка, гаряче оновлення</td>\n</tr>\n</tbody></table>\n<pre><code class=\"language-bash hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\"># Створити том та переглянути список томів</span>\ndocker volume create app-data\ndocker volume <span class=\"hljs-built_in\">ls</span>\n\n<span class=\"hljs-comment\"># Запустити контейнер із підключеним томом</span>\ndocker run -d -e POSTGRES_PASSWORD=secret -v app-data:/var/lib/postgresql/data postgres:16\n\n<span class=\"hljs-comment\"># Bind mount: підключити поточну директорію хоста до /app у контейнері</span>\ndocker run -d -v <span class=\"hljs-string\">\"<span class=\"hljs-subst\">$(pwd)</span>\"</span>:/app node:20-alpine</code></pre><div class=\"note\"><strong>📝 Named volume проти bind mount</strong> <p>Named volume підходить для постійних даних, бо ним повністю керує Docker. Bind mount зручний під час розробки, оскільки зміни файлів на машині одразу видно всередині контейнера.</p>\n</div>\n\n","<h1>🌐 Мережі та порти</h1>\n<p><strong>Головна ідея:</strong> контейнери ізольовані одне від одного та від хоста. Щоб застосунок був доступний ззовні, його порт зіставляють з портом хоста. Щоб контейнери спілкувалися між собою, їх об'єднують у спільну мережу.</p>\n<h2>🔌 Зіставлення портів (port mapping)</h2>\n<pre><code class=\"language-bash hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\"># Формат: -p порт_хоста:порт_контейнера</span>\ndocker run -d -p 8080:3000 my-api</code></pre><p>У цьому прикладі застосунок слухає порт <code>3000</code> всередині контейнера, а звертатися до нього ззовні можна через порт <code>8080</code> на хості.</p>\n<h2>🕸️ Мережі контейнерів</h2>\n<pre><code class=\"language-bash hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\"># Створити мережу</span>\ndocker network create app-network\n\n<span class=\"hljs-comment\"># Запустити контейнери в одній мережі</span>\ndocker run -d --name db --network app-network -e POSTGRES_PASSWORD=secret postgres:16\ndocker run -d --name api --network app-network my-api</code></pre><div class=\"tip\"><strong>💡 Звернення за іменем</strong> <p>Контейнери в одній мережі можуть звертатися одне до одного за іменем сервісу замість IP-адреси. Так контейнер <code>api</code> може підключитися до бази даних за хостом <code>db</code>. Це ключовий принцип взаємодії сервісів.</p>\n</div>\n\n","<h1>🧩 Docker Compose: основи</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>Docker Compose</strong> : це інструмент для опису та запуску застосунків з кількох контейнерів за допомогою одного конфігураційного файлу <code>docker-compose.yml</code>.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> замість ручного запуску кожного контейнера окремими командами, Compose описує всі сервіси, їхні зв'язки, томи та мережі в одному файлі та запускає їх однією командою.</p>\n<h2>🎯 Навіщо Compose</h2>\n<ul>\n<li>📜 <strong>Декларативність:</strong> уся конфігурація зібрана в одному файлі під контролем версій</li>\n<li>🔗 <strong>Зв'язки:</strong> Compose автоматично створює спільну мережу для всіх сервісів</li>\n<li>⚡ <strong>Одна команда:</strong> весь набір сервісів запускається та зупиняється разом</li>\n</ul>\n<pre><code class=\"language-bash hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\"># Запустити всі сервіси у фоновому режимі</span>\ndocker compose up -d\n\n<span class=\"hljs-comment\"># Переглянути стан сервісів та їхні логи</span>\ndocker compose ps\ndocker compose logs\n\n<span class=\"hljs-comment\"># Зупинити та прибрати сервіси</span>\ndocker compose down</code></pre><div class=\"note\"><strong>📝 Окремі контейнери проти Compose</strong> <p>Поодинокі команди <code>docker run</code> зручні для одного контейнера. Реальний застосунок зазвичай складається з кількох сервісів, наприклад серверного застосунку та бази даних, тому Compose значно спрощує керування ними.</p>\n</div>\n\n","<h1>📦 Docker Compose: приклад</h1>\n<p><strong>Головна ідея:</strong> файл <code>docker-compose.yml</code> описує сервіси у форматі YAML. Розглянемо типову конфігурацію серверного застосунку разом з базою даних PostgreSQL.</p>\n<pre><code class=\"language-yaml hljs\" data-highlighted=\"yes\"><span class=\"hljs-attr\">services:</span>\n  <span class=\"hljs-attr\">api:</span>\n    <span class=\"hljs-attr\">build:</span> <span class=\"hljs-string\">.</span>\n    <span class=\"hljs-attr\">ports:</span>\n      <span class=\"hljs-bullet\">-</span> <span class=\"hljs-string\">\"3000:3000\"</span>\n    <span class=\"hljs-attr\">environment:</span>\n      <span class=\"hljs-attr\">DATABASE_HOST:</span> <span class=\"hljs-string\">db</span>\n      <span class=\"hljs-attr\">DATABASE_PORT:</span> <span class=\"hljs-number\">5432</span>\n    <span class=\"hljs-attr\">depends_on:</span>\n      <span class=\"hljs-bullet\">-</span> <span class=\"hljs-string\">db</span>\n\n  <span class=\"hljs-attr\">db:</span>\n    <span class=\"hljs-attr\">image:</span> <span class=\"hljs-string\">postgres:16-alpine</span>\n    <span class=\"hljs-attr\">environment:</span>\n      <span class=\"hljs-attr\">POSTGRES_USER:</span> <span class=\"hljs-string\">app</span>\n      <span class=\"hljs-attr\">POSTGRES_PASSWORD:</span> <span class=\"hljs-string\">secret</span>\n      <span class=\"hljs-attr\">POSTGRES_DB:</span> <span class=\"hljs-string\">app_db</span>\n    <span class=\"hljs-attr\">volumes:</span>\n      <span class=\"hljs-bullet\">-</span> <span class=\"hljs-string\">pgdata:/var/lib/postgresql/data</span>\n\n<span class=\"hljs-attr\">volumes:</span>\n  <span class=\"hljs-attr\">pgdata:</span></code></pre><table>\n<thead>\n<tr>\n<th>Ключ</th>\n<th>Значення в прикладі</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>build</code></td>\n<td>Образ сервісу <code>api</code> будується з локального Dockerfile</td>\n</tr>\n<tr>\n<td><code>image</code></td>\n<td>Сервіс <code>db</code> використовує готовий образ PostgreSQL</td>\n</tr>\n<tr>\n<td><code>ports</code></td>\n<td>Порт <code>3000</code> контейнера доступний на тому самому порту хоста</td>\n</tr>\n<tr>\n<td><code>environment</code></td>\n<td>Передає змінні середовища, наприклад дані для підключення</td>\n</tr>\n<tr>\n<td><code>depends_on</code></td>\n<td>Визначає порядок запуску: спочатку <code>db</code>, потім <code>api</code></td>\n</tr>\n<tr>\n<td><code>volumes</code></td>\n<td>Том <code>pgdata</code> зберігає дані бази між перезапусками</td>\n</tr>\n</tbody></table>\n<div class=\"tip\"><strong>💡 Звернення між сервісами</strong> <p>Сервіс <code>api</code> підключається до бази даних за хостом <code>db</code>, що збігається з іменем сервісу. Compose автоматично створює спільну мережу, у якій сервіси доступні одне одному за іменами.</p>\n</div>\n\n","<h1>⭐ Найкращі практики</h1>\n<p><strong>Головна ідея:</strong> дотримання кількох принципів робить образи меншими, швидшими та безпечнішими.</p>\n<div class=\"success\"><strong>✅ Рекомендації</strong> <ol>\n<li><p>🪶 <strong>Легкі базові образи:</strong> обирайте варіанти на базі Alpine, де це доречно, щоб зменшити розмір</p>\n</li>\n<li><p>🧹 <strong>Файл .dockerignore:</strong> виключайте зайве, наприклад <code>node_modules</code> та файли із секретами</p>\n</li>\n<li><p>🏗️ <strong>Багатоетапна збірка:</strong> включайте у фінальний образ лише результат, без інструментів збірки</p>\n</li>\n<li><p>🗂️ <strong>Порядок інструкцій:</strong> копіюйте описи залежностей раніше за код, щоб ефективно використовувати кеш шарів</p>\n</li>\n<li><p>🏷️ <strong>Фіксовані версії:</strong> вказуйте конкретні версії образів замість тега <code>latest</code> для передбачуваності</p>\n</li>\n<li><p>🔐 <strong>Без секретів в образі:</strong> передавайте паролі та ключі через змінні середовища під час запуску</p>\n</li>\n<li><p>🎯 <strong>Один процес на контейнер:</strong> кожен контейнер відповідає за один сервіс, що спрощує масштабування та діагностику</p>\n</li>\n</ol>\n</div>\n\n","<h1>✅ Ключові висновки</h1>\n<div class=\"success\"><strong>✅ Підсумок лекції</strong> <ol>\n<li><p><strong>Контейнеризація</strong> вирішує проблему відмінностей середовищ, пакуючи застосунок разом із залежностями</p>\n</li>\n<li><p><strong>Контейнери</strong> легші за віртуальні машини, бо використовують спільне ядро хостової операційної системи</p>\n</li>\n<li><p><strong>Образ</strong> є незмінним шаблоном, а <strong>контейнер</strong> є його запущеним екземпляром: з одного образу можна створити багато контейнерів</p>\n</li>\n<li><p><strong>Dockerfile</strong> описує збірку образу інструкція за інструкцією, а образ складається з кешованих шарів</p>\n</li>\n<li><p><strong>Volumes</strong> зберігають дані поза життєвим циклом контейнера, що критично для баз даних</p>\n</li>\n<li><p><strong>Мережі та зіставлення портів</strong> забезпечують доступ до застосунку та взаємодію контейнерів за іменами сервісів</p>\n</li>\n<li><p><strong>Docker Compose</strong> описує застосунок з кількох сервісів в одному файлі та керує ними однією командою</p>\n</li>\n</ol>\n</div>\n\n","<h1>❓ Контрольні питання</h1>\n<ol>\n<li><p>🤔 Яку проблему вирішує контейнеризація та чому виникає ситуація \"у мене працює\"?</p>\n</li>\n<li><p>🤔 Чим контейнер відрізняється від віртуальної машини та чому контейнери легші?</p>\n</li>\n<li><p>🤔 Яка різниця між образом та контейнером? Наведіть аналогію.</p>\n</li>\n<li><p>🤔 Що таке Dockerfile? Назвіть основні інструкції та поясніть різницю між <code>RUN</code> та <code>CMD</code>.</p>\n</li>\n<li><p>🤔 Чому в Dockerfile файли <code>package.json</code> зазвичай копіюють раніше за вихідний код?</p>\n</li>\n<li><p>🤔 Навіщо потрібні volumes та чим named volume відрізняється від bind mount?</p>\n</li>\n<li><p>🤔 Яку задачу вирішує Docker Compose і як сервіси в ньому звертаються одне до одного?</p>\n</li>\n</ol>\n","<h1>📖 Глосарій термінів</h1>\n<table>\n<thead>\n<tr>\n<th>Термін</th>\n<th>English</th>\n<th>Визначення</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Контейнеризація</td>\n<td>Containerization</td>\n<td>Упакування застосунку із залежностями в ізольований пакунок</td>\n</tr>\n<tr>\n<td>Контейнер</td>\n<td>Container</td>\n<td>Запущений екземпляр образу</td>\n</tr>\n<tr>\n<td>Образ</td>\n<td>Image</td>\n<td>Незмінний шаблон для створення контейнерів</td>\n</tr>\n<tr>\n<td>Шар</td>\n<td>Layer</td>\n<td>Окремий рівень образу, що відповідає інструкції Dockerfile</td>\n</tr>\n<tr>\n<td>Том</td>\n<td>Volume</td>\n<td>Механізм збереження даних поза життєвим циклом контейнера</td>\n</tr>\n<tr>\n<td>Зіставлення портів</td>\n<td>Port mapping</td>\n<td>Зв'язування порту контейнера з портом хоста</td>\n</tr>\n<tr>\n<td>Реєстр</td>\n<td>Registry</td>\n<td>Сховище образів, наприклад Docker Hub</td>\n</tr>\n<tr>\n<td>Базовий образ</td>\n<td>Base image</td>\n<td>Образ, на якому будується новий образ</td>\n</tr>\n<tr>\n<td>Багатоетапна збірка</td>\n<td>Multi-stage build</td>\n<td>Збірка з кількома етапами для зменшення фінального образу</td>\n</tr>\n</tbody></table>\n","<h1>📖 Глосарій абревіатур</h1>\n<table>\n<thead>\n<tr>\n<th>Абревіатура</th>\n<th>Розшифровка</th>\n<th>Переклад</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>OS</td>\n<td>Operating System</td>\n<td>Операційна система</td>\n</tr>\n<tr>\n<td>VM</td>\n<td>Virtual Machine</td>\n<td>Віртуальна машина</td>\n</tr>\n<tr>\n<td>CLI</td>\n<td>Command Line Interface</td>\n<td>Інтерфейс командного рядка</td>\n</tr>\n<tr>\n<td>CPU</td>\n<td>Central Processing Unit</td>\n<td>Центральний процесор</td>\n</tr>\n<tr>\n<td>IP</td>\n<td>Internet Protocol</td>\n<td>Інтернет-протокол</td>\n</tr>\n<tr>\n<td>YAML</td>\n<td>YAML Ain't Markup Language</td>\n<td>Формат серіалізації даних</td>\n</tr>\n<tr>\n<td>API</td>\n<td>Application Programming Interface</td>\n<td>Програмний інтерфейс застосунку</td>\n</tr>\n<tr>\n<td>ENV</td>\n<td>Environment</td>\n<td>Середовище, змінні середовища</td>\n</tr>\n</tbody></table>\n"];let currentSlideIndex=0;
function renderMath(root){if(typeof renderMathInElement!=="function"||!root)return;try{renderMathInElement(root,{delimiters:[{left:"$$",right:"$$",display:true},{left:"\\[",right:"\\]",display:true},{left:"$",right:"$",display:false},{left:"\\(",right:"\\)",display:false}],throwOnError:false,strict:"ignore",ignoredTags:["script","noscript","style","textarea","pre","code"]});}catch(e){console.warn("Math render error:",e);}}
function showSlide(i){if(i<0||i>=slides.length)return;currentSlideIndex=i;const el=document.getElementById("current-slide");el.innerHTML=slides[i];el.scrollTop=0;renderMath(el);document.getElementById("progress-bar").style.width=((i+1)/slides.length*100)+"%";document.getElementById("slide-number").textContent=(i+1)+" / "+slides.length;updateSidebarActive();}
function nextSlide(){if(currentSlideIndex<slides.length-1)showSlide(currentSlideIndex+1);}
function previousSlide(){if(currentSlideIndex>0)showSlide(currentSlideIndex-1);}
function toggleSidebar(){document.getElementById("sidebar").classList.toggle("open");}
function toggleHelp(){document.getElementById("help-overlay").classList.toggle("hidden");}
function toggleFullscreen(){if(!document.fullscreenElement){const pc=document.getElementById("presentation-container");if(pc.requestFullscreen)pc.requestFullscreen();else if(pc.webkitRequestFullscreen)pc.webkitRequestFullscreen();else if(pc.msRequestFullscreen)pc.msRequestFullscreen();else if(pc.mozRequestFullScreen)pc.mozRequestFullScreen();}else{if(document.exitFullscreen)document.exitFullscreen();else if(document.webkitExitFullscreen)document.webkitExitFullscreen();else if(document.msExitFullscreen)document.msExitFullscreen();else if(document.mozCancelFullScreen)document.mozCancelFullScreen();}}
function generateSidebar(){const sc=document.getElementById("sidebar-content");sc.innerHTML="";slides.forEach((html,idx)=>{const t=document.createElement("div");t.className="slide-thumbnail";if(idx===0)t.classList.add("active");const tmp=document.createElement("div");tmp.innerHTML=html;const title=tmp.querySelector("h1,h2");const titleText=title?title.textContent:("Слайд "+(idx+1));const textContent=tmp.textContent.replace(/s+/g," ").trim();const preview=textContent.substring(0,100)+(textContent.length>100?"...":"");t.innerHTML="<div class=\"slide-thumbnail-number\">"+(idx+1)+"</div><div class=\"slide-thumbnail-title\">"+titleText+"</div><div class=\"slide-thumbnail-content\">"+preview+"</div>";t.onclick=()=>{showSlide(idx);if(window.innerWidth<1024)toggleSidebar();};sc.appendChild(t);});}
function updateSidebarActive(){document.querySelectorAll(".slide-thumbnail").forEach((th,idx)=>{if(idx===currentSlideIndex){th.classList.add("active");th.scrollIntoView({behavior:"smooth",block:"nearest"});}else th.classList.remove("active");});}
document.addEventListener("keydown",e=>{switch(e.key){case"ArrowLeft":previousSlide();break;case"ArrowRight":case" ":e.preventDefault();nextSlide();break;case"f":case"F":toggleFullscreen();break;case"s":case"S":toggleSidebar();break;case"?":toggleHelp();break;case"Escape":const sb=document.getElementById("sidebar");const ho=document.getElementById("help-overlay");if(sb.classList.contains("open"))toggleSidebar();else if(!ho.classList.contains("hidden"))ho.classList.add("hidden");break;}});
generateSidebar();showSlide(0);</script></body></html>
