<!DOCTYPE html><html lang="uk"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>React: робота з сервером</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css"><style>* {

#presentation-container:fullscreen,#presentation-container:-webkit-full-screen,#presentation-container:-moz-full-screen,#presentation-container:-ms-fullscreen{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%)!important;}</style></head><body><div id="presentation-container"><div class="progress"><div class="progress-bar" id="progress-bar"></div></div><button id="sidebar-toggle" onclick="toggleSidebar()" title="Навігація слайдами (S)">☰</button><div id="sidebar"><div id="sidebar-header"><h3>📑 Слайди</h3><button id="sidebar-close" onclick="toggleSidebar()">✕</button></div><div id="sidebar-content"></div></div><div class="slide-container"><div class="slide" id="current-slide"></div></div><div class="controls"><button class="control-btn" onclick="previousSlide()" title="Попередній (←)">←</button><button class="control-btn" onclick="nextSlide()" title="Наступний (→)">→</button><button class="control-btn" onclick="toggleFullscreen()" title="Повноекранний режим (F)">⛶</button><button class="control-btn" onclick="toggleHelp()" title="Допомога (?)">?</button></div><div class="slide-number" id="slide-number">1 / 19</div><div id="help-overlay" class="hidden"><strong>Гарячі клавіші:</strong><br><kbd>←</kbd> <kbd>→</kbd> Навігація<br><kbd>F</kbd> Повноекранний режим<br><kbd>S</kbd> Sidebar<br><kbd>?</kbd> Допомога<br><kbd>Esc</kbd> Закрити</div></div><script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script><script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script><script>const slides=["<h1>React: робота з сервером</h1>\n<p><strong>Сучасні технології Internet-програмування</strong></p>\n<p>Лектор: Кобилянський Антон</p>\n","<h1>📋 План лекції</h1>\n<ol>\n<li>🌐 Як React взаємодіє з сервером</li>\n<li>📡 Fetch API — базові HTTP-запити</li>\n<li>📦 Axios — зручна альтернатива</li>\n<li>🔑 Типізація API та змінні середовища</li>\n<li>⚠️ Проблеми ручного управління даними</li>\n<li>💾 Кеш: що це і навіщо він потрібе </td>\n<td><code>PUT</code></td>\n<td><code>PUT /tasks/5</code></td>\n</tr>\n<tr>\n<td>🗑️ Видалити задачу</td>\n<td><code>DELETE</code></td>\n<td><code>DELETE /tasks/5</code></td>\n</tr>\n</tbody></table>\n","<h1>📡 Fetch API — базові запити</h1>\n<div class=\"info\"><strong>ℹ️ Що таке fetch?</strong> <p><code>fetch</code> — вбудована у браузер функція для HTTP-запитів. Не потребує встановлення, повертає <code>Promise</code>. Це базовий інструмент для будь-якого спілкування з API.</p>\n</div>\n\n\n\n<h2>GET-запит — отримання даних</h2>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// fetch повертає Promise — тому використовуємо async/await</span>\n<span class=\"hljs-keyword\">const</span> response = <span class=\"hljs-keyword\">await</span> <span class=\"hljs-title function_\">fetch</span>(<span class=\"hljs-string\">'https://api.example.com/tasks'</span>);\n\n<span class=\"hljs-comment\">// ⚠️ ВАЖЛИВО: fetch НЕ кидає помилку при статусах 400, 500!</span>\n<span class=\"hljs-comment\">// Треба перевіряти response.ok вручну</span>\n<span class=\"hljs-keyword\">if</span> (!response.<span class=\"hljs-property\">ok</span>) {\n  <span class=\"hljs-keyword\">throw</span> <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Error</span>(<span class=\"hljs-string\">`Помилка сервера: <span class=\"hljs-subst\">${response.status}</span>`</span>);\n}\n\n<span class=\"hljs-comment\">// Перетворюємо JSON-рядок на JavaScript-об'єкт</span>\n<span class=\"hljs-keyword\">const</span> <span class=\"hljs-attr\">tasks</span>: <span class=\"hljs-title class_\">Task</span>[] = <span class=\"hljs-keyword\">await</span> response.<span class=\"hljs-title function_\">json</span>();</code></pre><h2>POST / PUT / DELETE — зміна даних</h2>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// POST — надсилаємо нові дані на сервер</span>\n<span class=\"hljs-keyword\">const</span> response = <span class=\"hljs-keyword\">await</span> <span class=\"hljs-title function_\">fetch</span>(<span class=\"hljs-string\">'https://api.example.com/tasks'</span>, {\n  <span class=\"hljs-attr\">method</span>: <span class=\"hljs-string\">'POST'</span>,\n  <span class=\"hljs-attr\">headers</span>: {\n    <span class=\"hljs-string\">'Content-Type'</span>: <span class=\"hljs-string\">'application/json'</span>, <span class=\"hljs-comment\">// говоримо серверу, що шлемо JSON</span>\n  },\n  <span class=\"hljs-attr\">body</span>: <span class=\"hljs-title class_\">JSON</span>.<span class=\"hljs-title function_\">stringify</span>({ <span class=\"hljs-attr\">title</span>: <span class=\"hljs-string\">'Нова задача'</span>, <span class=\"hljs-attr\">status</span>: <span class=\"hljs-string\">'todo'</span> }),\n});\n\n<span class=\"hljs-comment\">// PUT — оновлюємо існуючий запис</span>\n<span class=\"hljs-keyword\">await</span> <span class=\"hljs-title function_\">fetch</span>(<span class=\"hljs-string\">`https://api.example.com/tasks/<span class=\"hljs-subst\">${id}</span>`</span>, {\n  <span class=\"hljs-attr\">method</span>: <span class=\"hljs-string\">'PUT'</span>,\n  <span class=\"hljs-attr\">headers</span>: { <span class=\"hljs-string\">'Content-Type'</span>: <span class=\"hljs-string\">'application/json'</span> },\n  <span class=\"hljs-attr\">body</span>: <span class=\"hljs-title class_\">JSON</span>.<span class=\"hljs-title function_\">stringify</span>(updatedTask),\n});\n\n<span class=\"hljs-comment\">// DELETE — видаляємо (тіло зазвичай не потрібне)</span>\n<span class=\"hljs-keyword\">await</span> <span class=\"hljs-title function_\">fetch</span>(<span class=\"hljs-string\">`https://api.example.com/tasks/<span class=\"hljs-subst\">${id}</span>`</span>, {\n  <span class=\"hljs-attr\">method</span>: <span class=\"hljs-string\">'DELETE'</span>,\n});</code></pre><div class=\"warning\"><strong>⚠️ Поширена помилка</strong> <p><code>fetch</code> вважає запит <strong>успішним</strong> навіть при статусах 400 (Bad Request), 404 (Not Found) або 500 (Server Error). Завжди перевіряйте <code>response.ok</code> або <code>response.status</code>.</p>\n</div>\n\n","<h1>📦 Axios — зручна альтернатива</h1>\n<div class=\"info\"><strong>ℹ️ Чому axios, а не fetch?</strong> <p><code>axios</code> — бібліотека, яка робить те саме, що <code>fetch</code>, але зручніше: автоматично конвертує JSON, кидає помилки при 4xx/5xx-статусах, підтримує <code>timeout</code> та <strong>інтерцептори</strong>.</p>\n</div>\n\n\n\n<h2>Порівняння fetch vs axios</h2>\n<table>\n<thead>\n<tr>\n<th>Характеристика</th>\n<th><code>fetch</code></th>\n<th><code>axios</code></th>\n</tr>\n</thead>\n<tbody><tr>\n<td>🔧 Встановлення</td>\n<td>Не потрібне</td>\n<td><code>npm install axios</code></td>\n</tr>\n<tr>\n<td>📦 JSON</td>\n<td><code>.json()</code> вручну</td>\n<td>Автоматично</td>\n</tr>\n<tr>\n<td>❌ Помилки 4xx/5xx</td>\n<td>Не кидає</td>\n<td>Кидає exception</td>\n</tr>\n<tr>\n<td>⏱️ Timeout</td>\n<td>Не підтримує</td>\n<td>Підтримує</td>\n</tr>\n<tr>\n<td>🔁 Інтерцептори</td>\n<td>Немає</td>\n<td>Є</td>\n</tr>\n</tbody></table>\n<h2>Інтерцептори — навіщо вони потрібні?</h2>\n<div class=\"info\"><strong>ℹ️ Що таке інтерцептор?</strong> <p><strong>Інтерцептор</strong> — це функція, яка автоматично виконується <strong>перед кожним запитом</strong> або <strong>після кожної відповіді</strong>. Це дозволяє не писати однаковий код у кожному запиті.</p>\n</div>\n\n\n\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// src/api/client.ts</span>\n<span class=\"hljs-keyword\">import</span> axios <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">'axios'</span>;\n\n<span class=\"hljs-keyword\">const</span> apiClient = axios.<span class=\"hljs-title function_\">create</span>({\n  <span class=\"hljs-attr\">baseURL</span>: <span class=\"hljs-keyword\">import</span>.<span class=\"hljs-property\">meta</span>.<span class=\"hljs-property\">env</span>.<span class=\"hljs-property\">VITE_API_URL</span>, <span class=\"hljs-comment\">// базова адреса API</span>\n  <span class=\"hljs-attr\">timeout</span>: <span class=\"hljs-number\">10_000</span>,                        <span class=\"hljs-comment\">// якщо сервер не відповів за 10с — помилка</span>\n});\n\n<span class=\"hljs-comment\">// Інтерцептор ЗАПИТІВ: додаємо токен авторизації до кожного запиту</span>\n<span class=\"hljs-comment\">// Без інтерцептора довелося б писати це в кожному виклику вручну</span>\napiClient.<span class=\"hljs-property\">interceptors</span>.<span class=\"hljs-property\">request</span>.<span class=\"hljs-title function_\">use</span>(<span class=\"hljs-function\">(<span class=\"hljs-params\">config</span>) =&gt;</span> {\n  <span class=\"hljs-keyword\">const</span> token = <span class=\"hljs-variable language_\">localStorage</span>.<span class=\"hljs-title function_\">getItem</span>(<span class=\"hljs-string\">'token'</span>);\n  <span class=\"hljs-keyword\">if</span> (token) {\n    config.<span class=\"hljs-property\">headers</span>.<span class=\"hljs-property\">Authorization</span> = <span class=\"hljs-string\">`Bearer <span class=\"hljs-subst\">${token}</span>`</span>;\n  }\n  <span class=\"hljs-keyword\">return</span> config;\n});\n\n<span class=\"hljs-comment\">// Інтерцептор ВІДПОВІДЕЙ: централізована обробка помилок</span>\napiClient.<span class=\"hljs-property\">interceptors</span>.<span class=\"hljs-property\">response</span>.<span class=\"hljs-title function_\">use</span>(\n  <span class=\"hljs-function\">(<span class=\"hljs-params\">response</span>) =&gt;</span> response, <span class=\"hljs-comment\">// успіх — просто повертаємо</span>\n  <span class=\"hljs-function\">(<span class=\"hljs-params\">error</span>) =&gt;</span> {\n    <span class=\"hljs-keyword\">if</span> (error.<span class=\"hljs-property\">response</span>?.<span class=\"hljs-property\">status</span> === <span class=\"hljs-number\">401</span>) {\n      <span class=\"hljs-comment\">// Токен протух — перенаправляємо на логін</span>\n      <span class=\"hljs-variable language_\">window</span>.<span class=\"hljs-property\">location</span>.<span class=\"hljs-property\">href</span> = <span class=\"hljs-string\">'/login'</span>;\n    }\n    <span class=\"hljs-keyword\">return</span> <span class=\"hljs-title class_\">Promise</span>.<span class=\"hljs-title function_\">reject</span>(error); <span class=\"hljs-comment\">// передаємо помилку далі</span>\n  }\n);\n\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">default</span> apiClient;</code></pre><div class=\"tip\"><strong>💡 Один екземпляр для всього проєкту</strong> <p>Створюйте <strong>один</strong> <code>axios.create()</code> і використовуйте його скрізь. Налаштування <code>baseURL</code> та інтерцептори задаються один раз.</p>\n</div>\n\n","<h1>🔑 Типізація API та змінні середовища</h1>\n<h2>Типізація відповідей</h2>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// src/types/task.ts — описуємо структуру Task</span>\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">interface</span> <span class=\"hljs-title class_\">Task</span> {\n  <span class=\"hljs-attr\">id</span>: <span class=\"hljs-built_in\">number</span>;\n  <span class=\"hljs-attr\">title</span>: <span class=\"hljs-built_in\">string</span>;\n  <span class=\"hljs-attr\">description</span>: <span class=\"hljs-built_in\">string</span>;\n  <span class=\"hljs-attr\">status</span>: <span class=\"hljs-string\">'todo'</span> | <span class=\"hljs-string\">'in-progress'</span> | <span class=\"hljs-string\">'done'</span>;\n  <span class=\"hljs-attr\">priority</span>: <span class=\"hljs-string\">'low'</span> | <span class=\"hljs-string\">'medium'</span> | <span class=\"hljs-string\">'high'</span>;\n  <span class=\"hljs-attr\">createdAt</span>: <span class=\"hljs-built_in\">string</span>;\n}</code></pre><h2>API-сервіс — один файл для всіх запитів</h2>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// src/api/tasks.ts</span>\n<span class=\"hljs-keyword\">import</span> apiClient <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">'./client'</span>;\n<span class=\"hljs-keyword\">import</span> <span class=\"hljs-keyword\">type</span> { <span class=\"hljs-title class_\">Task</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">'../types/task'</span>;\n\n<span class=\"hljs-comment\">// Зібрати всі запити в один об'єкт — зручно та зрозуміло</span>\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">const</span> tasksApi = {\n  <span class=\"hljs-attr\">getAll</span>: <span class=\"hljs-function\">() =&gt;</span>\n    apiClient.<span class=\"hljs-property\">get</span>&lt;<span class=\"hljs-title class_\">Task</span>[]&gt;(<span class=\"hljs-string\">'/tasks'</span>).<span class=\"hljs-title function_\">then</span>(<span class=\"hljs-function\">(<span class=\"hljs-params\">r</span>) =&gt;</span> r.<span class=\"hljs-property\">data</span>),\n\n  <span class=\"hljs-attr\">getById</span>: <span class=\"hljs-function\">(<span class=\"hljs-params\">id: <span class=\"hljs-built_in\">number</span></span>) =&gt;</span>\n    apiClient.<span class=\"hljs-property\">get</span>&lt;<span class=\"hljs-title class_\">Task</span>&gt;(<span class=\"hljs-string\">`/tasks/<span class=\"hljs-subst\">${id}</span>`</span>).<span class=\"hljs-title function_\">then</span>(<span class=\"hljs-function\">(<span class=\"hljs-params\">r</span>) =&gt;</span> r.<span class=\"hljs-property\">data</span>),\n\n  <span class=\"hljs-attr\">create</span>: <span class=\"hljs-function\">(<span class=\"hljs-params\">data: Omit&lt;Task, <span class=\"hljs-string\">'id'</span> | <span class=\"hljs-string\">'createdAt'</span>&gt;</span>) =&gt;</span>\n    apiClient.<span class=\"hljs-property\">post</span>&lt;<span class=\"hljs-title class_\">Task</span>&gt;(<span class=\"hljs-string\">'/tasks'</span>, data).<span class=\"hljs-title function_\">then</span>(<span class=\"hljs-function\">(<span class=\"hljs-params\">r</span>) =&gt;</span> r.<span class=\"hljs-property\">data</span>),\n\n  <span class=\"hljs-attr\">update</span>: <span class=\"hljs-function\">(<span class=\"hljs-params\">id: <span class=\"hljs-built_in\">number</span>, data: Partial&lt;Task&gt;</span>) =&gt;</span>\n    apiClient.<span class=\"hljs-property\">put</span>&lt;<span class=\"hljs-title class_\">Task</span>&gt;(<span class=\"hljs-string\">`/tasks/<span class=\"hljs-subst\">${id}</span>`</span>, data).<span class=\"hljs-title function_\">then</span>(<span class=\"hljs-function\">(<span class=\"hljs-params\">r</span>) =&gt;</span> r.<span class=\"hljs-property\">data</span>),\n\n  <span class=\"hljs-attr\">remove</span>: <span class=\"hljs-function\">(<span class=\"hljs-params\">id: <span class=\"hljs-built_in\">number</span></span>) =&gt;</span>\n    apiClient.<span class=\"hljs-title function_\">delete</span>(<span class=\"hljs-string\">`/tasks/<span class=\"hljs-subst\">${id}</span>`</span>),\n};</code></pre><h2>Змінні середовища у Vite</h2>\n<pre><code class=\"language-bash hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\"># .env.development — для локальної розробки</span>\nVITE_API_URL=http://localhost:3000\n\n<span class=\"hljs-comment\"># .env.production — для продакшну</span>\nVITE_API_URL=https://api.myapp.com</code></pre><pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// Доступ у коді через import.meta.env</span>\n<span class=\"hljs-keyword\">const</span> url = <span class=\"hljs-keyword\">import</span>.<span class=\"hljs-property\">meta</span>.<span class=\"hljs-property\">env</span>.<span class=\"hljs-property\">VITE_API_URL</span>;\n<span class=\"hljs-comment\">// ⚠️ Тільки змінні з префіксом VITE_ видно у браузері</span></code></pre>","<h1>⚠️ Ручне управління даними: три стани</h1>\n<div class=\"info\"><strong>ℹ️ Три обов'язкові стани</strong> <p>Кожен HTTP-запит проходить через три стани. Якщо не відстежувати всі три — UI буде \"зламаним\": або вічний спіннер, або порожній список.</p>\n</div>\n\n\n\n<h2>Повна реалізація вручну</h2>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">TaskList</span>(<span class=\"hljs-params\"></span>) {\n  <span class=\"hljs-keyword\">const</span> [tasks, setTasks] = useState&lt;<span class=\"hljs-title class_\">Task</span>[]&gt;([]);\n  <span class=\"hljs-keyword\">const</span> [isLoading, setIsLoading] = <span class=\"hljs-title function_\">useState</span>(<span class=\"hljs-literal\">true</span>);\n  <span class=\"hljs-keyword\">const</span> [error, setError] = useState&lt;<span class=\"hljs-built_in\">string</span> | <span class=\"hljs-literal\">null</span>&gt;(<span class=\"hljs-literal\">null</span>);\n\n  <span class=\"hljs-title function_\">useEffect</span>(<span class=\"hljs-function\">() =&gt;</span> {\n    <span class=\"hljs-keyword\">const</span> controller = <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">AbortController</span>(); <span class=\"hljs-comment\">// для скасування запиту</span>\n\n    <span class=\"hljs-keyword\">const</span> <span class=\"hljs-title function_\">fetchTasks</span> = <span class=\"hljs-keyword\">async</span> (<span class=\"hljs-params\"></span>) =&gt; {\n      <span class=\"hljs-keyword\">try</span> {\n        <span class=\"hljs-title function_\">setIsLoading</span>(<span class=\"hljs-literal\">true</span>);\n        <span class=\"hljs-title function_\">setError</span>(<span class=\"hljs-literal\">null</span>);\n        <span class=\"hljs-keyword\">const</span> response = <span class=\"hljs-keyword\">await</span> <span class=\"hljs-title function_\">fetch</span>(<span class=\"hljs-string\">'/tasks'</span>, { <span class=\"hljs-attr\">signal</span>: controller.<span class=\"hljs-property\">signal</span> });\n        <span class=\"hljs-keyword\">if</span> (!response.<span class=\"hljs-property\">ok</span>) <span class=\"hljs-keyword\">throw</span> <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Error</span>(<span class=\"hljs-string\">`Помилка: <span class=\"hljs-subst\">${response.status}</span>`</span>);\n        <span class=\"hljs-keyword\">const</span> <span class=\"hljs-attr\">data</span>: <span class=\"hljs-title class_\">Task</span>[] = <span class=\"hljs-keyword\">await</span> response.<span class=\"hljs-title function_\">json</span>();\n        <span class=\"hljs-title function_\">setTasks</span>(data);\n      } <span class=\"hljs-keyword\">catch</span> (err) {\n        <span class=\"hljs-comment\">// AbortError — це не справжня помилка, а скасування запиту</span>\n        <span class=\"hljs-keyword\">if</span> (err <span class=\"hljs-keyword\">instanceof</span> <span class=\"hljs-title class_\">DOMException</span> &amp;&amp; err.<span class=\"hljs-property\">name</span> === <span class=\"hljs-string\">'AbortError'</span>) <span class=\"hljs-keyword\">return</span>;\n        <span class=\"hljs-title function_\">setError</span>(<span class=\"hljs-string\">'Не вдалося завантажити задачі'</span>);\n      } <span class=\"hljs-keyword\">finally</span> {\n        <span class=\"hljs-title function_\">setIsLoading</span>(<span class=\"hljs-literal\">false</span>); <span class=\"hljs-comment\">// виконується завжди — навіть при помилці</span>\n      }\n    };\n\n    <span class=\"hljs-title function_\">fetchTasks</span>();\n    <span class=\"hljs-keyword\">return</span> <span class=\"hljs-function\">() =&gt;</span> controller.<span class=\"hljs-title function_\">abort</span>(); <span class=\"hljs-comment\">// cleanup при розмонтуванні</span>\n  }, []);\n\n  <span class=\"hljs-keyword\">if</span> (isLoading) <span class=\"hljs-keyword\">return</span> <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">p</span>&gt;</span>Завантаження...<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">p</span>&gt;</span></span>;\n  <span class=\"hljs-keyword\">if</span> (error) <span class=\"hljs-keyword\">return</span> <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">p</span>&gt;</span>Помилка: {error}<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">p</span>&gt;</span></span>;\n  <span class=\"hljs-keyword\">return</span> <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">ul</span>&gt;</span>{tasks.map((t) =&gt; <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">li</span> <span class=\"hljs-attr\">key</span>=<span class=\"hljs-string\">{t.id}</span>&gt;</span>{t.title}<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">li</span>&gt;</span>)}<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">ul</span>&gt;</span></span>;\n}</code></pre><h2>Race condition — прихована проблема</h2>\n<div class=\"warning\"><strong>⚠️ Що це таке?</strong> <p><strong>Race condition</strong> виникає, коли два запити виконуються паралельно, і <strong>старий повертає відповідь пізніше за новий</strong>. UI показує неправильні дані.</p>\n</div>\n\n\n\n\n<div class=\"mermaid\" data-source=\"sequenceDiagram\n    participant U as Користувач\n    participant C as Компонент\n    participant S as Сервер\n    U-&gt;&gt;C: status = &quot;todo&quot;\n    C-&gt;&gt;S: GET /tasks?status=todo (запит 1)\n    U-&gt;&gt;C: status = &quot;done&quot;\n    C-&gt;&gt;S: GET /tasks?status=done (запит 2)\n    S--&gt;&gt;C: Відповідь на запит 2 ✅\n    C-&gt;&gt;C: setTasks(done-tasks)\n    S--&gt;&gt;C: Відповідь на запит 1 ❌ (повільніше!)\n    C-&gt;&gt;C: setTasks(todo-tasks) -- НЕПРАВИЛЬНІ ДАНІ!\"><svg id=\"exp-1773691669279-6-0\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" style=\"max-width: 799px rong>якщо два компоненти запитують одні й ті самі дані — вони зроблять два окремих запити</strong>. Немає жодної спільної \"пам'яті\" між ними.</p>\n<div class=\"info\"><strong>ℹ️ Серверний стан vs Клієнтський стан</strong> <p><strong>Клієнтський стан</strong> (UI): чи відкрите меню, активний таб — <code>useState</code>, Zustand.</p>\n<p><strong>Серверний стан</strong>: дані з API — вони асинхронні, можуть застаріти, потребують синхронізації. Для них — TanStack Query.</p>\n</div>\n\n","<h1>💾 Кеш: що це і навіщо він потрібен</h1>\n<div class=\"info\"><strong>ℹ️ Що таке кеш?</strong> <p><strong>Кеш</strong> — це тимчасове сховище вже отриманих даних. Замість того, щоб щоразу йти на сервер за одними й тими ж даними, застосунок бере їх із кешу — це швидко і без мережевого запиту.</p>\n</div>\n\n\n\n<h2>Без кешу — кожен компонент робить свій запит</h2>\n\n<div class=\"mermaid\" data-source=\"graph LR\n    C1[TaskList] --&gt;|GET /tasks| S[Сервер]\n    C2[TaskCounter] --&gt;|GET /tasks| S\n    C3[TaskSidebar] --&gt;|GET /tasks| S\n    style S fill:#fce4ec,stroke:#c62828\"><svg id=\"exp-1773691669301-8-0\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" class=\"flowchart\" style=\"max-width: 391.96875px;\" viewBox=\"0 0 391.96875 260\" role=\"graphics-document document\" aria-roledescription=\"flowchart-v2\"><style>#exp-1773691669301-8-0{font-family:system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,Arial,sans-serif;font-size:16px;fill:#333;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#exp-1773691669301-8-0 .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#exp-1773691669301-8-0 .edge-animation-fast{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 20s linear infinite;stroke-linecap:round;}#exp-1773691669301-8-0 .error-icon{fill:#552222;}#exp-1773691669301-8-0 .error-text{fill:#552222;stroke:#552222;}#exp te(0, 0)\"><text y=\"-10.1\" text-anchor=\"middle\"><tspan class=\"text-outer-tspan row\" x=\"0\" y=\"-0.1em\" dy=\"1.1em\" text-anchor=\"middle\"></tspan></text></g></g><g><rect class=\"background\" style=\"stroke: none\"></rect></g><g class=\"edgeLabel\"><g class=\"label\" data-id=\"L_CH_C2_0\" transform=\"translate(0, 0)\"><text y=\"-10.1\" text-anchor=\"middle\"><tspan class=\"text-outer-tspan row\" x=\"0\" y=\"-0.1em\" dy=\"1.1em\" text-anchor=\"middle\"></tspan></text></g></g><g><rect class=\"background\" style=\"stroke: none\"></rect></g><g class=\"edgeLabel\"><g class=\"label\" data-id=\"L_CH_C3_0\" transform=\"translate(0, 0)\"><text y=\"-10.1\" text-anchor=\"middle\"><tspan class=\"text-outer-tspan row\" x=\"0\" y=\"-0.1em\" dy=\"1.1em\" text-anchor=\"middle\"></tspan></text></g></g><g><rect class=\"background\" style=\"stroke: none\"></rect></g></g><g class=\"nodes\"><g class=\"node default  \" id=\"flowchart-S-0\" transform=\"translate(60.4296875, 130)\"><rect class=\"basic label-container\" style=\"fill:#e3f2fd !important;stroke:#1565c0 !important\" x=\"-52.4296875\" y=\"-24\" width=\"104.859375\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-28.4296875, -12)\"><rect></rect><foreignObject width=\"56.859375\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>Сервер</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"flowchart-CH-1\" transform=\"translate(294, 130)\"><rect class=\"basic label-container\" style=\"fill:#e8f5e9 !important;stroke:#2e7d32 !important\" x=\"-39.71875\" y=\"-24\" width=\"79.4375\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-15.71875, -12)\"><rect></rect><foreignObject width=\"31.4375\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>Кеш</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"flowchart-C1-3\" transform=\"translate(453.453125, 32)\"><rect class=\"basic label-container\" style=\"\" x=\"-53.5234375\" y=\"-24\" width=\"107.046875\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-29.5234375, -12)\"><rect></rect><foreignObject width=\"59.046875\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>TaskList</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"flowchart-C2-5\" transform=\"translate(453.453125, 130)\"><rect class=\"basic label-container\" style=\"\" x=\"-69.734375\" y=\"-24\" width=\"139.46875\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-45.734375, -12)\"><rect></rect><foreignObject width=\"91.46875\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>TaskCounter</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"flowchart-C3-7\" transform=\"translate(453.453125, 228)\"><rect class=\"basic label-container\" style=\"\" x=\"-68.4140625\" y=\"-24\" width=\"136.828125\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-44.4140625, -12)\"><rect></rect><foreignObject width=\"88.828125\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>TaskSidebar</p></span></div></foreignObject></g></g></g></g></g></svg></div>\n<h2>Коли кеш стає \"застарілим\"?</h2>\n<p>Після того, як ми <strong>змінюємо</strong> дані (створюємо, оновлюємо або видаляємо задачу), дані в кеші вже не відповідають тому, що є на сервері. Кеш треба <strong>інвалідувати</strong> — позначити як застарілий, щоб він оновився при наступному зверненні.</p>\n<table>\n<thead>\n<tr>\n<th>Термін</th>\n<th>Пояснення</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>staleTime</code></td>\n<td>Скільки часу дані вважаються \"свіжими\" (за замовчуванням — 0)</td>\n</tr>\n<tr>\n<td>Інвалідація</td>\n<td>Позначення даних як застарілих → автоматичний новий запит</td>\n</tr>\n<tr>\n<td>Фонове оновлення</td>\n<td>Показуємо старі дані, поки у фоні оновлюємо</td>\n</tr>\n</tbody></table>\n<div class=\"warning\"><strong>⚠️ Вибір staleTime</strong> <p>5 хвилин — розумне значення коли <strong>лише один користувач</strong> впливає на дані. Якщо дані можуть змінюватись з іншого пристрою або іншим користувачем — використовуйте менші значення (30–60 секунд) або <code>staleTime: 0</code>, щоб гарантувати актуальність.</p>\n</div>\n\n","<h1>⚡ TanStack Query: налаштування</h1>\n<h2>Встановлення</h2>\n<pre><code class=\"language-bash hljs\" data-highlighted=\"yes\">npm install @tanstack/react-query\nnpm install @tanstack/react-query-devtools  <span class=\"hljs-comment\"># DevTools для відлагодження</span></code></pre><h2>Підключення до застосунку</h2>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// src/main.tsx</span>\n<span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">QueryClient</span>, <span class=\"hljs-title class_\">QueryClientProvider</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">'@tanstack/react-query'</span>;\n<span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">ReactQueryDevtools</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">'@tanstack/react-query-devtools'</span>;\n\n<span class=\"hljs-comment\">// QueryClient — це і є \"центральне кешове сховище\"</span>\n<span class=\"hljs-keyword\">const</span> queryClient = <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">QueryClient</span>({\n  <span class=\"hljs-attr\">defaultOptions</span>: {\n    <span class=\"hljs-attr\">queries</span>: {\n      <span class=\"hljs-attr\">staleTime</span>: <span class=\"hljs-number\">1000</span> * <span class=\"hljs-number\">60</span> * <span class=\"hljs-number\">5</span>, <span class=\"hljs-comment\">// дані \"свіжі\" 5 хвилин</span>\n      <span class=\"hljs-attr\">retry</span>: <span class=\"hljs-number\">2</span>,                  <span class=\"hljs-comment\">// 2 автоматичні повторні спроби при помилці</span>\n    },\n  },\n});\n\n<span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">App</span>(<span class=\"hljs-params\"></span>) {\n  <span class=\"hljs-keyword\">return</span> (\n    <span class=\"hljs-comment\">// Провайдер дає доступ до кешу всьому дереву компонентів</span>\n    <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">QueryClientProvider</span> <span class=\"hljs-attr\">client</span>=<span class=\"hljs-string\">{queryClient}</span>&gt;</span>\n      <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">Router</span> /&gt;</span>\n      {/* DevTools — панель для перегляду стану кешу під час розробки */}\n      <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">ReactQueryDevtools</span> <span class=\"hljs-attr\">initialIsOpen</span>=<span class=\"hljs-string\">{false}</span> /&gt;</span>\n    <span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">QueryClientProvider</span>&gt;</span></span>\n  );\n}</code></pre><h2>TanStack Query DevTools</h2>\n<div class=\"tip\"><strong>💡 Розширення для браузера</strong> <p>Окрім вбудованого компонента <code>&lt;ReactQueryDevtools /&gt;</code>, є <strong>розширення для Chrome</strong> — <strong>TanStack Query DevTools</strong>. Дозволяє переглядати стан кешу без додавання компонента у код.</p>\n</div>\n\n\n\n<p>Що показують DevTools:</p>\n<ul>\n<li>🟢 <strong>fresh</strong> — дані свіжі, запит не потрібен</li>\n<li>🟡 <strong>stale</strong> — дані застаріли, буде фоновий запит</li>\n<li>🔵 <strong>fetching</strong> — запит виконується зараз</li>\n<li>🔴 <strong>error</strong> — запит завершився помилкою</li>\n</ul>\n","<h1>🔍 useQuery — отримання даних</h1>\n<div class=\"info\"><strong>ℹ️ Чому окремий хук, а не useEffect?</strong> <p><code>useQuery</code> — не просто \"обгортка над fetch\". Він автоматично керує кешем, дедуплікує однакові запити, відстежує всі стани та оновлює дані у фоні. З <code>useEffect</code> вам довелося б писати весь цей код вручну.</p>\n</div>\n\n\n\n<h2>Як думає useQuery</h2>\n\n<div class=\"mermaid\" data-source=\"graph LR\n    UQ[useQuery викликано] --&gt; CH{Є в кеші?}\n    CH --&gt;|Так, свіже| D[Повернути з кешу]\n    CH --&gt;|Немає або застаріле| F[Виконати queryFn]\n    F --&gt; CH2{Успіх?}\n    CH2 --&gt;|Так| S[Зберегти в кеш]\n    CH2 --&gt;|Ні| E[Повернути помилку]\n    style D fill:#e8f5e9,stroke:#2e7d32\n    style S fill:#e8f5e9,stroke:#2e7d32\n    style E fill:#fce4ec,stroke:#c62828\"><svg id=\"exp-1773691669322-10-0\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" class=\"flowchart\" style=\"max-width: 1207.96875px;\" viewBox=\"0 0 1207.96875 211\" role=\"graphics-document document\" aria-roledescription=\"flowchart-v2\"><style>#exp-1773691669322-10-0{font-family:system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,Arial,sans-serif;font-size:16px;fill:#333;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#exp-1773691669322-10-0 .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#exp-1773691669322-10-0 .edge-animation-fast{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 20s linear infinite;stroke-linecap:round;}#exp-1773691669322-10-0 .error-icon{fill:#552222;}#exp-1773691669322-10-0 .error-text{fill:# s=\"node default  \" id=\"flowchart-E-11\" transform=\"translate(1100.1171875, 179)\"><rect class=\"basic label-container\" style=\"fill:#fce4ec !important;stroke:#c62828 !important\" x=\"-99.8515625\" y=\"-24\" width=\"199.703125\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-75.8515625, -12)\"><rect></rect><foreignObject width=\"151.703125\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>Повернути помилку</p></span></div></foreignObject></g></g></g></g></g></svg></div>\n<h2>Базовий синтаксис</h2>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-keyword\">import</span> { useQuery } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">'@tanstack/react-query'</span>;\n\n<span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">TaskList</span>(<span class=\"hljs-params\"></span>) {\n  <span class=\"hljs-keyword\">const</span> {\n    <span class=\"hljs-attr\">data</span>: tasks,   <span class=\"hljs-comment\">// дані (Task[] | undefined)</span>\n    isLoading,     <span class=\"hljs-comment\">// true тільки при ПЕРШОМУ завантаженні (кешу ще немає)</span>\n    isFetching,    <span class=\"hljs-comment\">// true при БУДЬ-ЯКОМУ запиті (включно з фоновим)</span>\n    isError,       <span class=\"hljs-comment\">// true якщо запит завершився помилкою</span>\n    error,         <span class=\"hljs-comment\">// сам об'єкт помилки</span>\n    refetch,       <span class=\"hljs-comment\">// функція для ручного перезапиту</span>\n  } = <span class=\"hljs-title function_\">useQuery</span>({\n    <span class=\"hljs-attr\">queryKey</span>: [<span class=\"hljs-string\">'tasks'</span>],       <span class=\"hljs-comment\">// 🔑 унікальний ключ у кеші</span>\n    <span class=\"hljs-attr\">queryFn</span>: tasksApi.<span class=\"hljs-property\">getAll</span>,  <span class=\"hljs-comment\">// функція, що повертає Promise з даними</span>\n  });\n\n  <span class=\"hljs-keyword\">if</span> (isLoading) <span class=\"hljs-keyword\">return</span> <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">p</span>&gt;</span>Завантаження...<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">p</span>&gt;</span></span>;\n  <span class=\"hljs-keyword\">if</span> (isError) <span class=\"hljs-keyword\">return</span> <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">p</span>&gt;</span>Помилка: {error.message}<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">p</span>&gt;</span></span>;\n\n  <span class=\"hljs-keyword\">return</span> <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">ul</span>&gt;</span>{tasks?.map((t) =&gt; <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">li</span> <span class=\"hljs-attr\">key</span>=<span class=\"hljs-string\">{t.id}</span>&gt;</span>{t.title}<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">li</span>&gt;</span>)}<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">ul</span>&gt;</span></span>;\n}</code></pre><h2>queryKey — адреса в кеші</h2>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// Уявіть кеш як словник, де ключ — це queryKey</span>\n\n<span class=\"hljs-title function_\">useQuery</span>({ <span class=\"hljs-attr\">queryKey</span>: [<span class=\"hljs-string\">'tasks'</span>] });\n<span class=\"hljs-comment\">// кеш: { 'tasks': [...всі задачі] }</span>\n\n<span class=\"hljs-title function_\">useQuery</span>({ <span class=\"hljs-attr\">queryKey</span>: [<span class=\"hljs-string\">'tasks'</span>, { <span class=\"hljs-attr\">status</span>: <span class=\"hljs-string\">'todo'</span> }] });\n<span class=\"hljs-comment\">// кеш: { 'tasks,{status:todo}': [...todo задачі] }</span>\n<span class=\"hljs-comment\">// При зміні status — буде інший ключ, тобто новий запит</span>\n\n<span class=\"hljs-title function_\">useQuery</span>({ <span class=\"hljs-attr\">queryKey</span>: [<span class=\"hljs-string\">'tasks'</span>, <span class=\"hljs-number\">5</span>] });\n<span class=\"hljs-comment\">// кеш: { 'tasks,5': { id: 5, title: '...' } }</span>\n\n<span class=\"hljs-comment\">// enabled: не виконувати запит поки id не визначений</span>\n<span class=\"hljs-title function_\">useQuery</span>({\n  <span class=\"hljs-attr\">queryKey</span>: [<span class=\"hljs-string\">'tasks'</span>, id],\n  <span class=\"hljs-attr\">queryFn</span>: <span class=\"hljs-function\">() =&gt;</span> tasksApi.<span class=\"hljs-title function_\">getById</span>(id!),\n  <span class=\"hljs-attr\">enabled</span>: !!id,\n});</code></pre><div class=\"tip\"><strong>💡 queryKey як залежності useEffect</strong> <p><code>queryKey</code> працює як масив залежностей <code>useEffect</code>. Якщо значення у ключі змінились — Query виконує <code>queryFn</code> знову.</p>\n</div>\n\n","<h1>✏️ useMutation — навіщо окремий хук?</h1>\n<div class=\"info\"><strong>ℹ️ Чому не useQuery для всього?</strong> <p><code>useQuery</code> виконується <strong>автоматично</strong> при монтуванні компонента і повторюється у фоні. Це добре для читання даних, але катастрофа для запису: ви не хочете, щоб <code>DELETE /tasks/5</code> виконувався при кожному рендері. <code>useMutation</code> виконується лише тоді, коли ви явно викликаєте <code>.mutate()</code>.</p>\n</div>\n\n\n\n<h2>Порівняння useQuery vs useMutation</h2>\n<table>\n<thead>\n<tr>\n<th></th>\n<th><code>useQuery</code></th>\n<th><code>useMutation</code></th>\n</tr>\n</thead>\n<tbody><tr>\n<td>🎯 Призначення</td>\n<td>Читання даних</td>\n<td>Зміна даних</td>\n</tr>\n<tr>\n<td>🚀 Коли виконується</td>\n<td>Автоматично при монтуванні</td>\n<td>Тільки при виклику <code>.mutate()</code></td>\n</tr>\n<tr>\n<td>💾 Кешування</td>\n<td>Так</td>\n<td>Ні</td>\n</tr>\n<tr>\n<td>🔄 Фонове оновлення</td>\n<td>Так</td>\n<td>Ні</td>\n</tr>\n<tr>\n<td>📝 HTTP-методи</td>\n<td><code>GET</code></td>\n<td><code>POST</code>, <code>PUT</code>, <code>DELETE</code></td>\n</tr>\n</tbody></table>\n<h2>Базовий приклад: створення задачі</h2>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-keyword\">import</span> { useMutation, useQueryClient } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">'@tanstack/react-query'</span>;\n\n<span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">CreateTaskForm</span>(<span class=\"hljs-params\"></span>) {\n  <span class=\"hljs-keyword\">const</span> queryClient = <span class=\"hljs-title function_\">useQueryClient</span>(); <span class=\"hljs-comment\">// доступ до кешового сховища</span>\n\n  <span class=\"hljs-keyword\">const</span> createMutation = <span class=\"hljs-title function_\">useMutation</span>({\n    <span class=\"hljs-attr\">mutationFn</span>: <span class=\"hljs-function\">(<span class=\"hljs-params\">newTask: Omit&lt;Task, <span class=\"hljs-string\">'id'</span> | <span class=\"hljs-string\">'createdAt'</span>&gt;</span>) =&gt;</span>\n      tasksApi.<span class=\"hljs-title function_\">create</span>(newTask),\n\n    <span class=\"hljs-attr\">onSuccess</span>: <span class=\"hljs-function\">() =&gt;</span> {\n      <span class=\"hljs-comment\">// Після успішного створення — інвалідуємо кеш зі списком задач</span>\n      queryClient.<span class=\"hljs-title function_\">invalidateQueries</span>({ <span class=\"hljs-attr\">queryKey</span>: [<span class=\"hljs-string\">'tasks'</span>] });\n    },\n\n    <span class=\"hljs-attr\">onError</span>: <span class=\"hljs-function\">(<span class=\"hljs-params\">error</span>) =&gt;</span> {\n      <span class=\"hljs-title function_\">alert</span>(<span class=\"hljs-string\">`Помилка: <span class=\"hljs-subst\">${error.message}</span>`</span>);\n    },\n  });\n\n  <span class=\"hljs-keyword\">return</span> (\n    <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">button</span>\n      <span class=\"hljs-attr\">onClick</span>=<span class=\"hljs-string\">{()</span> =&gt;</span> createMutation.mutate({ title: 'Нова задача', status: 'todo' })}\n      disabled={createMutation.isPending}\n    &gt;\n      {createMutation.isPending ? 'Створення...' : 'Створити задачу'}\n    <span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">button</span>&gt;</span></span>\n  );\n}</code></pre><h2>Оновлення та видалення</h2>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">TaskItem</span>(<span class=\"hljs-params\">{ task }: { task: Task }</span>) {\n  <span class=\"hljs-keyword\">const</span> queryClient = <span class=\"hljs-title function_\">useQueryClient</span>();\n\n  <span class=\"hljs-keyword\">const</span> updateMutation = <span class=\"hljs-title function_\">useMutation</span>({\n    <span class=\"hljs-attr\">mutationFn</span>: <span class=\"hljs-function\">(<span class=\"hljs-params\">status: Task[<span class=\"hljs-string\">'status'</span>]</span>) =&gt;</span>\n      tasksApi.<span class=\"hljs-title function_\">update</span>(task.<span class=\"hljs-property\">id</span>, { status }),\n    <span class=\"hljs-attr\">onSuccess</span>: <span class=\"hljs-function\">() =&gt;</span> {\n      queryClient.<span class=\"hljs-title function_\">invalidateQueries</span>({ <span class=\"hljs-attr\">queryKey</span>: [<span class=\"hljs-string\">'tasks'</span>] });\n    },\n  });\n\n  <span class=\"hljs-keyword\">const</span> deleteMutation = <span class=\"hljs-title function_\">useMutation</span>({\n    <span class=\"hljs-attr\">mutationFn</span>: <span class=\"hljs-function\">() =&gt;</span> tasksApi.<span class=\"hljs-title function_\">remove</span>(task.<span class=\"hljs-property\">id</span>),\n    <span class=\"hljs-attr\">onSuccess</span>: <span class=\"hljs-function\">() =&gt;</span> {\n      queryClient.<span class=\"hljs-title function_\">invalidateQueries</span>({ <span class=\"hljs-attr\">queryKey</span>: [<span class=\"hljs-string\">'tasks'</span>] });\n    },\n  });\n\n  <span class=\"hljs-keyword\">return</span> (\n    <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">div</span>&gt;</span>\n      <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">span</span>&gt;</span>{task.title}<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">span</span>&gt;</span>\n      <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">button</span> <span class=\"hljs-attr\">onClick</span>=<span class=\"hljs-string\">{()</span> =&gt;</span> updateMutation.mutate('done')}&gt;✅ Завершити<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">button</span>&gt;</span>\n      <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">button</span>\n        <span class=\"hljs-attr\">onClick</span>=<span class=\"hljs-string\">{()</span> =&gt;</span> deleteMutation.mutate()}\n        disabled={deleteMutation.isPending}\n      &gt;\n        🗑️ Видалити\n      <span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">button</span>&gt;</span>\n    <span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">div</span>&gt;</span></span>\n  );\n}</code></pre>","<h1>🔄 Інвалідація кешу — навіщо це потрібно</h1>\n<div class=\"info\"><strong>ℹ️ Проблема застарілого кешу</strong> <p>Ви відкрили список задач — TanStack Query зробив запит і зберіг дані у кеші. Потім <strong>створили нову задачу</strong> — вона з'явилася на сервері. Але у кеші все ще старі дані! Без інвалідації нова задача не з'явиться у списку.</p>\n</div>\n\n\n\n<h2>Що відбувається без інвалідації</h2>\n\n<div class=\"mermaid\" data-source=\"sequenceDiagram\n    participant UI as TaskList\n    participant Cache as Кеш\n    participant API as Сервер\n    UI-&gt;&gt;Cache: Запит\n    Cache-&gt;&gt;API: GET /tasks\n    API--&gt;&gt;Cache: [task1, task2]\n    Cache--&gt;&gt;UI: [task1, task2]\n    Note over UI: Користувач створює task3\n    UI-&gt;&gt;API: POST /tasks (task3)\n    API--&gt;&gt;UI: 201 Created\n    UI-&gt;&gt;Cache: Запит оновленого списку\n    Cache--&gt;&gt;UI: [task1, task2] -- task3 відсутній!\"><svg id=\"exp-1773691669332-12-0\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" style=\"max-width: 783.5px;\" viewBox=\"-81.5 -10 783.5 603\" role=\"graphics-document document\" aria-roledescription=\"sequence\"><g><rect x=\"502\" y=\"517\" fill=\"#eaeaea\" stroke=\"#666\" width=\"150\" height=\"65\" name=\"API\" rx=\"3\" ry=\"3\" class=\"actor actor-bottom\"></rect><text x=\"577\" y=\"549.5\" dominant-baseline=\"central\" alignment-baseline=\"central\" class=\"actor actor-box\" style=\"text-anchor: middle; font-size: 16px; font-weight: 400;\"><tspan x=\"577\" dy=\"0\">Сервер</tspan></text></g><g><rect x=\"302\" y=\"517\" fill=\"#eaeaea\" stroke=\"#666\" width=\"150\" height=\"65\" name=\"Cache\" rx=\"3\" ry=\"3\" class=\"actor actor-bottom\"></rect><text x=\"377\" y=\"549.5\" dominant-baseline=\"central\" alignment-baseline=\"central\" class=\"actor actor-box\" style=\"text-anchor: middle; font-size: 16px; font-weight: 400;\"><tspan x=\"377\" dy=\"0\">Кеш</tspan></text></g><g><rect x=\"0\" y=\"517\" fill=\"#eaeaea\" stroke=\"#666\" width=\"150\" height=\"65\" name=\"UI\" rx=\"3\" ry=\"3\" class=\"actor actor-bottom\"></rect><text x=\"75\" y=\"549.5\" dominant-baseline=\"central\" alignment-baseline=\"central\" class=\"actor actor-box\" style=\"text-anchor: middle; font-size: 16px; font-weight: 400;\"><tspan x=\"75\" dy=\"0\">TaskList</tspan></text></g><g><line id=\"actor17\" x1=\"577\" y1=\"65\" x2=\"577\" y2=\"517\" class=\"actor-line 200\" stroke-width=\"0.5px\" stroke=\"#999\" name=\"API\"></line><g id=\"root-17\"><rect x=\"502\" y=\"0\" fill=\"#eaeaea\" stroke=\"#666\" width=\"150\" height=\"65\" name=\"API\" rx=\"3\" ry=\"3\" class=\"actor actor-top\"></rect><text x=\"577\" y ass=\"hljs-string\">{()</span> =&gt;</span> deleteMutation.mutate(task.id)}&gt;Видалити<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">button</span>&gt;</span>\n        <span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">li</span>&gt;</span>\n      ))}\n    <span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">ul</span>&gt;</span></span>\n  );\n}</code></pre>","<h1>🛡️ Обробка помилок</h1>\n<h2>Стани помилок та ручний повтор</h2>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">TaskList</span>(<span class=\"hljs-params\"></span>) {\n  <span class=\"hljs-keyword\">const</span> { data, isError, error, refetch, isFetching } = <span class=\"hljs-title function_\">useQuery</span>({\n    <span class=\"hljs-attr\">queryKey</span>: [<span class=\"hljs-string\">'tasks'</span>],\n    <span class=\"hljs-attr\">queryFn</span>: tasksApi.<span class=\"hljs-property\">getAll</span>,\n    <span class=\"hljs-attr\">retry</span>: <span class=\"hljs-number\">2</span>, <span class=\"hljs-comment\">// 2 автоматичні спроби перед тим, як показати помилку</span>\n    <span class=\"hljs-attr\">retryDelay</span>: <span class=\"hljs-function\">(<span class=\"hljs-params\">attempt</span>) =&gt;</span> <span class=\"hljs-title class_\">Math</span>.<span class=\"hljs-title function_\">min</span>(<span class=\"hljs-number\">1000</span> * <span class=\"hljs-number\">2</span> ** attempt, <span class=\"hljs-number\">30_000</span>),\n    <span class=\"hljs-comment\">// Затримка між спробами: 1с → 2с → максимум 30с</span>\n  });\n\n  <span class=\"hljs-keyword\">if</span> (isError) {\n    <span class=\"hljs-keyword\">return</span> (\n      <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">div</span>&gt;</span>\n        <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">p</span>&gt;</span>⚠️ Не вдалося завантажити задачі: {error.message}<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">p</span>&gt;</span>\n        {/* Даємо користувачу можливість спробувати ще раз */}\n        <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">button</span> <span class=\"hljs-attr\">onClick</span>=<span class=\"hljs-string\">{()</span> =&gt;</span> refetch()} disabled={isFetching}&gt;\n          🔄 Спробувати знову\n        <span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">button</span>&gt;</span>\n      <span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">div</span>&gt;</span></span>\n    );\n  }\n\n  <span class=\"hljs-keyword\">return</span> <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">ul</span>&gt;</span>{data?.map((t) =&gt; <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">li</span> <span class=\"hljs-attr\">key</span>=<span class=\"hljs-string\">{t.id}</span>&gt;</span>{t.title}<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">li</span>&gt;</span>)}<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">ul</span>&gt;</span></span>;\n}</code></pre><h2>Різниця між isLoading та isFetching</h2>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// isLoading = true: перший запит, даних у кеші ще немає → показуємо повний спіннер</span>\n<span class=\"hljs-comment\">// isFetching = true: будь-який запит (фоновий або перший) → ненав'язливий індикатор</span>\n\n<span class=\"hljs-keyword\">return</span> (\n  <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">div</span>&gt;</span>\n    {isLoading &amp;&amp; <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">FullPageSpinner</span> /&gt;</span>}\n\n    {/* Маленький індикатор при фоновому оновленні — не ламає UI */}\n    {isFetching &amp;&amp; !isLoading &amp;&amp; <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">SmallSpinner</span> /&gt;</span>}\n\n    <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">ul</span>&gt;</span>{data?.map((t) =&gt; <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">li</span> <span class=\"hljs-attr\">key</span>=<span class=\"hljs-string\">{t.id}</span>&gt;</span>{t.title}<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">li</span>&gt;</span>)}<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">ul</span>&gt;</span>\n  <span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">div</span>&gt;</span></span>\n);</code></pre><div class=\"tip\"><strong>💡 Toast-повідомлення</strong> <p>Для кращого UX показуйте помилки як toast-повідомлення, не ламаючи весь UI. Популярні бібліотеки: <code>react-hot-toast</code>, <code>sonner</code>.</p>\n</div>\n\n","<h1>✅ Ключові висновки</h1>\n<div class=\"success\"><strong>✅ Що важливо запам'ятати</strong> <p><strong>1. fetch vs axios</strong><br><code>fetch</code> — вбудований, не кидає помилки при 4xx/5xx. <code>axios</code> зручніший: автоматичний JSON, інтерцептори, краща TypeScript-підтримка.</p>\n<p><strong>2. Три обов'язкові стани</strong><br>Будь-який HTTP-запит має <code>loading</code>, <code>error</code>, <code>data</code>. Якщо не обробляти всі три — UI буде зламаним.</p>\n<p><strong>3. Кеш — спільна пам'ять для всіх компонентів</strong><br>TanStack Query зберігає отримані дані в центральному сховищі. Всі компоненти з однаковим <code>queryKey</code> отримують ті самі дані без зайвих мережевих запитів.</p>\n<p><strong>4. useQuery — читання, useMutation — зміна</strong><br><code>useQuery</code> запускається автоматично. <code>useMutation</code> — тільки при виклику <code>.mutate()</code>. Це принципова різниця.</p>\n<p><strong>5. Інвалідація — синхронізація з сервером</strong><br>Після будь-якої мутації викликайте <code>invalidateQueries</code>. Це гарантує, що кеш оновиться і UI покаже актуальні дані.</p>\n<p><strong>6. Кастомні хуки — чистота та перевикористання</strong><br>Виносьте <code>useQuery</code> і <code>useMutation</code> у кастомні хуки. Компонент має відповідати за відображення, а не за деталі запитів.</p>\n</div>\n\n","<h1>❓ Контрольні питання</h1>\n<ol>\n<li><p>Чому <code>fetch</code> не кидає виключення при статусах 400 або 500? Як правильно обробляти такі відповіді?</p>\n</li>\n<li><p>Що таке інтерцептор у <code>axios</code>? Наведіть практичний приклад, де він корисний.</p>\n</li>\n<li><p>Що таке кеш і яку проблему він вирішує при роботі кількох компонентів з одними даними?</p>\n</li>\n<li><p>Поясніть різницю між <code>useQuery</code> та <code>useMutation</code>. Чому <code>useMutation</code> не виконується автоматично?</p>\n</li>\n<li><p>Що таке <code>queryKey</code>? Чому <code>['tasks', { status: 'todo' }]</code> і <code>['tasks']</code> — різні записи у кеші?</p>\n</li>\n<li><p>Навіщо викликати <code>invalidateQueries</code> після успішної мутації? Що відбудеться, якщо цього не зробити?</p>\n</li>\n<li><p>Чим відрізняється <code>isLoading</code> від <code>isFetching</code> у TanStack Query?</p>\n</li>\n<li><p>Що таке оптимістичне оновлення і чому важливо реалізовувати відкіт у <code>onError</code>?</p>\n</li>\n</ol>\n","<h1>📖 Глосарій термінів</h1>\n<table>\n<thead>\n<tr>\n<th>Термін</th>\n<th>Визначення</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><strong>HTTP-клієнт</strong></td>\n<td>Інструмент для відправки HTTP-запитів та отримання відповідей від сервера</td>\n</tr>\n<tr>\n<td><strong>Інтерцептор</strong></td>\n<td>Функція-перехоплювач, що виконується автоматично до/після кожного запиту</td>\n</tr>\n<tr>\n<td><strong>Серверний стан</strong></td>\n<td>Дані, що зберігаються на сервері та синхронізуються з клієнтом</td>\n</tr>\n<tr>\n<td><strong>Клієнтський стан</strong></td>\n<td>UI-стан застосунку, що не потребує синхронізації з сервером</td>\n</tr>\n<tr>\n<td><strong>Кеш</strong></td>\n<td>Тимчасове сховище вже отриманих даних для уникнення повторних мережевих запитів</td>\n</tr>\n<tr>\n<td><strong>Інвалідація кешу</strong></td>\n<td>Позначення кешованих даних як застарілих, що ініціює їх оновлення</td>\n</tr>\n<tr>\n<td><strong>Race condition</strong></td>\n<td>Помилка, коли результат залежить від непередбачуваного порядку асинхронних операцій</td>\n</tr>\n<tr>\n<td><strong>Оптимістичне оновлення</strong></td>\n<td>Оновлення UI до отримання відповіді сервера з відкатом у разі помилки</td>\n</tr>\n<tr>\n<td><strong>Дедуплікація</strong></td>\n<td>Об'єднання кількох однакових запитів в один мережевий виклик</td>\n</tr>\n<tr>\n<td><strong>staleTime</strong></td>\n<td>Час (мс), протягом якого кешовані дані вважаються актуальними</td>\n</tr>\n</tbody></table>\n","<h1>🔤 Глосарій абревіатур</h1>\n<table>\n<thead>\n<tr>\n<th>Абревіатура</th>\n<th>Розшифрування</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><strong>API</strong> (Application Programming Interface)</td>\n<td>Програмний інтерфейс застосунку</td>\n</tr>\n<tr>\n<td><strong>CRUD</strong> (Create, Read, Update, Delete)</td>\n<td>Базові операції над даними: створення, читання, оновлення, видалення</td>\n</tr>\n<tr>\n<td><strong>REST</strong> (Representational State Transfer)</td>\n<td>Архітектурний стиль для побудови веб-сервісів</td>\n</tr>\n<tr>\n<td><strong>HTTP</strong> (HyperText Transfer Protocol)</td>\n<td>Протокол передачі гіпертексту — основа веб-комунікації</td>\n</tr>\n<tr>\n<td><strong>JSON</strong> (JavaScript Object Notation)</td>\n<td>Формат обміну даними на основі синтаксису об'єктів JavaScript</td>\n</tr>\n<tr>\n<td><strong>URL</strong> (Uniform Resource Locator)</td>\n<td>Уніфікований вказівник ресурсу (адреса в мережі)</td>\n</tr>\n<tr>\n<td><strong>SPA</strong> (Single Page Application)</td>\n<td>Односторінковий застосунок</td>\n</tr>\n</tbody></table>\n"];let currentSlideIndex=0;
function renderMath(root){if(typeof renderMathInElement!=="function"||!root)return;try{renderMathInElement(root,{delimiters:[{left:"$$",right:"$$",display:true},{left:"\\[",right:"\\]",display:true},{left:"$",right:"$",display:false},{left:"\\(",right:"\\)",display:false}],throwOnError:false,strict:"ignore",ignoredTags:["script","noscript","style","textarea","pre","code"]});}catch(e){console.warn("Math render error:",e);}}
function showSlide(i){if(i<0||i>=slides.length)return;currentSlideIndex=i;const el=document.getElementById("current-slide");el.innerHTML=slides[i];el.scrollTop=0;renderMath(el);document.getElementById("progress-bar").style.width=((i+1)/slides.length*100)+"%";document.getElementById("slide-number").textContent=(i+1)+" / "+slides.length;updateSidebarActive();}
function nextSlide(){if(currentSlideIndex<slides.length-1)showSlide(currentSlideIndex+1);}
function previousSlide(){if(currentSlideIndex>0)showSlide(currentSlideIndex-1);}
function toggleSidebar(){document.getElementById("sidebar").classList.toggle("open");}
function toggleHelp(){document.getElementById("help-overlay").classList.toggle("hidden");}
function toggleFullscreen(){if(!document.fullscreenElement){const pc=document.getElementById("presentation-container");if(pc.requestFullscreen)pc.requestFullscreen();else if(pc.webkitRequestFullscreen)pc.webkitRequestFullscreen();else if(pc.msRequestFullscreen)pc.msRequestFullscreen();else if(pc.mozRequestFullScreen)pc.mozRequestFullScreen();}else{if(document.exitFullscreen)document.exitFullscreen();else if(document.webkitExitFullscreen)document.webkitExitFullscreen();else if(document.msExitFullscreen)document.msExitFullscreen();else if(document.mozCancelFullScreen)document.mozCancelFullScreen();}}
function generateSidebar(){const sc=document.getElementById("sidebar-content");sc.innerHTML="";slides.forEach((html,idx)=>{const t=document.createElement("div");t.className="slide-thumbnail";if(idx===0)t.classList.add("active");const tmp=document.createElement("div");tmp.innerHTML=html;const title=tmp.querySelector("h1,h2");const titleText=title?title.textContent:("Слайд "+(idx+1));const textContent=tmp.textContent.replace(/s+/g," ").trim();const preview=textContent.substring(0,100)+(textContent.length>100?"...":"");t.innerHTML="<div class=\"slide-thumbnail-number\">"+(idx+1)+"</div><div class=\"slide-thumbnail-title\">"+titleText+"</div><div class=\"slide-thumbnail-content\">"+preview+"</div>";t.onclick=()=>{showSlide(idx);if(window.innerWidth<1024)toggleSidebar();};sc.appendChild(t);});}
function updateSidebarActive(){document.querySelectorAll(".slide-thumbnail").forEach((th,idx)=>{if(idx===currentSlideIndex){th.classList.add("active");th.scrollIntoView({behavior:"smooth",block:"nearest"});}else th.classList.remove("active");});}
document.addEventListener("keydown",e=>{switch(e.key){case"ArrowLeft":previousSlide();break;case"ArrowRight":case" ":e.preventDefault();nextSlide();break;case"f":case"F":toggleFullscreen();break;case"s":case"S":toggleSidebar();break;case"?":toggleHelp();break;case"Escape":const sb=document.getElementById("sidebar");const ho=document.getElementById("help-overlay");if(sb.classList.contains("open"))toggleSidebar();else if(!ho.classList.contains("hidden"))ho.classList.add("hidden");break;}});
generateSidebar();showSlide(0);</script></body></html>
