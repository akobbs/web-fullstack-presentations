#presentation-container:fullscreen,#presentation-container:-webkit-full-screen,#presentation-container:-moz-full-screen,#presentation-container:-ms-fullscreen{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%)!important;}</style></head><body><div id="presentation-container"><div class="progress"><div class="progress-bar" id="progress-bar"></div></div><button id="sidebar-toggle" onclick="toggleSidebar()" title="Навігація слайдами (S)">☰</button><div id="sidebar"><div id="sidebar-header"><h3>📑 Слайди</h3><button id="sidebar-close" onclick="toggleSidebar()">✕</button></div><div id="sidebar-content"></div></div><div class="slide-container"><div class="slide" id="current-slide"></div></div><div class="controls"><button class="control-btn" onclick="previousSlide()" title="Попередній (←)">←</button><button class="control-btn" onclick="nextSlide()" title="Наступний (→)">→</button><button class="control-btn" onclick="toggleFullscreen()" title="Повноекранний режим (F)">⛶</button><button class="control-btn" onclick="toggleHelp()" title="Допомога (?)">?</button></div><div class="slide-number" id="slide-number">1 / 13</div><div id="help-overlay" class="hidden"><strong>Гарячі клавіші:</strong><br><kbd>←</kbd> <kbd>→</kbd> Навігація<br><kbd>F</kbd> Повноекранний режим<br><kbd>S</kbd> Sidebar<br><kbd>?</kbd> Допомога<br><kbd>Esc</kbd> Закрити</div></div><script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script><script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script><script>const slides=["<h1>Nest.js: валідація</h1>\n<p><strong>Сучасні технології Internet-програмування</strong></p>\n<p>Лектор: Кобилянський Антон</p>\n","<h1>📋 План лекції</h1>\n<ol>\n<li>🤔 Проблема: що відбувається без валідації</li>\n<li>📦 DTO — об'єкт передачі даних</li>\n<li>🔧 Pipes — трансформація та валідація вхідних даних</li>\n<li>✅ ValidationPipe та class-validator</li>\n<li>🏷️ Основні декоратори валідації</li>\n<li>🚨 HttpException та вбудовані виключення</li>\n<li>🛡️ SQL Injection та захист</li>\n<li>✅ Ключові висновки та контрольні питання</li>\n</ol>\n","<h1>🤔 Проблема без валідації</h1>\n<div class=\"info\"><strong>ℹ️ Контекст</strong> <p>Сервер відкритий для будь-якого клієнта в мережі — браузера, Postman, скрипта чи зловмисника. Жодних гарантій про формат або зміст вхідних даних немає. TypeScript перевіряє типи лише під час компіляції — у рантаймі через HTTP завжди приходить сирий JSON.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> Навіть якщо контролер оголошує параметр як <code>number</code>, у тілі реального HTTP-запиту може прийти рядок, <code>null</code> або взагалі нічого. Відповідальність за перевірку — на бекенді.</p>\n<h2>😱 Що може надіслати клієнт</h2>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// Очікуємо:</span>\n{ <span class=\"hljs-string\">\"title\"</span>: <span class=\"hljs-string\">\"Купити молоко\"</span>, <span class=\"hljs-string\">\"priority\"</span>: <span class=\"hljs-number\">1</span> }\n\n<span class=\"hljs-comment\">// Реальність — клієнт може надіслати будь-що:</span>\n{ <span class=\"hljs-string\">\"title\"</span>: <span class=\"hljs-string\">\"\"</span>,   <span class=\"hljs-string\">\"priority\"</span>: <span class=\"hljs-string\">\"висока\"</span> }   <span class=\"hljs-comment\">// порожній рядок, рядок замість числа</span>\n{ <span class=\"hljs-string\">\"title\"</span>: <span class=\"hljs-literal\">null</span>, <span class=\"hljs-string\">\"priority\"</span>: -<span class=\"hljs-number\">999</span>    }    <span class=\"hljs-comment\">// null, від'ємне число</span>\n{}                                         <span class=\"hljs-comment\">// взагалі порожній об'єкт</span>\n{ <span class=\"hljs-string\">\"title\"</span>: <span class=\"hljs-string\">\"task\"</span>, <span class=\"hljs-string\">\"isAdmin\"</span>: <span class=\"hljs-literal\">true</span>   }    <span class=\"hljs-comment\">// зайве поле, якого не повинно бути</span>\n{ <span class=\"hljs-string\">\"title\"</span>: <span class=\"hljs-string\">\"'; DROP TABLE tasks; --\"</span> }    <span class=\"hljs-comment\">// спроба SQL Injection</span></code></pre><h2>💥 Код без валідації</h2>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// ❌ Контролер без валідації — приймає все підряд</span>\n<span class=\"hljs-meta\">@Post</span>()\n<span class=\"hljs-title function_\">create</span>(<span class=\"hljs-params\"><span class=\"hljs-meta\">@Body</span>() body: <span class=\"hljs-built_in\">any</span></span>) {\n  <span class=\"hljs-comment\">// body.title може бути undefined, null, числом або масивом</span>\n  <span class=\"hljs-comment\">// TypeScript НЕ захищає тут — тип 'any' вимикає перевірку</span>\n  <span class=\"hljs-keyword\">return</span> <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">tasksService</span>.<span class=\"hljs-title function_\">create</span>(body.<span class=\"hljs-property\">title</span>);\n}</code></pre><div class=\"danger\"><strong>🚫 Наслідки відсутності валідації</strong> <ul>\n<li>💾 <strong>Некоректні дані</strong> потрапляють у базу і ламають інші частини системи</li>\n<li>💥 <strong>Помилка 500</strong> замість зрозумілого повідомлення 400</li>\n<li>🔓 <strong>Уразливості</strong>: SQL Injection, зайві поля з небезпечними значеннями</li>\n<li>😤 <strong>Клієнт не розуміє</strong>, що він зробив неправильно</li>\n</ul>\n</div>\n\n","<h1>📦 DTO — об'єкт передачі даних</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>DTO (Data Transfer Object)</strong> — клас TypeScript, що описує структуру та типи даних, які очікуються на вході ендпоінту. Він є явним \"контрактом\" між клієнтом і сервером.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> DTO замінює розмитий <code>any</code> на конкретну структуру з іменами полів та типами. Завдяки цьому і ValidationPipe, і IDE, і кожен розробник команди одразу розуміє, що саме приймає ендпоінт.</p>\n<h2>🆚 До і після DTO</h2>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// ❌ До DTO — тип 'any' нічого не гарантує</span>\n<span class=\"hljs-meta\">@Post</span>()\n<span class=\"hljs-title function_\">create</span>(<span class=\"hljs-params\"><span class=\"hljs-meta\">@Body</span>() body: <span class=\"hljs-built_in\">any</span></span>) {\n  <span class=\"hljs-keyword\">return</span> <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">tasksService</span>.<span class=\"hljs-title function_\">create</span>(body.<span class=\"hljs-property\">title</span>, body.<span class=\"hljs-property\">priority</span>);\n}\n\n<span class=\"hljs-comment\">// ✅ Після DTO — явний контракт</span>\n<span class=\"hljs-meta\">@Post</span>()\n<span class=\"hljs-title function_\">create</span>(<span class=\"hljs-params\"><span class=\"hljs-meta\">@Body</span>() createTaskDto: CreateTaskDto</span>) {\n  <span class=\"hljs-keyword\">return</span> <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">tasksService</span>.<span class=\"hljs-title function_\">create</span>(createTaskDto);\n}</code></pre><h2>📝 Як виглядає DTO-клас</h2>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// src/tasks/dto/create-task.dto.ts</span>\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">class</span> <span class=\"hljs-title class_\">CreateTaskDto</span> {\n  <span class=\"hljs-attr\">title</span>: <span class=\"hljs-built_in\">string</span>; <span class=\"hljs-comment\">// Назва завдання — обов'язкова</span>\n  <span class=\"hljs-attr\">priority</span>: <span class=\"hljs-built_in\">number</span>; <span class=\"hljs-comment\">// Пріоритет: 1 (низький) – 3 (високий)</span>\n  description?: <span class=\"hljs-built_in\">string</span>; <span class=\"hljs-comment\">// Опис — необов'язковий (знак ?)</span>\n}\n<span class=\"hljs-comment\">// ⚠️ Цей клас поки лише описує структуру — валідація ще не налаштована.</span>\n<span class=\"hljs-comment\">// Правила (@IsString, @Min тощо) додамо через class-validator далі.</span></code></pre><div class=\"note\"><strong>📝 Чому клас, а не інтерфейс?</strong> <p>TypeScript-інтерфейс існує лише під час компіляції і повністю зникає у JavaScript. Декоратори валідації (<code>@IsString()</code>, <code>@Min()</code> тощо) прикріплюються до класу як <strong>метадані в рантаймі</strong> — саме їх ValidationPipe читає під час перевірки. Інтерфейс на це не здатний.</p>\n</div>\n\n\n\n<h2>📁 Де зберігати DTO</h2>\n<pre><code class=\"language-plaintext hljs\" data-highlighted=\"yes\">src/tasks/\n├── dto/\n│   ├── create-task.dto.ts    # 📥 Поля для POST /tasks\n│   └── update-task.dto.ts    # 📝 Поля для PATCH /tasks/:id\n├── tasks.controller.ts\n├── tasks.service.ts\n└── tasks.module.ts</code></pre><div class=\"tip\"><strong>💡 Угода про іменування</strong> <p>Файли DTO іменуються за шаблоном <code>&lt;дія&gt;-&lt;ресурс&gt;.dto.ts</code>. Наприклад: <code>create-task.dto.ts</code>, <code>update-task.dto.ts</code>. Суфікс <code>.dto.ts</code> одразу повідомляє про призначення файлу.</p>\n</div>\n\n","<h1>🔧 Pipes — трансформація та валідація вхідних даних</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>Pipe</strong> — клас із декоратором <code>@Injectable()</code>, що реалізує інтерфейс <code>PipeTransform</code>. Він виконується <strong>після</strong> отримання запиту, але <strong>до</strong> виклику методу контролера, і виконує одну з двох ролей: <strong>трансформує</strong> вхідні дані або <strong>валідує</strong> їх.</p>\n</div>\n\n\n\n<h2>🎯 Дві ролі Pipe</h2>\n<p><strong>Трансформація</strong> — перетворює значення на потрібний тип:</p>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// Параметр URL завжди приходить як рядок — навіть /tasks/5 дає '5'</span>\n<span class=\"hljs-comment\">// ParseIntPipe перетворює рядок '5' на число 5</span>\n\n<span class=\"hljs-comment\">// ❌ Без Pipe — id є рядком, порівняння з числом може не спрацювати</span>\n<span class=\"hljs-meta\">@Get</span>(<span class=\"hljs-string\">':id'</span>)\n<span class=\"hljs-title function_\">findOne</span>(<span class=\"hljs-params\"><span class=\"hljs-meta\">@Param</span>(<span class=\"hljs-string\">'id'</span>) id: <span class=\"hljs-built_in\">string</span></span>) { ... }  <span class=\"hljs-comment\">// id = '5' (рядок)</span>\n\n<span class=\"hljs-comment\">// ✅ З ParseIntPipe — id гарантовано число</span>\n<span class=\"hljs-meta\">@Get</span>(<span class=\"hljs-string\">':id'</span>)\n<span class=\"hljs-title function_\">findOne</span>(<span class=\"hljs-params\"><span class=\"hljs-meta\">@Param</span>(<span class=\"hljs-string\">'id'</span>, ParseIntPipe) id: <span class=\"hljs-built_in\">number</span></span>) { ... }  <span class=\"hljs-comment\">// id = 5 (число)</span></code></pre><p><strong>Валідація</strong> — перевіряє дані за правилами і зупиняє запит із помилкою 400, якщо вони порушені:</p>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// ValidationPipe перевіряє тіло запиту за правилами CreateTaskDto</span>\n<span class=\"hljs-comment\">// Якщо title порожній або priority &gt; 3 — запит не дійде до контролера</span>\n<span class=\"hljs-meta\">@Post</span>()\n<span class=\"hljs-title function_\">create</span>(<span class=\"hljs-params\"><span class=\"hljs-meta\">@Body</span>() dto: CreateTaskDto</span>) { ... }</code></pre><h2>🔄 Де Pipe знаходиться в ланцюжку</h2>\n\n<div class=\"mermaid\" data-source=\"graph LR\n    Client[&quot;🌐 Клієнт&quot;] --&gt; MW[&quot;🔒 Middleware&quot;]\n    MW --&gt; Guard[&quot;🛡️ Guard&quot;]\n    Guard --&gt; Pipe[&quot;🔧 Pipe&quot;]\n    Pipe --&gt;|&quot;✅ трансформовано / валідно&quot;| Handler[&quot;📬 Controller&quot;]\n    Pipe --&gt;|&quot;❌ невалідно&quot;| Error[&quot;💥 400 Bad Request&quot;]\n    style Client fill:#e3f2fd,stroke:#1565c0\n    style MW fill:#fff3e0,stroke:#ef6c00\n    style Guard fill:#fce4ec,stroke:#c2185b\n    style Pipe fill:#f3e5f5,stroke:#7b1fa2\n    style Handler fill:#e8f5e9,stroke:#388e3c\n    style Error fill:#ffebee,stroke:#c62828\"><svg id=\"exp-1775065595810-4-0\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" class=\"flowchart\" style=\"max-width: 1080.2890625px;\" viewBox=\"0 0 1080.2890625 162\" role=\"graphics-document document\" aria-roledescription=\"flowchart-v2\"><style>#exp-1775065595810-4-0{font-family:system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,Arial,sans-serif;font-size:16px;fill:#333;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#exp-1775065595810-4-0 .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#exp-1775065595810-4-0 .edge-animation-fast{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 20s linear infinite;stroke-linecap:round;}#exp-1775065595810-4-0 .error-icon{fill:#552222;}#exp-1775065595810-4-0 .error-text{fill:#552222;stroke:#552222;}#exp-1775065595810-4-0 .edge-thickness-normal{stroke-width:1px;}#exp-1775065595810-4-0 .edge-thickness-thick{stroke-width:3.5px;}#exp-1775065595810-4-0 .edge-pattern-solid{stroke-dasharray:0;}#exp-1775065595810-4-0 .edge-thickness-invisible{stroke-width:0;fill:none;}#exp-1775065595810-4-0 .edge-pattern-dashed{stroke-dasharray:3;}#exp-1775065595810-4-0 .edge-pattern-dotted{stroke-dasharray:2;}#exp-1775065595810-4-0 .marker{fill:#333333;stroke:#333333;}#exp-1775065595810-4-0 .marker.cross{stroke:#333333;}#exp-1775065595810-4-0 svg{font-family:system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,Arial,sans-serif;font-size:16px;}#exp-1775065595810-4-0 p{margin:0;}#exp-1775065595810-4-0 .label{font-family:s defs><filter id=\"exp-1775065595810-4-0-drop-shadow\" height=\"130%\" width=\"130%\"><feDropShadow dx=\"4\" dy=\"4\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs><defs><filter id=\"exp-1775065595810-4-0-drop-shadow-small\" height=\"150%\" width=\"150%\"><feDropShadow dx=\"2\" dy=\"2\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs></svg></div>\n<h2>🛠️ Вбудовані Pipes Nest.js</h2>\n<table>\n<thead>\n<tr>\n<th>Pipe</th>\n<th>Роль</th>\n<th>Що робить</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>ValidationPipe</code></td>\n<td>Валідація</td>\n<td>Перевіряє DTO-клас за декораторами class-validator</td>\n</tr>\n<tr>\n<td><code>ParseIntPipe</code></td>\n<td>Трансформація</td>\n<td>Перетворює рядок <code>\"42\"</code> у число <code>42</code></td>\n</tr>\n<tr>\n<td><code>ParseBoolPipe</code></td>\n<td>Трансформація</td>\n<td>Перетворює <code>\"true\"</code> / <code>\"false\"</code> у <code>boolean</code></td>\n</tr>\n<tr>\n<td><code>ParseUUIDPipe</code></td>\n<td>Валідація</td>\n<td>Перевіряє формат UUID, повертає рядок без змін</td>\n</tr>\n<tr>\n<td><code>DefaultValuePipe</code></td>\n<td>Трансформація</td>\n<td>Підставляє значення за замовчуванням, якщо поле відсутнє</td>\n</tr>\n</tbody></table>\n","<h1>✅ ValidationPipe та class-validator</h1>\n<p><strong>Головна ідея:</strong> <code>ValidationPipe</code> разом із бібліотекою <code>class-validator</code> дозволяє описати правила прямо в DTO через декоратори — і перевіряти їх <strong>автоматично</strong>, без жодного ручного коду в контролері.</p>\n<h2>📦 Встановлення</h2>\n<pre><code class=\"language-bash hljs\" data-highlighted=\"yes\">npm install class-validator class-transformer</code></pre><ul>\n<li><strong><code>class-validator</code></strong> — надає декоратори правил: <code>@IsString()</code>, <code>@Min()</code>, <code>@IsEmail()</code> тощо</li>\n<li><strong><code>class-transformer</code></strong> — перетворює сирий JSON-об'єкт на екземпляр класу DTO, щоб декоратори могли прочитати метадані</li>\n</ul>\n<h2>🏷️ DTO з правилами валідації</h2>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// src/tasks/dto/create-task.dto.ts</span>\n<span class=\"hljs-keyword\">import</span> {\n  <span class=\"hljs-title class_\">IsString</span>,\n  <span class=\"hljs-title class_\">IsNotEmpty</span>,\n  <span class=\"hljs-title class_\">IsInt</span>,\n  <span class=\"hljs-title class_\">Min</span>,\n  <span class=\"hljs-title class_\">Max</span>,\n  <span class=\"hljs-title class_\">MaxLength</span>,\n  <span class=\"hljs-title class_\">IsOptional</span>,\n} <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"class-validator\"</span>;\n\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">class</span> <span class=\"hljs-title class_\">CreateTaskDto</span> {\n  <span class=\"hljs-meta\">@IsString</span>({ <span class=\"hljs-attr\">message</span>: <span class=\"hljs-string\">\"Назва має бути рядком\"</span> })\n  <span class=\"hljs-meta\">@IsNotEmpty</span>({ <span class=\"hljs-attr\">message</span>: <span class=\"hljs-string\">\"Назва не може бути порожньою\"</span> })\n  <span class=\"hljs-meta\">@MaxLength</span>(<span class=\"hljs-number\">200</span>, { <span class=\"hljs-attr\">message</span>: <span class=\"hljs-string\">\"Назва не може перевищувати 200 символів\"</span> })\n  <span class=\"hljs-attr\">title</span>: <span class=\"hljs-built_in\">string</span>;\n\n  <span class=\"hljs-meta\">@IsInt</span>({ <span class=\"hljs-attr\">message</span>: <span class=\"hljs-string\">\"Пріоритет має бути цілим числом\"</span> })\n  <span class=\"hljs-meta\">@Min</span>(<span class=\"hljs-number\">1</span>, { <span class=\"hljs-attr\">message</span>: <span class=\"hljs-string\">\"Мінімальний пріоритет — 1\"</span> })\n  <span class=\"hljs-meta\">@Max</span>(<span class=\"hljs-number\">3</span>, { <span class=\"hljs-attr\">message</span>: <span class=\"hljs-string\">\"Максимальний пріоритет — 3\"</span> })\n  <span class=\"hljs-attr\">priority</span>: <span class=\"hljs-built_in\">number</span>;\n\n  <span class=\"hljs-meta\">@IsString</span>()\n  <span class=\"hljs-meta\">@IsOptional</span>() <span class=\"hljs-comment\">// Якщо поле відсутнє — валідація пропускається</span>\n  <span class=\"hljs-meta\">@MaxLength</span>(<span class=\"hljs-number\">1000</span>)\n  description?: <span class=\"hljs-built_in\">string</span>;\n}</code></pre><h2>🌐 Реєстрація ValidationPipe глобально</h2>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// src/main.ts</span>\n<span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">NestFactory</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"@nestjs/core\"</span>;\n<span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">ValidationPipe</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"@nestjs/common\"</span>;\n<span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">AppModule</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"./app.module\"</span>;\n\n<span class=\"hljs-keyword\">async</span> <span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">bootstrap</span>(<span class=\"hljs-params\"></span>) {\n  <span class=\"hljs-keyword\">const</span> app = <span class=\"hljs-keyword\">await</span> <span class=\"hljs-title class_\">NestFactory</span>.<span class=\"hljs-title function_\">create</span>(<span class=\"hljs-title class_\">AppModule</span>);\n\n  app.<span class=\"hljs-title function_\">useGlobalPipes</span>(\n    <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">ValidationPipe</span>({\n      <span class=\"hljs-attr\">whitelist</span>: <span class=\"hljs-literal\">true</span>, <span class=\"hljs-comment\">// 🧹 Видаляє поля, яких немає в DTO (захист від зайвих полів)</span>\n      <span class=\"hljs-attr\">transform</span>: <span class=\"hljs-literal\">true</span>, <span class=\"hljs-comment\">// 🔄 Перетворює типи: рядок → число де оголошено number</span>\n    }),\n  );\n\n  <span class=\"hljs-keyword\">await</span> app.<span class=\"hljs-title function_\">listen</span>(<span class=\"hljs-number\">3000</span>);\n}\n<span class=\"hljs-title function_\">bootstrap</span>();</code></pre><div class=\"tip\"><strong>💡 Що робить whitelist: true?</strong> <p>Якщо клієнт надсилає <code>{ \"title\": \"Задача\", \"priority\": 1, \"isAdmin\": true }</code>, а в DTO є лише <code>title</code> та <code>priority</code> — поле <code>isAdmin</code> буде <strong>автоматично видалено</strong> до виклику контролера. Це захищає від ситуації, коли клієнт намагається встановити поля, яких не повинен торкатися.</p>\n</div>\n\n\n\n<h2>🧪 Відповідь при невалідних даних</h2>\n<pre><code class=\"language-bash hljs\" data-highlighted=\"yes\">POST /tasks\n{ <span class=\"hljs-string\">\"title\"</span>: <span class=\"hljs-string\">\"\"</span>, <span class=\"hljs-string\">\"priority\"</span>: 10, <span class=\"hljs-string\">\"isAdmin\"</span>: <span class=\"hljs-literal\">true</span> }</code></pre><pre><code class=\"language-json hljs\" data-highlighted=\"yes\">HTTP/<span class=\"hljs-number\">1.1</span> <span class=\"hljs-number\">400</span> Bad Request\n<span class=\"hljs-punctuation\">{</span>\n  <span class=\"hljs-attr\">\"statusCode\"</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-number\">400</span><span class=\"hljs-punctuation\">,</span>\n  <span class=\"hljs-attr\">\"message\"</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-punctuation\">[</span>\n    <span class=\"hljs-string\">\"Назва не може бути порожньою\"</span><span class=\"hljs-punctuation\">,</span>\n    <span class=\"hljs-string\">\"Максимальний пріоритет — 3\"</span>\n  <span class=\"hljs-punctuation\">]</span><span class=\"hljs-punctuation\">,</span>\n  <span class=\"hljs-attr\">\"error\"</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">\"Bad Request\"</span>\n<span class=\"hljs-punctuation\">}</span></code></pre><p>Поле <code>isAdmin</code> видалено завдяки <code>whitelist: true</code>. Метод контролера так і не був викликаний.</p>\n","<h1>🏷️ Основні декоратори валідації</h1>\n<p><strong>Головна ідея:</strong> <code>class-validator</code> надає десятки готових декораторів. Нижче — найпоширеніші, яких достатньо для більшості реальних задач.</p>\n<h2>📋 Довідник декораторів</h2>\n<table>\n<thead>\n<tr>\n<th>Декоратор</th>\n<th>Що перевіряє</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>@IsString()</code></td>\n<td>Тип — рядок; відхиляє <code>null</code>, числа, масиви</td>\n</tr>\n<tr>\n<td><code>@IsInt()</code></td>\n<td>Тип — ціле число</td>\n</tr>\n<tr>\n<td><code>@IsBoolean()</code></td>\n<td>Тип — boolean</td>\n</tr>\n<tr>\n<td><code>@IsEmail()</code></td>\n<td>Формат email-адреси</td>\n</tr>\n<tr>\n<td><code>@IsNotEmpty()</code></td>\n<td>Значення не є порожнім рядком (<code>\"\"</code>) і не <code>undefined</code></td>\n</tr>\n<tr>\n<td><code>@IsOptional()</code></td>\n<td>Пропустити перевірку, якщо поле відсутнє</td>\n</tr>\n<tr>\n<td><code>@Min(n)</code> / <code>@Max(n)</code></td>\n<td>Числове значення не менше / не більше <code>n</code></td>\n</tr>\n<tr>\n<td><code>@MinLength(n)</code> / <code>@MaxLength(n)</code></td>\n<td>Довжина рядка не менше / не більше <code>n</code> символів</td>\n</tr>\n<tr>\n<td><code>@IsEnum(MyEnum)</code></td>\n<td>Значення входить до TypeScript enum</td>\n</tr>\n<tr>\n<td><code>@Matches(regex)</code></td>\n<td>Рядок відповідає регулярному виразу</td>\n</tr>\n</tbody></table>\n<h2>💡 Приклад: UpdateTaskDto з IsEnum</h2>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// src/tasks/dto/update-task.dto.ts</span>\n<span class=\"hljs-keyword\">import</span> {\n  <span class=\"hljs-title class_\">IsBoolean</span>,\n  <span class=\"hljs-title class_\">IsEnum</span>,\n  <span class=\"hljs-title class_\">IsOptional</span>,\n  <span class=\"hljs-title class_\">IsString</span>,\n  <span class=\"hljs-title class_\">MaxLength</span>,\n} <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"class-validator\"</span>;\n\n<span class=\"hljs-comment\">// В реальному проєкті enum виносять у окремий файл (наприклад task.types.ts),</span>\n<span class=\"hljs-comment\">// щоб його можна було імпортувати і в сервісі, і в контролері</span>\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">enum</span> <span class=\"hljs-title class_\">TaskStatus</span> {\n  <span class=\"hljs-variable constant_\">OPEN</span> = <span class=\"hljs-string\">\"open\"</span>,\n  <span class=\"hljs-variable constant_\">IN_PROGRESS</span> = <span class=\"hljs-string\">\"in_progress\"</span>,\n  <span class=\"hljs-variable constant_\">DONE</span> = <span class=\"hljs-string\">\"done\"</span>,\n}\n\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">class</span> <span class=\"hljs-title class_\">UpdateTaskDto</span> {\n  <span class=\"hljs-meta\">@IsString</span>()\n  <span class=\"hljs-meta\">@IsOptional</span>()\n  <span class=\"hljs-meta\">@MaxLength</span>(<span class=\"hljs-number\">200</span>)\n  title?: <span class=\"hljs-built_in\">string</span>;\n\n  <span class=\"hljs-meta\">@IsEnum</span>(<span class=\"hljs-title class_\">TaskStatus</span>, {\n    <span class=\"hljs-attr\">message</span>: <span class=\"hljs-string\">`Статус має бути одним із: <span class=\"hljs-subst\">${<span class=\"hljs-built_in\">Object</span>.values(TaskStatus).join(<span class=\"hljs-string\">\", \"</span>)}</span>`</span>,\n  })\n  <span class=\"hljs-meta\">@IsOptional</span>()\n  status?: <span class=\"hljs-title class_\">TaskStatus</span>;\n\n  <span class=\"hljs-meta\">@IsBoolean</span>()\n  <span class=\"hljs-meta\">@IsOptional</span>()\n  done?: <span class=\"hljs-built_in\">boolean</span>;\n}</code></pre><pre><code class=\"language-bash hljs\" data-highlighted=\"yes\">PATCH /tasks/1  { <span class=\"hljs-string\">\"status\"</span>: <span class=\"hljs-string\">\"unknown\"</span> }\n<span class=\"hljs-comment\"># → 400: \"Статус має бути одним із: open, in_progress, done\"</span>\n\nPATCH /tasks/1  { <span class=\"hljs-string\">\"status\"</span>: <span class=\"hljs-string\">\"done\"</span> }\n<span class=\"hljs-comment\"># → 200 OK</span></code></pre>","<h1>🚨 HttpException та вбудовані виключення</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong><code>HttpException</code></strong> — базовий клас Nest.js для формування HTTP-відповідей із помилками. Коли його \"кидають\" (<code>throw</code>) у будь-якому місці застосунку — вбудований глобальний фільтр Nest.js автоматично перехоплює його і повертає клієнту правильну JSON-відповідь.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> Замість того, щоб вручну будувати відповідь із помилкою — ми \"кидаємо\" виключення, а Nest.js сам формує відповідь клієнту з правильним статус-кодом.</p>\n<h2>🛠️ Вбудовані виключення</h2>\n<table>\n<thead>\n<tr>\n<th>Клас</th>\n<th>Код</th>\n<th>Типовий сценарій</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>BadRequestException</code></td>\n<td>400</td>\n<td>Некоректні дані від клієнта</td>\n</tr>\n<tr>\n<td><code>UnauthorizedException</code></td>\n<td>401</td>\n<td>Не автентифіковано (відсутній токен)</td>\n</tr>\n<tr>\n<td><code>ForbiddenException</code></td>\n<td>403</td>\n<td>Немає прав на цю дію</td>\n</tr>\n<tr>\n<td><code>NotFoundException</code></td>\n<td>404</td>\n<td>Ресурс не знайдено в базі даних</td>\n</tr>\n<tr>\n<td><code>ConflictException</code></td>\n<td>409</td>\n<td>Конфлікт: наприклад, email вже зареєстровано</td>\n</tr>\n<tr>\n<td><code>InternalServerErrorException</code></td>\n<td>500</td>\n<td>Непередбачена помилка на сервері</td>\n</tr>\n</tbody></table>\n<div class=\"tip\"><strong>💡 Приклад ConflictException</strong> <pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// Якщо завдання з такою назвою вже існує — повертаємо 409</span>\n<span class=\"hljs-keyword\">if</span> (<span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">tasksService</span>.<span class=\"hljs-title function_\">existsByTitle</span>(dto.<span class=\"hljs-property\">title</span>)) {\n  <span class=\"hljs-keyword\">throw</span> <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">ConflictException</span>(<span class=\"hljs-string\">`Завдання \"<span class=\"hljs-subst\">${dto.title}</span>\" вже існує`</span>);\n}</code></pre></div>\n\n\n\n<h2>💻 Використання у контролері</h2>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-keyword\">import</span> {\n  <span class=\"hljs-title class_\">Controller</span>,\n  <span class=\"hljs-title class_\">Get</span>,\n  <span class=\"hljs-title class_\">Post</span>,\n  <span class=\"hljs-title class_\">Delete</span>,\n  <span class=\"hljs-title class_\">Body</span>,\n  <span class=\"hljs-title class_\">Param</span>,\n  <span class=\"hljs-title class_\">HttpCode</span>,\n  <span class=\"hljs-title class_\">ParseIntPipe</span>,\n  <span class=\"hljs-title class_\">NotFoundException</span>,\n} <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"@nestjs/common\"</span>;\n<span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">CreateTaskDto</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"./dto/create-task.dto\"</span>;\n\n<span class=\"hljs-meta\">@Controller</span>(<span class=\"hljs-string\">\"tasks\"</span>)\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">class</span> <span class=\"hljs-title class_\">TasksController</span> {\n  <span class=\"hljs-title function_\">constructor</span>(<span class=\"hljs-params\"><span class=\"hljs-keyword\">private</span> <span class=\"hljs-keyword\">readonly</span> tasksService: TasksService</span>) {}\n\n  <span class=\"hljs-meta\">@Get</span>(<span class=\"hljs-string\">\":id\"</span>)\n  <span class=\"hljs-title function_\">findOne</span>(<span class=\"hljs-params\"><span class=\"hljs-meta\">@Param</span>(<span class=\"hljs-string\">\"id\"</span>, ParseIntPipe) id: <span class=\"hljs-built_in\">number</span></span>) {\n    <span class=\"hljs-keyword\">const</span> task = <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">tasksService</span>.<span class=\"hljs-title function_\">findOne</span>(id);\n    <span class=\"hljs-keyword\">if</span> (!task) {\n      <span class=\"hljs-keyword\">throw</span> <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">NotFoundException</span>(<span class=\"hljs-string\">`Завдання #<span class=\"hljs-subst\">${id}</span> не знайдено`</span>);\n      <span class=\"hljs-comment\">// → 404: { \"statusCode\": 404, \"message\": \"Завдання #99 не знайдено\" }</span>\n    }\n    <span class=\"hljs-keyword\">return</span> task;\n  }\n\n  <span class=\"hljs-meta\">@Post</span>()\n  <span class=\"hljs-meta\">@HttpCode</span>(<span class=\"hljs-number\">201</span>)\n  <span class=\"hljs-title function_\">create</span>(<span class=\"hljs-params\"><span class=\"hljs-meta\">@Body</span>() dto: CreateTaskDto</span>) {\n    <span class=\"hljs-keyword\">return</span> <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">tasksService</span>.<span class=\"hljs-title function_\">create</span>(dto);\n    <span class=\"hljs-comment\">// ValidationPipe вже перевірив dto — метод не викликається при помилці</span>\n  }\n\n  <span class=\"hljs-meta\">@Delete</span>(<span class=\"hljs-string\">\":id\"</span>)\n  <span class=\"hljs-meta\">@HttpCode</span>(<span class=\"hljs-number\">204</span>)\n  <span class=\"hljs-title function_\">remove</span>(<span class=\"hljs-params\"><span class=\"hljs-meta\">@Param</span>(<span class=\"hljs-string\">\"id\"</span>, ParseIntPipe) id: <span class=\"hljs-built_in\">number</span></span>) {\n    <span class=\"hljs-keyword\">const</span> removed = <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">tasksService</span>.<span class=\"hljs-title function_\">remove</span>(id);\n    <span class=\"hljs-keyword\">if</span> (!removed) {\n      <span class=\"hljs-keyword\">throw</span> <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">NotFoundException</span>(<span class=\"hljs-string\">`Завдання #<span class=\"hljs-subst\">${id}</span> не знайдено`</span>);\n    }\n    <span class=\"hljs-comment\">// 204 No Content — тіло відповіді порожнє</span>\n  }\n}</code></pre><div class=\"note\"><strong>📝 Де кидати виключення?</strong> <p>Рекомендується кидати HTTP-виключення у <strong>контролері</strong>: він перевіряє результат сервісу (<code>null</code>, <code>false</code>) і вирішує, яку HTTP-відповідь повернути. Сервіс не повинен знати про HTTP — він лише повертає дані або <code>null</code>.</p>\n</div>\n\n","<h1>🛡️ SQL Injection та захист</h1>\n<div class=\"danger\"><strong>🚫 Критична вразливість</strong> <p><strong>SQL Injection</strong> — атака, при якій зловмисник вставляє SQL-код у вхідні дані, щоб змінити логіку запиту до бази даних. Це одна з найпоширеніших вразливостей веб-застосунків.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> Якщо підставляти вхідні дані напряму у рядок SQL-запиту — зловмисник може \"вийти\" за межі очікуваного запиту і виконати будь-який SQL.</p>\n<h2>💀 Як виглядає атака</h2>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// ❌ ВРАЗЛИВИЙ КОД — підстановка даних рядком у SQL</span>\n<span class=\"hljs-keyword\">async</span> <span class=\"hljs-title function_\">findByTitle</span>(<span class=\"hljs-params\">title: <span class=\"hljs-built_in\">string</span></span>) {\n  <span class=\"hljs-keyword\">const</span> sql = <span class=\"hljs-string\">`SELECT * FROM tasks WHERE title = '<span class=\"hljs-subst\">${title}</span>'`</span>;\n  <span class=\"hljs-keyword\">return</span> <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">db</span>.<span class=\"hljs-title function_\">query</span>(sql);\n}</code></pre><pre><code class=\"language-bash hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\"># Звичайний запит:</span>\ntitle = <span class=\"hljs-string\">\"Купити молоко\"</span>\nSQL → SELECT * FROM tasks WHERE title = <span class=\"hljs-string\">'Купити молоко'</span>  ✅\n\n<span class=\"hljs-comment\"># Атака — обхід умови:</span>\ntitle = <span class=\"hljs-string\">\"' OR '1'='1\"</span>\nSQL → SELECT * FROM tasks WHERE title = <span class=\"hljs-string\">''</span> OR <span class=\"hljs-string\">'1'</span>=<span class=\"hljs-string\">'1'</span>\n<span class=\"hljs-comment\">#                                         ^^^^^^^^^^^ завжди true → витік ВСІХ записів</span>\n\n<span class=\"hljs-comment\"># Атака — видалення таблиці:</span>\ntitle = <span class=\"hljs-string\">\"'; DROP TABLE tasks; --\"</span>\nSQL → SELECT * FROM tasks WHERE title = <span class=\"hljs-string\">''</span>; DROP TABLE tasks; --\n<span class=\"hljs-comment\">#                                           ^^^^^^^^^^^^^^^^^ ВИДАЛЯЄ ТАБЛИЦЮ</span></code></pre><h2>🔒 Захист: параметризовані запити</h2>\n<p>При параметризованому запиті значення передається до бази <strong>окремо</strong> від SQL-тексту. База обробляє <code>$1</code> як місце для даних — будь-який текст там сприймається лише як рядок, а не як SQL-команда.</p>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// ✅ БЕЗПЕЧНО — значення передається окремо від запиту</span>\n<span class=\"hljs-keyword\">async</span> <span class=\"hljs-title function_\">findByTitle</span>(<span class=\"hljs-params\">title: <span class=\"hljs-built_in\">string</span></span>) {\n  <span class=\"hljs-keyword\">const</span> sql = <span class=\"hljs-string\">`SELECT * FROM tasks WHERE title = $1`</span>;\n  <span class=\"hljs-keyword\">return</span> <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">db</span>.<span class=\"hljs-title function_\">query</span>(sql, [title]);\n  <span class=\"hljs-comment\">// Навіть \"'; DROP TABLE tasks; --\" — просто текстовий рядок для БД</span>\n}</code></pre><h2>🛡️ TypeORM автоматично захищає</h2>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// ✅ Безпечно — TypeORM використовує параметризовані запити під капотом</span>\n<span class=\"hljs-keyword\">const</span> task = <span class=\"hljs-keyword\">await</span> <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">tasksRepository</span>.<span class=\"hljs-title function_\">findOne</span>({ <span class=\"hljs-attr\">where</span>: { title } });\n\n<span class=\"hljs-comment\">// ✅ Безпечно — named parameter у QueryBuilder</span>\n<span class=\"hljs-keyword\">const</span> tasks = <span class=\"hljs-keyword\">await</span> <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">tasksRepository</span>\n  .<span class=\"hljs-title function_\">createQueryBuilder</span>(<span class=\"hljs-string\">\"task\"</span>)\n  .<span class=\"hljs-title function_\">where</span>(<span class=\"hljs-string\">\"task.title = :title\"</span>, { title })\n  .<span class=\"hljs-title function_\">getMany</span>();\n\n<span class=\"hljs-comment\">// ❌ ВРАЗЛИВО — підстановка рядком небезпечна навіть у TypeORM</span>\n<span class=\"hljs-keyword\">const</span> tasks = <span class=\"hljs-keyword\">await</span> <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">tasksRepository</span>\n  .<span class=\"hljs-title function_\">createQueryBuilder</span>(<span class=\"hljs-string\">\"task\"</span>)\n  .<span class=\"hljs-title function_\">where</span>(<span class=\"hljs-string\">`task.title = '<span class=\"hljs-subst\">${title}</span>'`</span>) <span class=\"hljs-comment\">// ← ніколи так не робіть</span>\n  .<span class=\"hljs-title function_\">getMany</span>();</code></pre><div class=\"success\"><strong>✅ Багатошаровий захист</strong> <ol>\n<li>🔒 <strong>ORM / параметризовані запити</strong> — основний і обов'язковий захист</li>\n<li>✅ <strong>Валідація вхідних даних</strong> — обмеження довжини та допустимих символів зменшує ризики</li>\n<li>🔑 <strong>Принцип найменших привілеїв</strong> — БД-користувач має лише права <code>SELECT/INSERT/UPDATE/DELETE</code>, але не <code>DROP TABLE</code></li>\n</ol>\n</div>\n\n","<h1>✅ Ключові висновки</h1>\n<div class=\"success\"><strong>✅ Підсумок лекції</strong> <p><strong>📌 Що ми вивчили:</strong></p>\n<ol>\n<li><p><strong>Валідація — обов'язковий шар</strong> будь-якого API: TypeScript не захищає в рантаймі, клієнти можуть надсилати будь-що</p>\n</li>\n<li><p><strong>DTO</strong> — клас (не інтерфейс!), що описує структуру вхідних даних; існує в рантаймі, тому підтримує декоратори валідації; замінює <code>any</code> на явний контракт</p>\n</li>\n<li><p><strong>Pipe</strong> — виконується між запитом і контролером; <strong>трансформує</strong> дані (<code>ParseIntPipe</code>: <code>'5'</code> → <code>5</code>) або <strong>валідує</strong> їх (<code>ValidationPipe</code>: перевіряє DTO за правилами)</p>\n</li>\n<li><p><strong>class-validator</strong> — декоратори правил прямо в DTO: <code>@IsString()</code>, <code>@IsNotEmpty()</code>, <code>@Min()</code> тощо; <code>whitelist: true</code> автоматично видаляє зайві поля</p>\n</li>\n<li><p><strong>HttpException</strong> та вбудовані класи (<code>NotFoundException</code>, <code>ConflictException</code>) — явне та інформативне повідомлення клієнту; Nest.js сам формує JSON-відповідь</p>\n</li>\n<li><p><strong>SQL Injection</strong> — атака через підстановку SQL-коду у вхідні дані; основний захист — ORM та параметризовані запити; ніколи не підставляйте дані рядком у SQL</p>\n</li>\n</ol>\n</div>\n\n","<h1>❓ Контрольні питання</h1>\n<ol>\n<li><p>🤔 Що таке <strong>DTO</strong> і навіщо він потрібен? Чому використовують клас, а не TypeScript-інтерфейс?</p>\n</li>\n<li><p>🤔 Що таке <strong>Pipe</strong> у Nest.js? Поясніть його дві ролі: трансформацію та валідацію.</p>\n</li>\n<li><p>🤔 Для чого потрібен <code>ParseIntPipe</code>? Що він робить і коли повертає помилку?</p>\n</li>\n<li><p>🤔 Що робить параметр <code>whitelist: true</code> у <code>ValidationPipe</code>? Яку загрозу він усуває?</p>\n</li>\n<li><p>🤔 Яка різниця між <code>HttpException</code> та <code>NotFoundException</code>? Де у коді правильніше кидати виключення?</p>\n</li>\n<li><p>🤔 Що таке <strong>SQL Injection</strong>? Наведіть приклад атаки та поясніть, чому параметризований запит захищає від неї.</p>\n</li>\n<li><p>🤔 Чи достатньо <code>ValidationPipe</code> для захисту від SQL Injection? Відповідь обґрунтуйте.</p>\n</li>\n</ol>\n","<h1>📖 Глосарій термінів</h1>\n<table>\n<thead>\n<tr>\n<th>Термін</th>\n<th>English</th>\n<th>Визначення</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Об'єкт передачі даних</td>\n<td>DTO</td>\n<td>Клас, що описує структуру та правила валідації вхідних або вихідних даних</td>\n</tr>\n<tr>\n<td>Конвеєр</td>\n<td>Pipe</td>\n<td>Клас Nest.js, що трансформує або валідує дані до виклику обробника</td>\n</tr>\n<tr>\n<td>Декоратор валідації</td>\n<td>Validation decorator</td>\n<td>Анотація <code>@IsString()</code>, <code>@Min()</code> тощо з <code>class-validator</code></td>\n</tr>\n<tr>\n<td>Виключення</td>\n<td>Exception</td>\n<td>Об'єкт-помилка, що перериває нормальний потік і передається у фільтр</td>\n</tr>\n<tr>\n<td>Білий список</td>\n<td>Whitelist</td>\n<td>Перелік дозволених полів; все поза переліком видаляється або відхиляється</td>\n</tr>\n<tr>\n<td>Трансформація</td>\n<td>Transformation</td>\n<td>Автоматичне перетворення типу: рядок → число, JSON → екземпляр класу</td>\n</tr>\n<tr>\n<td>Параметризований запит</td>\n<td>Parameterized query</td>\n<td>SQL-запит із плейсхолдерами, де значення передаються окремо від тексту</td>\n</tr>\n<tr>\n<td>Плейсхолдер</td>\n<td>Placeholder</td>\n<td>Позначка <code>$1</code> або <code>:name</code> у SQL, куди база підставляє значення безпечно</td>\n</tr>\n<tr>\n<td>Масове призначення</td>\n<td>Mass assignment</td>\n<td>Атака: передача зайвих полів щоб змінити дані, яких не повинен торкатися клієнт</td>\n</tr>\n</tbody></table>\n","<h1>📖 Глосарій абревіатур</h1>\n<table>\n<thead>\n<tr>\n<th>Абревіатура</th>\n<th>Розшифровка</th>\n<th>Переклад</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>DTO</td>\n<td>Data Transfer Object</td>\n<td>Об'єкт передачі даних</td>\n</tr>\n<tr>\n<td>API</td>\n<td>Application Programming Interface</td>\n<td>Програмний інтерфейс застосунку</td>\n</tr>\n<tr>\n<td>HTTP</td>\n<td>HyperText Transfer Protocol</td>\n<td>Протокол передачі гіпертексту</td>\n</tr>\n<tr>\n<td>ORM</td>\n<td>Object-Relational Mapping</td>\n<td>Об'єктно-реляційне відображення</td>\n</tr>\n<tr>\n<td>SQL</td>\n<td>Structured Query Language</td>\n<td>Мова структурованих запитів</td>\n</tr>\n<tr>\n<td>OWASP</td>\n<td>Open Worldwide Application Security Project</td>\n<td>Проєкт відкритої безпеки застосунків</td>\n</tr>\n<tr>\n<td>UUID</td>\n<td>Universally Unique Identifier</td>\n<td>Універсальний унікальний ідентифікатор</td>\n</tr>\n<tr>\n<td>CRUD</td>\n<td>Create, Read, Update, Delete</td>\n<td>Базові операції з даними</td>\n</tr>\n</tbody></table>\n"];let currentSlideIndex=0;
function renderMath(root){if(typeof renderMathInElement!=="function"||!root)return;try{renderMathInElement(root,{delimiters:[{left:"$$",right:"$$",display:true},{left:"\\[",right:"\\]",display:true},{left:"$",right:"$",display:false},{left:"\\(",right:"\\)",display:false}],throwOnError:false,strict:"ignore",ignoredTags:["script","noscript","style","textarea","pre","code"]});}catch(e){console.warn("Math render error:",e);}}
function showSlide(i){if(i<0||i>=slides.length)return;currentSlideIndex=i;const el=document.getElementById("current-slide");el.innerHTML=slides[i];el.scrollTop=0;renderMath(el);document.getElementById("progress-bar").style.width=((i+1)/slides.length*100)+"%";document.getElementById("slide-number").textContent=(i+1)+" / "+slides.length;updateSidebarActive();}
function nextSlide(){if(currentSlideIndex<slides.length-1)showSlide(currentSlideIndex+1);}
function previousSlide(){if(currentSlideIndex>0)showSlide(currentSlideIndex-1);}
function toggleSidebar(){document.getElementById("sidebar").classList.toggle("open");}
function toggleHelp(){document.getElementById("help-overlay").classList.toggle("hidden");}
function toggleFullscreen(){if(!document.fullscreenElement){const pc=document.getElementById("presentation-container");if(pc.requestFullscreen)pc.requestFullscreen();else if(pc.webkitRequestFullscreen)pc.webkitRequestFullscreen();else if(pc.msRequestFullscreen)pc.msRequestFullscreen();else if(pc.mozRequestFullScreen)pc.mozRequestFullScreen();}else{if(document.exitFullscreen)document.exitFullscreen();else if(document.webkitExitFullscreen)document.webkitExitFullscreen();else if(document.msExitFullscreen)document.msExitFullscreen();else if(document.mozCancelFullScreen)document.mozCancelFullScreen();}}
function generateSidebar(){const sc=document.getElementById("sidebar-content");sc.innerHTML="";slides.forEach((html,idx)=>{const t=document.createElement("div");t.className="slide-thumbnail";if(idx===0)t.classList.add("active");const tmp=document.createElement("div");tmp.innerHTML=html;const title=tmp.querySelector("h1,h2");const titleText=title?title.textContent:("Слайд "+(idx+1));const textContent=tmp.textContent.replace(/s+/g," ").trim();const preview=textContent.substring(0,100)+(textContent.length>100?"...":"");t.innerHTML="<div class=\"slide-thumbnail-number\">"+(idx+1)+"</div><div class=\"slide-thumbnail-title\">"+titleText+"</div><div class=\"slide-thumbnail-content\">"+preview+"</div>";t.onclick=()=>{showSlide(idx);if(window.innerWidth<1024)toggleSidebar();};sc.appendChild(t);});}
function updateSidebarActive(){document.querySelectorAll(".slide-thumbnail").forEach((th,idx)=>{if(idx===currentSlideIndex){th.classList.add("active");th.scrollIntoView({behavior:"smooth",block:"nearest"});}else th.classList.remove("active");});}
document.addEventListener("keydown",e=>{switch(e.key){case"ArrowLeft":previousSlide();break;case"ArrowRight":case" ":e.preventDefault();nextSlide();break;case"f":case"F":toggleFullscreen();break;case"s":case"S":toggleSidebar();break;case"?":toggleHelp();break;case"Escape":const sb=document.getElementById("sidebar");const ho=document.getElementById("help-overlay");if(sb.classList.contains("open"))toggleSidebar();else if(!ho.classList.contains("hidden"))ho.classList.add("hidden");break;}});
generateSidebar();showSlide(0);</script></body></html>
