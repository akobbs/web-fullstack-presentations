єнтом та сервером</li>\n<li>📡 Контракти API та узгодження інтерфейсів</li>\n<li>🚀 Стратегії деплойменту Full-Stack</li>\n<li>✅ Ключові висновки та контрольні питання</li>\n</ol>\n","<h1>🏗️ Архітектура Full-Stack застосунку</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>Full-Stack застосунок</strong> — система, що складається з двох незалежних частин: клієнтської (frontend), яка виконується у браузері користувача, і серверної (backend), яка виконується на сервері. Ці частини взаємодіють через мережу за допомогою HTTP-протоколу.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> Frontend та backend — два окремі застосунки, що розробляються, тестуються та розгортаються незалежно. Їх єдиний канал зв'язку — API.</p>\n<h2>🔄 Базова модель взаємодії</h2>\n\n<div class=\"mermaid\" data-source=\"graph LR\n    USER[👤 Користувач] --&gt; BROWSER[🌐 Браузер]\n    BROWSER --&gt; FE[&quot;⚛️ Frontend\nReact + Vite&quot;]\n    FE --&gt;|HTTP запити| BE[&quot;🚀 Backend\nNest.js&quot;]\n    BE --&gt; DB[(&quot;🗄️ База даних\nPostgreSQL&quot;)]\n    BE --&gt;|JSON відповіді| FE\n    FE --&gt;|HTML/CSS/JS| BROWSER\n    style USER fill:#fff9c4,stroke:#f9a825\n    style FE fill:#e3f2fd,stroke:#1565c0\n    style BE fill:#e8f5e9,stroke:#388e3c\n    style DB fill:#fce4ec,stroke:#c2185b\"><svg id=\"exp-1778735931943-2-0\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" class=\"flowchart\" style=\"max-width: 1108.671875px;\" viewBox=\"0 0 1108.671875 112.20146179199219\" role=\"graphics-document document\" aria-roledescription=\"flowchart-v2\"><style>#exp-1778735931943-2-0{font-family:system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,Arial,sans-serif;font-size:16px;fill:#333;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#exp-1778735931943-2-0 .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#exp-1778735931943-2-0 .edge-a 99/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>⚛️ Frontend<br>React + Vite</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1778735931943-2-0-flowchart-BE-5\" data-look=\"classic\" transform=\"translate(868.58984375, 56.100730895996094)\"><rect class=\"basic label-container\" style=\"fill:#e8f5e9 !important;stroke:#388e3c !important\" x=\"-65.44921875\" y=\"-36\" width=\"130.8984375\" height=\"72\"></rect><g class=\"label\" style=\"\" transform=\"translate(-41.44921875, -24)\"><rect></rect><foreignObject width=\"82.8984375\" height=\"48\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>🚀 Backend<br>Nest.js</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1778735931943-2-0-flowchart-DB-7\" data-look=\"classic\" transform=\"translate(1042.35546875, 56.100730895996094)\"><path d=\"M0,12.067153803873389 a58.31640625,12.067153803873389 0,0,0 116.6328125,0 a58.31640625,12.067153803873389 0,0,0 -116.6328125,0 l0,72.0671538038734 a58.31640625,12.067153803873389 0,0,0 116.6328125,0 l0,-72.0671538038734\" class=\"basic label-container outer-path\" style=\"fill:#fce4ec !important;stroke:#c2185b !important\" label-offset-y=\"12.067153803873389\" transform=\"translate(-58.31640625, -48.100730705810086)\"></path><g class=\"label\" style=\"\" transform=\"translate(-52.31640625, -16)\"><rect></rect><foreignObject width=\"104.6328125\" height=\"48\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>🗄️ База даних<br>PostgreSQL</p></span></div></foreignObject></g></g></g></g></g><defs><filter id=\"exp-1778735931943-2-0-drop-shadow\" height=\"130%\" width=\"130%\"><feDropShadow dx=\"4\" dy=\"4\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs><defs><filter id=\"exp-1778735931943-2-0-drop-shadow-small\" height=\"150%\" width=\"150%\"><feDropShadow dx=\"2\" dy=\"2\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs></svg></div>\n<h2>🎯 Розподіл відповідальності</h2>\n<table>\n<thead>\n<tr>\n<th>Шар</th>\n<th>Технологія</th>\n<th>Відповідальність</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><strong>Frontend</strong></td>\n<td>React + Vite</td>\n<td>UI, валідація форм, маршрутизація, кешування на клієнті, UX</td>\n</tr>\n<tr>\n<td><strong>Backend</strong></td>\n<td>Nest.js</td>\n<td>Бізнес-логіка, авторизація, валідація даних, робота з БД, безпека</td>\n</tr>\n<tr>\n<td><strong>БД</strong></td>\n<td>PostgreSQL</td>\n<td>Зберігання даних, цілісність, транзакції</td>\n</tr>\n</tbody></table>\n<div class=\"warning\"><strong>⚠️ Принцип</strong> <p>Frontend <strong>ніколи не довіряє</strong> даним від користувача — будь-яка валідація на клієнті дублюється на сервері. Клієнтська валідація існує для UX, серверна — для безпеки.</p>\n</div>\n\n","<h1>🌐 Origin: походження ресурсу у мережі</h1>\n<p><strong>Головна ідея:</strong> Кожна частина системи має власний домен (origin) у мережі. Frontend і backend — це два окремих сервери, які працюють на різних адресах.</p>\n<h2>🔍 Що таке Origin?</h2>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>Origin</strong> (походження) — комбінація з трьох частин URL-адреси: <strong>протокол + домен + порт</strong>. Два URL мають однаковий origin лише якщо всі три частини збігаються.</p>\n</div>\n\n\n\n<pre><code class=\"language-plaintext hljs\" data-highlighted=\"yes\">https://example.com:443/api/users\n└─┬──┘  └────┬─────┘ └┬┘\n  │          │        │\nпротокол  домен    порт</code></pre><h2>📊 Приклади порівняння</h2>\n<table>\n<thead>\n<tr>\n<th>URL 1</th>\n<th>URL 2</th>\n<th>Однаковий origin?</th>\n<th>Причина</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>http://site.com/a</code></td>\n<td><code>http://site.com/b</code></td>\n<td>✅ Так</td>\n<td>Шлях не впливає на origin</td>\n</tr>\n<tr>\n<td><code>http://site.com</code></td>\n<td><code>https://site.com</code></td>\n<td>❌ Ні</td>\n<td>Різний протокол</td>\n</tr>\n<tr>\n<td><code>http://site.com</code></td>\n<td><code>http://api.site.com</code></td>\n<td>❌ Ні</td>\n<td>Різний домен (піддомен)</td>\n</tr>\n<tr>\n<td><code>http://site.com</code></td>\n<td><code>http://site.com:8080</code></td>\n<td>❌ Ні</td>\n<td>Різний порт</td>\n</tr>\n<tr>\n<td><code>http://localhost:5173</code></td>\n<td><code>http://localhost:3000</code></td>\n<td>❌ Ні</td>\n<td>Різний порт</td>\n</tr>\n</tbody></table>\n<div class=\"tip\"><strong>💡 Локальна розробка</strong> <p>У розробці frontend зазвичай запускається на <code>http://localhost:5173</code> (Vite), а backend — на <code>http://localhost:3000</code> (Nest.js). З точки зору браузера це <strong>різні origin'и</strong>, що породжує проблеми, які ми розглянемо далі.</p>\n</div>\n\n","<h1>🔧 Змінні середовища: навіщо вони потрібні</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>Змінні середовища</strong> (environment variables) — це налаштування, які зчитуються застосунком під час запуску. Вони дозволяють змінювати поведінку коду без його модифікації — за допомогою конфігурації, що залежить від середовища виконання.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> Адреси API, ключі шифрування, налаштування БД відрізняються між середовищами розробки та продакшну. Винесення цих значень у змінні середовища дозволяє використовувати <strong>один кодовий код</strong> у різних середовищах.</p>\n<h2>🚫 Чому не варто \"хардкодити\" значення?</h2>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// ❌ Погано: значення зашиті у код</span>\n<span class=\"hljs-keyword\">const</span> <span class=\"hljs-variable constant_\">API_URL</span> = <span class=\"hljs-string\">\"http://localhost:3000/api\"</span>;\n<span class=\"hljs-keyword\">const</span> <span class=\"hljs-variable constant_\">JWT_SECRET</span> = <span class=\"hljs-string\">\"my-secret-key-123\"</span>;\n\n<span class=\"hljs-comment\">// Проблеми:</span>\n<span class=\"hljs-comment\">// 1. У продакшні API URL інший — треба змінювати код</span>\n<span class=\"hljs-comment\">// 2. Секрет потрапляє у Git-репозиторій (загроза безпеці)</span>\n<span class=\"hljs-comment\">// 3. Неможливо мати різні налаштування без зміни коду</span></code></pre><pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// ✅ Добре: значення з оточення</span>\n<span class=\"hljs-keyword\">const</span> <span class=\"hljs-variable constant_\">API_URL</span> = process.<span class=\"hljs-property\">env</span>.<span class=\"hljs-property\">API_URL</span>;\n<span class=\"hljs-keyword\">const</span> <span class=\"hljs-variable constant_\">JWT_SECRET</span> = process.<span class=\"hljs-property\">env</span>.<span class=\"hljs-property\">JWT_SECRET</span>;</code></pre><h2>🌍 Типові середовища</h2>\n<table>\n<thead>\n<tr>\n<th>Середовище</th>\n<th>English</th>\n<th>Призначення</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Розробка</td>\n<td>Development</td>\n<td>Локальна машина розробника</td>\n</tr>\n<tr>\n<td>Тестування</td>\n<td>Testing</td>\n<td>Автоматичні тести, CI/CD</td>\n</tr>\n<tr>\n<td>Стейджинг</td>\n<td>Staging</td>\n<td>Передвиробниче середовище для перевірки</td>\n</tr>\n<tr>\n<td>Продакшн</td>\n<td>Production</td>\n<td>Реальне середовище для користувачів</td>\n</tr>\n</tbody></table>\n<div class=\"warning\"><strong>⚠️ Безпека</strong> <p>Файли <code>.env</code> <strong>ніколи не комітяться в Git</strong>. У репозиторії має бути лише <code>.env.example</code> із переліком потрібних змінних без реальних значень.</p>\n</div>\n\n","<h1>🚀 Змінні середовища у Nest.js</h1>\n<p><strong>Головна ідея:</strong> Nest.js надає вбудований <code>ConfigModule</code> для роботи зі змінними середовища у структурованому, типобезпечному вигляді.</p>\n<h2>📝 Файл <code>.env</code> для backend</h2>\n<pre><code class=\"language-bash hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\"># .env</span>\nPORT=3000\nDATABASE_HOST=localhost\nDATABASE_PORT=5432\nDATABASE_USER=postgres\nDATABASE_PASSWORD=secret\nDATABASE_NAME=taskmanager\nJWT_SECRET=very-long-random-string-here\nJWT_EXPIRES_IN=24h\nFRONTEND_URL=http://localhost:5173</code></pre><h2>⚙️ Підключення ConfigModule</h2>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// app.module.ts</span>\n<span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">Module</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"@nestjs/common\"</span>;\n<span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">ConfigModule</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"@nestjs/config\"</span>;\n\n<span class=\"hljs-meta\">@Module</span>({\n  <span class=\"hljs-attr\">imports</span>: [\n    <span class=\"hljs-title class_\">ConfigModule</span>.<span class=\"hljs-title function_\">forRoot</span>({\n      <span class=\"hljs-attr\">isGlobal</span>: <span class=\"hljs-literal\">true</span>,           <span class=\"hljs-comment\">// Доступний у всіх модулях без імпорту</span>\n      <span class=\"hljs-attr\">envFilePath</span>: <span class=\"hljs-string\">\".env\"</span>,      <span class=\"hljs-comment\">// Шлях до файлу</span>\n    }),\n  ],\n})\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">class</span> <span class=\"hljs-title class_\">AppModule</span> {}</code></pre><h2>🎯 Використання у сервісі</h2>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">Injectable</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"@nestjs/common\"</span>;\n<span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">ConfigService</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"@nestjs/config\"</span>;\n\n<span class=\"hljs-meta\">@Injectable</span>()\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">class</span> <span class=\"hljs-title class_\">AuthService</span> {\n  <span class=\"hljs-title function_\">constructor</span>(<span class=\"hljs-params\"><span class=\"hljs-keyword\">private</span> configService: ConfigService</span>) {}\n\n  <span class=\"hljs-title function_\">generateToken</span>(<span class=\"hljs-params\"></span>) {\n    <span class=\"hljs-keyword\">const</span> secret = <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">configService</span>.<span class=\"hljs-property\">get</span>&lt;<span class=\"hljs-built_in\">string</span>&gt;(<span class=\"hljs-string\">\"JWT_SECRET\"</span>);\n    <span class=\"hljs-keyword\">const</span> expiresIn = <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">configService</span>.<span class=\"hljs-property\">get</span>&lt;<span class=\"hljs-built_in\">string</span>&gt;(<span class=\"hljs-string\">\"JWT_EXPIRES_IN\"</span>);\n    <span class=\"hljs-comment\">// Використання secret та expiresIn</span>\n  }\n}</code></pre><div class=\"tip\"><strong>💡 Переваги ConfigService</strong> <p>На відміну від прямого використання <code>process.env</code>, <code>ConfigService</code> забезпечує типізацію, валідацію змінних на старті застосунку та централізоване керування конфігурацією.</p>\n</div>\n\n","<h1>⚛️ Змінні середовища у Vite</h1>\n<p><strong>Головна ідея:</strong> Vite має власну систему змінних середовища, яка відрізняється від Node.js: змінні <strong>вбудовуються у бандл</strong> під час збірки, тому всі вони стають публічними.</p>\n<h2>📝 Файл <code>.env</code> для frontend</h2>\n<pre><code class=\"language-bash hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\"># .env</span>\nVITE_API_URL=http://localhost:3000/api\nVITE_APP_TITLE=Task Manager</code></pre><div class=\"warning\"><strong>⚠️ Критично важливо</strong> <p>Усі змінні Vite мають починатися з префіксу <strong><code>VITE_</code></strong> — інакше вони не будуть доступні у клієнтському коді. Це захист від випадкового витоку серверних змінних.</p>\n</div>\n\n\n\n<h2>🎯 Використання у React-коді</h2>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// src/api/client.ts</span>\n<span class=\"hljs-keyword\">const</span> <span class=\"hljs-variable constant_\">API_URL</span> = <span class=\"hljs-keyword\">import</span>.<span class=\"hljs-property\">meta</span>.<span class=\"hljs-property\">env</span>.<span class=\"hljs-property\">VITE_API_URL</span>;\n\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">async</span> <span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">fetchTasks</span>(<span class=\"hljs-params\"></span>) {\n  <span class=\"hljs-keyword\">const</span> response = <span class=\"hljs-keyword\">await</span> <span class=\"hljs-title function_\">fetch</span>(<span class=\"hljs-string\">`<span class=\"hljs-subst\">${API_URL}</span>/tasks`</span>);\n  <span class=\"hljs-keyword\">return</span> response.<span class=\"hljs-title function_\">json</span>();\n}</code></pre><h2>🚫 Що не можна зберігати у Vite змінних</h2>\n<pre><code class=\"language-bash hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\"># ❌ КАТЕГОРИЧНО ЗАБОРОНЕНО</span>\nVITE_DATABASE_PASSWORD=secret      <span class=\"hljs-comment\"># Потрапить у бандл та буде видимим у браузері</span>\nVITE_JWT_SECRET=key                <span class=\"hljs-comment\"># Будь-хто зможе побачити у DevTools</span>\nVITE_ADMIN_API_KEY=admin-key       <span class=\"hljs-comment\"># Скомпрометує всю систему</span></code></pre><div class=\"danger\"><strong>🚫 Принцип безпеки</strong> <p>Змінні з префіксом <code>VITE_</code> <strong>публічні за визначенням</strong>. У них зберігаються лише ті значення, які не є таємницею: URL API, заголовки, налаштування UI. Усі секрети залишаються на backend.</p>\n</div>\n\n","<h1>🛡️ Same-Origin Policy</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>Same-Origin Policy</strong> (SOP) — фундаментальний механізм безпеки браузерів, що обмежує взаємодію скриптів між різними origin'ами. За замовчуванням скрипт із одного origin не може звертатися до ресурсів іншого origin.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> SOP захищає користувача від зловмисних сайтів. Без неї шкідливий сайт міг би непомітно надсилати запити від імені користувача на банк, пошту та інші сервіси, де користувач залогінений.</p>\n<h2>🦹 Сценарій без Same-Origin Policy</h2>\n\n<div class=\"mermaid\" data-source=\"graph LR\n    USER[&quot;👤 Користувач\nзалогінений у банку&quot;] --&gt; EVIL[😈 evil-site.com]\n    EVIL -.-&gt;|&quot;Без SOP: міг би\nнадіслати запит\nз кукі користувача&quot;| BANK[&quot;🏦 bank.com\n/transfer&quot;]\n    BANK -.-&gt;|Виконав переказ| HACKER[💰 Зловмисник]\n    style USER fill:#fff9c4,stroke:#f9a825\n    style EVIL fill:#fce4ec,stroke:#c2185b\n    style BANK fill:#e3f2fd,stroke:#1565c0\n    style HACKER fill:#ffcdd2,stroke:#b71c1c\"><svg id=\"exp-1778735931965-7-0\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" class=\"flowchart\" style=\"max-width: 1106.53125px;\" viewBox=\"0 0 1106.53125 88\" role=\"graphics-document document\" aria-roledescription=\"flowchart-v2\"><style>#exp-1778735931965-7-0{font-family:system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,Arial,sans-serif;font-size:16px;fill:#333;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#exp-1778735931965-7-0 .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900 n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>CORS</strong> (Cross-Origin Resource Sharing) — механізм, що дозволяє серверу декларативно вказати, які зовнішні origin'и мають право звертатися до його ресурсів. Це послаблення Same-Origin Policy за згодою сервера.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> CORS — не дозвіл, який запитує клієнт, а <strong>дозвіл, який видає сервер</strong>. Браузер перевіряє заголовки відповіді сервера й вирішує, чи дозволити коду читати дані.</p>\n<h2>🔄 Як працює CORS</h2>\n\n<div class=\"mermaid\" data-source=\"sequenceDiagram\n    participant B as 🌐 Браузер\n    participant S as 🚀 Сервер\n    B-&gt;&gt;S: GET /api/tasks (Origin: http://localhost:5173)\n    S-&gt;&gt;B: 200 OK (Access-Control-Allow-Origin: http://localhost:5173)\n    Note over B: Браузер перевіряє заголовок. Origin збігається -- дозволяє доступ.\"><svg id=\"exp-1778735931974-8-0\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" style=\"max-width: 924.5px;\" viewBox=\"-231.5 -10 924.5 320\" role=\"graphics-document document\" aria-roledescription=\"sequence\"><g><rect x=\"493\" y=\"234\" fill=\"#eaeaea\" stroke=\"#666\" width=\"150\" height=\"65\" name=\"S\" rx=\"3\" ry=\"3\" class=\"actor actor-bottom\"></rect><text x=\"568\" y=\"266.5\" dominant-baseline=\"central\" alignment-baseline=\"central\" class=\"actor actor-box\" style=\"text-anchor: middle; font-size: 16px; font-weight: 400;\"><tspan x=\"568\" dy=\"0\">🚀 Сервер</tspan></text></g><g><rect x=\"0\" y=\"234\" fill=\"#eaeaea\" stroke=\"#666\" width=\"150\" height=\"65\" name=\"B\" rx=\"3\" ry=\"3\" class=\"actor actor-bottom\"></rect><text x=\"75\" y=\"266.5\" dominant-baseline=\"central\" alignment-baseline=\"central\" class=\"actor actor-box\" style=\"text-anchor: middle; font-size: 16px; font-weight: 400;\"><tspan x=\"75\" dy=\"0\">🌐 Браузер</tspan></text></g><g><line id=\"actor1\" x1=\"568\" y1=\"65\" x2=\"568\" y2=\"234\" class=\"actor-line 200\" stroke-width=\"0.5px\" stroke= об'єкт конфігурації.</p>\n<h2>✅ Базове увімкнення</h2>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// main.ts</span>\n<span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">NestFactory</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"@nestjs/core\"</span>;\n<span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">AppModule</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"./app.module\"</span>;\n\n<span class=\"hljs-keyword\">async</span> <span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">bootstrap</span>(<span class=\"hljs-params\"></span>) {\n  <span class=\"hljs-keyword\">const</span> app = <span class=\"hljs-keyword\">await</span> <span class=\"hljs-title class_\">NestFactory</span>.<span class=\"hljs-title function_\">create</span>(<span class=\"hljs-title class_\">AppModule</span>);\n\n  <span class=\"hljs-comment\">// Базовий варіант: дозволяє всі origin'и</span>\n  app.<span class=\"hljs-title function_\">enableCors</span>();\n\n  <span class=\"hljs-keyword\">await</span> app.<span class=\"hljs-title function_\">listen</span>(<span class=\"hljs-number\">3000</span>);\n}\n<span class=\"hljs-title function_\">bootstrap</span>();</code></pre><div class=\"danger\"><strong>🚫 Безпека</strong> <p><code>app.enableCors()</code> без параметрів дозволяє запити з будь-якого origin. Це <strong>прийнятно лише для розробки</strong>. У продакшні завжди вказуйте конкретний список дозволених origin'ів.</p>\n</div>\n\n\n\n<h2>🎯 Налаштування для продакшну</h2>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">ConfigService</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"@nestjs/config\"</span>;\n\n<span class=\"hljs-keyword\">async</span> <span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">bootstrap</span>(<span class=\"hljs-params\"></span>) {\n  <span class=\"hljs-keyword\">const</span> app = <span class=\"hljs-keyword\">await</span> <span class=\"hljs-title class_\">NestFactory</span>.<span class=\"hljs-title function_\">create</span>(<span class=\"hljs-title class_\">AppModule</span>);\n  <span class=\"hljs-keyword\">const</span> configService = app.<span class=\"hljs-title function_\">get</span>(<span class=\"hljs-title class_\">ConfigService</span>);\n\n  app.<span class=\"hljs-title function_\">enableCors</span>({\n    <span class=\"hljs-attr\">origin</span>: configService.<span class=\"hljs-property\">get</span>&lt;<span class=\"hljs-built_in\">string</span>&gt;(<span class=\"hljs-string\">\"FRONTEND_URL\"</span>),\n    <span class=\"hljs-attr\">methods</span>: [<span class=\"hljs-string\">\"GET\"</span>, <span class=\"hljs-string\">\"POST\"</span>, <span class=\"hljs-string\">\"PUT\"</span>, <span class=\"hljs-string\">\"DELETE\"</span>, <span class=\"hljs-string\">\"PATCH\"</span>],\n    <span class=\"hljs-attr\">credentials</span>: <span class=\"hljs-literal\">true</span>,                    <span class=\"hljs-comment\">// Дозволити cookies та авторизаційні заголовки</span>\n    <span class=\"hljs-attr\">allowedHeaders</span>: [<span class=\"hljs-string\">\"Content-Type\"</span>, <span class=\"hljs-string\">\"Authorization\"</span>],\n    <span class=\"hljs-attr\">maxAge</span>: <span class=\"hljs-number\">3600</span>,                         <span class=\"hljs-comment\">// Кеш на 1 годину</span>\n  });\n\n  <span class=\"hljs-keyword\">await</span> app.<span class=\"hljs-title function_\">listen</span>(configService.<span class=\"hljs-property\">get</span>&lt;<span class=\"hljs-built_in\">number</span>&gt;(<span class=\"hljs-string\">\"PORT\"</span>) || <span class=\"hljs-number\">3000</span>);\n}</code></pre><h2>🔄 Динамічна перевірка origin</h2>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-keyword\">const</span> allowedOrigins = [\n  <span class=\"hljs-string\">\"http://localhost:5173\"</span>,\n  <span class=\"hljs-string\">\"https://taskmanager.example.com\"</span>,\n];\n\napp.<span class=\"hljs-title function_\">enableCors</span>({\n  <span class=\"hljs-attr\">origin</span>: <span class=\"hljs-function\">(<span class=\"hljs-params\">origin, callback</span>) =&gt;</span> {\n    <span class=\"hljs-keyword\">if</span> (!origin || allowedOrigins.<span class=\"hljs-title function_\">includes</span>(origin)) {\n      <span class=\"hljs-title function_\">callback</span>(<span class=\"hljs-literal\">null</span>, <span class=\"hljs-literal\">true</span>);\n    } <span class=\"hljs-keyword\">else</span> {\n      <span class=\"hljs-title function_\">callback</span>(<span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Error</span>(<span class=\"hljs-string\">\"Not allowed by CORS\"</span>));\n    }\n  },\n  <span class=\"hljs-attr\">credentials</span>: <span class=\"hljs-literal\">true</span>,\n});</code></pre>","<h1>🔀 Vite Proxy: альтернатива CORS у розробці</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>Proxy</strong> (проксі) — посередник, який перенаправляє запити від клієнта до сервера. У контексті розробки Vite може приймати запити frontend-застосунку та перенаправляти їх на backend.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> Замість налаштування CORS можна приховати різницю між origin'ами: frontend та backend здаються браузеру одним origin'ом, оскільки запити йдуть через dev-сервер Vite.</p>\n<h2>🎯 Як працює Proxy</h2>\n\n<div class=\"mermaid\" data-source=\"graph LR\n    BROWSER[&quot;🌐 Браузер\nlocalhost:5173&quot;] --&gt;|GET /api/tasks| VITE[&quot;⚡ Vite Dev Server\nlocalhost:5173&quot;]\n    VITE --&gt;|GET /api/tasks| NEST[&quot;🚀 Nest.js\nlocalhost:3000&quot;]\n    NEST --&gt;|JSON| VITE\n    VITE --&gt;|JSON| BROWSER\n    style BROWS 78735932009-11-0-flowchart-VITE-1\" data-look=\"classic\" transform=\"translate(408.9296875, 44)\"><rect class=\"basic label-container\" style=\"fill:#e3f2fd !important;stroke:#1565c0 !important\" x=\"-90.2265625\" y=\"-36\" width=\"180.453125\" height=\"72\"></rect><g class=\"label\" style=\"\" transform=\"translate(-66.2265625, -24)\"><rect></rect><foreignObject width=\"132.453125\" height=\"48\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>⚡ Vite Dev Server<br>localhost:5173</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1778735932009-11-0-flowchart-NEST-3\" data-look=\"classic\" transform=\"translate(735.39453125, 44)\"><rect class=\"basic label-container\" style=\"fill:#e8f5e9 !important;stroke:#388e3c !important\" x=\"-78.43359375\" y=\"-36\" width=\"156.8671875\" height=\"72\"></rect><g class=\"label\" style=\"\" transform=\"translate(-54.43359375, -24)\"><rect></rect><foreignObject width=\"108.8671875\" height=\"48\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>🚀 Nest.js<br>localhost:3000</p></span></div></foreignObject></g></g></g></g></g><defs><filter id=\"exp-1778735932009-11-0-drop-shadow\" height=\"130%\" width=\"130%\"><feDropShadow dx=\"4\" dy=\"4\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs><defs><filter id=\"exp-1778735932009-11-0-drop-shadow-small\" height=\"150%\" width=\"150%\"><feDropShadow dx=\"2\" dy=\"2\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs></svg></div>\n<p>З точки зору браузера всі запити йдуть на той самий origin — <code>localhost:5173</code>. CORS-перевірка не активується, оскільки запит вважається same-origin.</p>\n<h2>⚙️ Налаштування у Vite</h2>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// vite.config.ts</span>\n<span class=\"hljs-keyword\">import</span> { defineConfig } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"vite\"</span>;\n<span class=\"hljs-keyword\">import</span> react <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"@vitejs/plugin-react\"</span>;\n\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">default</span> <span class=\"hljs-title function_\">defineConfig</span>({\n  <span class=\"hljs-attr\">plugins</span>: [<span class=\"hljs-title function_\">react</span>()],\n  <span class=\"hljs-attr\">server</span>: {\n    <span class=\"hljs-attr\">proxy</span>: {\n      <span class=\"hljs-comment\">// Усі запити, що починаються з /api,</span>\n      <span class=\"hljs-comment\">// перенаправляються на backend</span>\n      <span class=\"hljs-string\">\"/api\"</span>: {\n        <span class=\"hljs-attr\">target</span>: <span class=\"hljs-string\">\"http://localhost:3000\"</span>,\n        <span class=\"hljs-attr\">changeOrigin</span>: <span class=\"hljs-literal\">true</span>,\n      },\n    },\n  },\n});</code></pre><div class=\"note\"><strong>📝 Узгодження з backend</strong> <p>Цей приклад припускає, що Nest.js приймає запити на <code>/api/*</code> (за допомогою <code>app.setGlobalPrefix('api')</code>). Якщо backend не має такого префіксу, додайте опцію <code>rewrite: (path) =&gt; path.replace(/^\\/api/, '')</code>.</p>\n</div>\n\n\n\n<h2>📞 Використання у коді</h2>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// Без proxy — потрібен повний URL та CORS на сервері</span>\n<span class=\"hljs-title function_\">fetch</span>(<span class=\"hljs-string\">\"http://localhost:3000/api/tasks\"</span>);\n\n<span class=\"hljs-comment\">// З proxy — відносний URL, без CORS-проблем</span>\n<span class=\"hljs-title function_\">fetch</span>(<span class=\"hljs-string\">\"/api/tasks\"</span>);</code></pre><div class=\"warning\"><strong>⚠️ Тільки для розробки</strong> <p>Vite Proxy працює лише на dev-сервері. У продакшні frontend та backend деплояться окремо, тому <strong>CORS на сервері все одно потрібен</strong>, або їх ставлять за спільний reverse proxy (наприклад, Nginx).</p>\n</div>\n\n","<h1>🔗 Спільні типи між клієнтом та сервером</h1>\n<p><strong>Головна ідея:</strong> Frontend і backend мають узгоджено описувати структуру даних, якими обмінюються. У TypeScript-проєктах це досягається через спільні типи, що використовуються обома сторонами.</p>\n<h2>❌ Проблема дублювання</h2>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// backend/src/tasks/task.entity.ts</span>\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">class</span> <span class=\"hljs-title class_\">Task</span> {\n  <span class=\"hljs-attr\">id</span>: <span class=\"hljs-built_in\">number</span>;\n  <span class=\"hljs-attr\">title</span>: <span class=\"hljs-built_in\">string</span>;\n  <span class=\"hljs-attr\">completed</span>: <span class=\"hljs-built_in\">boolean</span>;\n  <span class=\"hljs-attr\">createdAt</span>: <span class=\"hljs-title class_\">Date</span>;\n}\n\n<span class=\"hljs-comment\">// frontend/src/types/task.ts</span>\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">interface</span> <span class=\"hljs-title class_\">Task</span> {\n  <span class=\"hljs-attr\">id</span>: <span class=\"hljs-built_in\">number</span>;\n  <span class=\"hljs-attr\">title</span>: <span class=\"hljs-built_in\">string</span>;\n  <span class=\"hljs-attr\">completed</span>: <span class=\"hljs-built_in\">boolean</span>;\n  <span class=\"hljs-attr\">createdAt</span>: <span class=\"hljs-built_in\">string</span>;   <span class=\"hljs-comment\">// ⚠️ Розбіжність! На клієнті це рядок</span>\n}</code></pre><p>Проблеми такого підходу:</p>\n<ol>\n<li>Типи дублюються та можуть розійтися</li>\n<li>При зміні API легко забути оновити одну зі сторін</li>\n<li>Дрібні розбіжності викликають баги, які важко виявити</li>\n</ol>\n<h2>🎯 Підхід зі спільним пакетом</h2>\n<pre><code class=\"language-plaintext hljs\" data-highlighted=\"yes\">monorepo/\n├── packages/\n│   ├── backend/         # Nest.js застосунок\n│   ├── frontend/        # React застосунок\n│   └── shared/          # Спільний код\n│       └── types.ts     # Інтерфейси API</code></pre><pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// packages/shared/types.ts</span>\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">interface</span> <span class=\"hljs-title class_\">Task</span> {\n  <span class=\"hljs-attr\">id</span>: <span class=\"hljs-built_in\">number</span>;\n  <span class=\"hljs-attr\">title</span>: <span class=\"hljs-built_in\">string</span>;\n  <span class=\"hljs-attr\">completed</span>: <span class=\"hljs-built_in\">boolean</span>;\n  <span class=\"hljs-attr\">createdAt</span>: <span class=\"hljs-built_in\">string</span>;\n}\n\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">interface</span> <span class=\"hljs-title class_\">CreateTaskDto</span> {\n  <span class=\"hljs-attr\">title</span>: <span class=\"hljs-built_in\">string</span>;\n}\n\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">interface</span> <span class=\"hljs-title class_\">UpdateTaskDto</span> {\n  title?: <span class=\"hljs-built_in\">string</span>;\n  completed?: <span class=\"hljs-built_in\">boolean</span>;\n}</code></pre><pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// packages/backend/src/tasks/tasks.controller.ts</span>\n<span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">Task</span>, <span class=\"hljs-title class_\">CreateTaskDto</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"@app/shared\"</span>;\n\n<span class=\"hljs-meta\">@Controller</span>(<span class=\"hljs-string\">\"tasks\"</span>)\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">class</span> <span class=\"hljs-title class_\">TasksController</span> {\n  <span class=\"hljs-meta\">@Post</span>()\n  <span class=\"hljs-title function_\">create</span>(<span class=\"hljs-meta\">@Body</span>() <span class=\"hljs-attr\">dto</span>: <span class=\"hljs-title class_\">CreateTaskDto</span>): <span class=\"hljs-title class_\">Promise</span>&lt;<span class=\"hljs-title class_\">Task</span>&gt; { <span class=\"hljs-comment\">/* ... */</span> }\n}</code></pre><pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// packages/frontend/src/api/tasks.ts</span>\n<span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">Task</span>, <span class=\"hljs-title class_\">CreateTaskDto</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"@app/shared\"</span>;\n\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">async</span> <span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">createTask</span>(<span class=\"hljs-params\">dto: CreateTaskDto</span>): <span class=\"hljs-title class_\">Promise</span>&lt;<span class=\"hljs-title class_\">Task</span>&gt; {\n  <span class=\"hljs-comment\">// ...</span>\n}</code></pre><div class=\"tip\"><strong>💡 Переваги монорепозиторію</strong> <p>Зміна структури <code>Task</code> у спільному пакеті відразу проявиться помилками компіляції в обох частинах застосунку. Це знаходить помилки інтеграції на етапі розробки, а не у продакшні.</p>\n</div>\n\n","<h1>📡 Контракт API</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>Контракт API</strong> (API contract) — формальний опис того, які запити приймає сервер, які відповіді повертає, які помилки можливі. Контракт є точкою узгодження між командами frontend та backend.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> Перед написанням коду команди мають домовитися про структуру API. Це дозволяє розробляти frontend і backend паралельно, а також автоматично генерувати документацію та клієнтський код.</p>\n<h2>📋 Що містить контракт</h2>\n<table>\n<thead>\n<tr>\n<th>Елемент</th>\n<th>Опис</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><strong>Endpoint</strong></td>\n<td>URL та HTTP-метод (<code>POST /api/tasks</code>)</td>\n</tr>\n<tr>\n<td><strong>Запит</strong></td>\n<td>Структура тіла запиту, заголовки, query-параметри</td>\n</tr>\n<tr>\n<td><strong>Відповідь</strong></td>\n<td>Структура успішної відповіді, HTTP-статус</td>\n</tr>\n<tr>\n<td><strong>Помилки</strong></td>\n<td>Можливі статуси помилок та структура повідомлення</td>\n</tr>\n<tr>\n<td><strong>Авторизація</strong></td>\n<td>Чи потрібен токен, які ролі мають доступ</td>\n</tr>\n</tbody></table>\n<h2>📝 Приклад контракту</h2>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// Контракт для створення задачі</span>\n<span class=\"hljs-variable constant_\">POST</span> /api/tasks\n<span class=\"hljs-title class_\">Authorization</span>: <span class=\"hljs-title class_\">Bearer</span> &lt;token&gt;\n<span class=\"hljs-title class_\">Content</span>-<span class=\"hljs-title class_\">Type</span>: application/json\n\n<span class=\"hljs-comment\">// Запит</span>\n{\n  <span class=\"hljs-string\">\"title\"</span>: <span class=\"hljs-string\">\"Вивчити CORS\"</span>,\n  <span class=\"hljs-string\">\"description\"</span>: <span class=\"hljs-string\">\"Прочитати MDN\"</span>\n}\n\n<span class=\"hljs-comment\">// Відповідь 201 Created</span>\n{\n  <span class=\"hljs-string\">\"id\"</span>: <span class=\"hljs-number\">42</span>,\n  <span class=\"hljs-string\">\"title\"</span>: <span class=\"hljs-string\">\"Вивчити CORS\"</span>,\n  <span class=\"hljs-string\">\"description\"</span>: <span class=\"hljs-string\">\"Прочитати MDN\"</span>,\n  <span class=\"hljs-string\">\"completed\"</span>: <span class=\"hljs-literal\">false</span>,\n  <span class=\"hljs-string\">\"createdAt\"</span>: <span class=\"hljs-string\">\"2026-05-13T10:00:00Z\"</span>\n}\n\n<span class=\"hljs-comment\">// Можливі помилки</span>\n<span class=\"hljs-comment\">// 400 Bad Request — невалідні дані</span>\n<span class=\"hljs-comment\">// 401 Unauthorized — токен відсутній або недійсний</span></code></pre><div class=\"tip\"><strong>💡 OpenAPI / Swagger</strong> <p>Стандартний спосіб формалізації контракту API — специфікація <strong>OpenAPI</strong> (раніше Swagger). Вона дозволяє автоматично генерувати документацію, моки сервера та клієнтський код.</p>\n</div>\n\n","<h1>🌳 Архітектура Full-Stack проєкту</h1>\n<p><strong>Головна ідея:</strong> Існує кілька підходів до організації коду frontend та backend в одному проєкті. Вибір залежить від розміру команди, складності та етапу розвитку продукту.</p>\n<h2>📂 Варіант 1: Окремі репозиторії</h2>\n<pre><code class=\"language-plaintext hljs\" data-highlighted=\"yes\">backend-repo/\n├── src/\n└── package.json\n\nfrontend-repo/\n├── src/\n└── package.json</code></pre><p><strong>Переваги:</strong> незалежний деплой, ізольовані команди, прості CI/CD пайплайни.</p>\n<p><strong>Недоліки:</strong> дублювання типів, складна синхронізація змін, окремі релізні цикли.</p>\n<h2>📂 Варіант 2: Монорепозиторій</h2>\n<pre><code class=\"language-plaintext hljs\" data-highlighted=\"yes\">project/\n├── packages/\n│   ├── backend/\n│   ├── frontend/\n│   └── shared/\n├── package.json\n└── pnpm-workspace.yaml</code></pre><p><strong>Переваги:</strong> спільні типи, єдине сховище історії, синхронні зміни в коді API та клієнта.</p>\n<p><strong>Недоліки:</strong> складніша конфігурація збірки, обережність у CI/CD.</p>\n<h2>📂 Варіант 3: Frontend усередині Backend</h2>\n<pre><code class=\"language-plaintext hljs\" data-highlighted=\"yes\">project/\n├── src/                  # Nest.js\n├── client/               # React-проєкт\n│   ├── src/\n│   └── dist/             # Збірка → віддається статикою з Nest.js\n└── package.json</code></pre><p><strong>Переваги:</strong> один деплой, відсутність CORS у продакшні.</p>\n<p><strong>Недоліки:</strong> негнучкість, важко масштабувати окремо frontend та backend.</p>\n<div class=\"tip\"><strong>💡 Рекомендація</strong> <p>Для навчальних і середніх проєктів <strong>монорепозиторій</strong> — оптимальний вибір. Він дає переваги спільних типів без надмірної складності.</p>\n</div>\n\n","<h1>🚀 Стратегії деплойменту</h1>\n<p><strong>Головна ідея:</strong> У продакшні frontend та backend часто розгортаються на різних інфраструктурах. Розуміння цих стратегій впливає на дизайн API та налаштування CORS.</p>\n<h2>🌐 Стратегія 1: Різні домени</h2>\n<pre><code class=\"language-plaintext hljs\" data-highlighted=\"yes\">Frontend: https://app.example.com   (Vercel, Netlify, S3+CloudFront)\nBackend:  https://api.example.com   (AWS, DigitalOcean, Heroku)</code></pre><ul>\n<li>Класичний підхід для SPA</li>\n<li>Frontend на CDN — швидкий, дешевий</li>\n<li><strong>Потрібен CORS</strong> на backend для <code>app.example.com</code></li>\n</ul>\n<h2>🌐 Стратегія 2: Спільний домен з reverse proxy</h2>\n<pre><code class=\"language-plaintext hljs\" data-highlighted=\"yes\">Frontend: https://example.com/        → роздається з backend або CDN\nBackend:  https://example.com/api/*   → проксіюється на backend</code></pre>\n<div class=\"mermaid\" data-source=\"graph LR\n    USER[👤 Користувач] --&gt; NGINX[&quot;🔀 Nginx\nexample.com&quot;]\n    NGINX --&gt;|&quot;/api/*&quot;| BE[🚀 Backend]\n    NGINX --&gt;|&quot;/*&quot;| FE[&quot;📦 Static files\nReact build&quot;]\n    style USER fill:#fff9c4,stroke:#f9a825\n    style NGINX fill:#fff3e0,stroke:#ef6c00\n    style BE fill:#e8f5e9,stroke:#388e3c\n    style FE fill:#e3f2fd,stroke:#1565c0\"><svg id=\"exp-1778735932021-15-0\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg <g class=\"node default  \" id=\"exp-1778735932021-15-0-flowchart-NGINX-1\" data-look=\"classic\" transform=\"translate(286.859375, 87)\"><rect class=\"basic label-container\" style=\"fill:#fff3e0 !important;stroke:#ef6c00 !important\" x=\"-72.125\" y=\"-36\" width=\"144.25\" height=\"72\"></rect><g class=\"label\" style=\"\" transform=\"translate(-48.125, -24)\"><rect></rect><foreignObject width=\"96.25\" height=\"48\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>🔀 Nginx<br>example.com</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1778735932021-15-0-flowchart-BE-3\" data-look=\"classic\" transform=\"translate(522.8515625, 32)\"><rect class=\"basic label-container\" style=\"fill:#e8f5e9 !important;stroke:#388e3c !important\" x=\"-65.44921875\" y=\"-24\" width=\"130.8984375\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-41.44921875, -12)\"><rect></rect><foreignObject width=\"82.8984375\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>🚀 Backend</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1778735932021-15-0-flowchart-FE-5\" data-look=\"classic\" transform=\"translate(522.8515625, 142)\"><rect class=\"basic label-container\" style=\"fill:#e3f2fd !important;stroke:#1565c0 !important\" x=\"-71.8984375\" y=\"-36\" width=\"143.796875\" height=\"72\"></rect><g class=\"label\" style=\"\" transform=\"translate(-47.8984375, -24)\"><rect></rect><foreignObject width=\"95.796875\" height=\"48\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>📦 Static files<br>React build</p></span></div></foreignObject></g></g></g></g></g><defs><filter id=\"exp-1778735932021-15-0-drop-shadow\" height=\"130%\" width=\"130%\"><feDropShadow dx=\"4\" dy=\"4\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs><defs><filter id=\"exp-1778735932021-15-0-drop-shadow-small\" height=\"150%\" width=\"150%\"><feDropShadow dx=\"2\" dy=\"2\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs></svg></div>\n<ul>\n<li>Один origin — <strong>CORS не потрібен</strong></li>\n<li>Однакові правила для cookies</li>\n<li>Складніше масштабувати</li>\n</ul>\n<h2>🌐 Стратегія 3: Backend віддає frontend</h2>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// main.ts</span>\n<span class=\"hljs-keyword\">import</span> { join } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"path\"</span>;\n<span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">NestExpressApplication</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"@nestjs/platform-express\"</span>;\n\n<span class=\"hljs-keyword\">async</span> <span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">bootstrap</span>(<span class=\"hljs-params\"></span>) {\n  <span class=\"hljs-keyword\">const</span> app = <span class=\"hljs-keyword\">await</span> <span class=\"hljs-title class_\">NestFactory</span>.<span class=\"hljs-property\">create</span>&lt;<span class=\"hljs-title class_\">NestExpressApplication</span>&gt;(<span class=\"hljs-title class_\">AppModule</span>);\n  app.<span class=\"hljs-title function_\">useStaticAssets</span>(<span class=\"hljs-title function_\">join</span>(__dirname, <span class=\"hljs-string\">\"..\"</span>, <span class=\"hljs-string\">\"client\"</span>, <span class=\"hljs-string\">\"dist\"</span>));\n  <span class=\"hljs-keyword\">await</span> app.<span class=\"hljs-title function_\">listen</span>(<span class=\"hljs-number\">3000</span>);\n}</code></pre><ul>\n<li>Найпростіший варіант для невеликих проєктів</li>\n<li>Один сервер, одна конфігурація</li>\n<li>Не підходить для високих навантажень</li>\n</ul>\n","<h1>🔐 Cookies vs Bearer токени: вибір механізму</h1>\n<p><strong>Головна ідея:</strong> Спосіб передачі автентифікаційних даних впливає на налаштування CORS і безпеки.</p>\n<h2>🔄 Порівняння підходів</h2>\n<table>\n<thead>\n<tr>\n<th>Аспект</th>\n<th>JWT у localStorage</th>\n<th>JWT у HttpOnly Cookie</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Передача</td>\n<td>Заголовок <code>Authorization</code></td>\n<td>Автоматично з cookie</td>\n</tr>\n<tr>\n<td>Захист від XSS</td>\n<td>❌ Доступний JavaScript</td>\n<td>✅ HttpOnly прихований</td>\n</tr>\n<tr>\n<td>Захист від CSRF</td>\n<td>✅ Не надсилається сам</td>\n<td>⚠️ Потрібен CSRF-токен</td>\n</tr>\n<tr>\n<td>CORS налаштування</td>\n<td>Простіше</td>\n<td>Потрібен <code>credentials: true</code></td>\n</tr>\n<tr>\n<td>Sub-domain підтримка</td>\n<td>Простіше</td>\n<td>Потрібне налаштування домену</td>\n</tr>\n</tbody></table>\n<h2>🍪 Налаштування CORS для cookies</h2>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// Backend</span>\napp.<span class=\"hljs-title function_\">enableCors</span>({\n  <span class=\"hljs-attr\">origin</span>: <span class=\"hljs-string\">\"http://localhost:5173\"</span>,\n  <span class=\"hljs-attr\">credentials</span>: <span class=\"hljs-literal\">true</span>,             <span class=\"hljs-comment\">// 🔑 Обов'язково</span>\n});\n\n<span class=\"hljs-comment\">// Frontend (fetch)</span>\n<span class=\"hljs-title function_\">fetch</span>(<span class=\"hljs-string\">\"/api/tasks\"</span>, {\n  <span class=\"hljs-attr\">credentials</span>: <span class=\"hljs-string\">\"include\"</span>,        <span class=\"hljs-comment\">// 🔑 Обов'язково</span>\n});\n\n<span class=\"hljs-comment\">// Frontend (axios)</span>\naxios.<span class=\"hljs-property\">defaults</span>.<span class=\"hljs-property\">withCredentials</span> = <span class=\"hljs-literal\">true</span>;</code></pre><div class=\"warning\"><strong>⚠️ Обмеження</strong> <p>При <code>credentials: true</code> заборонено використовувати <code>origin: \"*\"</code>. Сервер має явно вказати конкретний origin.</p>\n</div>\n\n","<h1>⚠️ Поширені помилки інтеграції</h1>\n<p><strong>Головна ідея:</strong> Розуміння типових помилок прискорює діагностику проблем інтеграції.</p>\n<h2>🚫 Помилка 1: CORS не налаштований</h2>\n<pre><code class=\"language-plaintext hljs\" data-highlighted=\"yes\">Access to fetch at 'http://localhost:3000/api/tasks'\nfrom origin 'http://localhost:5173' has been blocked by CORS policy</code></pre><p><strong>Причина:</strong> Backend не повертає заголовок <code>Access-Control-Allow-Origin</code>.</p>\n<p><strong>Рішення:</strong> Додати <code>app.enableCors()</code> у <code>main.ts</code>.</p>\n<h2>🚫 Помилка 2: Невідповідність API URL</h2>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// .env (frontend)</span>\n<span class=\"hljs-variable constant_\">VITE_API_URL</span>=<span class=\"hljs-attr\">http</span>:<span class=\"hljs-comment\">//localhost:3000</span>\n\n<span class=\"hljs-comment\">// Код</span>\n<span class=\"hljs-title function_\">fetch</span>(<span class=\"hljs-string\">`<span class=\"hljs-subst\">${<span class=\"hljs-keyword\">import</span>.meta.env.VITE_API_URL}</span>/api/tasks`</span>);\n<span class=\"hljs-comment\">// Запит: http://localhost:3000/api/tasks</span></code></pre><p><strong>Поширене непорозуміння:</strong> дублювання <code>/api</code> або його втрата. Слід узгодити, чи входить <code>/api</code> у <code>VITE_API_URL</code> або додається в коді.</p>\n<h2>🚫 Помилка 3: Cookies не приходять</h2>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// ❌ Cookies не надсилаються</span>\n<span class=\"hljs-title function_\">fetch</span>(<span class=\"hljs-string\">\"/api/me\"</span>);\n\n<span class=\"hljs-comment\">// ✅ Cookies надсилаються</span>\n<span class=\"hljs-title function_\">fetch</span>(<span class=\"hljs-string\">\"/api/me\"</span>, { <span class=\"hljs-attr\">credentials</span>: <span class=\"hljs-string\">\"include\"</span> });</code></pre><p><strong>Причина:</strong> При cross-origin запитах fetch за замовчуванням не надсилає cookies. Потрібно явно вказати <code>credentials: \"include\"</code>, а сервер має повертати <code>Access-Control-Allow-Credentials: true</code>.</p>\n<h2>🚫 Помилка 4: Змінні Vite без префіксу</h2>\n<pre><code class=\"language-bash hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\"># ❌ Не буде доступна у клієнтському коді</span>\nAPI_URL=http://localhost:3000\n\n<span class=\"hljs-comment\"># ✅ Доступна</span>\nVITE_API_URL=http://localhost:3000</code></pre><div class=\"tip\"><strong>💡 Діагностика</strong> <p>Перш ніж шукати складні причини, перевірте Network-вкладку DevTools: чи надсилається запит, який його статус, які заголовки запиту та відповіді. У 80% випадків відповідь видно одразу.</p>\n</div>\n\n","<h1>🧪 Налагодження CORS-проблем</h1>\n<p><strong>Головна ідея:</strong> CORS-проблеми мають характерні ознаки в DevTools. Систематичний підхід прискорює їх вирішення.</p>\n<h2>🔍 Чек-лист діагностики</h2>\n\n<div class=\"mermaid\" data-source=\"graph TD\n    START[⚠️ Запит не працює] --&gt; CHECK1{Чи надіслано запит?}\n    CHECK1 --&gt;|Ні| URL[&quot;Перевірити URL у коді\nта змінні середовища&quot;]\n    CHECK1 --&gt;|Так| CHECK2{Який статус відповіді?}\n    CHECK2 --&gt;|Network Error| CORS_BLOCK[&quot;CORS заблокував\nперевірити Console&quot;]\n    CHECK2 --&gt;|4xx / 5xx| SERVER[&quot;Помилка сервера\nчитати тіло відповіді&quot;]\n    CHECK2 --&gt;|200 OK, але код не виконується| READ[&quot;Браузер блокує читання\nперевірити CORS-заголовки&quot;]\n    CORS_BLOCK --&gt; HEADERS[&quot;Перевірити Response Headers\nAccess-Control-Allow-Origin&quot;]\n    HEADERS --&gt; FIX[Налаштувати CORS на сервері]\n    style START fill:#fce4ec,stroke:#c2185b\n    style FIX fill:#e8f5e9,stroke:#388e3c\"><svg id=\"exp-1778735932028-18-0\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" class=\"flowchart\" style=\"max-width: 789.66796875px;\" viewBox=\"0 0 789.66796875 1086.3265380859375\" role=\"graphics-document document\" aria-roledescription=\"flowchart-v2\"><style>#exp-1778735932028-18-0{font-family:system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,Arial,sans-serif;font-size:16px;fill:#333;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#exp-1778735932028-18-0 .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#exp-1778735932028-18-0 .edge-animation-fast{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 20s linear infinite;stroke-linecap:round;}#exp-1778735932028-18-0 .error-icon{fill:#552222;}#exp-1778735932028-18-0 .error-text{fill:#552222;stroke:#552222;}#exp-1778735932028-18-0 .edge-thickness-normal{stroke-width:1px;}#exp-1778735932028-18-0 .edge-thickness-thick{stroke-width:3.5px;}#exp-1778735932028-18-0 .edge-pattern-solid{stroke-dasharray:0;}#exp-1778735932028-18-0 .edge-thickness-invisible{stroke-width:0;fill:none;}#exp-1778735932028-18-0 .edge-pattern-dashed{stroke-dasharray:3;}#exp-1778735932028-18-0 .edge-pattern-dotted{stroke-dasharray:2;}#exp-1778735932028-18-0 .marker{fill:#333333;stroke:#333333;}#exp-1778735932028-18-0 .marker.cross{stroke:#333333;}#exp-1778735932028-18-0 svg{font-family:system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,Arial,sans-serif;font-size:16px;}#exp-1778735932028-18-0 p{margin:0;}#exp-1778735932028-18-0 .label{font-family:system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,Arial,sans-serif;color:#333;}#exp-1778735932028-18-0 .cluster-label text{fill:#3 "><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;\"><span class=\"nodeLabel \"><p>Налаштувати CORS на сервері</p></span></div></foreignObject></g></g></g></g></g><defs><filter id=\"exp-1778735932028-18-0-drop-shadow\" height=\"130%\" width=\"130%\"><feDropShadow dx=\"4\" dy=\"4\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs><defs><filter id=\"exp-1778735932028-18-0-drop-shadow-small\" height=\"150%\" width=\"150%\"><feDropShadow dx=\"2\" dy=\"2\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs></svg></div>\n<h2>🔧 Як читати DevTools</h2>\n<ol>\n<li><strong>Вкладка Console:</strong> повідомлення про CORS виводяться тут.</li>\n<li><strong>Вкладка Network:</strong> вибрати проблемний запит, перевірити заголовки.</li>\n<li><strong>Headers → Response Headers:</strong> наявність <code>Access-Control-Allow-Origin</code>.</li>\n<li><strong>Headers → Request Headers:</strong> правильний <code>Origin</code> та <code>Authorization</code>.</li>\n</ol>\n<div class=\"tip\"><strong>💡 Швидка перевірка</strong> <p>Якщо запит <strong>виконується через curl/Postman, але не через браузер</strong> — це CORS. Сервер працює, але браузер не пускає JavaScript до відповіді.</p>\n</div>\n\n","<h1>✅ Ключові висновки</h1>\n<div class=\"success\"><strong>✅ Підсумок лекції</strong> <p><strong>📌 Що ми вивчили:</strong></p>\n<ol>\n<li><p><strong>Архітектура Full-Stack:</strong> frontend та backend — два незалежні застосунки, які взаємодіють через HTTP API</p>\n</li>\n<li><p><strong>Origin:</strong> комбінація протоколу, домену та порту; різні origin'и активують механізми безпеки браузера</p>\n</li>\n<li><p><strong>Змінні середовища:</strong> дозволяють розділити код і конфігурацію; у Vite потрібен префікс <code>VITE_</code>, у Nest.js використовується <code>ConfigModule</code></p>\n</li>\n<li><p><strong>Same-Origin Policy:</strong> базовий механізм безпеки браузера, що блокує читання відповідей з інших origin'ів</p>\n</li>\n<li><p><strong>CORS:</strong> механізм, що дозволяє серверу дати дозвіл на cross-origin запити через заголовки відповіді</p>\n</li>\n<li><p><strong>Vite Proxy:</strong> альтернатива CORS у розробці — проксіювання запитів через dev-сервер</p>\n</li>\n<li><p><strong>Спільні типи:</strong> монорепозиторій зі спільним пакетом усуває дублювання інтерфейсів між клієнтом і сервером</p>\n</li>\n<li><p><strong>Деплоймент:</strong> різні стратегії (окремі домени, reverse proxy, спільний сервер) впливають на налаштування CORS</p>\n</li>\n</ol>\n</div>\n\n","<h1>❓ Контрольні питання</h1>\n<ol>\n<li><p>🤔 Що таке origin і чим він відрізняється від URL? Наведіть приклади однакових і різних origin'ів.</p>\n</li>\n<li><p>🤔 Чому Same-Origin Policy існує у браузерах? Які атаки вона запобігає?</p>\n</li>\n<li><p>🤔 Що таке CORS і де він налаштовується — на клієнті чи на сервері? Чому?</p>\n</li>\n<li><p>🤔 Чим відрізняється простий CORS-запит від запиту з preflight? Що активує preflight?</p>\n</li>\n<li><p>🤔 Як працює Vite Proxy? Чому з його допомогою CORS не потрібен у розробці, але потрібен у продакшні?</p>\n</li>\n<li><p>🤔 Чому всі змінні середовища у Vite мають префікс <code>VITE_</code>? Що станеться, якщо зберегти секрет у такій змінній?</p>\n</li>\n<li><p>🤔 Які переваги має монорепозиторій зі спільним пакетом типів порівняно з окремими репозиторіями?</p>\n</li>\n<li><p>🤔 Як налаштувати CORS у Nest.js для роботи з cookies? Які зміни потрібні на стороні frontend?</p>\n</li>\n</ol>\n","<h1>📖 Глосарій термінів</h1>\n<table>\n<thead>\n<tr>\n<th>Термін</th>\n<th>English</th>\n<th>Визначення</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Походження</td>\n<td>Origin</td>\n<td>Комбінація протоколу, домену та порту</td>\n</tr>\n<tr>\n<td>Політика спільного походження</td>\n<td>Same-Origin Policy</td>\n<td>Обмеження браузера на взаємодію між origin'ами</td>\n</tr>\n<tr>\n<td>Cross-origin запит</td>\n<td>Cross-origin request</td>\n<td>Запит з одного origin до іншого</td>\n</tr>\n<tr>\n<td>Попередній запит</td>\n<td>Preflight request</td>\n<td>OPTIONS-запит браузера для перевірки CORS-дозволу</td>\n</tr>\n<tr>\n<td>Змінні середовища</td>\n<td>Environment variables</td>\n<td>Параметри, що зчитуються застосунком зі свого оточення</td>\n</tr>\n<tr>\n<td>Проксі</td>\n<td>Proxy</td>\n<td>Посередник, що перенаправляє запити</td>\n</tr>\n<tr>\n<td>Контракт API</td>\n<td>API contract</td>\n<td>Формальний опис інтерфейсу взаємодії клієнта та сервера</td>\n</tr>\n<tr>\n<td>Монорепозиторій</td>\n<td>Monorepository</td>\n<td>Один Git-репозиторій з кількома пов'язаними пакетами</td>\n</tr>\n<tr>\n<td>Reverse proxy</td>\n<td>Reverse proxy</td>\n<td>Сервер-посередник перед backend, що приймає запити клієнтів</td>\n</tr>\n<tr>\n<td>Хардкод</td>\n<td>Hardcoded</td>\n<td>Жорстко зафіксоване у коді значення, яке мало б бути конфігурованим</td>\n</tr>\n</tbody></table>\n","<h1>📖 Глосарій абревіатур</h1>\n<table>\n<thead>\n<tr>\n<th>Абревіатура</th>\n<th>Розшифровка</th>\n<th>Переклад</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>CORS</td>\n<td>Cross-Origin Resource Sharing</td>\n<td>Спільне використання ресурсів між origin'ами</td>\n</tr>\n<tr>\n<td>SOP</td>\n<td>Same-Origin Policy</td>\n<td>Політика спільного походження</td>\n</tr>\n<tr>\n<td>API</td>\n<td>Application Programming Interface</td>\n<td>Програмний інтерфейс застосунку</td>\n</tr>\n<tr>\n<td>URL</td>\n<td>Uniform Resource Locator</td>\n<td>Уніфікований локатор ресурсу</td>\n</tr>\n<tr>\n<td>HTTP</td>\n<td>HyperText Transfer Protocol</td>\n<td>Протокол передачі гіпертексту</td>\n</tr>\n<tr>\n<td>HTTPS</td>\n<td>HTTP Secure</td>\n<td>Захищений HTTP</td>\n</tr>\n<tr>\n<td>DTO</td>\n<td>Data Transfer Object</td>\n<td>Об'єкт передачі даних</td>\n</tr>\n<tr>\n<td>JWT</td>\n<td>JSON Web Token</td>\n<td>Веб-токен у форматі JSON</td>\n</tr>\n<tr>\n<td>SPA</td>\n<td>Single Page Application</td>\n<td>Односторінковий застосунок</td>\n</tr>\n<tr>\n<td>CDN</td>\n<td>Content Delivery Network</td>\n<td>Мережа доставки контенту</td>\n</tr>\n<tr>\n<td>XSS</td>\n<td>Cross-Site Scripting</td>\n<td>Міжсайтовий скриптинг</td>\n</tr>\n<tr>\n<td>CSRF</td>\n<td>Cross-Site Request Forgery</td>\n<td>Міжсайтова підробка запиту</td>\n</tr>\n<tr>\n<td>ENV</td>\n<td>Environment</td>\n<td>Середовище виконання</td>\n</tr>\n</tbody></table>\n"];let currentSlideIndex=0;
function renderMath(root){if(typeof renderMathInElement!=="function"||!root)return;try{renderMathInElement(root,{delimiters:[{left:"$$",right:"$$",display:true},{left:"\\[",right:"\\]",display:true},{left:"$",right:"$",display:false},{left:"\\(",right:"\\)",display:false}],throwOnError:false,strict:"ignore",ignoredTags:["script","noscript","style","textarea","pre","code"]});}catch(e){console.warn("Math render error:",e);}}
function showSlide(i){if(i<0||i>=slides.length)return;currentSlideIndex=i;const el=document.getElementById("current-slide");el.innerHTML=slides[i];el.scrollTop=0;renderMath(el);document.getElementById("progress-bar").style.width=((i+1)/slides.length*100)+"%";document.getElementById("slide-number").textContent=(i+1)+" / "+slides.length;updateSidebarActive();}
function nextSlide(){if(currentSlideIndex<slides.length-1)showSlide(currentSlideIndex+1);}
function previousSlide(){if(currentSlideIndex>0)showSlide(currentSlideIndex-1);}
function toggleSidebar(){document.getElementById("sidebar").classList.toggle("open");}
function toggleHelp(){document.getElementById("help-overlay").classList.toggle("hidden");}
function toggleFullscreen(){if(!document.fullscreenElement){const pc=document.getElementById("presentation-container");if(pc.requestFullscreen)pc.requestFullscreen();else if(pc.webkitRequestFullscreen)pc.webkitRequestFullscreen();else if(pc.msRequestFullscreen)pc.msRequestFullscreen();else if(pc.mozRequestFullScreen)pc.mozRequestFullScreen();}else{if(document.exitFullscreen)document.exitFullscreen();else if(document.webkitExitFullscreen)document.webkitExitFullscreen();else if(document.msExitFullscreen)document.msExitFullscreen();else if(document.mozCancelFullScreen)document.mozCancelFullScreen();}}
function generateSidebar(){const sc=document.getElementById("sidebar-content");sc.innerHTML="";slides.forEach((html,idx)=>{const t=document.createElement("div");t.className="slide-thumbnail";if(idx===0)t.classList.add("active");const tmp=document.createElement("div");tmp.innerHTML=html;const title=tmp.querySelector("h1,h2");const titleText=title?title.textContent:("Слайд "+(idx+1));const textContent=tmp.textContent.replace(/s+/g," ").trim();const preview=textContent.substring(0,100)+(textContent.length>100?"...":"");t.innerHTML="<div class=\"slide-thumbnail-number\">"+(idx+1)+"</div><div class=\"slide-thumbnail-title\">"+titleText+"</div><div class=\"slide-thumbnail-content\">"+preview+"</div>";t.onclick=()=>{showSlide(idx);if(window.innerWidth<1024)toggleSidebar();};sc.appendChild(t);});}
function updateSidebarActive(){document.querySelectorAll(".slide-thumbnail").forEach((th,idx)=>{if(idx===currentSlideIndex){th.classList.add("active");th.scrollIntoView({behavior:"smooth",block:"nearest"});}else th.classList.remove("active");});}
document.addEventListener("keydown",e=>{switch(e.key){case"ArrowLeft":previousSlide();break;case"ArrowRight":case" ":e.preventDefault();nextSlide();break;case"f":case"F":toggleFullscreen();break;case"s":case"S":toggleSidebar();break;case"?":toggleHelp();break;case"Escape":const sb=document.getElementById("sidebar");const ho=document.getElementById("help-overlay");if(sb.classList.contains("open"))toggleSidebar();else if(!ho.classList.contains("hidden"))ho.classList.add("hidden");break;}});
generateSidebar();showSlide(0);</script></body></html>
