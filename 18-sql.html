#presentation-container:fullscreen,#presentation-container:-webkit-full-screen,#presentation-container:-moz-full-screen,#presentation-container:-ms-fullscreen{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%)!important;}</style></head><body><div id="presentation-container"><div class="progress"><div class="progress-bar" id="progress-bar"></div></div><button id="sidebar-toggle" onclick="toggleSidebar()" title="Навігація слайдами (S)">☰</button><div id="sidebar"><div id="sidebar-header"><h3>📑 Слайди</h3><button id="sidebar-close" onclick="toggleSidebar()">✕</button></div><div id="sidebar-content"></div></div><div class="slide-container"><div class="slide" id="current-slide"></div></div><div class="controls"><button class="control-btn" onclick="previousSlide()" title="Попередній (←)">←</button><button class="control-btn" onclick="nextSlide()" title="Наступний (→)">→</button><button class="control-btn" onclick="toggleFullscreen()" title="Повноекранний режим (F)">⛶</button><button class="control-btn" onclick="toggleHelp()" title="Допомога (?)">?</button></div><div class="slide-number" id="slide-number">1 / 18</div><div id="help-overlay" class="hidden"><strong>Гарячі клавіші:</strong><br><kbd>←</kbd> <kbd>→</kbd> Навігація<br><kbd>F</kbd> Повноекранний режим<br><kbd>S</kbd> Sidebar<br><kbd>?</kbd> Допомога<br><kbd>Esc</kbd> Закрити</div></div><script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script><script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script><script>const slides=["<h1>Бази даних: SQL</h1>\n<p><strong>Сучасні технології Internet-програмування</strong></p>\n<p>Лектор: Кобилянський Антон</p>\n","<h1>📋 План лекції</h1>\n<ol>\n<li>🗄️ Навіщо потрібні бази даних</li>\n<li>🏗️ Реляційна модель та типи даних PostgreSQL</li>\n<li>📐 Проектування схеми: DDL</li>\n<li>🔗 Відносини: OneToOne</li>\n<li>🔗 Відносини: OneToMany та ManyToOne</li>\n<li>🔗 Відносини: ManyToMany</li>\n<li>✍️ Маніпуляція даними: INSERT</li>\n<li>🔍 Вибірка даних: SELECT</li>\n<li>🔄 Логічний порядок виконання SELECT</li>\n<li>✏️ UPDATE та DELETE</li>\n<li>🔀 Об'єднання таблиць: JOIN</li>\n<li>📊 Агрегатні функції та GROUP BY</li>\n<li>✅ Ключові висновки та контрольні питання</li>\n</ol>\n","<h1>🗄️ Навіщо потрібні бази даних</h1>\n<div class=\"info\"><strong>ℹ️ Проблема</strong> <p>До цього моменту всі сервіси зберігали дані <strong>в пам'яті процесу</strong> — у звичайних масивах і об'єктах Node.js. Щойно сервер перезапускається — всі дані зникають назавжди.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> база даних — це надійне, структуроване та незалежне від застосунку сховище даних, яке живе власним життям.</p>\n<h2>⚖️ In-memory зберігання vs база даних</h2>\n<table>\n<thead>\n<tr>\n<th>Критерій</th>\n<th>In-memory (масив)</th>\n<th>База даних</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Збереження при перезапуску</td>\n<td>❌ Дані зникають</td>\n<td>✅ Дані зберігаються назавжди</td>\n</tr>\n<tr>\n<td>Обсяг даних</td>\n<td>Обмежений оперативною пам'яттю</td>\n<td>Практично необмежений (диск)</td>\n</tr>\n<tr>\n<td>Пошук та фільтрація</td>\n<td>Ручний код: <code>array.filter(...)</code></td>\n<td>Вбудований SQL із оптимізацією</td>\n</tr>\n<tr>\n<td>Одночасний доступ</td>\n<td>Не масштабується: кожен процес має власну копію даних</td>\n<td>✅ СУБД управляє конкурентністю</td>\n</tr>\n<tr>\n<td>Цілісність даних</td>\n<td>Ручна валідація в коді</td>\n<td>Constraints на рівні схеми БД</td>\n</tr>\n<tr>\n<td>Відновлення після збою</td>\n<td>❌ Неможливо</td>\n<td>✅ Транзакції та журналювання</td>\n</tr>\n</tbody></table>\n<h2>🏛️ Що таке СУБД та PostgreSQL</h2>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>СУБД</strong> (Система управління базами даних) — програмне забезпечення, що забезпечує зберігання, організацію та доступ до даних. <strong>PostgreSQL</strong> — одна з найпотужніших реляційних СУБД з відкритим кодом, яка активно використовується у промисловій розробці.</p>\n</div>\n\n\n\n<p><strong>Реляційна база даних</strong> організовує дані у вигляді <strong>таблиць</strong>. Кожна таблиця описує одну сутність (users, tasks, tags), кожен рядок — один конкретний запис, кожна колонка — одна властивість цього запису. Зв'язки між сутностями описуються через <strong>зовнішні ключі</strong>.</p>\n<div class=\"tip\"><strong>💡 Чому PostgreSQL?</strong> <p>PostgreSQL безкоштовний, надійний, підтримує складні запити, JSON, повнотекстовий пошук та є стандартом у більшості сучасних стартапів та компаній. TypeORM — ORM, яку ми вивчатимемо далі — має першокласну підтримку PostgreSQL.</p>\n</div>\n\n","<h1>🏗️ Типи даних PostgreSQL</h1>\n<p><strong>Головна ідея:</strong> кожна колонка таблиці має <strong>строго визначений тип</strong>. Це означає, що база даних не дозволить записати текст у числову колонку або дату у булеве поле — цілісність гарантована на рівні схеми, а не лише в коді застосунку.</p>\n<h2>📊 Основні типи даних</h2>\n<table>\n<thead>\n<tr>\n<th>Категорія</th>\n<th>Тип</th>\n<th>Опис</th>\n<th>Приклад</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>🔢 Числа</td>\n<td><code>INTEGER</code></td>\n<td>Ціле 32-біт (-2.1 млрд до 2.1 млрд)</td>\n<td><code>42</code></td>\n</tr>\n<tr>\n<td>🔢 Числа</td>\n<td><code>BIGINT</code></td>\n<td>Ціле 64-біт (дуже великі числа)</td>\n<td><code>9000000000</code></td>\n</tr>\n<tr>\n<td>🔢 Числа</td>\n<td><code>DECIMAL(p,s)</code></td>\n<td>Точне дробове (фінансові розрахунки), синонім <code>NUMERIC</code></td>\n<td><code>99.99</code></td>\n</tr>\n<tr>\n<td>📝 Текст</td>\n<td><code>VARCHAR(n)</code></td>\n<td>Рядок з обмеженням довжини до n символів</td>\n<td><code>'hello'</code></td>\n</tr>\n<tr>\n<td>📝 Текст</td>\n<td><code>TEXT</code></td>\n<td>Рядок необмеженої довжини</td>\n<td><code>'будь-який текст'</code></td>\n</tr>\n<tr>\n<td>✅ Логічний</td>\n<td><code>BOOLEAN</code></td>\n<td>Істина або хиба</td>\n<td><code>true</code>, <code>false</code></td>\n</tr>\n<tr>\n<td>📅 Дата/час</td>\n<td><code>TIMESTAMP</code></td>\n<td>Дата і час без інформації про часовий пояс</td>\n<td><code>2025-01-15 10:30:00</code></td>\n</tr>\n<tr>\n<td>📅 Дата/час</td>\n<td><code>TIMESTAMPTZ</code></td>\n<td>Дата і час зі збереженням часового поясу</td>\n<td><code>2025-01-15 10:30:00+02</code></td>\n</tr>\n<tr>\n<td>🆔 Ключі</td>\n<td><code>SERIAL</code></td>\n<td>Автоінкрементний INTEGER (1, 2, 3...)</td>\n<td><code>1</code>, <code>2</code>, <code>3</code></td>\n</tr>\n<tr>\n<td>🆔 Ключі</td>\n<td><code>UUID</code></td>\n<td>Глобально унікальний ідентифікатор</td>\n<td><code>a1b2c3d4-...</code></td>\n</tr>\n</tbody></table>\n<div class=\"tip\"><strong>💡 TEXT vs VARCHAR</strong> <p>У PostgreSQL <code>TEXT</code> та <code>VARCHAR</code> мають <strong>однакову продуктивність</strong> — це особливість PostgreSQL на відміну від інших СУБД. <code>VARCHAR(n)</code> додає лише обмеження на довжину. Тому для більшості текстових полів зручніше використовувати <code>TEXT</code>.</p>\n</div>\n\n\n\n\n\n<div class=\"tip\"><strong>💡 SERIAL vs UUID</strong> <p><code>SERIAL</code> — простий автоінкремент: 1, 2, 3. Зручний, передбачуваний, але id можна вгадати. <code>UUID</code> — глобально унікальний: підходить для розподілених систем або коли id не повинен бути передбачуваним з міркувань безпеки.</p>\n</div>\n\n\n\n\n\n<div class=\"note\"><strong>📝 SERIAL — псевдотип</strong> <p><code>SERIAL</code> — це синтаксичний цукор: під капотом PostgreSQL створює колонку <code>INTEGER</code> та прив'язує до неї автоматичну послідовність (<code>SEQUENCE</code>). Починаючи з PostgreSQL 10, стандартною альтернативою є <code>GENERATED ALWAYS AS IDENTITY</code>, яку можна зустріти у сучасних проєктах. У цьому курсі використовуємо <code>SERIAL</code> як більш компактний і поширений варіант.</p>\n</div>\n\n\n\n\n\n<div class=\"warning\"><strong>⚠️ TIMESTAMP vs TIMESTAMPTZ</strong> <p>Завжди надавайте перевагу <code>TIMESTAMPTZ</code>. <code>TIMESTAMP</code> зберігає дату без часового поясу — при зміні налаштувань сервера або переїзді на інший хостинг дані можуть бути інтерпретовані некоректно.</p>\n</div>\n\n","<h1>📐 DDL: CREATE TABLE та Constraints</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>DDL</strong> (Data Definition Language) — мова опису структури даних. Включає команди <code>CREATE TABLE</code>, <code>ALTER TABLE</code>, <code>DROP TABLE</code>. DDL описує <strong>що</strong> зберігається і <strong>які правила</strong> діють на дані.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> перш ніж записати перший рядок даних, потрібно описати <strong>схему</strong> таблиці — назви колонок, їх типи та обмеження. Схема — це контракт між базою даних та застосунком.</p>\n<h2>💻 Синтаксис CREATE TABLE</h2>\n<pre><code class=\"language-sql hljs\" data-highlighted=\"yes\"><span class=\"hljs-keyword\">CREATE</span> <span class=\"hljs-keyword\">TABLE</span> tasks (\n  id          SERIAL        <span class=\"hljs-keyword\">PRIMARY</span> KEY,\n  title       TEXT          <span class=\"hljs-keyword\">NOT</span> <span class=\"hljs-keyword\">NULL</span>,\n  description TEXT,                          <span class=\"hljs-comment\">-- NULL дозволено (опис необов'язковий)</span>\n  status      <span class=\"hljs-type\">VARCHAR</span>(<span class=\"hljs-number\">20</span>)   <span class=\"hljs-keyword\">NOT</span> <span class=\"hljs-keyword\">NULL</span> <span class=\"hljs-keyword\">DEFAULT</span> <span class=\"hljs-string\">'todo'</span>\n                            <span class=\"hljs-keyword\">CHECK</span> (status <span class=\"hljs-keyword\">IN</span> (<span class=\"hljs-string\">'todo'</span>, <span class=\"hljs-string\">'in_progress'</span>, <span class=\"hljs-string\">'done'</span>, <span class=\"hljs-string\">'cancelled'</span>)),\n  priority    <span class=\"hljs-type\">VARCHAR</span>(<span class=\"hljs-number\">20</span>)   <span class=\"hljs-keyword\">NOT</span> <span class=\"hljs-keyword\">NULL</span> <span class=\"hljs-keyword\">DEFAULT</span> <span class=\"hljs-string\">'medium'</span>\n                            <span class=\"hljs-keyword\">CHECK</span> (priority <span class=\"hljs-keyword\">IN</span> (<span class=\"hljs-string\">'low'</span>, <span class=\"hljs-string\">'medium'</span>, <span class=\"hljs-string\">'high'</span>, <span class=\"hljs-string\">'critical'</span>)),\n  created_at  TIMESTAMPTZ   <span class=\"hljs-keyword\">NOT</span> <span class=\"hljs-keyword\">NULL</span> <span class=\"hljs-keyword\">DEFAULT</span> NOW()\n);</code></pre><h2>🔒 Constraints — обмеження цілісності</h2>\n<table>\n<thead>\n<tr>\n<th>Constraint</th>\n<th>Призначення</th>\n<th>Приклад</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>PRIMARY KEY</code></td>\n<td>Унікальний ідентифікатор рядка, автоматично <code>NOT NULL</code></td>\n<td><code>id SERIAL PRIMARY KEY</code></td>\n</tr>\n<tr>\n<td><code>NOT NULL</code></td>\n<td>Поле обов'язкове — порожнє значення заборонено</td>\n<td><code>title TEXT NOT NULL</code></td>\n</tr>\n<tr>\n<td><code>UNIQUE</code></td>\n<td>Значення не повторюється в межах усієї таблиці</td>\n<td><code>email TEXT UNIQUE</code></td>\n</tr>\n<tr>\n<td><code>DEFAULT value</code></td>\n<td>Значення підставляється автоматично, якщо не вказано</td>\n<td><code>DEFAULT NOW()</code></td>\n</tr>\n<tr>\n<td><code>CHECK (умова)</code></td>\n<td>Довільна умова на значення поля</td>\n<td><code>CHECK (priority IN ('low','medium','high'))</code></td>\n</tr>\n<tr>\n<td><code>REFERENCES</code></td>\n<td>Зовнішній ключ — посилання на рядок іншої таблиці</td>\n<td><code>REFERENCES users(id)</code></td>\n</tr>\n</tbody></table>\n<div class=\"note\"><strong>📝 ALTER TABLE та DROP TABLE</strong> <p><code>ALTER TABLE tasks ADD COLUMN due_date TIMESTAMPTZ</code> — додати колонку. <code>DROP TABLE tasks</code> — знищити таблицю разом з усіма даними. На практиці зміни схеми виконуються через <strong>міграції</strong> — версіоновані, керовані скрипти, якими займається TypeORM.</p>\n</div>\n\n","<h1>🔗 Відносини: OneToOne</h1>\n<p><strong>Головна ідея:</strong> OneToOne означає, що кожен запис таблиці A пов'язаний <strong>рівно з одним</strong> записом таблиці B — і навпаки. Використовується для логічного розділення даних однієї сутності на дві таблиці з різними характеристиками доступу.</p>\n<h2>🤔 Навіщо розділяти?</h2>\n<p>Уявімо таблицю <code>users</code>. Дані для аутентифікації (email, password_hash) читаються <strong>при кожному запиті</strong> до API. Профільні дані (full_name, avatar_url, bio) потрібні значно рідше — лише на сторінці профілю. Розділення дозволяє тримати \"гарячу\" таблицю компактною та швидкою.</p>\n<h2>📐 Схема: users → user_profiles</h2>\n\n<div class=\"mermaid\" data-source=\"graph LR\n    U[&quot;👤 users&lt;br/&gt;id PK&lt;br/&gt;email UNIQUE NOT NULL&lt;br/&gt;password_hash NOT NULL&lt;br/&gt;created_at&quot;] --&gt;|&quot;1 : 1&quot;| P[&quot;📋 user_profiles&lt;br/&gt;id PK&lt;br/&gt;user_id FK UNIQUE&lt;br/&gt;full_name NOT NULL&lt;br/&gt;avatar_url&quot;]\n    style U fill:#e3f2fd,stroke:#1565c0\n    style P fill:#e8f5e9,stroke:#388e3c\"><svg id=\"exp-1775675463421-5-0\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" class=\"flowchart\" style=\"max-width: 541.3203125px;\" viewBox=\"0 0 541.3203125 160\" role=\"graphics-document document\" aria-roledescription=\"flowchart-v2\"><style>#exp-1775675463421-5-0{font-family:system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,Arial,sans-serif;font-size:16px;fill:#333;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#exp-1775675463421-5-0 .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#exp-1775675463421-5-0 .edge-animation-fast{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 20s linear infinite;stroke-linecap:round;}#exp-1775675463421-5-0 .error-icon{fill:#552222;}#exp-1775675463421-5-0 .error-text{fill:#552222;stroke:#552222;}#exp-1775675463421-5-0 .edge-thickness-norm </g></g></g></g><defs><filter id=\"exp-1775675463421-5-0-drop-shadow\" height=\"130%\" width=\"130%\"><feDropShadow dx=\"4\" dy=\"4\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs><defs><filter id=\"exp-1775675463421-5-0-drop-shadow-small\" height=\"150%\" width=\"150%\"><feDropShadow dx=\"2\" dy=\"2\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs></svg></div>\n<h2>💻 SQL</h2>\n<pre><code class=\"language-sql hljs\" data-highlighted=\"yes\"><span class=\"hljs-keyword\">CREATE</span> <span class=\"hljs-keyword\">TABLE</span> users (\n  id            SERIAL      <span class=\"hljs-keyword\">PRIMARY</span> KEY,\n  email         TEXT        <span class=\"hljs-keyword\">NOT</span> <span class=\"hljs-keyword\">NULL</span> <span class=\"hljs-keyword\">UNIQUE</span>,\n  password_hash TEXT        <span class=\"hljs-keyword\">NOT</span> <span class=\"hljs-keyword\">NULL</span>,\n  created_at    TIMESTAMPTZ <span class=\"hljs-keyword\">NOT</span> <span class=\"hljs-keyword\">NULL</span> <span class=\"hljs-keyword\">DEFAULT</span> NOW()\n);\n\n<span class=\"hljs-keyword\">CREATE</span> <span class=\"hljs-keyword\">TABLE</span> user_profiles (\n  id         SERIAL  <span class=\"hljs-keyword\">PRIMARY</span> KEY,\n  <span class=\"hljs-comment\">-- UNIQUE гарантує OneToOne: кожен user має лише один profile</span>\n  user_id    <span class=\"hljs-type\">INTEGER</span> <span class=\"hljs-keyword\">NOT</span> <span class=\"hljs-keyword\">NULL</span> <span class=\"hljs-keyword\">UNIQUE</span> <span class=\"hljs-keyword\">REFERENCES</span> users(id) <span class=\"hljs-keyword\">ON</span> <span class=\"hljs-keyword\">DELETE</span> CASCADE,\n  full_name  TEXT    <span class=\"hljs-keyword\">NOT</span> <span class=\"hljs-keyword\">NULL</span>,\n  avatar_url TEXT    <span class=\"hljs-comment\">-- NULL означає \"аватар не завантажено\"</span>\n);</code></pre><div class=\"info\"><strong>ℹ️ Як UNIQUE на user_id забезпечує OneToOne</strong> <p><code>REFERENCES users(id)</code> гарантує, що <code>user_id</code> обов'язково існує в таблиці <code>users</code> — це зовнішній ключ. <code>UNIQUE</code> на <code>user_id</code> гарантує, що одне значення не зустрінеться двічі. Разом це означає: кожен рядок у <code>user_profiles</code> посилається на унікального користувача — один до одного.</p>\n</div>\n\n\n\n\n\n<div class=\"tip\"><strong>💡 ON DELETE CASCADE</strong> <p>При видаленні користувача з <code>users</code> — його профіль у <code>user_profiles</code> видаляється <strong>автоматично</strong>. Без <code>ON DELETE CASCADE</code> PostgreSQL заборонить видалення користувача, доки існує пов'язаний профіль.</p>\n</div>\n\n","<h1>🔗 Відносини: OneToMany та ManyToOne</h1>\n<p><strong>Головна ідея:</strong> OneToMany — один запис пов'язаний з <strong>багатьма</strong> іншими. Це найпоширеніший тип відношень у реляційних базах даних. Реалізується через зовнішній ключ на боці \"багатьох\".</p>\n<h2>🤔 Логіка відношення</h2>\n<p>Один користувач може мати <strong>багато задач</strong> — це OneToMany з боку <code>users</code>. Кожна задача належить <strong>одному</strong> користувачу — це ManyToOne з боку <code>tasks</code>. Це два погляди на одне і те саме відношення: зовнішній ключ <code>user_id</code> живе в таблиці <code>tasks</code>, тому що саме tasks — сторона \"багатьох\".</p>\n<h2>📐 Схема: users → tasks</h2>\n\n<div class=\"mermaid\" data-source=\"graph LR\n    U[&quot;👤 users&lt;br/&gt;id PK&lt;br/&gt;email&quot;] --&gt;|&quot;1 : N&quot;| T[&quot;📝 tasks&lt;br/&gt;id PK&lt;br/&gt;title NOT NULL&lt;br/&gt;status DEFAULT 'todo'&lt;br/&gt;priority DEFAULT 'medium'&lt;br/&gt;user_id FK → users.id&quot;]\n    style U fill:#e3f2fd,stroke:#1565c0\n    style T fill:#fff3e0,stroke:#ef6c00\"><svg id=\"exp-1775675463433-6-0\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" class=\"flowchart\" style=\"max-width: 451.7265625px;\" viewBox=\"0 0 451.7265625 184\" role fault  \" id=\"exp-1775675463433-6-0-flowchart-T-1\" data-look=\"classic\" transform=\"translate(322.5, 92)\"><rect class=\"basic label-container\" style=\"fill:#fff3e0 !important;stroke:#ef6c00 !important\" x=\"-121.2265625\" y=\"-84\" width=\"242.453125\" height=\"168\"></rect><g class=\"label\" style=\"\" transform=\"translate(-97.2265625, -72)\"><rect></rect><foreignObject width=\"194.453125\" height=\"144\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>📝 tasks<br>id PK<br>title NOT NULL<br>status DEFAULT 'todo'<br>priority DEFAULT 'medium'<br>user_id FK → users.id</p></span></div></foreignObject></g></g></g></g></g><defs><filter id=\"exp-1775675463433-6-0-drop-shadow\" height=\"130%\" width=\"130%\"><feDropShadow dx=\"4\" dy=\"4\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs><defs><filter id=\"exp-1775675463433-6-0-drop-shadow-small\" height=\"150%\" width=\"150%\"><feDropShadow dx=\"2\" dy=\"2\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs></svg></div>\n<h2>💻 SQL</h2>\n<pre><code class=\"language-sql hljs\" data-highlighted=\"yes\"><span class=\"hljs-keyword\">CREATE</span> <span class=\"hljs-keyword\">TABLE</span> tasks (\n  id          SERIAL      <span class=\"hljs-keyword\">PRIMARY</span> KEY,\n  title       TEXT        <span class=\"hljs-keyword\">NOT</span> <span class=\"hljs-keyword\">NULL</span>,\n  description TEXT,\n  status      <span class=\"hljs-type\">VARCHAR</span>(<span class=\"hljs-number\">20</span>) <span class=\"hljs-keyword\">NOT</span> <span class=\"hljs-keyword\">NULL</span> <span class=\"hljs-keyword\">DEFAULT</span> <span class=\"hljs-string\">'todo'</span>\n                          <span class=\"hljs-keyword\">CHECK</span> (status <span class=\"hljs-keyword\">IN</span> (<span class=\"hljs-string\">'todo'</span>, <span class=\"hljs-string\">'in_progress'</span>, <span class=\"hljs-string\">'done'</span>, <span class=\"hljs-string\">'cancelled'</span>)),\n  priority    <span class=\"hljs-type\">VARCHAR</span>(<span class=\"hljs-number\">20</span>) <span class=\"hljs-keyword\">NOT</span> <span class=\"hljs-keyword\">NULL</span> <span class=\"hljs-keyword\">DEFAULT</span> <span class=\"hljs-string\">'medium'</span>\n                          <span class=\"hljs-keyword\">CHECK</span> (priority <span class=\"hljs-keyword\">IN</span> (<span class=\"hljs-string\">'low'</span>, <span class=\"hljs-string\">'medium'</span>, <span class=\"hljs-string\">'high'</span>, <span class=\"hljs-string\">'critical'</span>)),\n  <span class=\"hljs-comment\">-- NULL дозволено: задача може існувати без виконавця</span>\n  user_id     <span class=\"hljs-type\">INTEGER</span>     <span class=\"hljs-keyword\">REFERENCES</span> users(id) <span class=\"hljs-keyword\">ON</span> <span class=\"hljs-keyword\">DELETE</span> <span class=\"hljs-keyword\">SET</span> <span class=\"hljs-keyword\">NULL</span>,\n  created_at  TIMESTAMPTZ <span class=\"hljs-keyword\">NOT</span> <span class=\"hljs-keyword\">NULL</span> <span class=\"hljs-keyword\">DEFAULT</span> NOW()\n);</code></pre><div class=\"tip\"><strong>💡 ON DELETE SET NULL vs CASCADE</strong> <p><code>ON DELETE SET NULL</code> — при видаленні користувача задача <strong>залишається</strong>, але <code>user_id</code> стає <code>NULL</code> (задача без виконавця). <code>ON DELETE CASCADE</code> — задача <strong>видаляється</strong> разом із користувачем. Тут правильна бізнес-логіка: задачі цінніші за акаунт, тому <code>SET NULL</code>.</p>\n</div>\n\n\n\n\n\n<div class=\"note\"><strong>📝 Де розміщувати зовнішній ключ?</strong> <p>Зовнішній ключ <strong>завжди</strong> знаходиться на боці \"багатьох\". Якби ми поставили <code>task_id</code> в таблицю <code>users</code> — один рядок <code>users</code> міг би посилатися лише на одну задачу, що суперечить логіці OneToMany.</p>\n</div>\n\n","<h1>🔗 Відносини: ManyToMany</h1>\n<p><strong>Головна ідея:</strong> одна задача може мати <strong>кілька тегів</strong>, і один тег може належати <strong>кільком задачам</strong>. Реляційна БД не дозволяє зберігати масиви посилань у колонці, тому ManyToMany реалізується через <strong>проміжну (junction) таблицю</strong>.</p>\n<h2>🤔 Чому потрібна проміжна таблиця?</h2>\n<p>Якби ми спробували зберегти теги прямо в <code>tasks</code> (наприклад, <code>tag_ids = [1, 2, 3]</code>) — це порушило б реляційну модель: не можна робити JOIN по масиву, не можна додати constraint, пошук неефективний. Проміжна таблиця <code>task_tags</code> перетворює ManyToMany на <strong>два OneToMany</strong>.</p>\n<h2>📐 Схема: tasks ↔ tags через task_tags</h2>\n\n<div class=\"mermaid\" data-source=\"graph LR\n    T[&quot;📝 tasks&lt;br/&gt;id PK&lt;br/&gt;title&quot;] --&gt;|&quot;1 : N&quot;| TT[&quot;🔀 task_tags&lt;br/&gt;task_id FK&lt;br/&gt;tag_id FK&lt;br/&gt;PK(task_id, tag_id)&quot;]\n    TT --&gt;|&quot;N : 1&quot;| TG[&quot;🏷️ tags&lt;br/&gt;id PK&lt;br/&gt;name UNIQUE&quot;]\n    style T fill:#fff3e0,stroke:#ef6c00\n    style TT fill:#fce4ec,stroke:#c2185b\n    style TG fill:#f3e5f5,stroke:#7b1fa2\"><svg id=\"exp-1775675463443-7-0\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" class=\"flowchart\" style=\"max-width: 632.3046875px;\" viewBox=\"0 0 632.3046875 136\" role=\"graphics-document document\" aria-roledescription=\"flowchart-v2\"><style>#exp-1775675463443-7-0{font-family:system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,Arial,sans-serif;font-size:16px;fill:#333;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#exp-1775675463443-7-0 .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#exp-1775675463443-7-0 .edge-animation-fast{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:d /p></span></div></foreignObject></g></g></g></g></g><defs><filter id=\"exp-1775675463443-7-0-drop-shadow\" height=\"130%\" width=\"130%\"><feDropShadow dx=\"4\" dy=\"4\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs><defs><filter id=\"exp-1775675463443-7-0-drop-shadow-small\" height=\"150%\" width=\"150%\"><feDropShadow dx=\"2\" dy=\"2\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs></svg></div>\n<h2>💻 SQL</h2>\n<pre><code class=\"language-sql hljs\" data-highlighted=\"yes\"><span class=\"hljs-keyword\">CREATE</span> <span class=\"hljs-keyword\">TABLE</span> tags (\n  id   SERIAL <span class=\"hljs-keyword\">PRIMARY</span> KEY,\n  name TEXT   <span class=\"hljs-keyword\">NOT</span> <span class=\"hljs-keyword\">NULL</span> <span class=\"hljs-keyword\">UNIQUE</span>  <span class=\"hljs-comment\">-- назва тегу унікальна в межах системи</span>\n);\n\n<span class=\"hljs-keyword\">CREATE</span> <span class=\"hljs-keyword\">TABLE</span> task_tags (\n  task_id <span class=\"hljs-type\">INTEGER</span> <span class=\"hljs-keyword\">NOT</span> <span class=\"hljs-keyword\">NULL</span> <span class=\"hljs-keyword\">REFERENCES</span> tasks(id) <span class=\"hljs-keyword\">ON</span> <span class=\"hljs-keyword\">DELETE</span> CASCADE,\n  tag_id  <span class=\"hljs-type\">INTEGER</span> <span class=\"hljs-keyword\">NOT</span> <span class=\"hljs-keyword\">NULL</span> <span class=\"hljs-keyword\">REFERENCES</span> tags(id)  <span class=\"hljs-keyword\">ON</span> <span class=\"hljs-keyword\">DELETE</span> CASCADE,\n  <span class=\"hljs-comment\">-- Складений первинний ключ: пара (task_id, tag_id) унікальна</span>\n  <span class=\"hljs-keyword\">PRIMARY</span> KEY (task_id, tag_id)\n);</code></pre><div class=\"info\"><strong>ℹ️ Складений первинний ключ</strong> <p><code>PRIMARY KEY (task_id, tag_id)</code> означає, що первинним ключем є <strong>комбінація</strong> двох полів. Це автоматично гарантує, що один і той самий тег не може бути прив'язаний до однієї задачі двічі. Спроба вставити дублікат отримає помилку від БД.</p>\n</div>\n\n\n\n\n\n<div class=\"tip\"><strong>💡 ON DELETE CASCADE в проміжній таблиці</strong> <p>Обидва зовнішні ключі мають <code>CASCADE</code>. Якщо видалити задачу — всі її зв'язки з тегами видаляються автоматично. Якщо видалити тег — всі зв'язки задач з цим тегом видаляються. Самі задачі та теги при цьому не чіпаються.</p>\n</div>\n\n","<h1>✍️ DML: INSERT — додавання даних</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>DML</strong> (Data Manipulation Language) — мова маніпуляції даними. Включає <code>INSERT</code>, <code>SELECT</code>, <code>UPDATE</code>, <code>DELETE</code>. Якщо DDL описує <strong>структуру</strong>, то DML працює з <strong>вмістом</strong> таблиць.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> <code>INSERT</code> додає нові рядки до таблиці. Порядок значень у <code>VALUES</code> повинен точно відповідати порядку колонок у списку після назви таблиці.</p>\n<h2>💻 Варіанти INSERT</h2>\n<pre><code class=\"language-sql hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">-- Вставка одного рядка (явно вказуємо колонки — хороша практика)</span>\n<span class=\"hljs-keyword\">INSERT</span> <span class=\"hljs-keyword\">INTO</span> users (email, password_hash)\n<span class=\"hljs-keyword\">VALUES</span> (<span class=\"hljs-string\">'john@example.com'</span>, <span class=\"hljs-string\">'$2b$10$hashedpassword'</span>);\n\n<span class=\"hljs-comment\">-- Вставка кількох рядків за один запит (ефективніше, ніж по одному)</span>\n<span class=\"hljs-keyword\">INSERT</span> <span class=\"hljs-keyword\">INTO</span> tags (name)\n<span class=\"hljs-keyword\">VALUES</span> (<span class=\"hljs-string\">'backend'</span>), (<span class=\"hljs-string\">'frontend'</span>), (<span class=\"hljs-string\">'urgent'</span>), (<span class=\"hljs-string\">'bug'</span>);\n\n<span class=\"hljs-comment\">-- Вставка з поверненням даних згенерованих БД</span>\n<span class=\"hljs-comment\">-- Корисно, коли після INSERT потрібно знати id нового запису</span>\n<span class=\"hljs-keyword\">INSERT</span> <span class=\"hljs-keyword\">INTO</span> tasks (title, description, status, priority, user_id)\n<span class=\"hljs-keyword\">VALUES</span> (<span class=\"hljs-string\">'Розробити API'</span>, <span class=\"hljs-string\">'REST API для задач'</span>, <span class=\"hljs-string\">'in_progress'</span>, <span class=\"hljs-string\">'high'</span>, <span class=\"hljs-number\">1</span>)\nRETURNING id, created_at;\n<span class=\"hljs-comment\">-- → повертає: id=1, created_at=2025-01-15 10:30:00+02</span>\n\n<span class=\"hljs-comment\">-- Зв'язування задачі з тегами через проміжну таблицю</span>\n<span class=\"hljs-keyword\">INSERT</span> <span class=\"hljs-keyword\">INTO</span> task_tags (task_id, tag_id) <span class=\"hljs-keyword\">VALUES</span> (<span class=\"hljs-number\">1</span>, <span class=\"hljs-number\">1</span>), (<span class=\"hljs-number\">1</span>, <span class=\"hljs-number\">2</span>);</code></pre><div class=\"tip\"><strong>💡 RETURNING — особливість PostgreSQL</strong> <p><code>RETURNING</code> дозволяє отримати дані щойно вставленого рядка одразу після <code>INSERT</code> — без додаткового <code>SELECT</code>. TypeORM при роботі з PostgreSQL використовує саме <code>RETURNING</code> для повернення створеної сутності з усіма згенерованими полями.</p>\n</div>\n\n\n\n\n\n<div class=\"warning\"><strong>⚠️ Порядок вставки має значення</strong> <p>Через зовнішні ключі: спочатку вставляємо <code>users</code>, потім <code>tasks</code> (бо <code>tasks.user_id</code> посилається на <code>users.id</code>). Спроба вставити <code>task</code> з неіснуючим <code>user_id</code> призведе до помилки порушення foreign key constraint.</p>\n</div>\n\n","<h1>🔍 SELECT: вибірка та фільтрація</h1>\n<p><strong>Головна ідея:</strong> <code>SELECT</code> — найуживаніша команда SQL. Вона дозволяє отримати рівно ті дані, які потрібні, з потрібним сортуванням та кількістю рядків. Більшість складності SQL зосереджена саме у різноманітних формах <code>SELECT</code>.</p>\n<h2>💻 Від простого до складного</h2>\n<pre><code class=\"language-sql hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">-- Всі колонки всіх рядків (зручно для відлагодження, уникайте у production)</span>\n<span class=\"hljs-keyword\">SELECT</span> <span class=\"hljs-operator\">*</span> <span class=\"hljs-keyword\">FROM</span> tasks;\n\n<span class=\"hljs-comment\">-- Конкретні колонки — ефективніше та зрозуміліше</span>\n<span class=\"hljs-keyword\">SELECT</span> id, title, status, priority <span class=\"hljs-keyword\">FROM</span> tasks;\n\n<span class=\"hljs-comment\">-- WHERE — фільтрація рядків за умовою</span>\n<span class=\"hljs-keyword\">SELECT</span> <span class=\"hljs-operator\">*</span> <span class=\"hljs-keyword\">FROM</span> tasks <span class=\"hljs-keyword\">WHERE</span> status <span class=\"hljs-operator\">=</span> <span class=\"hljs-string\">'todo'</span>;\n<span class=\"hljs-keyword\">SELECT</span> <span class=\"hljs-operator\">*</span> <span class=\"hljs-keyword\">FROM</span> tasks <span class=\"hljs-keyword\">WHERE</span> status <span class=\"hljs-operator\">=</span> <span class=\"hljs-string\">'todo'</span> <span class=\"hljs-keyword\">AND</span> priority <span class=\"hljs-operator\">=</span> <span class=\"hljs-string\">'high'</span>;\n<span class=\"hljs-keyword\">SELECT</span> <span class=\"hljs-operator\">*</span> <span class=\"hljs-keyword\">FROM</span> tasks <span class=\"hljs-keyword\">WHERE</span> status <span class=\"hljs-operator\">=</span> <span class=\"hljs-string\">'todo'</span> <span class=\"hljs-keyword\">OR</span> status <span class=\"hljs-operator\">=</span> <span class=\"hljs-string\">'in_progress'</span>;\n\n<span class=\"hljs-comment\">-- ORDER BY — сортування (DESC = від більшого до меншого)</span>\n<span class=\"hljs-keyword\">SELECT</span> <span class=\"hljs-operator\">*</span> <span class=\"hljs-keyword\">FROM</span> tasks <span class=\"hljs-keyword\">ORDER</span> <span class=\"hljs-keyword\">BY</span> created_at <span class=\"hljs-keyword\">DESC</span>;\n<span class=\"hljs-keyword\">SELECT</span> <span class=\"hljs-operator\">*</span> <span class=\"hljs-keyword\">FROM</span> tasks <span class=\"hljs-keyword\">ORDER</span> <span class=\"hljs-keyword\">BY</span> priority <span class=\"hljs-keyword\">ASC</span>, created_at <span class=\"hljs-keyword\">DESC</span>; <span class=\"hljs-comment\">-- подвійне сортування</span>\n\n<span class=\"hljs-comment\">-- LIMIT та OFFSET — пагінація</span>\n<span class=\"hljs-keyword\">SELECT</span> <span class=\"hljs-operator\">*</span> <span class=\"hljs-keyword\">FROM</span> tasks <span class=\"hljs-keyword\">ORDER</span> <span class=\"hljs-keyword\">BY</span> created_at <span class=\"hljs-keyword\">DESC</span> LIMIT <span class=\"hljs-number\">10</span>;           <span class=\"hljs-comment\">-- записи 1–10</span>\n<span class=\"hljs-keyword\">SELECT</span> <span class=\"hljs-operator\">*</span> <span class=\"hljs-keyword\">FROM</span> tasks <span class=\"hljs-keyword\">ORDER</span> <span class=\"hljs-keyword\">BY</span> created_at <span class=\"hljs-keyword\">DESC</span> LIMIT <span class=\"hljs-number\">10</span> <span class=\"hljs-keyword\">OFFSET</span> <span class=\"hljs-number\">20</span>; <span class=\"hljs-comment\">-- записи 21–30</span>\n\n<span class=\"hljs-comment\">-- ILIKE — пошук без урахування регістру (I = case-Insensitive)</span>\n<span class=\"hljs-keyword\">SELECT</span> <span class=\"hljs-operator\">*</span> <span class=\"hljs-keyword\">FROM</span> tasks <span class=\"hljs-keyword\">WHERE</span> title ILIKE <span class=\"hljs-string\">'%api%'</span>; <span class=\"hljs-comment\">-- знайде 'API', 'api', 'Api'</span>\n\n<span class=\"hljs-comment\">-- IN — перевірка на входження в список значень</span>\n<span class=\"hljs-keyword\">SELECT</span> <span class=\"hljs-operator\">*</span> <span class=\"hljs-keyword\">FROM</span> tasks <span class=\"hljs-keyword\">WHERE</span> status <span class=\"hljs-keyword\">IN</span> (<span class=\"hljs-string\">'todo'</span>, <span class=\"hljs-string\">'in_progress'</span>);\n\n<span class=\"hljs-comment\">-- Перевірка на NULL (не можна використовувати =)</span>\n<span class=\"hljs-keyword\">SELECT</span> <span class=\"hljs-operator\">*</span> <span class=\"hljs-keyword\">FROM</span> tasks <span class=\"hljs-keyword\">WHERE</span> user_id <span class=\"hljs-keyword\">IS</span> <span class=\"hljs-keyword\">NULL</span>;     <span class=\"hljs-comment\">-- задачі без виконавця</span>\n<span class=\"hljs-keyword\">SELECT</span> <span class=\"hljs-operator\">*</span> <span class=\"hljs-keyword\">FROM</span> tasks <span class=\"hljs-keyword\">WHERE</span> user_id <span class=\"hljs-keyword\">IS</span> <span class=\"hljs-keyword\">NOT</span> <span class=\"hljs-keyword\">NULL</span>; <span class=\"hljs-comment\">-- задачі з виконавцем</span></code></pre><div class=\"warning\"><strong>⚠️ NULL — особливий випадок</strong> <p><code>WHERE user_id = NULL</code> завжди повертає <strong>порожній результат</strong>, навіть якщо в таблиці є рядки з NULL. Це пов'язано з тризначною логікою SQL: будь-яке порівняння з NULL дає не <code>true</code>/<code>false</code>, а <code>UNKNOWN</code>. Єдиний коректний спосіб — <code>IS NULL</code> та <code>IS NOT NULL</code>.</p>\n</div>\n\n\n\n\n\n<div class=\"tip\"><strong>💡 Псевдонім колонки через AS</strong> <p><code>SELECT email AS author_email FROM users</code> — перейменовує колонку у результаті запиту. Корисно при JOIN, коли кілька таблиць мають колонки з однаковими іменами (наприклад, <code>id</code> є і в <code>tasks</code>, і в <code>users</code>).</p>\n</div>\n\n","<h1>🔄 Логічний порядок виконання SELECT</h1>\n<p><strong>Головна ідея:</strong> SQL-запит пишеться в одному порядку, але виконується в іншому. Розуміння цього порядку пояснює більшість правил та обмежень мови.</p>\n<h2>📋 Порядок виконання</h2>\n\n<div class=\"mermaid\" data-source=\"graph LR\n    FR[&quot;1️⃣ FROM&lt;br/&gt;Визначити таблиці&quot;] --&gt; WH[&quot;2️⃣ WHERE&lt;br/&gt;Відфільтрувати рядки&quot;]\n    WH --&gt; GB[&quot;3️⃣ GROUP BY&lt;br/&gt;Згрупувати&quot;]\n    GB --&gt; HV[&quot;4️⃣ HAVING&lt;br/&gt;Відфільтрувати групи&quot;]\n    HV --&gt; SE[&quot;5️⃣ SELECT&lt;br/&gt;Обрати колонки&quot;]\n    SE --&gt; OB[&quot;6️⃣ ORDER BY&lt;br/&gt;Відсортувати&quot;]\n    OB --&gt; LM[&quot;7️⃣ LIMIT / OFFSET&lt;br/&gt;Обрізати результат&quot;]\n    style FR fill:#e3f2fd,stroke:#1565c0\n    style WH fill:#e8f5e9,stroke:#388e3c\n    style GB fill:#fff3e0,stroke:#ef6c00\n    style HV fill:#fce4ec,stroke:#c2185b\n    style SE fill:#f3e5f5,stroke:#7b1fa2\n    style OB fill:#fff9c4,stroke:#f9a825\n    style LM fill:#e3f2fd,stroke:#1565c0\"><svg id=\"exp-1775675463453-10-0\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" class=\"flowchart\" style=\"max-width: 1593.5234375px;\" viewBox=\"0 0 1593.5234375 88\" role=\"graphics-document document\" aria-roledescription=\"flowchart-v2\"><style>#exp-1775675463453-10-0{font-family:system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,Arial,sans-serif;font-size:16px;fill:#333;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#exp-1775675463453-10-0 .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#exp-1775675463453-10-0 .edge-animation-fast{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 20s linear infinite;stroke-linecap:round;}#exp-1775675463453-10-0 .error-icon{fill:#552222;}#exp-1775675463453-10-0 .error-text{fill:#552222;stroke:#552222;}#exp-1775675463453-10-0 .edge-thickness-normal{stroke-width:1px;}#exp-1775675463453-10-0 .edge-thickness-thick{stroke-width:3.5px;}#exp-1775675463453-10-0 .edge-pattern-solid{stroke-dasharray:0;}#ex r>\n<tr>\n<td>Чому <code>HAVING</code> використовується для агрегатів, а не <code>WHERE</code>?</td>\n<td>Агрегати обчислюються на кроці <code>GROUP BY</code> — <strong>після</strong> <code>WHERE</code>, але <strong>до</strong> <code>HAVING</code></td>\n</tr>\n<tr>\n<td>Чому <code>ORDER BY</code> може використовувати alias із <code>SELECT</code>?</td>\n<td><code>ORDER BY</code> виконується <strong>після</strong> <code>SELECT</code> — alias вже існує</td>\n</tr>\n</tbody></table>\n<pre><code class=\"language-sql hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">-- ❌ Помилка: alias 'cnt' недоступний у WHERE (WHERE виконується до SELECT)</span>\n<span class=\"hljs-keyword\">SELECT</span> status, <span class=\"hljs-built_in\">COUNT</span>(<span class=\"hljs-operator\">*</span>) <span class=\"hljs-keyword\">AS</span> cnt <span class=\"hljs-keyword\">FROM</span> tasks <span class=\"hljs-keyword\">WHERE</span> cnt <span class=\"hljs-operator\">&gt;</span> <span class=\"hljs-number\">5</span> <span class=\"hljs-keyword\">GROUP</span> <span class=\"hljs-keyword\">BY</span> status;\n\n<span class=\"hljs-comment\">-- ✅ Правильно: для фільтрації агрегатів використовуємо HAVING</span>\n<span class=\"hljs-keyword\">SELECT</span> status, <span class=\"hljs-built_in\">COUNT</span>(<span class=\"hljs-operator\">*</span>) <span class=\"hljs-keyword\">AS</span> cnt <span class=\"hljs-keyword\">FROM</span> tasks <span class=\"hljs-keyword\">GROUP</span> <span class=\"hljs-keyword\">BY</span> status <span class=\"hljs-keyword\">HAVING</span> <span class=\"hljs-built_in\">COUNT</span>(<span class=\"hljs-operator\">*</span>) <span class=\"hljs-operator\">&gt;</span> <span class=\"hljs-number\">5</span>;\n\n<span class=\"hljs-comment\">-- ✅ Правильно: alias доступний в ORDER BY</span>\n<span class=\"hljs-keyword\">SELECT</span> status, <span class=\"hljs-built_in\">COUNT</span>(<span class=\"hljs-operator\">*</span>) <span class=\"hljs-keyword\">AS</span> cnt <span class=\"hljs-keyword\">FROM</span> tasks <span class=\"hljs-keyword\">GROUP</span> <span class=\"hljs-keyword\">BY</span> status <span class=\"hljs-keyword\">ORDER</span> <span class=\"hljs-keyword\">BY</span> cnt <span class=\"hljs-keyword\">DESC</span>;</code></pre>","<h1>✏️ UPDATE та DELETE</h1>\n<p><strong>Головна ідея:</strong> <code>UPDATE</code> змінює існуючі рядки, <code>DELETE</code> видаляє їх. Обидві команди майже завжди повинні містити <code>WHERE</code> — без нього операція застосовується до <strong>всіх</strong> рядків таблиці.</p>\n<h2>💻 UPDATE — оновлення даних</h2>\n<pre><code class=\"language-sql hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">-- Оновлення одного конкретного запису за id</span>\n<span class=\"hljs-keyword\">UPDATE</span> tasks\n<span class=\"hljs-keyword\">SET</span> status <span class=\"hljs-operator\">=</span> <span class=\"hljs-string\">'done'</span>\n<span class=\"hljs-keyword\">WHERE</span> id <span class=\"hljs-operator\">=</span> <span class=\"hljs-number\">1</span>;\n\n<span class=\"hljs-comment\">-- Оновлення кількох полів одночасно через кому</span>\n<span class=\"hljs-keyword\">UPDATE</span> tasks\n<span class=\"hljs-keyword\">SET</span> status <span class=\"hljs-operator\">=</span> <span class=\"hljs-string\">'done'</span>,\n    priority <span class=\"hljs-operator\">=</span> <span class=\"hljs-string\">'low'</span>\n<span class=\"hljs-keyword\">WHERE</span> id <span class=\"hljs-operator\">=</span> <span class=\"hljs-number\">1</span>;\n\n<span class=\"hljs-comment\">-- Оновлення кількох рядків за умовою</span>\n<span class=\"hljs-keyword\">UPDATE</span> tasks\n<span class=\"hljs-keyword\">SET</span> status <span class=\"hljs-operator\">=</span> <span class=\"hljs-string\">'cancelled'</span>\n<span class=\"hljs-keyword\">WHERE</span> user_id <span class=\"hljs-operator\">=</span> <span class=\"hljs-number\">5</span> <span class=\"hljs-keyword\">AND</span> status <span class=\"hljs-operator\">!=</span> <span class=\"hljs-string\">'done'</span>;\n\n<span class=\"hljs-comment\">-- Оновлення з поверненням результату</span>\n<span class=\"hljs-keyword\">UPDATE</span> tasks <span class=\"hljs-keyword\">SET</span> status <span class=\"hljs-operator\">=</span> <span class=\"hljs-string\">'done'</span> <span class=\"hljs-keyword\">WHERE</span> id <span class=\"hljs-operator\">=</span> <span class=\"hljs-number\">1</span>\nRETURNING id, title, status;</code></pre><h2>💻 DELETE — видалення даних</h2>\n<pre><code class=\"language-sql hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">-- Видалення конкретного запису</span>\n<span class=\"hljs-keyword\">DELETE</span> <span class=\"hljs-keyword\">FROM</span> tasks <span class=\"hljs-keyword\">WHERE</span> id <span class=\"hljs-operator\">=</span> <span class=\"hljs-number\">1</span>;\n\n<span class=\"hljs-comment\">-- Видалення за умовою (старі скасовані задачі)</span>\n<span class=\"hljs-keyword\">DELETE</span> <span class=\"hljs-keyword\">FROM</span> tasks\n<span class=\"hljs-keyword\">WHERE</span> status <span class=\"hljs-operator\">=</span> <span class=\"hljs-string\">'cancelled'</span>\n  <span class=\"hljs-keyword\">AND</span> created_at <span class=\"hljs-operator\">&lt;</span> NOW() <span class=\"hljs-operator\">-</span> <span class=\"hljs-type\">INTERVAL</span> <span class=\"hljs-string\">'30 days'</span>;\n\n<span class=\"hljs-comment\">-- Видалення всіх задач конкретного користувача</span>\n<span class=\"hljs-keyword\">DELETE</span> <span class=\"hljs-keyword\">FROM</span> tasks <span class=\"hljs-keyword\">WHERE</span> user_id <span class=\"hljs-operator\">=</span> <span class=\"hljs-number\">3</span>;</code></pre><div class=\"danger\"><strong>🚫 WHERE — обов'язковий</strong> <p><code>UPDATE tasks SET status = 'done'</code> без <code>WHERE</code> — змінить статус <strong>кожного</strong> рядка в таблиці. <code>DELETE FROM tasks</code> без <code>WHERE</code> — знищить <strong>всі</strong> дані. PostgreSQL виконає ці команди без попередження. Перед виконанням UPDATE/DELETE завжди спочатку перевіряйте умову через <code>SELECT</code> з тим самим <code>WHERE</code>.</p>\n</div>\n\n","<h1>🔀 JOIN: об'єднання таблиць</h1>\n<p><strong>Головна ідея:</strong> дані в реляційній БД навмисно розподілені по різних таблицях. <code>JOIN</code> дозволяє <strong>об'єднати</strong> їх в один результат за умовою зв'язку — як правило, через зовнішній ключ.</p>\n<h2>🔗 INNER JOIN — тільки збіги</h2>\n<pre><code class=\"language-sql hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">-- Повертає лише задачі, у яких user_id вказаний та user існує</span>\n<span class=\"hljs-comment\">-- Задачі з user_id = NULL сюди НЕ потраплять</span>\n<span class=\"hljs-keyword\">SELECT</span>\n  t.id,\n  t.title,\n  t.status,\n  u.email <span class=\"hljs-keyword\">AS</span> author_email\n<span class=\"hljs-keyword\">FROM</span> tasks t\n<span class=\"hljs-keyword\">INNER</span> <span class=\"hljs-keyword\">JOIN</span> users u <span class=\"hljs-keyword\">ON</span> t.user_id <span class=\"hljs-operator\">=</span> u.id;</code></pre><h2>🔗 LEFT JOIN — всі рядки лівої таблиці</h2>\n<pre><code class=\"language-sql hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">-- Повертає ВСІ задачі, навіть ті що без виконавця</span>\n<span class=\"hljs-comment\">-- Якщо user_id = NULL — у колонках users буде NULL</span>\n<span class=\"hljs-keyword\">SELECT</span>\n  t.id,\n  t.title,\n  u.email <span class=\"hljs-keyword\">AS</span> author_email   <span class=\"hljs-comment\">-- буде NULL для задач без виконавця</span>\n<span class=\"hljs-keyword\">FROM</span> tasks t\n<span class=\"hljs-keyword\">LEFT</span> <span class=\"hljs-keyword\">JOIN</span> users u <span class=\"hljs-keyword\">ON</span> t.user_id <span class=\"hljs-operator\">=</span> u.id;</code></pre><h2>🔀 Візуальна різниця INNER vs LEFT</h2>\n\n<div class=\"mermaid\" data-source=\"graph TD\n    subgraph INNER[&quot;🔵 INNER JOIN&quot;]\n        T1[&quot;tasks&lt;br/&gt;id=1 user_id=1&lt;br/&gt;id=2 user_id=2&lt;br/&gt;id=3 user_id=NULL&quot;] --&gt;|&quot;збігається&quot;| U1[&quot;users&lt;br/&gt;id=1 john&lt;br/&gt;id=2 anna&quot;]\n        U1 --&gt; R1[&quot;✅ Результат&lt;br/&gt;task 1 + john&lt;br/&gt;task 2 + anna&lt;br/&gt;❌ task 3 -- не потрапляє&quot;]\n    end\n    subgraph LEFT[&quot;🟡 LEFT JOIN&quot;]\n        T2[&quot;tasks&lt;br/&gt;id=1 user_id=1&lt;br/&gt;id=2 user_id=2&lt;br/&gt;id=3 user_id=NULL&quot;] --&gt;|&quot;всі рядки&quot;| U2[&quot;users&lt;br/&gt;id=1 john&lt;br/&gt;id=2 anna&quot;]\n        U2 --&gt; R2[&quot;✅ Результат&lt;br/&gt;task 1 + john&lt;br/&gt;task 2 + anna&lt;br/&gt;✅ task 3 + NULL&quot;]\n    end\n    style T1 fill:#e3f2fd,stroke:#1565c0\n    style U1 fill:#e8f5e9,stroke:#388e3c\n    style R1 fill:#fff9c4,stroke:#f9a825\n    style T2 fill:#e3f2fd,stroke:#1565c0\n    style U2 fill:#e8f5e9,stroke:#388e3c\n    style R2 fill:#fff9c4,stroke:#f9a825\"><svg id=\"exp-1775675463467-12-0\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" class=\"flowchart\" style=\"max-width: 1696.0625px;\" viewBox=\"0 0 1696.0625 206\" role=\"graphics-document document\" aria-roledescription=\"flowchart-v2\"><style>#exp-1775675463467-12-0{font-family:system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,Arial,sans-serif;font-size:16px;fill:#333;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#exp-1775675463467-12-0 .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#exp-1775675463467-12-0 .edge-animation-fast{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 20s linear infinite;stroke-linecap:round;}#exp-1775675463467-12-0 .error-icon{fill:#552222;}#exp-1775675463467-12-0 .error-text{fill:#552222;stroke:#552222;}#exp-1775675463467-12-0 .edge-thickness-normal{stroke-width:1px;}#exp-1775675463467-12-0 .edge-thickness-thick{stroke-width:3.5px;}#exp- =\"-59.765625\" y=\"-48\" width=\"119.53125\" height=\"96\"></rect><g class=\"label\" style=\"\" transform=\"translate(-35.765625, -36)\"><rect></rect><foreignObject width=\"71.53125\" height=\"72\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>users<br>id=1 john<br>id=2 anna</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1775675463467-12-0-flowchart-R1-3\" data-look=\"classic\" transform=\"translate(703.6796875, 103)\"><rect class=\"basic label-container\" style=\"fill:#fff9c4 !important;stroke:#f9a825 !important\" x=\"-118.4296875\" y=\"-60\" width=\"236.859375\" height=\"120\"></rect><g class=\"label\" style=\"\" transform=\"translate(-94.4296875, -48)\"><rect></rect><foreignObject width=\"188.859375\" height=\"96\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>✅ Результат<br>task 1 + john<br>task 2 + anna<br>❌ task 3 -- не потрапляє</p></span></div></foreignObject></g></g></g></g></g></g></g><defs><filter id=\"exp-1775675463467-12-0-drop-shadow\" height=\"130%\" width=\"130%\"><feDropShadow dx=\"4\" dy=\"4\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs><defs><filter id=\"exp-1775675463467-12-0-drop-shadow-small\" height=\"150%\" width=\"150%\"><feDropShadow dx=\"2\" dy=\"2\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs></svg></div>\n<h2>🏷️ JOIN через проміжну таблицю — ManyToMany</h2>\n<pre><code class=\"language-sql hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">-- Отримати всі теги для задачі з id = 1</span>\n<span class=\"hljs-comment\">-- Потрібно два JOIN: tasks → task_tags → tags</span>\n<span class=\"hljs-keyword\">SELECT</span>\n  t.id,\n  t.title,\n  tg.name <span class=\"hljs-keyword\">AS</span> tag_name\n<span class=\"hljs-keyword\">FROM</span> tasks t\n<span class=\"hljs-keyword\">INNER</span> <span class=\"hljs-keyword\">JOIN</span> task_tags tt <span class=\"hljs-keyword\">ON</span> t.id  <span class=\"hljs-operator\">=</span> tt.task_id\n<span class=\"hljs-keyword\">INNER</span> <span class=\"hljs-keyword\">JOIN</span> tags tg      <span class=\"hljs-keyword\">ON</span> tg.id <span class=\"hljs-operator\">=</span> tt.tag_id\n<span class=\"hljs-keyword\">WHERE</span> t.id <span class=\"hljs-operator\">=</span> <span class=\"hljs-number\">1</span>;</code></pre><div class=\"note\"><strong>📝 RIGHT JOIN та FULL JOIN</strong> <p><code>RIGHT JOIN</code> — всі рядки <strong>правої</strong> таблиці + збіги з лівою. <code>FULL JOIN</code> — всі рядки обох таблиць, NULL там де немає збігів. На практиці <code>RIGHT JOIN</code> майже завжди можна замінити <code>LEFT JOIN</code> зі зміненим порядком таблиць, тому він рідко зустрічається у реальному коді.</p>\n</div>\n\n","<h1>📊 Агрегатні функції та GROUP BY</h1>\n<p><strong>Головна ідея:</strong> агрегатні функції обчислюють <strong>одне значення</strong> для групи рядків. <code>GROUP BY</code> ділить таблицю на групи за значенням колонки, а агрегатна функція застосовується до кожної групи окремо.</p>\n<h2>💻 Базові агрегатні функції</h2>\n<pre><code class=\"language-sql hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">-- Загальна кількість задач у системі</span>\n<span class=\"hljs-keyword\">SELECT</span> <span class=\"hljs-built_in\">COUNT</span>(<span class=\"hljs-operator\">*</span>) <span class=\"hljs-keyword\">AS</span> total_tasks <span class=\"hljs-keyword\">FROM</span> tasks;\n\n<span class=\"hljs-comment\">-- Кількість задач по кожному статусу</span>\n<span class=\"hljs-keyword\">SELECT</span> status, <span class=\"hljs-built_in\">COUNT</span>(<span class=\"hljs-operator\">*</span>) <span class=\"hljs-keyword\">AS</span> count\n<span class=\"hljs-keyword\">FROM</span> tasks\n<span class=\"hljs-keyword\">GROUP</span> <span class=\"hljs-keyword\">BY</span> status\n<span class=\"hljs-keyword\">ORDER</span> <span class=\"hljs-keyword\">BY</span> count <span class=\"hljs-keyword\">DESC</span>;\n<span class=\"hljs-comment\">-- Результат:</span>\n<span class=\"hljs-comment\">-- status        | count</span>\n<span class=\"hljs-comment\">-- done          |   25</span>\n<span class=\"hljs-comment\">-- in_progress   |   12</span>\n<span class=\"hljs-comment\">-- todo          |    8</span></code></pre><h2>💻 Агрегати з JOIN та HAVING</h2>\n<pre><code class=\"language-sql hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">-- Скільки задач має кожен користувач</span>\n<span class=\"hljs-keyword\">SELECT</span>\n  u.email,\n  <span class=\"hljs-built_in\">COUNT</span>(t.id) <span class=\"hljs-keyword\">AS</span> task_count\n<span class=\"hljs-keyword\">FROM</span> users u\n<span class=\"hljs-keyword\">LEFT</span> <span class=\"hljs-keyword\">JOIN</span> tasks t <span class=\"hljs-keyword\">ON</span> u.id <span class=\"hljs-operator\">=</span> t.user_id\n<span class=\"hljs-keyword\">GROUP</span> <span class=\"hljs-keyword\">BY</span> u.id, u.email\n<span class=\"hljs-keyword\">ORDER</span> <span class=\"hljs-keyword\">BY</span> task_count <span class=\"hljs-keyword\">DESC</span>;\n\n<span class=\"hljs-comment\">-- HAVING — фільтр після групування (лише користувачі з 3+ задачами)</span>\n<span class=\"hljs-keyword\">SELECT</span>\n  u.email,\n  <span class=\"hljs-built_in\">COUNT</span>(t.id) <span class=\"hljs-keyword\">AS</span> task_count\n<span class=\"hljs-keyword\">FROM</span> users u\n<span class=\"hljs-keyword\">LEFT</span> <span class=\"hljs-keyword\">JOIN</span> tasks t <span class=\"hljs-keyword\">ON</span> u.id <span class=\"hljs-operator\">=</span> t.user_id\n<span class=\"hljs-keyword\">GROUP</span> <span class=\"hljs-keyword\">BY</span> u.id, u.email\n<span class=\"hljs-keyword\">HAVING</span> <span class=\"hljs-built_in\">COUNT</span>(t.id) <span class=\"hljs-operator\">&gt;=</span> <span class=\"hljs-number\">3</span>\n<span class=\"hljs-keyword\">ORDER</span> <span class=\"hljs-keyword\">BY</span> task_count <span class=\"hljs-keyword\">DESC</span>;</code></pre><h2>📋 Довідка: агрегатні функції</h2>\n<table>\n<thead>\n<tr>\n<th>Функція</th>\n<th>Призначення</th>\n<th>Приклад використання</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>COUNT(*)</code></td>\n<td>Кількість рядків у групі</td>\n<td>Скільки задач у статусі 'todo'</td>\n</tr>\n<tr>\n<td><code>COUNT(col)</code></td>\n<td>Кількість рядків де col IS NOT NULL</td>\n<td>Скільки задач мають виконавця</td>\n</tr>\n<tr>\n<td><code>MIN(col)</code></td>\n<td>Мінімальне значення</td>\n<td>Найстаріша задача: <code>MIN(created_at)</code></td>\n</tr>\n<tr>\n<td><code>MAX(col)</code></td>\n<td>Максимальне значення</td>\n<td>Остання задача: <code>MAX(created_at)</code></td>\n</tr>\n<tr>\n<td><code>AVG(col)</code></td>\n<td>Середнє значення (числові поля)</td>\n<td>Середня кількість задач на user</td>\n</tr>\n</tbody></table>\n<div class=\"tip\"><strong>💡 WHERE vs HAVING — ключова різниця</strong> <p><code>WHERE</code> фільтрує <strong>окремі рядки до</strong> того, як вони потрапляють у групи. <code>HAVING</code> фільтрує <strong>самі групи після</strong> групування. Правило: якщо умова стосується агрегатної функції (<code>COUNT</code>, <code>AVG</code>) — використовуй <code>HAVING</code>. Якщо конкретного рядка — <code>WHERE</code>.</p>\n</div>\n\n","<h1>✅ Ключові висновки</h1>\n<div class=\"success\"><strong>✅ Підсумок лекції</strong> <p><strong>📌 Що ми розглянули:</strong></p>\n<ol>\n<li><p><strong>Навіщо БД:</strong> in-memory зберігання не переживає перезапуск; база даних забезпечує надійність, цілісність та масштабованість</p>\n</li>\n<li><p><strong>Типи даних:</strong> <code>SERIAL</code>/<code>UUID</code> для ключів, <code>TEXT</code> для рядків, <code>TIMESTAMPTZ</code> для дат — кожна колонка має суворий тип</p>\n</li>\n<li><p><strong>DDL:</strong> <code>CREATE TABLE</code> з constraints (<code>NOT NULL</code>, <code>UNIQUE</code>, <code>DEFAULT</code>, <code>CHECK</code>, <code>REFERENCES</code>) описує схему та правила цілісності</p>\n</li>\n<li><p><strong>Відносини:</strong> OneToOne через <code>UNIQUE FOREIGN KEY</code>, OneToMany через <code>FOREIGN KEY</code> на боці \"багатьох\", ManyToMany через проміжну таблицю</p>\n</li>\n<li><p><strong>INSERT:</strong> додає рядки; <code>RETURNING</code> повертає згенеровані поля; порядок вставки відповідає зовнішнім ключам</p>\n</li>\n<li><p><strong>SELECT:</strong> <code>WHERE</code> фільтрує, <code>ORDER BY</code> сортує, <code>LIMIT</code>/<code>OFFSET</code> пагінує; <code>IS NULL</code> замість <code>= NULL</code></p>\n</li>\n<li><p><strong>UPDATE/DELETE:</strong> завжди з <code>WHERE</code> — без нього операція зачіпає всі рядки</p>\n</li>\n<li><p><strong>JOIN:</strong> <code>INNER</code> — тільки збіги, <code>LEFT</code> — всі рядки лівої таблиці; кілька JOIN для ManyToMany</p>\n</li>\n<li><p><strong>Агрегати:</strong> <code>COUNT</code> + <code>GROUP BY</code> для статистики по групах; <code>HAVING</code> фільтрує групи, <code>WHERE</code> — рядки</p>\n</li>\n</ol>\n</div>\n\n","<h1>❓ Контрольні питання</h1>\n<ol>\n<li><p>🤔 Яка ключова перевага бази даних над зберіганням даних у масивах Node.js? Які проблеми вирішує БД?</p>\n</li>\n<li><p>🤔 Яка різниця між <code>SERIAL</code> та <code>UUID</code> як типами первинного ключа? Коли варто обирати кожен?</p>\n</li>\n<li><p>🤔 Що таке <code>FOREIGN KEY</code> і як він забезпечує цілісність даних між таблицями?</p>\n</li>\n<li><p>🤔 Чим відрізняються <code>ON DELETE CASCADE</code> та <code>ON DELETE SET NULL</code>? Наведіть приклад коли доречний кожен варіант.</p>\n</li>\n<li><p>🤔 Як реалізується відношення ManyToMany у реляційній БД? Чому не можна обійтись без проміжної таблиці?</p>\n</li>\n<li><p>🤔 Яка різниця між <code>INNER JOIN</code> та <code>LEFT JOIN</code>? Наведіть конкретний приклад, коли результат відрізнятиметься.</p>\n</li>\n<li><p>🤔 Чому <code>WHERE user_id = NULL</code> не повертає рядки з NULL? Як правильно перевірити на NULL в SQL?</p>\n</li>\n<li><p>🤔 Яка різниця між <code>WHERE</code> та <code>HAVING</code>? На якому етапі виконання запиту застосовується кожен?</p>\n</li>\n<li><p>🤔 В якому логічному порядку виконуються клаузи SELECT-запиту? Чому alias із <code>SELECT</code> не можна використовувати у <code>WHERE</code>, але можна в <code>ORDER BY</code>?</p>\n</li>\n</ol>\n","<h1>📖 Глосарій термінів</h1>\n<table>\n<thead>\n<tr>\n<th>Термін</th>\n<th>English</th>\n<th>Визначення</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>База даних</td>\n<td>Database</td>\n<td>Організоване сховище структурованих даних з механізмами доступу та цілісності</td>\n</tr>\n<tr>\n<td>Таблиця</td>\n<td>Table / Relation</td>\n<td>Структура з рядків і колонок для зберігання однотипних записів</td>\n</tr>\n<tr>\n<td>Рядок</td>\n<td>Row / Record / Tuple</td>\n<td>Один запис у таблиці</td>\n</tr>\n<tr>\n<td>Первинний ключ</td>\n<td>Primary Key</td>\n<td>Унікальний ідентифікатор рядка в таблиці, не може бути NULL</td>\n</tr>\n<tr>\n<td>Зовнішній ключ</td>\n<td>Foreign Key</td>\n<td>Посилання на первинний ключ іншої таблиці — механізм зв'язків</td>\n</tr>\n<tr>\n<td>Обмеження</td>\n<td>Constraint</td>\n<td>Правило цілісності даних, що застосовується на рівні схеми БД</td>\n</tr>\n<tr>\n<td>Відношення</td>\n<td>Relationship</td>\n<td>Зв'язок між таблицями, реалізований через зовнішні ключі</td>\n</tr>\n<tr>\n<td>Проміжна таблиця</td>\n<td>Junction Table</td>\n<td>Таблиця для реалізації ManyToMany — містить пари зовнішніх ключів</td>\n</tr>\n<tr>\n<td>Міграція</td>\n<td>Migration</td>\n<td>Версіонований скрипт для керованої зміни схеми бази даних</td>\n</tr>\n<tr>\n<td>Агрегація</td>\n<td>Aggregation</td>\n<td>Обчислення одного значення для групи рядків (COUNT, SUM, AVG)</td>\n</tr>\n<tr>\n<td>Запит</td>\n<td>Query</td>\n<td>Інструкція до СУБД для читання або зміни даних</td>\n</tr>\n<tr>\n<td>Схема</td>\n<td>Schema</td>\n<td>Опис структури бази даних: таблиці, колонки, типи, constraints</td>\n</tr>\n</tbody></table>\n","<h1>📖 Глосарій абревіатур</h1>\n<table>\n<thead>\n<tr>\n<th>Абревіатура</th>\n<th>Розшифровка</th>\n<th>Переклад</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>СУБД</td>\n<td>Система управління базами даних</td>\n<td>—</td>\n</tr>\n<tr>\n<td>SQL</td>\n<td>Structured Query Language</td>\n<td>Мова структурованих запитів</td>\n</tr>\n<tr>\n<td>DDL</td>\n<td>Data Definition Language</td>\n<td>Мова опису структури даних</td>\n</tr>\n<tr>\n<td>DML</td>\n<td>Data Manipulation Language</td>\n<td>Мова маніпуляції даними</td>\n</tr>\n<tr>\n<td>PK</td>\n<td>Primary Key</td>\n<td>Первинний ключ</td>\n</tr>\n<tr>\n<td>FK</td>\n<td>Foreign Key</td>\n<td>Зовнішній ключ</td>\n</tr>\n<tr>\n<td>UUID</td>\n<td>Universally Unique Identifier</td>\n<td>Глобально унікальний ідентифікатор</td>\n</tr>\n<tr>\n<td>ORM</td>\n<td>Object-Relational Mapping</td>\n<td>Об'єктно-реляційне відображення</td>\n</tr>\n</tbody></table>\n"];let currentSlideIndex=0;
function renderMath(root){if(typeof renderMathInElement!=="function"||!root)return;try{renderMathInElement(root,{delimiters:[{left:"$$",right:"$$",display:true},{left:"\\[",right:"\\]",display:true},{left:"$",right:"$",display:false},{left:"\\(",right:"\\)",display:false}],throwOnError:false,strict:"ignore",ignoredTags:["script","noscript","style","textarea","pre","code"]});}catch(e){console.warn("Math render error:",e);}}
function showSlide(i){if(i<0||i>=slides.length)return;currentSlideIndex=i;const el=document.getElementById("current-slide");el.innerHTML=slides[i];el.scrollTop=0;renderMath(el);document.getElementById("progress-bar").style.width=((i+1)/slides.length*100)+"%";document.getElementById("slide-number").textContent=(i+1)+" / "+slides.length;updateSidebarActive();}
function nextSlide(){if(currentSlideIndex<slides.length-1)showSlide(currentSlideIndex+1);}
function previousSlide(){if(currentSlideIndex>0)showSlide(currentSlideIndex-1);}
function toggleSidebar(){document.getElementById("sidebar").classList.toggle("open");}
function toggleHelp(){document.getElementById("help-overlay").classList.toggle("hidden");}
function toggleFullscreen(){if(!document.fullscreenElement){const pc=document.getElementById("presentation-container");if(pc.requestFullscreen)pc.requestFullscreen();else if(pc.webkitRequestFullscreen)pc.webkitRequestFullscreen();else if(pc.msRequestFullscreen)pc.msRequestFullscreen();else if(pc.mozRequestFullScreen)pc.mozRequestFullScreen();}else{if(document.exitFullscreen)document.exitFullscreen();else if(document.webkitExitFullscreen)document.webkitExitFullscreen();else if(document.msExitFullscreen)document.msExitFullscreen();else if(document.mozCancelFullScreen)document.mozCancelFullScreen();}}
function generateSidebar(){const sc=document.getElementById("sidebar-content");sc.innerHTML="";slides.forEach((html,idx)=>{const t=document.createElement("div");t.className="slide-thumbnail";if(idx===0)t.classList.add("active");const tmp=document.createElement("div");tmp.innerHTML=html;const title=tmp.querySelector("h1,h2");const titleText=title?title.textContent:("Слайд "+(idx+1));const textContent=tmp.textContent.replace(/s+/g," ").trim();const preview=textContent.substring(0,100)+(textContent.length>100?"...":"");t.innerHTML="<div class=\"slide-thumbnail-number\">"+(idx+1)+"</div><div class=\"slide-thumbnail-title\">"+titleText+"</div><div class=\"slide-thumbnail-content\">"+preview+"</div>";t.onclick=()=>{showSlide(idx);if(window.innerWidth<1024)toggleSidebar();};sc.appendChild(t);});}
function updateSidebarActive(){document.querySelectorAll(".slide-thumbnail").forEach((th,idx)=>{if(idx===currentSlideIndex){th.classList.add("active");th.scrollIntoView({behavior:"smooth",block:"nearest"});}else th.classList.remove("active");});}
document.addEventListener("keydown",e=>{switch(e.key){case"ArrowLeft":previousSlide();break;case"ArrowRight":case" ":e.preventDefault();nextSlide();break;case"f":case"F":toggleFullscreen();break;case"s":case"S":toggleSidebar();break;case"?":toggleHelp();break;case"Escape":const sb=document.getElementById("sidebar");const ho=document.getElementById("help-overlay");if(sb.classList.contains("open"))toggleSidebar();else if(!ho.classList.contains("hidden"))ho.classList.add("hidden");break;}});
generateSidebar();showSlide(0);</script></body></html>
