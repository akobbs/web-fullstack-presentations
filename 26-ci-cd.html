#presentation-container:fullscreen,#presentation-container:-webkit-full-screen,#presentation-container:-moz-full-screen,#presentation-container:-ms-fullscreen{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%)!important;}</style></head><body><div id="presentation-container"><div class="progress"><div class="progress-bar" id="progress-bar"></div></div><button id="sidebar-toggle" onclick="toggleSidebar()" title="Навігація слайдами (S)">☰</button><div id="sidebar"><div id="sidebar-header"><h3>📑 Слайди</h3><button id="sidebar-close" onclick="toggleSidebar()">✕</button></div><div id="sidebar-content"></div></div><div class="slide-container"><div class="slide" id="current-slide"></div></div><div class="controls"><button class="control-btn" onclick="previousSlide()" title="Попередній (←)">←</button><button class="control-btn" onclick="nextSlide()" title="Наступний (→)">→</button><button class="control-btn" onclick="toggleFullscreen()" title="Повноекранний режим (F)">⛶</button><button class="control-btn" onclick="toggleHelp()" title="Допомога (?)">?</button></div><div class="slide-number" id="slide-number">1 / 20</div><div id="help-overlay" class="hidden"><strong>Гарячі клавіші:</strong><br><kbd>←</kbd> <kbd>→</kbd> Навігація<br><kbd>F</kbd> Повноекранний режим<br><kbd>S</kbd> Sidebar<br><kbd>?</kbd> Допомога<br><kbd>Esc</kbd> Закрити</div></div><script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script><script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script><script>const slides=["<h1>CI/CD та деплоймент</h1>\n<p><strong>Сучасні технології Internet-програмування</strong></p>\n<p>Лектор: Кобилянський Антон</p>\n","<h1>📋 План лекції</h1>\n<ol>\n<li>🔄 Що таке CI/CD та навіщо воно потрібне</li>\n<li>🏭 Конвеєр CI/CD: від коміту до продакшену</li>\n<li>⚙️ GitHub Actions: основні поняття</li>\n<li>📄 Анатомія workflow-файлу та тригери</li>\n<li>🧪 Автоматизація перевірки якості коду</li>\n<li>🔐 Секрети та кешування залежностей</li>\n<li>☁️ Continuous Deployment та хмарні платформи</li>\n<li>🎓 Підсумки курсу та контрольні питання</li>\n</ol>\n","<h1>🔄 Що таке CI/CD</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>CI/CD</strong> є сукупністю практик автоматизації, що дозволяють командам інтегрувати зміни коду та доставляти застосунок користувачам швидко, часто та надійно.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> замість ручного тестування та розгортання раз на місяць, кожна зміна автоматично перевіряється та може бути доставлена за лічені хвилини.</p>\n<h2>📐 Три ключові практики</h2>\n<table>\n<thead>\n<tr>\n<th>Абревіатура</th>\n<th>Практика</th>\n<th>Суть</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><strong>CI</strong> (Continuous Integration)</td>\n<td>Безперервна інтеграція</td>\n<td>Зміни регулярно зливаються у спільну гілку та автоматично перевіряються</td>\n</tr>\n<tr>\n<td><strong>CD</strong> (Continuous Delivery)</td>\n<td>Безперервна доставка</td>\n<td>Кожна перевірена зміна готова до розгортання, реліз запускається вручну</td>\n</tr>\n<tr>\n<td><strong>CD</strong> (Continuous Deployment)</td>\n<td>Безперервне розгортання</td>\n<td>Кожна перевірена зміна автоматично потрапляє у продакшен без участі людини</td>\n</tr>\n</tbody></table>\n<div class=\"note\"><strong>📝 Continuous Delivery vs Continuous Deployment</strong> <p>Обидві практики позначають літерами CD. Різниця у фінальному кроці: за Delivery рішення про реліз ухвалює людина, за Deployment розгортання відбувається повністю автоматично.</p>\n</div>\n\n","<h1>🏭 Конвеєр CI/CD: концепція</h1>\n<p><strong>Головна ідея:</strong> конвеєр (pipeline) є послідовністю автоматичних етапів, через які проходить кожна зміна коду перед потраплянням до користувача.</p>\n\n<div class=\"mermaid\" data-source=\"graph LR\n    DEV[&quot;👨‍💻 Розробник пише код&quot;] --&gt; PUSH[&quot;📤 git push / Pull Request&quot;]\n    PUSH --&gt; CI[&quot;🔍 CI: перевірка&quot;]\n    CI --&gt; LINT[&quot;📏 Лінтинг&quot;]\n    CI --&gt; TEST[&quot;🧪 Тести&quot;]\n    CI --&gt; BUILD[&quot;📦 Збірка&quot;]\n    BUILD --&gt; CD[&quot;🚀 CD: розгортання&quot;]\n    CD --&gt; PROD[&quot;🌐 Продакшен&quot;]\n    style DEV fill:#fff9c4,stroke:#f9a825\n    style CI fill:#e3f2fd,stroke:#1565c0\n    style CD fill:#e8f5e9,stroke:#388e3c\n    style PROD fill:#fce4ec,stroke:#c2185b\"><svg id=\"exp-1780990250265-3-0\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" class=\"flowchart\" style=\"max-width: 1365.2265625px;\" viewBox=\"0 0 1365.2265625 260\" role=\"graphics-document document\" aria-roledescription=\"flowchart-v2\"><style>#exp-1780990250265-3-0{font-family:system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,Arial,sans-serif;font-size:16px;fill:#333;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#exp-1780990250265-3-0 .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#exp-1780990250265-3-0 .edge-animation-fast{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 20s linear infinite;stroke-linecap:round;}#exp-1780990250265-3-0 .error-icon{fill:#552222;}#exp-1780990250265-3-0 .error-text{fill:#552222;stroke:#552222;}#exp-1780990250265-3-0 .edge-thickness-normal{stroke-width:1px;}#exp-1780990250265-3-0 .edge-thickness-thick{stroke-width:3.5px;}#exp-1780990250265-3-0 .edge-pattern-solid{stroke-dasharray:0;}#exp-1780990250265-3-0 .edge-thickness-invisible{stroke-width:0;fill:none;}#exp-1780990250265-3-0 .edge-pattern-dashed{stroke-dasharray:3;}#exp-1780990250265-3-0 .edge-pattern-dotted{stroke-dasharray:2;}#exp-1780990250265-3-0 .marker{fill:#333333;stroke:#333333;}#exp-1780990250265-3-0 .marker.cross{stroke:#333333;}#exp-1780990250265-3-0 svg{font-family:system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,Arial,sans-serif;font-size:16px;}#exp-1780990250265-3-0 p{margin:0;}#exp-1780990250265-3-0 .label{font-family:s adow dx=\"4\" dy=\"4\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs><defs><filter id=\"exp-1780990250283-4-0-drop-shadow-small\" height=\"150%\" width=\"150%\"><feDropShadow dx=\"2\" dy=\"2\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs></svg></div>\n<table>\n<thead>\n<tr>\n<th>Поняття</th>\n<th>Опис</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><strong>Workflow</strong></td>\n<td>Автоматизований процес, описаний у YAML-файлі</td>\n</tr>\n<tr>\n<td><strong>Event</strong></td>\n<td>Подія, що запускає процес (push, pull request, розклад)</td>\n</tr>\n<tr>\n<td><strong>Job</strong></td>\n<td>Група кроків, що виконуються на одному runner</td>\n</tr>\n<tr>\n<td><strong>Step</strong></td>\n<td>Окрема дія: запуск команди або готового action</td>\n</tr>\n<tr>\n<td><strong>Runner</strong></td>\n<td>Віртуальна машина, на якій виконується job</td>\n</tr>\n<tr>\n<td><strong>Action</strong></td>\n<td>Готовий перевикористовуваний компонент із Marketplace</td>\n</tr>\n</tbody></table>\n","<h1>📄 Анатомія workflow-файлу</h1>\n<p><strong>Головна ідея:</strong> workflow-файли зберігаються у каталозі <code>.github/workflows/</code> та мають розширення <code>.yml</code>. GitHub автоматично виявляє та запускає їх.</p>\n<pre><code class=\"language-yaml hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\"># .github/workflows/ci.yml</span>\n<span class=\"hljs-attr\">name:</span> <span class=\"hljs-string\">CI</span> <span class=\"hljs-string\">Pipeline</span> <span class=\"hljs-comment\"># Назва процесу</span>\n\n<span class=\"hljs-attr\">on:</span> <span class=\"hljs-comment\"># Коли запускати</span>\n  <span class=\"hljs-attr\">push:</span>\n    <span class=\"hljs-attr\">branches:</span> [<span class=\"hljs-string\">main</span>]\n  <span class=\"hljs-attr\">pull_request:</span>\n    <span class=\"hljs-attr\">branches:</span> [<span class=\"hljs-string\">main</span>]\n\n<span class=\"hljs-attr\">jobs:</span> <span class=\"hljs-comment\"># Список завдань</span>\n  <span class=\"hljs-attr\">test:</span>\n    <span class=\"hljs-attr\">runs-on:</span> <span class=\"hljs-string\">ubuntu-latest</span> <span class=\"hljs-comment\"># Операційна система runner</span>\n    <span class=\"hljs-attr\">steps:</span>\n      <span class=\"hljs-bullet\">-</span> <span class=\"hljs-attr\">name:</span> <span class=\"hljs-string\">Клонування</span> <span class=\"hljs-string\">репозиторію</span>\n        <span class=\"hljs-attr\">uses:</span> <span class=\"hljs-string\">actions/checkout@v5</span>\n\n      <span class=\"hljs-bullet\">-</span> <span class=\"hljs-attr\">name:</span> <span class=\"hljs-string\">Налаштування</span> <span class=\"hljs-string\">Node.js</span>\n        <span class=\"hljs-attr\">uses:</span> <span class=\"hljs-string\">actions/setup-node@v5</span>\n        <span class=\"hljs-attr\">with:</span>\n          <span class=\"hljs-attr\">node-version:</span> <span class=\"hljs-number\">22</span>\n\n      <span class=\"hljs-bullet\">-</span> <span class=\"hljs-attr\">name:</span> <span class=\"hljs-string\">Встановлення</span> <span class=\"hljs-string\">залежностей</span>\n        <span class=\"hljs-attr\">run:</span> <span class=\"hljs-string\">npm</span> <span class=\"hljs-string\">ci</span>\n\n      <span class=\"hljs-bullet\">-</span> <span class=\"hljs-attr\">name:</span> <span class=\"hljs-string\">Запуск</span> <span class=\"hljs-string\">тестів</span>\n        <span class=\"hljs-attr\">run:</span> <span class=\"hljs-string\">npm</span> <span class=\"hljs-string\">test</span></code></pre><div class=\"warning\"><strong>⚠️ Особливості синтаксису YAML</strong> <p>YAML чутливий до відступів: використовуйте лише пробіли, не табуляцію. Неправильний відступ є найпоширенішою причиною помилок у workflow-файлах.</p>\n</div>\n\n","<h1>🎯 Тригери запуску</h1>\n<p><strong>Головна ідея:</strong> секція <code>on</code> визначає, які події в репозиторії запускають workflow. Правильний вибір тригерів економить ресурси та час.</p>\n<pre><code class=\"language-yaml hljs\" data-highlighted=\"yes\"><span class=\"hljs-attr\">on:</span>\n  <span class=\"hljs-comment\"># Запуск при push у вказані гілки</span>\n  <span class=\"hljs-attr\">push:</span>\n    <span class=\"hljs-attr\">branches:</span> [<span class=\"hljs-string\">main</span>, <span class=\"hljs-string\">develop</span>]\n\n  <span class=\"hljs-comment\"># Запуск при відкритті або оновленні Pull Request</span>\n  <span class=\"hljs-attr\">pull_request:</span>\n    <span class=\"hljs-attr\">branches:</span> [<span class=\"hljs-string\">main</span>]\n\n  <span class=\"hljs-comment\"># Запуск за розкладом (cron-синтаксис, UTC)</span>\n  <span class=\"hljs-attr\">schedule:</span>\n    <span class=\"hljs-bullet\">-</span> <span class=\"hljs-attr\">cron:</span> <span class=\"hljs-string\">\"0 3 * * 1\"</span> <span class=\"hljs-comment\"># Щопонеділка о 03:00</span>\n\n  <span class=\"hljs-comment\"># Ручний запуск через інтерфейс GitHub</span>\n  <span class=\"hljs-attr\">workflow_dispatch:</span></code></pre><table>\n<thead>\n<tr>\n<th>Тригер</th>\n<th>Типовий сценарій використання</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>push</code></td>\n<td>Перевірка та деплой основних гілок</td>\n</tr>\n<tr>\n<td><code>pull_request</code></td>\n<td>Перевірка коду перед злиттям у головну гілку</td>\n</tr>\n<tr>\n<td><code>schedule</code></td>\n<td>Регулярні задачі: оновлення залежностей, звіти</td>\n</tr>\n<tr>\n<td><code>workflow_dispatch</code></td>\n<td>Ручний запуск розгортання за потреби</td>\n</tr>\n</tbody></table>\n<div class=\"tip\"><strong>💡 Розділення відповідальності</strong> <p>Поширений підхід: на <code>pull_request</code> запускати лише перевірки (лінтинг, тести), а на <code>push</code> у <code>main</code> додатково запускати розгортання.</p>\n</div>\n\n","<h1>🧪 Приклад CI: перевірка якості коду</h1>\n<p><strong>Головна ідея:</strong> базовий CI-конвеєр для веб-проєкту складається з трьох послідовних перевірок: лінтинг, тести, збірка.</p>\n<pre><code class=\"language-yaml hljs\" data-highlighted=\"yes\"><span class=\"hljs-attr\">jobs:</span>\n  <span class=\"hljs-attr\">quality:</span>\n    <span class=\"hljs-attr\">runs-on:</span> <span class=\"hljs-string\">ubuntu-latest</span>\n    <span class=\"hljs-attr\">strategy:</span>\n      <span class=\"hljs-attr\">matrix:</span>\n        <span class=\"hljs-attr\">node-version:</span> [<span class=\"hljs-number\">20</span>, <span class=\"hljs-number\">22</span>] <span class=\"hljs-comment\"># Перевірка на кількох версіях</span>\n    <span class=\"hljs-attr\">steps:</span>\n      <span class=\"hljs-bullet\">-</span> <span class=\"hljs-attr\">uses:</span> <span class=\"hljs-string\">actions/checkout@v5</span>\n\n      <span class=\"hljs-bullet\">-</span> <span class=\"hljs-attr\">uses:</span> <span class=\"hljs-string\">actions/setup-node@v5</span>\n        <span class=\"hljs-attr\">with:</span>\n          <span class=\"hljs-attr\">node-version:</span> <span class=\"hljs-string\">${{</span> <span class=\"hljs-string\">matrix.node-version</span> <span class=\"hljs-string\">}}</span>\n          <span class=\"hljs-attr\">cache:</span> <span class=\"hljs-string\">\"npm\"</span> <span class=\"hljs-comment\"># Вбудоване кешування залежностей</span>\n\n      <span class=\"hljs-bullet\">-</span> <span class=\"hljs-attr\">run:</span> <span class=\"hljs-string\">npm</span> <span class=\"hljs-string\">ci</span> <span class=\"hljs-comment\"># Чиста установка за package-lock.json</span>\n      <span class=\"hljs-bullet\">-</span> <span class=\"hljs-attr\">run:</span> <span class=\"hljs-string\">npm</span> <span class=\"hljs-string\">run</span> <span class=\"hljs-string\">lint</span> <span class=\"hljs-comment\"># Перевірка стилю коду</span>\n      <span class=\"hljs-bullet\">-</span> <span class=\"hljs-attr\">run:</span> <span class=\"hljs-string\">npm</span> <span class=\"hljs-string\">test</span> <span class=\"hljs-comment\"># Запуск тестів</span>\n      <span class=\"hljs-bullet\">-</span> <span class=\"hljs-attr\">run:</span> <span class=\"hljs-string\">npm</span> <span class=\"hljs-string\">run</span> <span class=\"hljs-string\">build</span> <span class=\"hljs-comment\"># Перевірка успішності збірки</span></code></pre><div class=\"note\"><strong>📝 Матрична стратегія (matrix)</strong> <p>Секція <code>strategy.matrix</code> запускає job паралельно для кожної комбінації значень. У прикладі перевірки виконуються одночасно на Node.js 20 та 22, що гарантує сумісність.</p>\n</div>\n\n\n\n\n\n<div class=\"warning\"><strong>⚠️ npm ci проти npm install</strong> <p>У CI-середовищі використовуйте <code>npm ci</code>: ця команда встановлює залежності строго за <code>package-lock.json</code>, працює швидше та забезпечує відтворюваність збірки.</p>\n</div>\n\n","<h1>🔐 Секрети та змінні середовища</h1>\n<div class=\"danger\"><strong>🚫 Критичне правило безпеки</strong> <p>Ніколи не зберігайте паролі, токени та ключі API безпосередньо у workflow-файлах. Вони стають видимими в історії репозиторію та доступними кожному, хто має доступ до коду.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> конфіденційні дані зберігаються у зашифрованих GitHub Secrets та підставляються у workflow під час виконання через синтаксис <code>${{ secrets.НАЗВА }}</code>.</p>\n<pre><code class=\"language-yaml hljs\" data-highlighted=\"yes\"><span class=\"hljs-attr\">jobs:</span>\n  <span class=\"hljs-attr\">deploy:</span>\n    <span class=\"hljs-attr\">runs-on:</span> <span class=\"hljs-string\">ubuntu-latest</span>\n    <span class=\"hljs-attr\">steps:</span>\n      <span class=\"hljs-bullet\">-</span> <span class=\"hljs-attr\">uses:</span> <span class=\"hljs-string\">actions/checkout@v5</span>\n\n      <span class=\"hljs-bullet\">-</span> <span class=\"hljs-attr\">name:</span> <span class=\"hljs-string\">Розгортання</span> <span class=\"hljs-string\">з</span> <span class=\"hljs-string\">токеном</span>\n        <span class=\"hljs-attr\">run:</span> <span class=\"hljs-string\">npx</span> <span class=\"hljs-string\">deploy-tool</span> <span class=\"hljs-string\">--token=$DEPLOY_TOKEN</span>\n        <span class=\"hljs-attr\">env:</span>\n          <span class=\"hljs-comment\"># Секрет підставляється безпечно, не потрапляє у логи</span>\n          <span class=\"hljs-attr\">DEPLOY_TOKEN:</span> <span class=\"hljs-string\">${{</span> <span class=\"hljs-string\">secrets.DEPLOY_TOKEN</span> <span class=\"hljs-string\">}}</span>\n          <span class=\"hljs-attr\">DATABASE_URL:</span> <span class=\"hljs-string\">${{</span> <span class=\"hljs-string\">secrets.DATABASE_URL</span> <span class=\"hljs-string\">}}</span></code></pre><div class=\"tip\"><strong>💡 Налаштування секретів</strong> <p>Секрети додаються в інтерфейсі репозиторію: Settings, далі Secrets and variables, далі Actions. GitHub автоматично маскує їхні значення у логах, замінюючи на зірочки.</p>\n</div>\n\n","<h1>💾 Кешування залежностей</h1>\n<p><strong>Головна ідея:</strong> встановлення залежностей повторюється у кожному запуску та займає значний час. Кешування зберігає завантажені пакети між запусками, прискорюючи конвеєр.</p>\n<pre><code class=\"language-yaml hljs\" data-highlighted=\"yes\"><span class=\"hljs-attr\">steps:</span>\n  <span class=\"hljs-bullet\">-</span> <span class=\"hljs-attr\">uses:</span> <span class=\"hljs-string\">actions/checkout@v5</span>\n\n  <span class=\"hljs-comment\"># Варіант 1: вбудоване кешування у setup-node (рекомендовано)</span>\n  <span class=\"hljs-bullet\">-</span> <span class=\"hljs-attr\">uses:</span> <span class=\"hljs-string\">actions/setup-node@v5</span>\n    <span class=\"hljs-attr\">with:</span>\n      <span class=\"hljs-attr\">node-version:</span> <span class=\"hljs-number\">22</span>\n      <span class=\"hljs-attr\">cache:</span> <span class=\"hljs-string\">\"npm\"</span> <span class=\"hljs-comment\"># Автоматичне кешування на основі package-lock.json</span>\n\n  <span class=\"hljs-bullet\">-</span> <span class=\"hljs-attr\">run:</span> <span class=\"hljs-string\">npm</span> <span class=\"hljs-string\">ci</span></code></pre>\n<div class=\"mermaid\" data-source=\"graph LR\n    START[&quot;▶️ Старт job&quot;] --&gt; CHECK{&quot;Кеш існує?&quot;}\n    CHECK --&gt;|&quot;Так&quot;| RESTORE[&quot;♻️ Відновити кеш&quot;]\n    CHECK --&gt;|&quot;Ні&quot;| INSTALL[&quot;⬇️ Завантажити пакети&quot;]\n    RESTORE --&gt; FAST[&quot;⚡ Швидке встановлення&quot;]\n    INSTALL --&gt; SAVE[&quot;💾 Зберегти кеш&quot;]\n    style START fill:#fff9c4,stroke:#f9a825\n    style RESTORE fill:#e8f5e9,stroke:#388e3c\n    style INSTALL fill:#fff3e0,stroke:#ef6c00\n    style FAST fill:#e3f2fd,stroke:#1565c0\"><svg id=\"exp-1780990250297-9-0\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" class=\"flowchart\" style=\"max-width: 924.6484375px;\" viewBox=\"0 0 924.6484375 162\" role=\"graphics-document document\" aria-roledescription=\"flowchart-v2\"><style>#exp-1780990250297-9-0{font-family:system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,Arial,sans-serif;font-size:16px;fill:#333;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#exp-1780990250297-9-0 .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#exp-1780990250297-9-0 .edge-animation-fast{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 20s linear infinite;stroke-linecap:round;}#exp-1780990250297-9-0 .error-icon{fill:#552222;}#exp-1780990250297-9-0 .error-text{fill:#552222;stroke:#552222;}#exp-1780990250297-9-0 .edge-thickness-normal{stroke-width:1px;}#exp-1780990250297-9-0 .edge-thickness-thick{stroke-width:3.5px;}#exp-1780990250297-9-0 .edge-pattern-solid{stroke-dasharray:0;}#exp-1780990250297-9-0 .edge-thickness-invisible{stroke-width:0;fill:none;}#exp-1780990250297-9-0 .edge-pattern-dashed{stroke-dasharray:3;}#e space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>👤 Підтвердження</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1780990250308-10-0-flowchart-PROD-5\" data-look=\"classic\" transform=\"translate(915.48828125, 100.27734375)\"><rect class=\"basic label-container\" style=\"fill:#fce4ec !important;stroke:#c2185b !important\" x=\"-73.68359375\" y=\"-24\" width=\"147.3671875\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-49.68359375, -12)\"><rect></rect><foreignObject width=\"99.3671875\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>🌐 Production</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1780990250308-10-0-flowchart-QA-7\" data-look=\"classic\" transform=\"translate(616.8671875, 266.5546875)\"><rect class=\"basic label-container\" style=\"fill:#e3f2fd !important;stroke:#1565c0 !important\" x=\"-97.8125\" y=\"-24\" width=\"195.625\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-73.8125, -12)\"><rect></rect><foreignObject width=\"147.625\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>🔬 Перевірка якості</p></span></div></foreignObject></g></g></g></g></g><defs><filter id=\"exp-1780990250308-10-0-drop-shadow\" height=\"130%\" width=\"130%\"><feDropShadow dx=\"4\" dy=\"4\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs><defs><filter id=\"exp-1780990250308-10-0-drop-shadow-small\" height=\"150%\" width=\"150%\"><feDropShadow dx=\"2\" dy=\"2\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs></svg></div>\n<table>\n<thead>\n<tr>\n<th>Середовище</th>\n<th>English</th>\n<th>Призначення</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Розробницьке</td>\n<td>Development</td>\n<td>Локальна машина розробника</td>\n</tr>\n<tr>\n<td>Проміжне</td>\n<td>Staging</td>\n<td>Копія продакшену для фінального тестування</td>\n</tr>\n<tr>\n<td>Продакшен</td>\n<td>Production</td>\n<td>Робоче середовище, доступне реальним користувачам</td>\n</tr>\n</tbody></table>\n<div class=\"tip\"><strong>💡 Залежності між завданнями</strong> <p>У GitHub Actions ключове слово <code>needs</code> гарантує, що деплой запускається лише після успішного завершення перевірок: <code>needs: [quality]</code>.</p>\n</div>\n\n","<h1>☁️ Хмарні платформи для деплою</h1>\n<p><strong>Головна ідея:</strong> сучасні PaaS-платформи (Platform as a Service) спрощують розгортання: вони підключаються до репозиторію та автоматично розгортають застосунок при кожному push.</p>\n<table>\n<thead>\n<tr>\n<th>Платформа</th>\n<th>Сильна сторона</th>\n<th>Типове застосування</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><strong>Vercel</strong></td>\n<td>Оптимізація frontend, serverless-функції</td>\n<td>React, Next.js застосунки</td>\n</tr>\n<tr>\n<td><strong>Netlify</strong></td>\n<td>Статичні сайти, проста конфігурація</td>\n<td>Односторінкові застосунки, лендинги</td>\n</tr>\n<tr>\n<td><strong>Render</strong></td>\n<td>Повноцінний backend із керованою базою даних</td>\n<td>Nest.js API з PostgreSQL</td>\n</tr>\n<tr>\n<td><strong>Railway</strong></td>\n<td>Швидке налаштування інфраструктури та БД</td>\n<td>Full-stack проєкти з базою даних</td>\n</tr>\n<tr>\n<td><strong>Fly.io</strong></td>\n<td>Розгортання контейнерів у різних регіонах</td>\n<td>Застосунки з вимогами до географії</td>\n</tr>\n</tbody></table>\n<div class=\"note\"><strong>📝 Автоматичний деплой без workflow</strong> <p>Більшість цих платформ підключаються до GitHub напряму та розгортають проєкт при кожному push, без написання workflow-файлу. GitHub Actions потрібен, коли перед деплоєм слід виконати власні перевірки або складніші кроки.</p>\n</div>\n\n\n\n\n\n<div class=\"warning\"><strong>⚠️ Безкоштовні тарифи</strong> <p>Безкоштовні плани мають обмеження: backend-сервіси можуть засинати після періоду неактивності, а ресурси обмежені. Для навчальних проєктів цього зазвичай достатньо.</p>\n</div>\n\n","<h1>📦 Особливості деплою frontend та backend</h1>\n<p><strong>Головна ідея:</strong> frontend та backend розгортаються по-різному, оскільки мають різну природу: статичні файли проти постійно працюючого сервера.</p>\n<h2>🎨 Frontend (React, Vite)</h2>\n<pre><code class=\"language-bash hljs\" data-highlighted=\"yes\">npm run build        <span class=\"hljs-comment\"># Створює статичні файли у каталозі dist/</span></code></pre><p>Результат збірки: набір статичних файлів (HTML, CSS, JS), які роздаються через CDN. Сервер не потрібен.</p>\n<h2>⚙️ Backend (Nest.js)</h2>\n<p>Backend є процесом, що постійно працює та обробляє запити. Для розгортання потрібні:</p>\n<table>\n<thead>\n<tr>\n<th>Потреба</th>\n<th>Опис</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Постійний процес</td>\n<td>Сервер запущено та слухає вхідні запити</td>\n</tr>\n<tr>\n<td>База даних</td>\n<td>Окремий керований екземпляр PostgreSQL</td>\n</tr>\n<tr>\n<td>Змінні середовища</td>\n<td>Рядок підключення до БД, секрети, налаштування</td>\n</tr>\n<tr>\n<td>Міграції</td>\n<td>Застосування змін схеми бази даних перед стартом</td>\n</tr>\n</tbody></table>\n<div class=\"danger\"><strong>🚫 Конфігурація через змінні середовища</strong> <p>Налаштування продакшену (рядок підключення до БД, секрети) задаються виключно через змінні середовища платформи, а не у коді. Це правило стосується і frontend, і backend.</p>\n</div>\n\n","<h1>🤖 Приклад: повний CI/CD-конвеєр</h1>\n<p><strong>Головна ідея:</strong> деплой залежить від успішної перевірки через <code>needs</code>. Розгортання у продакшен виконується лише з гілки <code>main</code>.</p>\n<pre><code class=\"language-yaml hljs\" data-highlighted=\"yes\"><span class=\"hljs-attr\">name:</span> <span class=\"hljs-string\">CI/CD</span>\n\n<span class=\"hljs-attr\">on:</span>\n  <span class=\"hljs-attr\">push:</span>\n    <span class=\"hljs-attr\">branches:</span> [<span class=\"hljs-string\">main</span>]\n\n<span class=\"hljs-attr\">jobs:</span>\n  <span class=\"hljs-attr\">quality:</span> <span class=\"hljs-comment\"># Етап 1: перевірка</span>\n    <span class=\"hljs-attr\">runs-on:</span> <span class=\"hljs-string\">ubuntu-latest</span>\n    <span class=\"hljs-attr\">steps:</span>\n      <span class=\"hljs-bullet\">-</span> <span class=\"hljs-attr\">uses:</span> <span class=\"hljs-string\">actions/checkout@v5</span>\n      <span class=\"hljs-bullet\">-</span> <span class=\"hljs-attr\">uses:</span> <span class=\"hljs-string\">actions/setup-node@v5</span>\n        <span class=\"hljs-attr\">with:</span>\n          <span class=\"hljs-attr\">node-version:</span> <span class=\"hljs-number\">22</span>\n          <span class=\"hljs-attr\">cache:</span> <span class=\"hljs-string\">\"npm\"</span>\n      <span class=\"hljs-bullet\">-</span> <span class=\"hljs-attr\">run:</span> <span class=\"hljs-string\">npm</span> <span class=\"hljs-string\">ci</span>\n      <span class=\"hljs-bullet\">-</span> <span class=\"hljs-attr\">run:</span> <span class=\"hljs-string\">npm</span> <span class=\"hljs-string\">run</span> <span class=\"hljs-string\">lint</span>\n      <span class=\"hljs-bullet\">-</span> <span class=\"hljs-attr\">run:</span> <span class=\"hljs-string\">npm</span> <span class=\"hljs-string\">test</span>\n      <span class=\"hljs-bullet\">-</span> <span class=\"hljs-attr\">run:</span> <span class=\"hljs-string\">npm</span> <span class=\"hljs-string\">run</span> <span class=\"hljs-string\">build</span>\n\n  <span class=\"hljs-attr\">deploy:</span> <span class=\"hljs-comment\"># Етап 2: деплой</span>\n    <span class=\"hljs-attr\">needs:</span> <span class=\"hljs-string\">quality</span> <span class=\"hljs-comment\"># Запуск лише після успішної перевірки</span>\n    <span class=\"hljs-attr\">runs-on:</span> <span class=\"hljs-string\">ubuntu-latest</span>\n    <span class=\"hljs-attr\">steps:</span>\n      <span class=\"hljs-bullet\">-</span> <span class=\"hljs-attr\">uses:</span> <span class=\"hljs-string\">actions/checkout@v5</span>\n      <span class=\"hljs-bullet\">-</span> <span class=\"hljs-attr\">name:</span> <span class=\"hljs-string\">Розгортання</span>\n        <span class=\"hljs-attr\">run:</span> <span class=\"hljs-string\">npx</span> <span class=\"hljs-string\">platform-cli</span> <span class=\"hljs-string\">deploy</span>\n        <span class=\"hljs-attr\">env:</span>\n          <span class=\"hljs-attr\">API_TOKEN:</span> <span class=\"hljs-string\">${{</span> <span class=\"hljs-string\">secrets.API_TOKEN</span> <span class=\"hljs-string\">}}</span></code></pre><div class=\"success\"><strong>✅ Результат</strong> <p>Кожен push у <code>main</code> автоматично перевіряє код та, у разі успіху, розгортає нову версію застосунку. Якщо хоча б одна перевірка не пройшла, деплой не запускається.</p>\n</div>\n\n","<h1>✅ Найкращі практики CI/CD</h1>\n<div class=\"tip\"><strong>💡 Рекомендації для надійного конвеєра</strong> <ol>\n<li><p><strong>🔒 Захищайте головну гілку:</strong> налаштуйте branch protection, щоб зливати код лише після успішних перевірок та рев'ю.</p>\n</li>\n<li><p><strong>⚡ Тримайте конвеєр швидким:</strong> використовуйте кешування та паралельні jobs; повільний конвеєр сповільнює всю команду.</p>\n</li>\n<li><p><strong>🔐 Зберігайте секрети окремо:</strong> лише через GitHub Secrets, ніколи у коді.</p>\n</li>\n<li><p><strong>🧪 Перевіряйте перед деплоєм:</strong> деплой має залежати від проходження всіх тестів через <code>needs</code>.</p>\n</li>\n<li><p><strong>📌 Фіксуйте версії actions:</strong> вказуйте щонайменше мажорну версію (<code>@v5</code>) замість посилання на гілку (<code>@main</code>); для повної відтворюваності можна закріпити конкретний commit SHA.</p>\n</li>\n<li><p><strong>🎯 Розділяйте середовища:</strong> спочатку staging, потім production.</p>\n</li>\n</ol>\n</div>\n\n\n\n\n\n<div class=\"warning\"><strong>⚠️ Поширена помилка</strong> <p>Розгортання без попередніх перевірок зводить нанівець саму ідею CI/CD. Деплой неперевіреного коду у продакшен стає джерелом збоїв, що бачать користувачі.</p>\n</div>\n\n","<h1>🎓 Підсумки курсу</h1>\n<p><strong>Головна ідея:</strong> курс провів вас повним шляхом створення сучасного веб-застосунку: від мови програмування до розгортання у продакшені.</p>\n\n<div class=\"mermaid\" data-source=\"graph LR\n    LANG[&quot;📜 Мова: JS / TS&quot;] --&gt; FE[&quot;🎨 Frontend: React&quot;]\n    FE --&gt; BE[&quot;⚙️ Backend: Nest.js&quot;]\n    BE --&gt; DB[&quot;🗄️ База даних: PostgreSQL&quot;]\n    DB --&gt; FULL[&quot;🔗 Full-stack інтеграція&quot;]\n    FULL --&gt; DEPLOY[&quot;🚀 Деплой: CI/CD&quot;]\n    style LANG fill:#fff9c4,stroke:#f9a825\n    style FE fill:#e3f2fd,stroke:#1565c0\n    style BE fill:#e8f5e9,stroke:#388e3c\n    style DB fill:#fce4ec,stroke:#c2185b\n    style DEPLOY fill:#f3e5f5,stroke:#7b1fa2\"><svg id=\"exp-1780990250317-15-0\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" class=\"flowchart\" style=\"max-width: 1451.6484375px;\" viewBox=\"0 0 1451.6484375 64\" role=\"graphics-document document\" aria-roledescription=\"flowchart-v2\"><style>#exp-1780990250317-15-0{font-family:system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,Arial,sans-serif;font-size:16px;fill:#333;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#exp-1780990250317-15-0 .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#exp-1780990250317-15-0 .edge-animation-fast{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 20s linear infinite;stroke-linecap:round;}#exp-1780990250317-15-0 .error-icon{fill:#552222;}#exp-1780990250317-15-0 .error-text{fill:#5 "0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs><defs><filter id=\"exp-1780990250317-15-0-drop-shadow-small\" height=\"150%\" width=\"150%\"><feDropShadow dx=\"2\" dy=\"2\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs></svg></div>\n<table>\n<thead>\n<tr>\n<th>Напрям</th>\n<th>Опановані технології та навички</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>📜 Основи</td>\n<td>Сучасний JavaScript (ES6+), статична типізація TypeScript</td>\n</tr>\n<tr>\n<td>🎨 Frontend</td>\n<td>Компоненти, хуки, форми, маршрутизація, управління станом React</td>\n</tr>\n<tr>\n<td>⚙️ Backend</td>\n<td>Архітектура Nest.js, сервіси, валідація, аутентифікація</td>\n</tr>\n<tr>\n<td>🗄️ Дані</td>\n<td>SQL, проєктування схеми, TypeORM, зв'язки між таблицями</td>\n</tr>\n<tr>\n<td>🔗 Інтеграція</td>\n<td>Зв'язок frontend та backend, робота з файлами, обробка помилок</td>\n</tr>\n<tr>\n<td>🚀 DevOps</td>\n<td>Контейнеризація, автоматизація CI/CD, розгортання у хмарі</td>\n</tr>\n</tbody></table>\n","<h1>✅ Ключові висновки</h1>\n<div class=\"success\"><strong>✅ Підсумок лекції</strong> <p><strong>📌 Що ми вивчили:</strong></p>\n<ol>\n<li><p><strong>CI/CD</strong> автоматизує інтеграцію, тестування та доставку коду, забезпечуючи швидкий зворотний зв'язок та надійні релізи.</p>\n</li>\n<li><p><strong>GitHub Actions</strong> описує автоматизацію у YAML-файлах через поняття workflow, jobs, steps та runners.</p>\n</li>\n<li><p><strong>Тригери</strong> (<code>push</code>, <code>pull_request</code>, <code>schedule</code>, <code>workflow_dispatch</code>) визначають, коли запускається конвеєр.</p>\n</li>\n<li><p><strong>Секрети</strong> зберігаються зашифрованими у GitHub Secrets та ніколи не потрапляють у код.</p>\n</li>\n<li><p><strong>Кешування</strong> залежностей суттєво прискорює виконання конвеєра.</p>\n</li>\n<li><p><strong>Хмарні платформи</strong> (Vercel, Netlify, Render, Railway, Fly.io) спрощують розгортання frontend та backend.</p>\n</li>\n<li><p><strong>Деплой</strong> має залежати від успішних перевірок та використовувати окремі середовища для staging і production.</p>\n</li>\n</ol>\n</div>\n\n","<h1>❓ Контрольні питання</h1>\n<ol>\n<li><p>🤔 У чому різниця між Continuous Integration, Continuous Delivery та Continuous Deployment?</p>\n</li>\n<li><p>🤔 Що таке workflow, job, step та runner у GitHub Actions? Як вони пов'язані між собою?</p>\n</li>\n<li><p>🤔 Які тригери запуску workflow ви знаєте? Чому на <code>pull_request</code> зазвичай запускають лише перевірки?</p>\n</li>\n<li><p>🤔 Чому конфіденційні дані не можна зберігати у workflow-файлі та як правильно з ними працювати?</p>\n</li>\n<li><p>🤔 Для чого використовується кешування залежностей і на основі чого формується ключ кешу?</p>\n</li>\n<li><p>🤔 Чим відрізняється розгортання frontend від розгортання backend? Чому?</p>\n</li>\n<li><p>🤔 Як гарантувати, що деплой запускається лише після успішного проходження перевірок?</p>\n</li>\n</ol>\n","<h1>📖 Глосарій термінів</h1>\n<table>\n<thead>\n<tr>\n<th>Термін</th>\n<th>English</th>\n<th>Визначення</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Конвеєр</td>\n<td>Pipeline</td>\n<td>Послідовність автоматичних етапів обробки зміни коду</td>\n</tr>\n<tr>\n<td>Безперервна інтеграція</td>\n<td>Continuous Integration</td>\n<td>Регулярне злиття та автоматична перевірка змін коду</td>\n</tr>\n<tr>\n<td>Безперервне розгортання</td>\n<td>Continuous Deployment</td>\n<td>Автоматична доставка перевіреного коду у продакшен</td>\n</tr>\n<tr>\n<td>Робочий процес</td>\n<td>Workflow</td>\n<td>Автоматизований процес, описаний у YAML-файлі</td>\n</tr>\n<tr>\n<td>Завдання</td>\n<td>Job</td>\n<td>Група кроків, що виконуються на одному runner</td>\n</tr>\n<tr>\n<td>Runner</td>\n<td>Runner</td>\n<td>Віртуальна машина для виконання завдань</td>\n</tr>\n<tr>\n<td>Секрет</td>\n<td>Secret</td>\n<td>Зашифроване конфіденційне значення для використання у процесі</td>\n</tr>\n<tr>\n<td>Проміжне середовище</td>\n<td>Staging</td>\n<td>Копія продакшену для фінального тестування перед релізом</td>\n</tr>\n<tr>\n<td>Продакшен</td>\n<td>Production</td>\n<td>Робоче середовище, доступне реальним користувачам</td>\n</tr>\n</tbody></table>\n","<h1>📖 Глосарій абревіатур</h1>\n<table>\n<thead>\n<tr>\n<th>Абревіатура</th>\n<th>Розшифровка</th>\n<th>Переклад</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>CI</td>\n<td>Continuous Integration</td>\n<td>Безперервна інтеграція</td>\n</tr>\n<tr>\n<td>CD</td>\n<td>Continuous Delivery / Deployment</td>\n<td>Безперервна доставка / розгортання</td>\n</tr>\n<tr>\n<td>CI/CD</td>\n<td>Continuous Integration / Delivery</td>\n<td>Автоматизація інтеграції та доставки</td>\n</tr>\n<tr>\n<td>YAML</td>\n<td>YAML Ain't Markup Language</td>\n<td>Формат файлів конфігурації</td>\n</tr>\n<tr>\n<td>PaaS</td>\n<td>Platform as a Service</td>\n<td>Платформа як послуга</td>\n</tr>\n<tr>\n<td>CDN</td>\n<td>Content Delivery Network</td>\n<td>Мережа доставки контенту</td>\n</tr>\n<tr>\n<td>API</td>\n<td>Application Programming Interface</td>\n<td>Програмний інтерфейс застосунку</td>\n</tr>\n<tr>\n<td>QA</td>\n<td>Quality Assurance</td>\n<td>Забезпечення якості</td>\n</tr>\n<tr>\n<td>UTC</td>\n<td>Coordinated Universal Time</td>\n<td>Всесвітній координований час</td>\n</tr>\n<tr>\n<td>PR</td>\n<td>Pull Request</td>\n<td>Запит на злиття змін</td>\n</tr>\n</tbody></table>\n"];let currentSlideIndex=0;
function renderMath(root){if(typeof renderMathInElement!=="function"||!root)return;try{renderMathInElement(root,{delimiters:[{left:"$$",right:"$$",display:true},{left:"\\[",right:"\\]",display:true},{left:"$",right:"$",display:false},{left:"\\(",right:"\\)",display:false}],throwOnError:false,strict:"ignore",ignoredTags:["script","noscript","style","textarea","pre","code"]});}catch(e){console.warn("Math render error:",e);}}
function showSlide(i){if(i<0||i>=slides.length)return;currentSlideIndex=i;const el=document.getElementById("current-slide");el.innerHTML=slides[i];el.scrollTop=0;renderMath(el);document.getElementById("progress-bar").style.width=((i+1)/slides.length*100)+"%";document.getElementById("slide-number").textContent=(i+1)+" / "+slides.length;updateSidebarActive();}
function nextSlide(){if(currentSlideIndex<slides.length-1)showSlide(currentSlideIndex+1);}
function previousSlide(){if(currentSlideIndex>0)showSlide(currentSlideIndex-1);}
function toggleSidebar(){document.getElementById("sidebar").classList.toggle("open");}
function toggleHelp(){document.getElementById("help-overlay").classList.toggle("hidden");}
function toggleFullscreen(){if(!document.fullscreenElement){const pc=document.getElementById("presentation-container");if(pc.requestFullscreen)pc.requestFullscreen();else if(pc.webkitRequestFullscreen)pc.webkitRequestFullscreen();else if(pc.msRequestFullscreen)pc.msRequestFullscreen();else if(pc.mozRequestFullScreen)pc.mozRequestFullScreen();}else{if(document.exitFullscreen)document.exitFullscreen();else if(document.webkitExitFullscreen)document.webkitExitFullscreen();else if(document.msExitFullscreen)document.msExitFullscreen();else if(document.mozCancelFullScreen)document.mozCancelFullScreen();}}
function generateSidebar(){const sc=document.getElementById("sidebar-content");sc.innerHTML="";slides.forEach((html,idx)=>{const t=document.createElement("div");t.className="slide-thumbnail";if(idx===0)t.classList.add("active");const tmp=document.createElement("div");tmp.innerHTML=html;const title=tmp.querySelector("h1,h2");const titleText=title?title.textContent:("Слайд "+(idx+1));const textContent=tmp.textContent.replace(/s+/g," ").trim();const preview=textContent.substring(0,100)+(textContent.length>100?"...":"");t.innerHTML="<div class=\"slide-thumbnail-number\">"+(idx+1)+"</div><div class=\"slide-thumbnail-title\">"+titleText+"</div><div class=\"slide-thumbnail-content\">"+preview+"</div>";t.onclick=()=>{showSlide(idx);if(window.innerWidth<1024)toggleSidebar();};sc.appendChild(t);});}
function updateSidebarActive(){document.querySelectorAll(".slide-thumbnail").forEach((th,idx)=>{if(idx===currentSlideIndex){th.classList.add("active");th.scrollIntoView({behavior:"smooth",block:"nearest"});}else th.classList.remove("active");});}
document.addEventListener("keydown",e=>{switch(e.key){case"ArrowLeft":previousSlide();break;case"ArrowRight":case" ":e.preventDefault();nextSlide();break;case"f":case"F":toggleFullscreen();break;case"s":case"S":toggleSidebar();break;case"?":toggleHelp();break;case"Escape":const sb=document.getElementById("sidebar");const ho=document.getElementById("help-overlay");if(sb.classList.contains("open"))toggleSidebar();else if(!ho.classList.contains("hidden"))ho.classList.add("hidden");break;}});
generateSidebar();showSlide(0);</script></body></html>
