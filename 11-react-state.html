<!DOCTYPE html><html lang="uk"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>React: управління станом</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css"><style>* {
            margin: 0;

        .slide {

        @keyframes slideIn {

        .slide::-webkit-scrollbar-thumb {

            border-radius: 10px;
        }

        .slide h1 {

            border-bottom: 3px solid #667eea;

        .slide p {

        .slide ul, .slide ol {

        .slide li {

        .slide-number {

        #sidebar-header {

        #sidebar-toggle {

        .mermaid {

        /* Запобігаємо обрізанню останньої літери в нодах Mermaid через зміну font-weight після розрахунку розміру */

        .plantuml-diagram {

        #help-overlay {

        .mermaid-error pre {

        /* Повноекранний режим - зберігаємо оригінальний фон */
        #presentation-container:fullscreen {

        #presentation-container:-webkit-full-screen {

        #presentation-container:-moz-full-screen {

#presentation-container:fullscreen,#presentation-container:-webkit-full-screen,#presentation-container:-moz-full-screen,#presentation-container:-ms-fullscreen{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%)!important;}</style></head><body><div id="presentation-container"><div class="progress"><div class="progress-bar" id="progress-bar"></div></div><button id="sidebar-toggle" onclick="toggleSidebar()" title="Навігація слайдами (S)">☰</button><div id="sidebar"><div id="sidebar-header"><h3>📑 Слайди</h3><button id="sidebar-close" onclick="toggleSidebar()">✕</button></div><div id="sidebar-content"></div></div><div class="slide-container"><div class="slide" id="current-slide"></div></div><div class="controls"><button class="control-btn" onclick="previousSlide()" title="Попередній (←)">←</button><button class="control-btn" onclick="nextSlide()" title="Наступний (→)">→</button><button class="control-btn" onclick="toggleFullscreen()" title="Повноекранний режим (F)">⛶</button><button class="control-btn" onclick="toggleHelp()" title="Допомога (?)">?</button></div><div class="slide-number" id="slide-number">1 / 20</div><div id="help-overlay" class="hidden"><strong>Гарячі клавіші:</strong><br><kbd>←</kbd> <kbd>→</kbd> Навігація<br><kbd>F</kbd> Повноекранний режим<br><kbd>S</kbd> Sidebar<br><kbd>?</kbd> Допомога<br><kbd>Esc</kbd> Закрити</div></div><script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script><script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script><script>const slides=["<h1>React: управління станом</h1>\n<p><strong>Сучасні технології Internet-програмування</strong></p>\n<p>Лектор: Кобилянський Антон</p>\n","<h1>📋 План лекції</h1>\n<ol>\n<li>🧩 Проблема prop drilling — коли props заважають</li>\n<li>🌐 Context API — глобальні дані без передачі через props</li>\n<li>🔌 useContext — споживання контексту в компонентах</li>\n<li>🗂️ Context API на практиці: TasksContext</li>\n<li>⚠️ Обмеження Context API та розділення контексту</li>\n<li>🔀 useReducer — управління складним станом</li>\n<li>🔗 useReducer + Context — глобальний стан</li>\n<li>🐻 Zustand — легка бібліотека для глобального стану</li>\n<li>🏛️ Redux — короткий огляд та місце в екосистемі</li>\n<li>🧭 Як обрати інструмент для стану</li>\n</ol>\n","<h1>🧩 Проблема prop drilling</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>Prop drilling</strong> (прокидання пропсів) — ситуація, коли дані передаються через кілька рівнів компонентів лише для того, щоб дістатися до глибоко вкладеного компонента, якому вони насправді потрібні.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> Коли застосунок зростає, передача даних через props перетворюється на проблему — «проміжні» компоненти знають про дані, що їм не потрібні.</p>\n<h2>📉 Наочний приклад</h2>\n<pre><code class=\"language-tsx hljs language-typescript\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// Проблема: App зберігає currentUser, але реально використовує його</span>\n<span class=\"hljs-comment\">// лише UserPanel — найглибший компонент у дереві.</span>\n<span class=\"hljs-comment\">// Layout і Sidebar є «транзитними»: вони отримують prop лише щоб передати далі.</span>\n\n<span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">App</span>(<span class=\"hljs-params\"></span>) {\n  <span class=\"hljs-keyword\">const</span> [currentUser, setCurrentUser] = useState&lt;<span class=\"hljs-title class_\">User</span>&gt;({\n    <span class=\"hljs-attr\">id</span>: <span class=\"hljs-number\">1</span>,\n    <span class=\"hljs-attr\">name</span>: <span class=\"hljs-string\">\"Олена\"</span>,\n  });\n\n  <span class=\"hljs-keyword\">return</span> <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">Layout</span> <span class=\"hljs-attr\">currentUser</span>=<span class=\"hljs-string\">{currentUser}</span> /&gt;</span></span>; <span class=\"hljs-comment\">// ← Передаємо вниз</span>\n}\n\n<span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">Layout</span>(<span class=\"hljs-params\">{ currentUser }: { currentUser: User }</span>) {\n  <span class=\"hljs-comment\">// Layout не використовує currentUser — лише передає далі!</span>\n  <span class=\"hljs-keyword\">return</span> <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">Sidebar</span> <span class=\"hljs-attr\">currentUser</span>=<span class=\"hljs-string\">{currentUser}</span> /&gt;</span></span>;\n}\n\n<span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">Sidebar</span>(<span class=\"hljs-params\">{ currentUser }: { currentUser: User }</span>) {\n  <span class=\"hljs-comment\">// Sidebar також не використовує — знову просто передає</span>\n  <span class=\"hljs-keyword\">return</span> <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">UserPanel</span> <span class=\"hljs-attr\">currentUser</span>=<span class=\"hljs-string\">{currentUser}</span> /&gt;</span></span>;\n}\n\n<span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">UserPanel</span>(<span class=\"hljs-params\">{ currentUser }: { currentUser: User }</span>) {\n  <span class=\"hljs-keyword\">return</span> <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">p</span>&gt;</span>👤 {currentUser.name}<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">p</span>&gt;</span></span>; <span class=\"hljs-comment\">// ← Нарешті використовуємо!</span>\n}</code></pre><h2>🔴 Наслідки Prop Drilling</h2>\n<table>\n<thead>\n<tr>\n<th>Проблема</th>\n<th>Що відбувається</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>🔗 Тісне зв'язування</td>\n<td>Проміжні компоненти залежать від даних, яких не використовують</td>\n</tr>\n<tr>\n<td>🔧 Складний рефакторинг</td>\n<td>Зміна структури даних → правити типи у всіх компонентах ланцюга</td>\n</tr>\n<tr>\n<td>📖 Погана читабельність</td>\n<td>Незрозуміло, звідки прийшов і куди йде конкретний prop</td>\n</tr>\n<tr>\n<td>🧪 Складне тестування</td>\n<td>Для тесту компонента треба передати всі «транзитні» props</td>\n</tr>\n</tbody></table>\n","<h1>🌐 Context API — як це вирішує проблему</h1>\n<p><strong>Головна ідея:</strong> Context API дозволяє передавати дані наскрізь через дерево компонентів без явної передачі через props на кожному рівні. Компонент може підписатись на контекст та отримати дані напряму.</p>\n<h2>🔄 Порівняння підходів</h2>\n\n<div class=\"mermaid\" data-source=\"graph TD\n    subgraph DRILLING[&quot;Prop Drilling (проблема)&quot;]\n        A1[&quot;App (user)&quot;] --&gt; B1[&quot;Layout (user)&quot;]\n        B1 --&gt; C1[&quot;Sidebar (user)&quot;]\n        C1 --&gt; D1[&quot;UserPanel (user)&quot;]\n    end\n    subgraph CONTEXT[&quot;Context API (рішення)&quot;]\n        A2[&quot;App (Provider)&quot;] --&gt; B2[&quot;Layout&quot;]\n        B2 --&gt; C2[&quot;Sidebar&quot;]\n        C2 --&gt; D2[&quot;UserPanel (useContext)&quot;]\n        A2 -.-&gt;|&quot;контекст&quot;| D2\n    end\n    style DRILLING fill:#fce4ec,stroke:#c2185b\n    style CONTEXT fill:#e8f5e9,stroke:#388e3c\"><svg id=\"exp-1773079959386-3-0\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" class=\"flowchart\" style=\"max-width: 1900.734375px;\" viewBox=\"0 0 1900.734375 179.25\" role=\"graphics-document document\" aria-roledescription=\"flowchart-v2\"><style>#exp-1773079959386-3-0{font-family:system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,Arial,sans-serif;font-size:16px;fill:#333;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#exp-1773079959386-3-0 .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#exp-1773079959386-3-0 .edge-animation-fast{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 20s linear infinite;stroke-linecap:round;}#exp-17730799593  class=\"edgeLabel\"><g class=\"label\" data-id=\"L_C1_D1_0\" transform=\"translate(0, 0)\"><text y=\"-10.1\"><tspan class=\"text-outer-tspan\" x=\"0\" y=\"-0.1em\" dy=\"1.1em\"></tspan></text></g></g></g><g class=\"nodes\"><g class=\"node default  \" id=\"flowchart-A1-0\" transform=\"translate(107.92578125, 67)\"><rect class=\"basic label-container\" style=\"\" x=\"-62.42578125\" y=\"-24\" width=\"124.8515625\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-38.42578125, -12)\"><rect></rect><foreignObject width=\"76.8515625\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>App (user)</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"flowchart-B1-1\" transform=\"translate(317.44140625, 67)\"><rect class=\"basic label-container\" style=\"\" x=\"-72.08984375\" y=\"-24\" width=\"144.1796875\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-48.08984375, -12)\"><rect></rect><foreignObject width=\"96.1796875\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>Layout (user)</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"flowchart-C1-3\" transform=\"translate(540.109375, 67)\"><rect class=\"basic label-container\" style=\"\" x=\"-75.578125\" y=\"-24\" width=\"151.15625\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-51.578125, -12)\"><rect></rect><foreignObject width=\"103.15625\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>Sidebar (user)</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"flowchart-D1-5\" transform=\"translate(775.32421875, 67)\"><rect class=\"basic label-container\" style=\"\" x=\"-84.63671875\" y=\"-24\" width=\"169.2734375\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-60.63671875, -12)\"><rect></rect><foreignObject width=\"121.2734375\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>UserPanel (user)</p></span></div></foreignObject></g></g></g></g></g></g></g></svg></div>\n<h2>🧱 Три кроки Context API</h2>\n<table>\n<thead>\n<tr>\n<th>Крок</th>\n<th>Дія</th>\n<th>API</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>1️⃣ <strong>Створити</strong> контекст</td>\n<td>Оголосити «канал» даних</td>\n<td><code>createContext()</code></td>\n</tr>\n<tr>\n<td>2️⃣ <strong>Надати</strong> значення</td>\n<td>Обгорнути дерево у Provider</td>\n<td><code>&lt;Context.Provider value={...}&gt;</code></td>\n</tr>\n<tr>\n<td>3️⃣ <strong>Споживати</strong> значення</td>\n<td>Підписатись у будь-якому компоненті</td>\n<td><code>useContext(Context)</code></td>\n</tr>\n</tbody></table>\n","<h1>🌐 Context API — createContext та Provider</h1>\n<p><strong>Головна ідея:</strong> <code>createContext</code> створює об'єкт контексту. <code>Provider</code> — компонент-обгортка, який робить значення доступним для всього піддерева.</p>\n<h2>💻 Крок 1 і 2: Створення та надання контексту</h2>\n<pre><code class=\"language-tsx hljs language-typescript\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// contexts/UserContext.tsx</span>\n\n<span class=\"hljs-keyword\">import</span> { createContext, useContext, useState } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"react\"</span>;\n\n<span class=\"hljs-comment\">// Описуємо TypeScript-тип для значення контексту</span>\n<span class=\"hljs-keyword\">interface</span> <span class=\"hljs-title class_\">UserContextValue</span> {\n  <span class=\"hljs-attr\">currentUser</span>: <span class=\"hljs-title class_\">User</span> | <span class=\"hljs-literal\">null</span>;\n  <span class=\"hljs-attr\">setCurrentUser</span>: <span class=\"hljs-function\">(<span class=\"hljs-params\">user: User | <span class=\"hljs-literal\">null</span></span>) =&gt;</span> <span class=\"hljs-built_in\">void</span>;\n}\n\n<span class=\"hljs-comment\">// Тип | null означає: контекст може бути null, якщо компонент викликаний поза Provider.</span>\n<span class=\"hljs-comment\">// Реальне значення завжди надасть Provider — перевірку додамо у custom hook.</span>\n<span class=\"hljs-keyword\">const</span> <span class=\"hljs-title class_\">UserContext</span> = createContext&lt;<span class=\"hljs-title class_\">UserContextValue</span> | <span class=\"hljs-literal\">null</span>&gt;(<span class=\"hljs-literal\">null</span>);\n\n<span class=\"hljs-comment\">// Компонент-Provider: зберігає стан і надає його всім нащадкам</span>\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">UserProvider</span>(<span class=\"hljs-params\">{ children }: { children: React.ReactNode }</span>) {\n  <span class=\"hljs-keyword\">const</span> [currentUser, setCurrentUser] = useState&lt;<span class=\"hljs-title class_\">User</span> | <span class=\"hljs-literal\">null</span>&gt;(<span class=\"hljs-literal\">null</span>);\n\n  <span class=\"hljs-keyword\">return</span> (\n    <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">UserContext.Provider</span> <span class=\"hljs-attr\">value</span>=<span class=\"hljs-string\">{{</span> <span class=\"hljs-attr\">currentUser</span>, <span class=\"hljs-attr\">setCurrentUser</span> }}&gt;</span>\n      {children}\n    <span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">UserContext.Provider</span>&gt;</span></span>\n  );\n}\n\n<span class=\"hljs-comment\">// Custom hook із захистом: якщо викликати поза Provider — одразу помилка</span>\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">useUser</span>(<span class=\"hljs-params\"></span>) {\n  <span class=\"hljs-keyword\">const</span> context = <span class=\"hljs-title function_\">useContext</span>(<span class=\"hljs-title class_\">UserContext</span>);\n  <span class=\"hljs-keyword\">if</span> (context === <span class=\"hljs-literal\">null</span>) {\n    <span class=\"hljs-keyword\">throw</span> <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Error</span>(<span class=\"hljs-string\">\"useUser must be used within a UserProvider\"</span>);\n  }\n  <span class=\"hljs-keyword\">return</span> context;\n}</code></pre><pre><code class=\"language-tsx hljs language-typescript\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// main.tsx — обгортаємо все дерево в Provider</span>\n<span class=\"hljs-title class_\">ReactDOM</span>.<span class=\"hljs-title function_\">createRoot</span>(<span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-title function_\">getElementById</span>(<span class=\"hljs-string\">\"root\"</span>)!).<span class=\"hljs-title function_\">render</span>(\n  <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">React.StrictMode</span>&gt;</span>\n    <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">UserProvider</span>&gt;</span>\n      {\" \"}\n      {/* Всі компоненти всередині мають доступ до UserContext */}\n      <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">App</span> /&gt;</span>\n    <span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">UserProvider</span>&gt;</span>\n  <span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">React.StrictMode</span>&gt;</span></span>,\n);</code></pre>","<h1>🔌 useContext — споживання контексту</h1>\n<p><strong>Головна ідея:</strong> Хук <code>useContext</code> дозволяє будь-якому функціональному компоненту отримати поточне значення контексту. Компонент <strong>автоматично перерендерюється</strong>, коли значення контексту змінюється.</p>\n<h2>💻 Крок 3: Споживання контексту</h2>\n<pre><code class=\"language-tsx hljs language-typescript\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// UserPanel.tsx — тепер НЕ потребує жодних props для user!</span>\n<span class=\"hljs-keyword\">import</span> { useUser } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"../contexts/UserContext\"</span>;\n\n<span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">UserPanel</span>(<span class=\"hljs-params\"></span>) {\n  <span class=\"hljs-comment\">// Використовуємо custom hook — не useContext напряму</span>\n  <span class=\"hljs-keyword\">const</span> { currentUser, setCurrentUser } = <span class=\"hljs-title function_\">useUser</span>();\n\n  <span class=\"hljs-keyword\">if</span> (!currentUser) {\n    <span class=\"hljs-keyword\">return</span> <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">p</span>&gt;</span>Ви не авторизовані<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">p</span>&gt;</span></span>;\n  }\n\n  <span class=\"hljs-keyword\">return</span> (\n    <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">div</span>&gt;</span>\n      <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">p</span>&gt;</span>👤 {currentUser.name}<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">p</span>&gt;</span>\n      <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">button</span> <span class=\"hljs-attr\">onClick</span>=<span class=\"hljs-string\">{()</span> =&gt;</span> setCurrentUser(null)}&gt;Вийти<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">button</span>&gt;</span>\n    <span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">div</span>&gt;</span></span>\n  );\n}\n\n<span class=\"hljs-comment\">// Layout, Sidebar — більше не потребують user у props! ✅</span>\n<span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">Layout</span>(<span class=\"hljs-params\"></span>) {\n  <span class=\"hljs-keyword\">return</span> <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">Sidebar</span> /&gt;</span></span>;\n}\n\n<span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">Sidebar</span>(<span class=\"hljs-params\"></span>) {\n  <span class=\"hljs-keyword\">return</span> <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">UserPanel</span> /&gt;</span></span>;\n}</code></pre><div class=\"tip\"><strong>💡 Де розмістити Provider?</strong> <p>Provider розміщують на <strong>найближчому спільному батьківському компоненті</strong> для всіх споживачів. Якщо дані потрібні у всьому застосунку — розміщують у <code>main.tsx</code> або <code>App.tsx</code>.</p>\n</div>\n\n","<h1>🗂️ Context API на практиці: TasksContext</h1>\n<p><strong>Головна ідея:</strong> Застосуємо вивчений патерн до Task Manager. <code>TasksContext</code> зберігає список задач і надає методи для роботи з ним — будь-який компонент у дереві може отримати їх через <code>useTasks()</code> без жодного prop drilling.</p>\n<h2>💻 TasksContext з повними операціями</h2>\n<pre><code class=\"language-tsx hljs language-typescript\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// contexts/TasksContext.tsx</span>\n<span class=\"hljs-keyword\">import</span> { createContext, useContext, useState } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"react\"</span>;\n<span class=\"hljs-keyword\">import</span> <span class=\"hljs-keyword\">type</span> { <span class=\"hljs-title class_\">Task</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"../types/task\"</span>;\n\n<span class=\"hljs-keyword\">interface</span> <span class=\"hljs-title class_\">TasksContextValue</span> {\n  <span class=\"hljs-attr\">tasks</span>: <span class=\"hljs-title class_\">Task</span>[];\n  <span class=\"hljs-attr\">addTask</span>: <span class=\"hljs-function\">(<span class=\"hljs-params\">data: Omit&lt;Task, <span class=\"hljs-string\">\"id\"</span> | <span class=\"hljs-string\">\"createdAt\"</span>&gt;</span>) =&gt;</span> <span class=\"hljs-built_in\">void</span>;\n  <span class=\"hljs-attr\">updateStatus</span>: <span class=\"hljs-function\">(<span class=\"hljs-params\">id: <span class=\"hljs-built_in\">number</span>, status: Task[<span class=\"hljs-string\">\"status\"</span>]</span>) =&gt;</span> <span class=\"hljs-built_in\">void</span>;\n  <span class=\"hljs-attr\">removeTask</span>: <span class=\"hljs-function\">(<span class=\"hljs-params\">id: <span class=\"hljs-built_in\">number</span></span>) =&gt;</span> <span class=\"hljs-built_in\">void</span>;\n}\n\n<span class=\"hljs-keyword\">const</span> <span class=\"hljs-title class_\">TasksContext</span> = createContext&lt;<span class=\"hljs-title class_\">TasksContextValue</span> | <span class=\"hljs-literal\">null</span>&gt;(<span class=\"hljs-literal\">null</span>);\n\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">TasksProvider</span>(<span class=\"hljs-params\">{ children }: { children: React.ReactNode }</span>) {\n  <span class=\"hljs-keyword\">const</span> [tasks, setTasks] = useState&lt;<span class=\"hljs-title class_\">Task</span>[]&gt;([]);\n\n  <span class=\"hljs-keyword\">const</span> <span class=\"hljs-title function_\">addTask</span> = (<span class=\"hljs-params\">data: Omit&lt;Task, <span class=\"hljs-string\">\"id\"</span> | <span class=\"hljs-string\">\"createdAt\"</span>&gt;</span>) =&gt; {\n    <span class=\"hljs-title function_\">setTasks</span>(<span class=\"hljs-function\">(<span class=\"hljs-params\">prev</span>) =&gt;</span> [\n      ...prev,\n      { ...data, <span class=\"hljs-attr\">id</span>: <span class=\"hljs-title class_\">Date</span>.<span class=\"hljs-title function_\">now</span>(), <span class=\"hljs-attr\">createdAt</span>: <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Date</span>() },\n    ]);\n  };\n\n  <span class=\"hljs-keyword\">const</span> <span class=\"hljs-title function_\">updateStatus</span> = (<span class=\"hljs-params\">id: <span class=\"hljs-built_in\">number</span>, status: Task[<span class=\"hljs-string\">\"status\"</span>]</span>) =&gt; {\n    <span class=\"hljs-title function_\">setTasks</span>(<span class=\"hljs-function\">(<span class=\"hljs-params\">prev</span>) =&gt;</span> prev.<span class=\"hljs-title function_\">map</span>(<span class=\"hljs-function\">(<span class=\"hljs-params\">t</span>) =&gt;</span> (t.<span class=\"hljs-property\">id</span> === id ? { ...t, status } : t)));\n  };\n\n  <span class=\"hljs-keyword\">const</span> <span class=\"hljs-title function_\">removeTask</span> = (<span class=\"hljs-params\">id: <span class=\"hljs-built_in\">number</span></span>) =&gt; {\n    <span class=\"hljs-title function_\">setTasks</span>(<span class=\"hljs-function\">(<span class=\"hljs-params\">prev</span>) =&gt;</span> prev.<span class=\"hljs-title function_\">filter</span>(<span class=\"hljs-function\">(<span class=\"hljs-params\">t</span>) =&gt;</span> t.<span class=\"hljs-property\">id</span> !== id));\n  };\n\n  <span class=\"hljs-keyword\">return</span> (\n    <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">TasksContext.Provider</span> <span class=\"hljs-attr\">value</span>=<span class=\"hljs-string\">{{</span> <span class=\"hljs-attr\">tasks</span>, <span class=\"hljs-attr\">addTask</span>, <span class=\"hljs-attr\">updateStatus</span>, <span class=\"hljs-attr\">removeTask</span> }}&gt;</span>\n      {children}\n    <span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">TasksContext.Provider</span>&gt;</span></span>\n  );\n}\n\n<span class=\"hljs-comment\">// Хук із захистом: зрозуміла помилка замість загадкового \"Cannot read properties of null\"</span>\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">useTasks</span>(<span class=\"hljs-params\"></span>) {\n  <span class=\"hljs-keyword\">const</span> context = <span class=\"hljs-title function_\">useContext</span>(<span class=\"hljs-title class_\">TasksContext</span>);\n  <span class=\"hljs-keyword\">if</span> (context === <span class=\"hljs-literal\">null</span>)\n    <span class=\"hljs-keyword\">throw</span> <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Error</span>(<span class=\"hljs-string\">\"useTasks must be used within TasksProvider\"</span>);\n  <span class=\"hljs-keyword\">return</span> context;\n}</code></pre><pre><code class=\"language-tsx hljs language-typescript\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// Будь-який компонент у дереві отримує задачі напряму — без props</span>\n<span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">TaskList</span>(<span class=\"hljs-params\"></span>) {\n  <span class=\"hljs-keyword\">const</span> { tasks, updateStatus, removeTask } = <span class=\"hljs-title function_\">useTasks</span>();\n  <span class=\"hljs-keyword\">return</span> (\n    <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">ul</span>&gt;</span>\n      {tasks.map((t) =&gt; (\n        <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">li</span> <span class=\"hljs-attr\">key</span>=<span class=\"hljs-string\">{t.id}</span>&gt;</span>\n          {t.title}\n          <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">button</span> <span class=\"hljs-attr\">onClick</span>=<span class=\"hljs-string\">{()</span> =&gt;</span> updateStatus(t.id, \"done\")}&gt;✅<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">button</span>&gt;</span>\n          <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">button</span> <span class=\"hljs-attr\">onClick</span>=<span class=\"hljs-string\">{()</span> =&gt;</span> removeTask(t.id)}&gt;🗑️<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">button</span>&gt;</span>\n        <span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">li</span>&gt;</span>\n      ))}\n    <span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">ul</span>&gt;</span></span>\n  );\n}</code></pre><div class=\"warning\"><strong>⚠️ Спрощений приклад</strong> <p><code>addTask</code>, <code>updateStatus</code>, <code>removeTask</code> отримують нові посилання при кожному рендері <code>TasksProvider</code>. Повне вирішення — мемоізація через <code>useCallback</code>, яку розглянемо пізніше.</p>\n</div>\n\n","<h1>⚠️ Обмеження Context API</h1>\n<p><strong>Головна ідея:</strong> Context API зручний для рідко змінюваних даних (тема, мова, авторизація), але має важливе обмеження: <strong>будь-яка зміна значення контексту перерендерює всіх його споживачів</strong>, навіть якщо вони використовують лише частину даних.</p>\n<h2>🔴 Чому це відбувається?</h2>\n<p>React порівнює значення контексту через <code>===</code>. Якщо <code>value</code> — об'єкт, то при кожному рендері Provider він отримує <strong>нове посилання</strong> — і React вважає, що значення змінилось. Тому перерендерюються <strong>всі</strong> компоненти, що підписані на цей контекст, навіть якщо потрібне їм поле не змінилося.</p>\n<pre><code class=\"language-tsx hljs language-typescript\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// ❌ Антипатерн: один великий контекст з даними різної частоти оновлення</span>\n<span class=\"hljs-keyword\">interface</span> <span class=\"hljs-title class_\">AppContextValue</span> {\n  <span class=\"hljs-attr\">tasks</span>: <span class=\"hljs-title class_\">Task</span>[];\n  <span class=\"hljs-attr\">currentUser</span>: <span class=\"hljs-title class_\">User</span> | <span class=\"hljs-literal\">null</span>;\n  <span class=\"hljs-attr\">theme</span>: <span class=\"hljs-string\">\"light\"</span> | <span class=\"hljs-string\">\"dark\"</span>;\n}\n\n<span class=\"hljs-keyword\">const</span> <span class=\"hljs-title class_\">AppContext</span> = createContext&lt;<span class=\"hljs-title class_\">AppContextValue</span> | <span class=\"hljs-literal\">null</span>&gt;(<span class=\"hljs-literal\">null</span>);\n\n<span class=\"hljs-comment\">// Будь-яка зміна tasks → перерендер ThemeToggle, хоча theme не змінилась 😱</span>\n<span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">ThemeToggle</span>(<span class=\"hljs-params\"></span>) {\n  <span class=\"hljs-keyword\">const</span> ctx = <span class=\"hljs-title function_\">useContext</span>(<span class=\"hljs-title class_\">AppContext</span>);\n  <span class=\"hljs-keyword\">const</span> theme = ctx?.<span class=\"hljs-property\">theme</span>; <span class=\"hljs-comment\">// Використовує лише theme, але рендериться при зміні tasks!</span>\n}</code></pre><h2>✅ Рішення: розділення контексту</h2>\n<p>Якщо дані оновлюються з різною частотою — розкладіть їх по окремих контекстах. Тоді кожен компонент підписується лише на той контекст, що йому потрібен, і перерендерюється лише при зміні <strong>своїх</strong> даних.</p>\n<pre><code class=\"language-tsx hljs language-typescript\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// ✅ Три окремих контексти — кожен змінюється незалежно</span>\n<span class=\"hljs-keyword\">const</span> <span class=\"hljs-title class_\">ThemeContext</span> = createContext&lt;{ <span class=\"hljs-attr\">theme</span>: <span class=\"hljs-string\">\"light\"</span> | <span class=\"hljs-string\">\"dark\"</span> } | <span class=\"hljs-literal\">null</span>&gt;(<span class=\"hljs-literal\">null</span>);\n<span class=\"hljs-keyword\">const</span> <span class=\"hljs-title class_\">UserContext</span> = createContext&lt;{ <span class=\"hljs-attr\">currentUser</span>: <span class=\"hljs-title class_\">User</span> | <span class=\"hljs-literal\">null</span> } | <span class=\"hljs-literal\">null</span>&gt;(<span class=\"hljs-literal\">null</span>);\n<span class=\"hljs-keyword\">const</span> <span class=\"hljs-title class_\">TasksContext</span> = createContext&lt;<span class=\"hljs-title class_\">TasksContextValue</span> | <span class=\"hljs-literal\">null</span>&gt;(<span class=\"hljs-literal\">null</span>);\n\n<span class=\"hljs-comment\">// ThemeToggle — перерендерюється ЛИШЕ при зміні теми, tasks не стосуються ✅</span>\n<span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">ThemeToggle</span>(<span class=\"hljs-params\"></span>) {\n  <span class=\"hljs-keyword\">const</span> ctx = <span class=\"hljs-title function_\">useContext</span>(<span class=\"hljs-title class_\">ThemeContext</span>);\n  <span class=\"hljs-keyword\">const</span> theme = ctx?.<span class=\"hljs-property\">theme</span>;\n  <span class=\"hljs-keyword\">return</span> <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">button</span>&gt;</span>Тема: {theme}<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">button</span>&gt;</span></span>;\n}</code></pre><h2>📊 Коли Context API підходить</h2>\n<table>\n<thead>\n<tr>\n<th>Сценарій</th>\n<th>Context?</th>\n<th>Чому</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>🎨 Тема (dark/light)</td>\n<td>✅ Так</td>\n<td>Змінюється рідко — раз на сесію</td>\n</tr>\n<tr>\n<td>🌍 Мова інтерфейсу</td>\n<td>✅ Так</td>\n<td>Змінюється рідко</td>\n</tr>\n<tr>\n<td>👤 Авторизований користувач</td>\n<td>✅ Так</td>\n<td>Змінюється при логіні/логауті</td>\n</tr>\n<tr>\n<td>📋 Список задач</td>\n<td>⚠️ Обережно</td>\n<td>Часто змінюється → зайві рендери</td>\n</tr>\n<tr>\n<td>🔄 Дані, що оновлюються кожну секунду</td>\n<td>❌ Ні</td>\n<td>Краще Zustand</td>\n</tr>\n</tbody></table>\n","<h1>🔀 useReducer — управління складним станом</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>useReducer</strong> — хук для управління станом через <strong>редьюсер</strong> — чисту функцію, що приймає поточний стан та дію, і повертає новий стан. Натхнений патерном Redux.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> <code>useReducer</code> доцільний, коли стан складний: багато взаємопов'язаних полів, складна логіка переходів між станами, дії з бізнес-логікою.</p>\n<h2>🔧 Базовий синтаксис</h2>\n<pre><code class=\"language-tsx hljs language-typescript\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// useReducer повертає пару: поточний стан та функцію dispatch для відправки дій</span>\n<span class=\"hljs-keyword\">const</span> [state, dispatch] = <span class=\"hljs-title function_\">useReducer</span>(reducer, initialState);\n\n<span class=\"hljs-comment\">// reducer — чиста функція: отримує стан і дію, повертає НОВИЙ стан (без мутацій!)</span>\n<span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">reducer</span>(<span class=\"hljs-params\">state: State, action: Action</span>): <span class=\"hljs-title class_\">State</span> {\n  <span class=\"hljs-comment\">// логіка переходів — switch (action.type), повертає новий об'єкт стану</span>\n  <span class=\"hljs-keyword\">return</span> state;\n}\n\n<span class=\"hljs-comment\">// dispatch — відправляє дію до редьюсера, запускаючи оновлення стану</span>\n<span class=\"hljs-title function_\">dispatch</span>({ <span class=\"hljs-attr\">type</span>: <span class=\"hljs-string\">\"ADD_TASK\"</span>, <span class=\"hljs-attr\">payload</span>: { <span class=\"hljs-attr\">title</span>: <span class=\"hljs-string\">\"Нова задача\"</span> } });\n\n<span class=\"hljs-comment\">// action — звичайний об'єкт з обов'язковим полем type та опціональним payload</span>\n<span class=\"hljs-comment\">// type описує ЩО відбувається, payload — з якими даними</span></code></pre><h2>📊 useState vs useReducer</h2>\n<table>\n<thead>\n<tr>\n<th>Критерій</th>\n<th><code>useState</code></th>\n<th><code>useReducer</code></th>\n</tr>\n</thead>\n<tbody><tr>\n<td>🧱 Складність стану</td>\n<td>Простий (примітив, один об'єкт)</td>\n<td>Складний (кілька взаємопов'язаних полів)</td>\n</tr>\n<tr>\n<td>🔄 Оновлення</td>\n<td>Незалежна зміна окремих полів</td>\n<td>Одна дія змінює кілька полів одночасно</td>\n</tr>\n<tr>\n<td>🧠 Бізнес-логіка</td>\n<td>Розкидана по обробниках подій</td>\n<td>Централізована в одній функції-редьюсері</td>\n</tr>\n<tr>\n<td>🧪 Тестованість</td>\n<td>Потребує рендерингу компонента</td>\n<td>Редьюсер — чиста функція, тест без React</td>\n</tr>\n<tr>\n<td>📖 Читабельність</td>\n<td>Зрозуміло для простих випадків</td>\n<td>Явні назви дій описують наміри коду</td>\n</tr>\n</tbody></table>\n","<h1>🔀 useReducer — практичний приклад</h1>\n<p><strong>Головна ідея:</strong> Типізація дій через <strong>discriminated unions</strong> дає TypeScript можливість перевіряти, чи правильний <code>payload</code> передано для кожного типу дії. Поле <code>type</code> є «дискримінатором» — у <code>case \"ADD_TASK\"</code> TypeScript <strong>автоматично звужує</strong> тип <code>action</code> і знає, що <code>action.payload</code> містить дані задачі, а у <code>case \"CLEAR_COMPLETED\"</code> — що <code>payload</code> взагалі відсутній.</p>\n<h2>💻 Task Manager з useReducer</h2>\n<pre><code class=\"language-tsx hljs language-typescript\" data-highlighted=\"yes\"><span class=\"hljs-keyword\">import</span> { useReducer } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"react\"</span>;\n<span class=\"hljs-keyword\">import</span> <span class=\"hljs-keyword\">type</span> { <span class=\"hljs-title class_\">Task</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"../types/task\"</span>;\n\n<span class=\"hljs-comment\">// Типізація дій через discriminated union</span>\n<span class=\"hljs-keyword\">type</span> <span class=\"hljs-title class_\">TaskAction</span> =\n  | { <span class=\"hljs-attr\">type</span>: <span class=\"hljs-string\">\"ADD_TASK\"</span>; <span class=\"hljs-attr\">payload</span>: <span class=\"hljs-title class_\">Omit</span>&lt;<span class=\"hljs-title class_\">Task</span>, <span class=\"hljs-string\">\"id\"</span> | <span class=\"hljs-string\">\"createdAt\"</span>&gt; }\n  | { <span class=\"hljs-attr\">type</span>: <span class=\"hljs-string\">\"REMOVE_TASK\"</span>; <span class=\"hljs-attr\">payload</span>: { <span class=\"hljs-attr\">id</span>: <span class=\"hljs-built_in\">number</span> } }\n  | { <span class=\"hljs-attr\">type</span>: <span class=\"hljs-string\">\"UPDATE_STATUS\"</span>; <span class=\"hljs-attr\">payload</span>: { <span class=\"hljs-attr\">id</span>: <span class=\"hljs-built_in\">number</span>; <span class=\"hljs-attr\">status</span>: <span class=\"hljs-title class_\">Task</span>[<span class=\"hljs-string\">\"status\"</span>] } }\n  | { <span class=\"hljs-attr\">type</span>: <span class=\"hljs-string\">\"CLEAR_COMPLETED\"</span> };\n\n<span class=\"hljs-comment\">// Стан</span>\n<span class=\"hljs-keyword\">interface</span> <span class=\"hljs-title class_\">TaskState</span> {\n  <span class=\"hljs-attr\">tasks</span>: <span class=\"hljs-title class_\">Task</span>[];\n  <span class=\"hljs-attr\">filter</span>: <span class=\"hljs-title class_\">Task</span>[<span class=\"hljs-string\">\"status\"</span>] | <span class=\"hljs-string\">\"all\"</span>;\n}\n\n<span class=\"hljs-keyword\">const</span> <span class=\"hljs-attr\">initialState</span>: <span class=\"hljs-title class_\">TaskState</span> = { <span class=\"hljs-attr\">tasks</span>: [], <span class=\"hljs-attr\">filter</span>: <span class=\"hljs-string\">\"all\"</span> };\n\n<span class=\"hljs-comment\">// Редьюсер — чиста функція, вся бізнес-логіка тут</span>\n<span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">taskReducer</span>(<span class=\"hljs-params\">state: TaskState, action: TaskAction</span>): <span class=\"hljs-title class_\">TaskState</span> {\n  <span class=\"hljs-keyword\">switch</span> (action.<span class=\"hljs-property\">type</span>) {\n    <span class=\"hljs-keyword\">case</span> <span class=\"hljs-string\">\"ADD_TASK\"</span>:\n      <span class=\"hljs-keyword\">return</span> {\n        ...state,\n        <span class=\"hljs-attr\">tasks</span>: [\n          ...state.<span class=\"hljs-property\">tasks</span>,\n          { ...action.<span class=\"hljs-property\">payload</span>, <span class=\"hljs-attr\">id</span>: <span class=\"hljs-title class_\">Date</span>.<span class=\"hljs-title function_\">now</span>(), <span class=\"hljs-attr\">createdAt</span>: <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Date</span>() },\n        ],\n      };\n    <span class=\"hljs-keyword\">case</span> <span class=\"hljs-string\">\"REMOVE_TASK\"</span>:\n      <span class=\"hljs-keyword\">return</span> {\n        ...state,\n        <span class=\"hljs-attr\">tasks</span>: state.<span class=\"hljs-property\">tasks</span>.<span class=\"hljs-title function_\">filter</span>(<span class=\"hljs-function\">(<span class=\"hljs-params\">t</span>) =&gt;</span> t.<span class=\"hljs-property\">id</span> !== action.<span class=\"hljs-property\">payload</span>.<span class=\"hljs-property\">id</span>),\n      };\n    <span class=\"hljs-keyword\">case</span> <span class=\"hljs-string\">\"UPDATE_STATUS\"</span>:\n      <span class=\"hljs-keyword\">return</span> {\n        ...state,\n        <span class=\"hljs-attr\">tasks</span>: state.<span class=\"hljs-property\">tasks</span>.<span class=\"hljs-title function_\">map</span>(<span class=\"hljs-function\">(<span class=\"hljs-params\">t</span>) =&gt;</span>\n          t.<span class=\"hljs-property\">id</span> === action.<span class=\"hljs-property\">payload</span>.<span class=\"hljs-property\">id</span>\n            ? { ...t, <span class=\"hljs-attr\">status</span>: action.<span class=\"hljs-property\">payload</span>.<span class=\"hljs-property\">status</span> }\n            : t,\n        ),\n      };\n    <span class=\"hljs-keyword\">case</span> <span class=\"hljs-string\">\"CLEAR_COMPLETED\"</span>:\n      <span class=\"hljs-keyword\">return</span> {\n        ...state,\n        <span class=\"hljs-attr\">tasks</span>: state.<span class=\"hljs-property\">tasks</span>.<span class=\"hljs-title function_\">filter</span>(<span class=\"hljs-function\">(<span class=\"hljs-params\">t</span>) =&gt;</span> t.<span class=\"hljs-property\">status</span> !== <span class=\"hljs-string\">\"done\"</span>),\n      };\n    <span class=\"hljs-attr\">default</span>:\n      <span class=\"hljs-keyword\">return</span> state;\n  }\n}</code></pre><pre><code class=\"language-tsx hljs language-typescript\" data-highlighted=\"yes\"><span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">TaskApp</span>(<span class=\"hljs-params\"></span>) {\n  <span class=\"hljs-keyword\">const</span> [state, dispatch] = <span class=\"hljs-title function_\">useReducer</span>(taskReducer, initialState);\n\n  <span class=\"hljs-keyword\">const</span> <span class=\"hljs-title function_\">handleAdd</span> = (<span class=\"hljs-params\"></span>) =&gt; {\n    <span class=\"hljs-title function_\">dispatch</span>({\n      <span class=\"hljs-attr\">type</span>: <span class=\"hljs-string\">\"ADD_TASK\"</span>,\n      <span class=\"hljs-attr\">payload</span>: {\n        <span class=\"hljs-attr\">title</span>: <span class=\"hljs-string\">\"Нова задача\"</span>,\n        <span class=\"hljs-attr\">description</span>: <span class=\"hljs-string\">\"\"</span>,\n        <span class=\"hljs-attr\">status</span>: <span class=\"hljs-string\">\"todo\"</span>,\n        <span class=\"hljs-attr\">priority</span>: <span class=\"hljs-string\">\"medium\"</span>,\n      },\n    });\n  };\n\n  <span class=\"hljs-keyword\">const</span> <span class=\"hljs-title function_\">handleDone</span> = (<span class=\"hljs-params\">id: <span class=\"hljs-built_in\">number</span></span>) =&gt; {\n    <span class=\"hljs-title function_\">dispatch</span>({ <span class=\"hljs-attr\">type</span>: <span class=\"hljs-string\">\"UPDATE_STATUS\"</span>, <span class=\"hljs-attr\">payload</span>: { id, <span class=\"hljs-attr\">status</span>: <span class=\"hljs-string\">\"done\"</span> } });\n  };\n\n  <span class=\"hljs-keyword\">return</span> (\n    <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">div</span>&gt;</span>\n      <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">button</span> <span class=\"hljs-attr\">onClick</span>=<span class=\"hljs-string\">{handleAdd}</span>&gt;</span>➕ Додати задачу<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">button</span>&gt;</span>\n      <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">ul</span>&gt;</span>\n        {state.tasks.map((t) =&gt; (\n          <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">li</span> <span class=\"hljs-attr\">key</span>=<span class=\"hljs-string\">{t.id}</span>&gt;</span>\n            {t.title}\n            <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">button</span> <span class=\"hljs-attr\">onClick</span>=<span class=\"hljs-string\">{()</span> =&gt;</span> handleDone(t.id)}&gt;✅<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">button</span>&gt;</span>\n          <span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">li</span>&gt;</span>\n        ))}\n      <span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">ul</span>&gt;</span>\n    <span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">div</span>&gt;</span></span>\n  );\n}</code></pre>","<h1>🔗 Патерн: useReducer + Context</h1>\n<p><strong>Головна ідея:</strong> Поєднання <code>useReducer</code> і <code>Context API</code> дає потужний патерн для глобального стану: логіка централізована у редьюсері, а доступ — через контекст. Щоб уникнути зайвих рендерів, <strong>розділяють контексти стану та dispatch</strong>. Це працює тому, що <code>dispatch</code> — стабільне посилання (React гарантує це між рендерами), а отже компоненти, що лише надсилають дії, не перерендеряться при зміні даних.</p>\n<h2>💻 Розділені контексти для state і dispatch</h2>\n<pre><code class=\"language-tsx hljs language-typescript\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// contexts/TasksContext.tsx</span>\n\n<span class=\"hljs-keyword\">import</span> { createContext, useContext, useReducer } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"react\"</span>;\n\n<span class=\"hljs-comment\">// Два окремих контексти — ключова ідея розділення</span>\n<span class=\"hljs-keyword\">const</span> <span class=\"hljs-title class_\">TasksStateContext</span> = createContext&lt;<span class=\"hljs-title class_\">TaskState</span> | <span class=\"hljs-literal\">null</span>&gt;(<span class=\"hljs-literal\">null</span>);\n<span class=\"hljs-keyword\">const</span> <span class=\"hljs-title class_\">TasksDispatchContext</span> = createContext&lt;<span class=\"hljs-title class_\">React</span>.<span class=\"hljs-property\">Dispatch</span>&lt;<span class=\"hljs-title class_\">TaskAction</span>&gt; | <span class=\"hljs-literal\">null</span>&gt;(\n  <span class=\"hljs-literal\">null</span>,\n);\n\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">TasksProvider</span>(<span class=\"hljs-params\">{ children }: { children: React.ReactNode }</span>) {\n  <span class=\"hljs-keyword\">const</span> [state, dispatch] = <span class=\"hljs-title function_\">useReducer</span>(taskReducer, initialState);\n\n  <span class=\"hljs-keyword\">return</span> (\n    <span class=\"hljs-comment\">// Два Provider вкладені один в одного</span>\n    <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">TasksStateContext.Provider</span> <span class=\"hljs-attr\">value</span>=<span class=\"hljs-string\">{state}</span>&gt;</span>\n      <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">TasksDispatchContext.Provider</span> <span class=\"hljs-attr\">value</span>=<span class=\"hljs-string\">{dispatch}</span>&gt;</span>\n        {children}\n      <span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">TasksDispatchContext.Provider</span>&gt;</span>\n    <span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">TasksStateContext.Provider</span>&gt;</span></span>\n  );\n}\n\n<span class=\"hljs-comment\">// Два окремих хуки — компонент підписується лише на те, що потребує</span>\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">useTasksState</span>(<span class=\"hljs-params\"></span>) {\n  <span class=\"hljs-keyword\">const</span> context = <span class=\"hljs-title function_\">useContext</span>(<span class=\"hljs-title class_\">TasksStateContext</span>);\n  <span class=\"hljs-keyword\">if</span> (context === <span class=\"hljs-literal\">null</span>)\n    <span class=\"hljs-keyword\">throw</span> <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Error</span>(<span class=\"hljs-string\">\"useTasksState must be within TasksProvider\"</span>);\n  <span class=\"hljs-keyword\">return</span> context;\n}\n\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">useTasksDispatch</span>(<span class=\"hljs-params\"></span>) {\n  <span class=\"hljs-keyword\">const</span> context = <span class=\"hljs-title function_\">useContext</span>(<span class=\"hljs-title class_\">TasksDispatchContext</span>);\n  <span class=\"hljs-keyword\">if</span> (context === <span class=\"hljs-literal\">null</span>)\n    <span class=\"hljs-keyword\">throw</span> <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Error</span>(<span class=\"hljs-string\">\"useTasksDispatch must be within TasksProvider\"</span>);\n  <span class=\"hljs-keyword\">return</span> context;\n}</code></pre><pre><code class=\"language-tsx hljs language-typescript\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// Компонент лише читає стан — перерендерюється при зміні tasks</span>\n<span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">TaskList</span>(<span class=\"hljs-params\"></span>) {\n  <span class=\"hljs-keyword\">const</span> { tasks } = <span class=\"hljs-title function_\">useTasksState</span>(); <span class=\"hljs-comment\">// Підписка лише на стан</span>\n  <span class=\"hljs-keyword\">return</span> (\n    <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">ul</span>&gt;</span>\n      {tasks.map((t) =&gt; (\n        <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">li</span> <span class=\"hljs-attr\">key</span>=<span class=\"hljs-string\">{t.id}</span>&gt;</span>{t.title}<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">li</span>&gt;</span>\n      ))}\n    <span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">ul</span>&gt;</span></span>\n  );\n}\n\n<span class=\"hljs-comment\">// Компонент лише надсилає дії — НЕ перерендерюється при зміні tasks! ✅</span>\n<span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">AddTaskButton</span>(<span class=\"hljs-params\"></span>) {\n  <span class=\"hljs-keyword\">const</span> dispatch = <span class=\"hljs-title function_\">useTasksDispatch</span>(); <span class=\"hljs-comment\">// dispatch ніколи не змінюється —</span>\n  <span class=\"hljs-comment\">// React гарантує стабільність посилання між рендерами, як і setState</span>\n  <span class=\"hljs-keyword\">return</span> (\n    <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">button</span>\n      <span class=\"hljs-attr\">onClick</span>=<span class=\"hljs-string\">{()</span> =&gt;</span>\n        dispatch({\n          type: \"ADD_TASK\",\n          payload: {\n            title: \"Нова задача\",\n            description: \"\",\n            status: \"todo\",\n            priority: \"medium\",\n          },\n        })\n      }\n    &gt;\n      ➕ Додати\n    <span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">button</span>&gt;</span></span>\n  );\n}</code></pre>","<h1>🐻 Zustand — легка бібліотека для глобального стану</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>Zustand</strong> — мінімалістична бібліотека управління станом для React. Не потребує Provider, використовує хуки-селектори, підтримує middleware (persist, devtools). Назва у перекладі з німецької — «стан».</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> Zustand вирішує ті самі завдання, що Context + useReducer, але з набагато меншим обсягом коду і без проблеми зайвих рендерів завдяки вбудованим селекторам.</p>\n<h2>🚀 Встановлення</h2>\n<pre><code class=\"language-bash hljs\" data-highlighted=\"yes\">npm install zustand</code></pre><h2>💻 Створення store</h2>\n<pre><code class=\"language-tsx hljs language-typescript\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// stores/taskStore.ts</span>\n<span class=\"hljs-keyword\">import</span> { create } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"zustand\"</span>;\n<span class=\"hljs-keyword\">import</span> <span class=\"hljs-keyword\">type</span> { <span class=\"hljs-title class_\">Task</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"../types/task\"</span>;\n\n<span class=\"hljs-comment\">// В Zustand стан і дії описуються в одному інтерфейсі — на відміну від useReducer,</span>\n<span class=\"hljs-comment\">// де стан і дії розділені. Це спрощує читання: одразу видно, що зберігає store і що вміє.</span>\n<span class=\"hljs-keyword\">interface</span> <span class=\"hljs-title class_\">TaskStore</span> {\n  <span class=\"hljs-attr\">tasks</span>: <span class=\"hljs-title class_\">Task</span>[];\n  <span class=\"hljs-attr\">filter</span>: <span class=\"hljs-title class_\">Task</span>[<span class=\"hljs-string\">\"status\"</span>] | <span class=\"hljs-string\">\"all\"</span>;\n  <span class=\"hljs-attr\">addTask</span>: <span class=\"hljs-function\">(<span class=\"hljs-params\">data: Omit&lt;Task, <span class=\"hljs-string\">\"id\"</span> | <span class=\"hljs-string\">\"createdAt\"</span>&gt;</span>) =&gt;</span> <span class=\"hljs-built_in\">void</span>;\n  <span class=\"hljs-attr\">removeTask</span>: <span class=\"hljs-function\">(<span class=\"hljs-params\">id: <span class=\"hljs-built_in\">number</span></span>) =&gt;</span> <span class=\"hljs-built_in\">void</span>;\n  <span class=\"hljs-attr\">updateStatus</span>: <span class=\"hljs-function\">(<span class=\"hljs-params\">id: <span class=\"hljs-built_in\">number</span>, status: Task[<span class=\"hljs-string\">\"status\"</span>]</span>) =&gt;</span> <span class=\"hljs-built_in\">void</span>;\n  <span class=\"hljs-attr\">setFilter</span>: <span class=\"hljs-function\">(<span class=\"hljs-params\">filter: Task[<span class=\"hljs-string\">\"status\"</span>] | <span class=\"hljs-string\">\"all\"</span></span>) =&gt;</span> <span class=\"hljs-built_in\">void</span>;\n}\n\n<span class=\"hljs-comment\">// create() приймає функцію-ініціалізатор, що отримує set — функцію оновлення стану.</span>\n<span class=\"hljs-comment\">// set працює так само як setState у React: злиття нового об'єкта з поточним станом.</span>\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">const</span> useTaskStore = create&lt;<span class=\"hljs-title class_\">TaskStore</span>&gt;(<span class=\"hljs-function\">(<span class=\"hljs-params\">set</span>) =&gt;</span> ({\n  <span class=\"hljs-attr\">tasks</span>: [],\n  <span class=\"hljs-attr\">filter</span>: <span class=\"hljs-string\">\"all\"</span>,\n\n  <span class=\"hljs-attr\">addTask</span>: <span class=\"hljs-function\">(<span class=\"hljs-params\">data</span>) =&gt;</span>\n    <span class=\"hljs-title function_\">set</span>(<span class=\"hljs-function\">(<span class=\"hljs-params\">state</span>) =&gt;</span> ({\n      <span class=\"hljs-attr\">tasks</span>: [\n        ...state.<span class=\"hljs-property\">tasks</span>,\n        { ...data, <span class=\"hljs-attr\">id</span>: <span class=\"hljs-title class_\">Date</span>.<span class=\"hljs-title function_\">now</span>(), <span class=\"hljs-attr\">createdAt</span>: <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Date</span>() },\n      ],\n    })),\n\n  <span class=\"hljs-attr\">removeTask</span>: <span class=\"hljs-function\">(<span class=\"hljs-params\">id</span>) =&gt;</span>\n    <span class=\"hljs-title function_\">set</span>(<span class=\"hljs-function\">(<span class=\"hljs-params\">state</span>) =&gt;</span> ({\n      <span class=\"hljs-attr\">tasks</span>: state.<span class=\"hljs-property\">tasks</span>.<span class=\"hljs-title function_\">filter</span>(<span class=\"hljs-function\">(<span class=\"hljs-params\">t</span>) =&gt;</span> t.<span class=\"hljs-property\">id</span> !== id),\n    })),\n\n  <span class=\"hljs-attr\">updateStatus</span>: <span class=\"hljs-function\">(<span class=\"hljs-params\">id, status</span>) =&gt;</span>\n    <span class=\"hljs-title function_\">set</span>(<span class=\"hljs-function\">(<span class=\"hljs-params\">state</span>) =&gt;</span> ({\n      <span class=\"hljs-attr\">tasks</span>: state.<span class=\"hljs-property\">tasks</span>.<span class=\"hljs-title function_\">map</span>(<span class=\"hljs-function\">(<span class=\"hljs-params\">t</span>) =&gt;</span> (t.<span class=\"hljs-property\">id</span> === id ? { ...t, status } : t)),\n    })),\n\n  <span class=\"hljs-attr\">setFilter</span>: <span class=\"hljs-function\">(<span class=\"hljs-params\">filter</span>) =&gt;</span> <span class=\"hljs-title function_\">set</span>({ filter }),\n}));</code></pre>","<h1>🐻 Zustand — використання та селектори</h1>\n<p><strong>Головна ідея:</strong> Компонент підписується лише на <strong>необхідну частину</strong> store через селектор — функцію, що вибирає конкретні поля. При зміні інших полів компонент <strong>не перерендерюється</strong>. Без селектора (якщо передати <code>useTaskStore()</code> без аргументу) компонент отримує весь store і перерендерюється при будь-якій зміні.</p>\n<h2>💻 Селектори — точкова підписка</h2>\n<pre><code class=\"language-tsx hljs language-typescript\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// ✅ TaskList підписується лише на tasks — перерендер лише при зміні tasks</span>\n<span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">TaskList</span>(<span class=\"hljs-params\"></span>) {\n  <span class=\"hljs-keyword\">const</span> tasks = <span class=\"hljs-title function_\">useTaskStore</span>(<span class=\"hljs-function\">(<span class=\"hljs-params\">state</span>) =&gt;</span> state.<span class=\"hljs-property\">tasks</span>); <span class=\"hljs-comment\">// Селектор</span>\n  <span class=\"hljs-keyword\">const</span> removeTask = <span class=\"hljs-title function_\">useTaskStore</span>(<span class=\"hljs-function\">(<span class=\"hljs-params\">state</span>) =&gt;</span> state.<span class=\"hljs-property\">removeTask</span>);\n\n  <span class=\"hljs-keyword\">return</span> (\n    <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">ul</span>&gt;</span>\n      {tasks.map((t) =&gt; (\n        <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">li</span> <span class=\"hljs-attr\">key</span>=<span class=\"hljs-string\">{t.id}</span>&gt;</span>\n          {t.title}\n          <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">button</span> <span class=\"hljs-attr\">onClick</span>=<span class=\"hljs-string\">{()</span> =&gt;</span> removeTask(t.id)}&gt;🗑️<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">button</span>&gt;</span>\n        <span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">li</span>&gt;</span>\n      ))}\n    <span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">ul</span>&gt;</span></span>\n  );\n}\n\n<span class=\"hljs-comment\">// ✅ FilterPanel підписується лише на filter і setFilter</span>\n<span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">FilterPanel</span>(<span class=\"hljs-params\"></span>) {\n  <span class=\"hljs-keyword\">const</span> filter = <span class=\"hljs-title function_\">useTaskStore</span>(<span class=\"hljs-function\">(<span class=\"hljs-params\">state</span>) =&gt;</span> state.<span class=\"hljs-property\">filter</span>);\n  <span class=\"hljs-keyword\">const</span> setFilter = <span class=\"hljs-title function_\">useTaskStore</span>(<span class=\"hljs-function\">(<span class=\"hljs-params\">state</span>) =&gt;</span> state.<span class=\"hljs-property\">setFilter</span>);\n\n  <span class=\"hljs-keyword\">return</span> (\n    <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">div</span>&gt;</span>\n      {([\"all\", \"todo\", \"in-progress\", \"done\"] as const).map((f) =&gt; (\n        <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">button</span>\n          <span class=\"hljs-attr\">key</span>=<span class=\"hljs-string\">{f}</span>\n          <span class=\"hljs-attr\">onClick</span>=<span class=\"hljs-string\">{()</span> =&gt;</span> setFilter(f)}\n          style={{ fontWeight: filter === f ? \"bold\" : \"normal\" }}\n        &gt;\n          {f}\n        <span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">button</span>&gt;</span>\n      ))}\n    <span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">div</span>&gt;</span></span>\n  );\n}\n\n<span class=\"hljs-comment\">// ✅ AddTask НЕ перерендерюється при зміні tasks або filter</span>\n<span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">AddTask</span>(<span class=\"hljs-params\"></span>) {\n  <span class=\"hljs-keyword\">const</span> addTask = <span class=\"hljs-title function_\">useTaskStore</span>(<span class=\"hljs-function\">(<span class=\"hljs-params\">state</span>) =&gt;</span> state.<span class=\"hljs-property\">addTask</span>); <span class=\"hljs-comment\">// Тільки функція</span>\n  <span class=\"hljs-keyword\">return</span> (\n    <span class=\"language-xml\"><span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">button</span>\n      <span class=\"hljs-attr\">onClick</span>=<span class=\"hljs-string\">{()</span> =&gt;</span>\n        addTask({\n          title: \"Нова задача\",\n          description: \"\",\n          status: \"todo\",\n          priority: \"medium\",\n        })\n      }\n    &gt;\n      ➕ Додати\n    <span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">button</span>&gt;</span></span>\n  );\n}</code></pre><div class=\"note\"><strong>📝 Без Provider!</strong> <p>На відміну від Context API, Zustand не потребує обгортки <code>&lt;Provider&gt;</code>. Store — це глобальний синглтон, який можна використовувати у будь-якому компоненті просто імпортуючи хук.</p>\n</div>\n\n","<h1>🐻 Zustand — Middleware</h1>\n<p><strong>Головна ідея:</strong> Middleware розширюють поведінку store. Два найпоширеніші — <code>persist</code> (збереження у localStorage) та <code>devtools</code> (інтеграція з Redux DevTools для дебагінгу).</p>\n<h2>💻 persist та devtools</h2>\n<pre><code class=\"language-tsx hljs language-typescript\" data-highlighted=\"yes\"><span class=\"hljs-keyword\">import</span> { create } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"zustand\"</span>;\n<span class=\"hljs-keyword\">import</span> { persist, devtools } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"zustand/middleware\"</span>;\n\n<span class=\"hljs-comment\">// Коли активний devtools, функція set приймає три аргументи:</span>\n<span class=\"hljs-comment\">// set(updater, replace, actionName)</span>\n<span class=\"hljs-comment\">// Без devtools — достатньо одного аргументу, як у попередньому прикладі</span>\n\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">const</span> useTaskStore = create&lt;<span class=\"hljs-title class_\">TaskStore</span>&gt;()(\n  <span class=\"hljs-title function_\">devtools</span>(\n    <span class=\"hljs-comment\">// Обгортка для Redux DevTools (бачимо дії та стан у браузері)</span>\n    <span class=\"hljs-title function_\">persist</span>(\n      <span class=\"hljs-comment\">// Обгортка для збереження у localStorage</span>\n      <span class=\"hljs-function\">(<span class=\"hljs-params\">set</span>) =&gt;</span> ({\n        <span class=\"hljs-attr\">tasks</span>: [],\n        <span class=\"hljs-attr\">filter</span>: <span class=\"hljs-string\">\"all\"</span> <span class=\"hljs-keyword\">as</span> <span class=\"hljs-keyword\">const</span>,\n\n        <span class=\"hljs-attr\">addTask</span>: <span class=\"hljs-function\">(<span class=\"hljs-params\">data</span>) =&gt;</span>\n          <span class=\"hljs-title function_\">set</span>(\n            <span class=\"hljs-function\">(<span class=\"hljs-params\">state</span>) =&gt;</span> ({\n              <span class=\"hljs-attr\">tasks</span>: [\n                ...state.<span class=\"hljs-property\">tasks</span>,\n                { ...data, <span class=\"hljs-attr\">id</span>: <span class=\"hljs-title class_\">Date</span>.<span class=\"hljs-title function_\">now</span>(), <span class=\"hljs-attr\">createdAt</span>: <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Date</span>() },\n              ],\n            }),\n            <span class=\"hljs-literal\">false</span>, <span class=\"hljs-comment\">// false = злити зі станом (не замінювати повністю)</span>\n            <span class=\"hljs-string\">\"tasks/addTask\"</span>, <span class=\"hljs-comment\">// Назва дії — відображається у Redux DevTools</span>\n          ),\n\n        <span class=\"hljs-attr\">removeTask</span>: <span class=\"hljs-function\">(<span class=\"hljs-params\">id</span>) =&gt;</span>\n          <span class=\"hljs-title function_\">set</span>(\n            <span class=\"hljs-function\">(<span class=\"hljs-params\">state</span>) =&gt;</span> ({ <span class=\"hljs-attr\">tasks</span>: state.<span class=\"hljs-property\">tasks</span>.<span class=\"hljs-title function_\">filter</span>(<span class=\"hljs-function\">(<span class=\"hljs-params\">t</span>) =&gt;</span> t.<span class=\"hljs-property\">id</span> !== id) }),\n            <span class=\"hljs-literal\">false</span>,\n            <span class=\"hljs-string\">\"tasks/removeTask\"</span>,\n          ),\n      }),\n      {\n        <span class=\"hljs-attr\">name</span>: <span class=\"hljs-string\">\"task-manager-storage\"</span>, <span class=\"hljs-comment\">// Ключ у localStorage</span>\n        <span class=\"hljs-attr\">partialize</span>: <span class=\"hljs-function\">(<span class=\"hljs-params\">state</span>) =&gt;</span> ({ <span class=\"hljs-attr\">tasks</span>: state.<span class=\"hljs-property\">tasks</span> }), <span class=\"hljs-comment\">// Зберігати лише tasks, не filter</span>\n      },\n    ),\n  ),\n);</code></pre><div class=\"tip\"><strong>💡 Redux DevTools</strong> <p>Встановіть розширення <strong>Redux DevTools</strong> для Chrome/Firefox — разом із Zustand devtools middleware ви зможете переглядати всі зміни стану, подорожувати у часі та відлагоджувати баги набагато ефективніше.</p>\n</div>\n\n","<h1>🗂️ Redux — короткий огляд та місце в екосистемі</h1>\n<p><strong>Головна ідея:</strong> Redux — класична бібліотека управління станом, яка свого часу стандартизувала підходи до глобального стану у великих застосунках. Сьогодні існує <strong>Redux Toolkit</strong> — офіційний, сучасний спосіб роботи з Redux.</p>\n<h2>🏛️ Архітектура Redux</h2>\n\n<div class=\"mermaid\" data-source=\"graph LR\n    UI[&quot;🖥️ UI Component&quot;] --&gt;|&quot;dispatch(action)&quot;| STORE[&quot;🏪 Store&quot;]\n    STORE --&gt;|&quot;reducer(state, action)&quot;| REDUCER[&quot;⚙️ Reducer&quot;]\n    REDUCER --&gt;|&quot;new state&quot;| STORE\n    STORE --&gt;|&quot;subscribe / selector&quot;| UI\n    style UI fill:#e3f2fd,stroke:#1565c0\n    style STORE fill:#fff9c4 рямо у store</td>\n</tr>\n<tr>\n<td><strong>Boilerplate</strong></td>\n<td>Багато (actions, reducers, selectors)</td>\n<td>Мінімальний</td>\n</tr>\n<tr>\n<td><strong>DevTools</strong></td>\n<td>Вбудована підтримка</td>\n<td>Через middleware</td>\n</tr>\n<tr>\n<td><strong>Популярність</strong></td>\n<td>Домінував до ~2021</td>\n<td>Активно витісняє Redux</td>\n</tr>\n</tbody></table>\n<h2>📌 Коли Redux ще доречний</h2>\n<ul>\n<li>Великі команди, де важлива сувора архітектура</li>\n<li>Legacy-проєкти, де Redux вже використовується</li>\n<li>Дуже складні сценарії з time-travel debugging</li>\n</ul>\n<div class=\"note\"><strong>📝 Redux Toolkit</strong> <p>Якщо проєкт вже використовує Redux, <strong>Redux Toolkit (RTK)</strong> — єдиний правильний спосіб роботи з ним. RTK усуває надлишковий boilerplate і включає Immer для іммутабельного оновлення.</p>\n</div>\n\n","<h1>🧭 Як обрати інструмент для стану?</h1>\n<p><strong>Головна ідея:</strong> Не існує єдиного «правильного» інструмента — вибір залежить від <strong>типу даних</strong> та <strong>сценарію використання</strong>. Правильне питання: «Де живуть ці дані і як часто змінюються?»</p>\n<h2>🗺️ Карта прийняття рішень</h2>\n\n<div class=\"mermaid\" data-source=\"graph TD\n    Q1{&quot;Де потрібні дані?&quot;} --&gt;|&quot;Один компонент&quot;| Q0{&quot;Складний стан?&quot;}\n    Q0 --&gt;|&quot;Простий&quot;| UST[&quot;📦 useState&quot;]\n    Q0 --&gt;|&quot;Складний&quot;| URD[&quot;📦 useReducer&quot;]\n    Q1 --&gt;|&quot;Кілька компонентів&quot;| Q2{&quot;Як часто змінюються?&quot;}\n    Q2 --&gt;|&quot;Рідко: тема, мова, auth&quot;| CTX[&quot;🌐 Context API&quot;]\n    Q2 --&gt;|&quot;Часто: складний UI-стан&quot;| Q3{&quot;Розмір команди / проєкту?&quot;}\n    Q3 --&gt;|&quot;Малий або середній&quot;| ZST[&quot;🐻 Zustand&quot;]\n    Q3 --&gt;|&quot;Великий enterprise&quot;| RDX[&quot;🗂️ Redux Toolkit&quot;]\n    Q1 --&gt;|&quot;Серверні дані (API)&quot;| TQ[&quot;🔄 TanStack Query&quot;]\n    style UST fill:#e8f5e9,str  class=\"basic label-container\" style=\"fill:#f3e5f5 !important;stroke:#7b1fa2 !important\" x=\"-91.56640625\" y=\"-24\" width=\"183.1328125\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-67.56640625, -12)\"><rect></rect><foreignObject width=\"135.1328125\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>🔄 TanStack Query</p></span></div></foreignObject></g></g></g></g></g></svg></div>\n<h2>📋 Зведена таблиця</h2>\n<table>\n<thead>\n<tr>\n<th>Інструмент</th>\n<th>Тип стану</th>\n<th>Коли обирати</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><strong>useState</strong></td>\n<td>Локальний, простий</td>\n<td>Стан одного компонента: форми, toggle, лічильники</td>\n</tr>\n<tr>\n<td><strong>useReducer</strong></td>\n<td>Локальний, складний</td>\n<td>Багато взаємопов'язаних полів, складна логіка переходів</td>\n</tr>\n<tr>\n<td><strong>Context API</strong></td>\n<td>Глобальний, рідко змінюваний</td>\n<td>Тема, мова, авторизація</td>\n</tr>\n<tr>\n<td><strong>Zustand</strong></td>\n<td>Глобальний, активно змінюваний</td>\n<td>Складний клієнтський стан у більшості проєктів</td>\n</tr>\n<tr>\n<td><strong>TanStack Query</strong></td>\n<td>Серверний стан</td>\n<td>Дані з API: кешування, синхронізація, оновлення</td>\n</tr>\n<tr>\n<td><strong>Redux Toolkit</strong></td>\n<td>Глобальний, enterprise</td>\n<td>Великі проєкти з великими командами</td>\n</tr>\n</tbody></table>\n<div class=\"tip\"><strong>💡 Практична порада</strong> <p>Для більшості нових React-застосунків оптимальне поєднання — <strong>Zustand</strong> для клієнтського стану + <strong>TanStack Query</strong> для серверного. Context API залишається для рідко змінюваних «конфігураційних» даних (тема, локаль).</p>\n</div>\n\n","<h1>✅ Ключові висновки</h1>\n<div class=\"success\"><strong>✅ Підсумок лекції</strong> <p><strong>📌 Що ми вивчили:</strong></p>\n<ol>\n<li><p><strong>Prop drilling</strong> — передача props через «транзитні» компоненти ускладнює підтримку. Context API вирішує цю проблему для рідко змінюваних даних</p>\n</li>\n<li><p><strong>Context API</strong> — три кроки: <code>createContext</code> → <code>Provider</code> → <code>useContext</code>. Обгортання <code>useContext</code> у custom hook приховує деталі реалізації та додає захист від використання поза Provider</p>\n</li>\n<li><p><strong>Обмеження Context:</strong> будь-яка зміна значення перерендерює всіх споживачів → розділяйте контексти за частотою оновлення</p>\n</li>\n<li><p><strong>useReducer</strong> — централізує бізнес-логіку у редьюсері <code>(state, action) =&gt; newState</code>. Дії типізуються через discriminated unions. Поєднується з Context для глобального стану</p>\n</li>\n<li><p><strong>Zustand</strong> — мінімалістична альтернатива. Не потребує Provider, селектори запобігають зайвим рендерам, middleware <code>persist</code> та <code>devtools</code> виходять із коробки</p>\n</li>\n<li><p><strong>Redux</strong> — ветеран екосистеми, сьогодні доречний у великих enterprise-проєктах. Redux Toolkit — єдиний правильний спосіб роботи з ним</p>\n</li>\n<li><p><strong>Вибір інструмента:</strong> <code>useState/useReducer</code> → локальний стан, Context → рідко змінювані глобальні дані, Zustand → активний клієнтський стан, TanStack Query → серверний стан</p>\n</li>\n</ol>\n</div>\n\n","<h1>❓ Контрольні питання</h1>\n<ol>\n<li><p>🤔 Що таке prop drilling і чому це вважається проблемою? За яких умов воно виникає?</p>\n</li>\n<li><p>🤔 Опишіть три кроки використання Context API. Що відбудеться, якщо <code>useContext</code> викликати за межами відповідного <code>Provider</code>?</p>\n</li>\n<li><p>🤔 Чому зміна значення контексту викликає перерендер усіх споживачів? Як патерн розділення контексту вирішує цю проблему?</p>\n</li>\n<li><p>🤔 Яка концептуальна різниця між <code>useState</code> і <code>useReducer</code>? Наведіть приклад задачі, де <code>useReducer</code> доцільніший.</p>\n</li>\n<li><p>🤔 Що таке discriminated union у TypeScript? Навіщо його використовують для типізації дій у редьюсері?</p>\n</li>\n<li><p>🤔 Чим Zustand відрізняється від Context API? Навіщо потрібні селектори при використанні Zustand?</p>\n</li>\n<li><p>🤔 Які типи стану вирішує TanStack Query і чим він відрізняється від Zustand?</p>\n</li>\n</ol>\n","<h1>📖 Глосарій термінів</h1>\n<table>\n<thead>\n<tr>\n<th>Термін</th>\n<th>English</th>\n<th>Визначення</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Прокидання пропсів</td>\n<td>Prop Drilling</td>\n<td>Передача даних через проміжні компоненти, що їх не використовують</td>\n</tr>\n<tr>\n<td>Контекст</td>\n<td>Context</td>\n<td>Механізм React для передачі даних без явного прокидання через props</td>\n</tr>\n<tr>\n<td>Постачальник</td>\n<td>Provider</td>\n<td>Компонент-обгортка, що робить значення контексту доступним для нащадків</td>\n</tr>\n<tr>\n<td>Споживач</td>\n<td>Consumer</td>\n<td>Компонент, що отримує значення з контексту через <code>useContext</code></td>\n</tr>\n<tr>\n<td>Редьюсер</td>\n<td>Reducer</td>\n<td>Чиста функція <code>(state, action) =&gt; newState</code> для оновлення стану</td>\n</tr>\n<tr>\n<td>Дія</td>\n<td>Action</td>\n<td>Об'єкт <code>{ type, payload }</code>, що описує намір змінити стан</td>\n</tr>\n<tr>\n<td>Селектор</td>\n<td>Selector</td>\n<td>Функція, що вибирає частину стану зі store</td>\n</tr>\n<tr>\n<td>Розрізнюване об'єднання</td>\n<td>Discriminated Union</td>\n<td>Патерн TypeScript: об'єднання типів з полем-дискримінатором (<code>type</code>), що дозволяє TypeScript звужувати тип у <code>switch/if</code></td>\n</tr>\n<tr>\n<td>Синглтон</td>\n<td>Singleton</td>\n<td>Патерн, де існує лише один екземпляр об'єкта (Zustand store)</td>\n</tr>\n<tr>\n<td>Мідлвар</td>\n<td>Middleware</td>\n<td>Функція, що розширює поведінку store (persist, devtools)</td>\n</tr>\n</tbody></table>\n","<h1>📖 Глосарій абревіатур</h1>\n<table>\n<thead>\n<tr>\n<th>Абревіатура</th>\n<th>Розшифровка</th>\n<th>Переклад</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>API</td>\n<td>Application Programming Interface</td>\n<td>Програмний інтерфейс застосунку</td>\n</tr>\n<tr>\n<td>UI</td>\n<td>User Interface</td>\n<td>Інтерфейс користувача</td>\n</tr>\n<tr>\n<td>RTK</td>\n<td>Redux Toolkit</td>\n<td>Офіційний набір інструментів Redux</td>\n</tr>\n<tr>\n<td>TS</td>\n<td>TypeScript</td>\n<td>Типізований надмножина JavaScript</td>\n</tr>\n</tbody></table>\n"];let currentSlideIndex=0;
function renderMath(root){if(typeof renderMathInElement!=="function"||!root)return;try{renderMathInElement(root,{delimiters:[{left:"$$",right:"$$",display:true},{left:"\\[",right:"\\]",display:true},{left:"$",right:"$",display:false},{left:"\\(",right:"\\)",display:false}],throwOnError:false,strict:"ignore",ignoredTags:["script","noscript","style","textarea","pre","code"]});}catch(e){console.warn("Math render error:",e);}}
function showSlide(i){if(i<0||i>=slides.length)return;currentSlideIndex=i;const el=document.getElementById("current-slide");el.innerHTML=slides[i];el.scrollTop=0;renderMath(el);document.getElementById("progress-bar").style.width=((i+1)/slides.length*100)+"%";document.getElementById("slide-number").textContent=(i+1)+" / "+slides.length;updateSidebarActive();}
function nextSlide(){if(currentSlideIndex<slides.length-1)showSlide(currentSlideIndex+1);}
function previousSlide(){if(currentSlideIndex>0)showSlide(currentSlideIndex-1);}
function toggleSidebar(){document.getElementById("sidebar").classList.toggle("open");}
function toggleHelp(){document.getElementById("help-overlay").classList.toggle("hidden");}
function toggleFullscreen(){if(!document.fullscreenElement){const pc=document.getElementById("presentation-container");if(pc.requestFullscreen)pc.requestFullscreen();else if(pc.webkitRequestFullscreen)pc.webkitRequestFullscreen();else if(pc.msRequestFullscreen)pc.msRequestFullscreen();else if(pc.mozRequestFullScreen)pc.mozRequestFullScreen();}else{if(document.exitFullscreen)document.exitFullscreen();else if(document.webkitExitFullscreen)document.webkitExitFullscreen();else if(document.msExitFullscreen)document.msExitFullscreen();else if(document.mozCancelFullScreen)document.mozCancelFullScreen();}}
function generateSidebar(){const sc=document.getElementById("sidebar-content");sc.innerHTML="";slides.forEach((html,idx)=>{const t=document.createElement("div");t.className="slide-thumbnail";if(idx===0)t.classList.add("active");const tmp=document.createElement("div");tmp.innerHTML=html;const title=tmp.querySelector("h1,h2");const titleText=title?title.textContent:("Слайд "+(idx+1));const textContent=tmp.textContent.replace(/s+/g," ").trim();const preview=textContent.substring(0,100)+(textContent.length>100?"...":"");t.innerHTML="<div class=\"slide-thumbnail-number\">"+(idx+1)+"</div><div class=\"slide-thumbnail-title\">"+titleText+"</div><div class=\"slide-thumbnail-content\">"+preview+"</div>";t.onclick=()=>{showSlide(idx);if(window.innerWidth<1024)toggleSidebar();};sc.appendChild(t);});}
function updateSidebarActive(){document.querySelectorAll(".slide-thumbnail").forEach((th,idx)=>{if(idx===currentSlideIndex){th.classList.add("active");th.scrollIntoView({behavior:"smooth",block:"nearest"});}else th.classList.remove("active");});}
document.addEventListener("keydown",e=>{switch(e.key){case"ArrowLeft":previousSlide();break;case"ArrowRight":case" ":e.preventDefault();nextSlide();break;case"f":case"F":toggleFullscreen();break;case"s":case"S":toggleSidebar();break;case"?":toggleHelp();break;case"Escape":const sb=document.getElementById("sidebar");const ho=document.getElementById("help-overlay");if(sb.classList.contains("open"))toggleSidebar();else if(!ho.classList.contains("hidden"))ho.classList.add("hidden");break;}});
generateSidebar();showSlide(0);</script></body></html>
