#presentation-container:fullscreen,#presentation-container:-webkit-full-screen,#presentation-container:-moz-full-screen,#presentation-container:-ms-fullscreen{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%)!important;}</style></head><body><div id="presentation-container"><div class="progress"><div class="progress-bar" id="progress-bar"></div></div><button id="sidebar-toggle" onclick="toggleSidebar()" title="Навігація слайдами (S)">☰</button><div id="sidebar"><div id="sidebar-header"><h3>📑 Слайди</h3><button id="sidebar-close" onclick="toggleSidebar()">✕</button></div><div id="sidebar-content"></div></div><div class="slide-container"><div class="slide" id="current-slide"></div></div><div class="controls"><button class="control-btn" onclick="previousSlide()" title="Попередній (←)">←</button><button class="control-btn" onclick="nextSlide()" title="Наступний (→)">→</button><button class="control-btn" onclick="toggleFullscreen()" title="Повноекранний режим (F)">⛶</button><button class="control-btn" onclick="toggleHelp()" title="Допомога (?)">?</button></div><div class="slide-number" id="slide-number">1 / 15</div><div id="help-overlay" class="hidden"><strong>Гарячі клавіші:</strong><br><kbd>←</kbd> <kbd>→</kbd> Навігація<br><kbd>F</kbd> Повноекранний режим<br><kbd>S</kbd> Sidebar<br><kbd>?</kbd> Допомога<br><kbd>Esc</kbd> Закрити</div></div><script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script><script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script><script>const slides=["<h1>Nest.js: основи</h1>\n<p><strong>Сучасні технології Internet-програмування</strong></p>\n<p>Лектор: Кобилянський Антон</p>\n","<h1>📋 План лекції</h1>\n<ol>\n<li>🏗️ Що таке Nest.js та навіщо він потрібен</li>\n<li>🧩 Архітектура: модулі, контролери, провайдери</li>\n<li>🎨 Декоратори — основа Nest.js</li>\n<li>⚙️ Nest CLI: створення проєкту та генерація коду</li>\n<li>🎮 Контролери та маршрутизація HTTP-запитів</li>\n<li>🌐 Змінні середовища та ConfigModule</li>\n<li>✅ Ключові висновки та контрольні питання</li>\n</ol>\n","<h1>🏗️ Що таке Nest.js</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>Nest.js</strong> — це фреймворк для побудови серверних (backend) застосунків на Node.js з підтримкою TypeScript. Він надає чітку архітектуру та набір інструментів, що дозволяють створювати масштабовані та добре структуровані API.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> Nest.js не замінює Node.js — він будується поверх нього та поверх HTTP-сервера (Express або Fastify), додаючи архітектуру та зручні інструменти.</p>\n<h2>🤔 Проблема без фреймворку</h2>\n<p>Уявімо, що ми пишемо API на чистому Node.js:</p>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// Без фреймворку — все вручну, все в одному місці</span>\n<span class=\"hljs-keyword\">const</span> http = <span class=\"hljs-built_in\">require</span>(<span class=\"hljs-string\">\"http\"</span>);\n\n<span class=\"hljs-keyword\">const</span> server = http.<span class=\"hljs-title function_\">createServer</span>(<span class=\"hljs-function\">(<span class=\"hljs-params\">req, res</span>) =&gt;</span> {\n  <span class=\"hljs-keyword\">if</span> (req.<span class=\"hljs-property\">method</span> === <span class=\"hljs-string\">\"GET\"</span> &amp;&amp; req.<span class=\"hljs-property\">url</span> === <span class=\"hljs-string\">\"/tasks\"</span>) {\n    res.<span class=\"hljs-title function_\">writeHead</span>(<span class=\"hljs-number\">200</span>, { <span class=\"hljs-string\">\"Content-Type\"</span>: <span class=\"hljs-string\">\"application/json\"</span> });\n    res.<span class=\"hljs-title function_\">end</span>(<span class=\"hljs-title class_\">JSON</span>.<span class=\"hljs-title function_\">stringify</span>({ <span class=\"hljs-attr\">tasks</span>: [] }));\n  } <span class=\"hljs-keyword\">else</span> <span class=\"hljs-keyword\">if</span> (req.<span class=\"hljs-property\">method</span> === <span class=\"hljs-string\">\"POST\"</span> &amp;&amp; req.<span class=\"hljs-property\">url</span> === <span class=\"hljs-string\">\"/tasks\"</span>) {\n    <span class=\"hljs-comment\">// Збір тіла запиту — потрібно вручну</span>\n    <span class=\"hljs-keyword\">let</span> body = <span class=\"hljs-string\">\"\"</span>;\n    req.<span class=\"hljs-title function_\">on</span>(<span class=\"hljs-string\">\"data\"</span>, <span class=\"hljs-function\">(<span class=\"hljs-params\">chunk</span>) =&gt;</span> (body += chunk));\n    req.<span class=\"hljs-title function_\">on</span>(<span class=\"hljs-string\">\"end\"</span>, <span class=\"hljs-function\">() =&gt;</span> {\n      <span class=\"hljs-keyword\">const</span> task = <span class=\"hljs-title class_\">JSON</span>.<span class=\"hljs-title function_\">parse</span>(body);\n      res.<span class=\"hljs-title function_\">writeHead</span>(<span class=\"hljs-number\">201</span>);\n      res.<span class=\"hljs-title function_\">end</span>(<span class=\"hljs-title class_\">JSON</span>.<span class=\"hljs-title function_\">stringify</span>(task));\n    });\n  } <span class=\"hljs-keyword\">else</span> {\n    res.<span class=\"hljs-title function_\">writeHead</span>(<span class=\"hljs-number\">404</span>);\n    res.<span class=\"hljs-title function_\">end</span>(<span class=\"hljs-string\">\"Not found\"</span>);\n  }\n});</code></pre><div class=\"warning\"><strong>⚠️ Проблеми чистого підходу</strong> <ul>\n<li>📁 Весь код в одному файлі → важко підтримувати</li>\n<li>🔁 Повторюваний код: парсинг тіла, обробка помилок, заголовки</li>\n<li>🧪 Важко тестувати: все тісно зв'язано</li>\n<li>👥 Складно працювати командою: немає єдиної структури</li>\n</ul>\n</div>\n\n\n\n<h2>✅ Рішення Nest.js</h2>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// З Nest.js — кожен компонент має своє місце та відповідальність</span>\n<span class=\"hljs-meta\">@Controller</span>(<span class=\"hljs-string\">\"tasks\"</span>)\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">class</span> <span class=\"hljs-title class_\">TasksController</span> {\n  <span class=\"hljs-meta\">@Get</span>()\n  <span class=\"hljs-title function_\">findAll</span>(<span class=\"hljs-params\"></span>) {\n    <span class=\"hljs-keyword\">return</span> { <span class=\"hljs-attr\">tasks</span>: [] };\n  }\n\n  <span class=\"hljs-meta\">@Post</span>()\n  <span class=\"hljs-title function_\">create</span>(<span class=\"hljs-params\"><span class=\"hljs-meta\">@Body</span>() createTaskDto: CreateTaskDto</span>) {\n    <span class=\"hljs-keyword\">return</span> createTaskDto;\n  }\n}</code></pre><p>Nest.js надає <strong>чітку структуру</strong>: кожен файл має зрозумілу роль, тестування спрощено, команда одразу розуміє де що знаходиться.</p>\n","<h1>🔗 Nest.js у стеку технологій</h1>\n<p><strong>Головна ідея:</strong> Nest.js займає роль \"бекенду\" у стеку розробки — обробляє HTTP-запити від браузера або мобільного додатку, взаємодіє з базою даних і повертає дані.</p>\n\n<div class=\"mermaid\" data-source=\"graph LR\n    CLIENT[&quot;🌐 Браузер (React)&quot;] --&gt; NEST[&quot;🏗️ Nest.js API&quot;]\n    MOBILE[&quot;📱 Мобільний додаток&quot;] --&gt; NEST\n    NEST --&gt; DB[&quot;🗄️ База даних&quot;]\n    NEST --&gt; CACHE[&quot;⚡ Кеш (Redis)&quot;]\n    NEST --&gt; EXT[&quot;🔌 Зовнішні API&quot;]\n    style CLIENT fill:#e3f2fd,stroke:#1565c0\n    style MOBILE fill:#fce4ec,stroke:#c2185b\n    style NEST fill:#fff9c4,stroke:#f9a825\n    style DB fill:#e8f5e9,stroke:#388e3c\n    style CACHE fill:#f3e5f5,stroke:#7b1fa2\n    style EXT fill:#fff3e0,stroke:#ef6c00\"><svg id=\"exp-1774377781637-3-0\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" class=\"flowchart\" style=\"max-width: 653.015625px;\" viewBox=\"0 0 653.015625 260\" role=\"graphics-document document\" aria-roledescription=\"flowchart-v2\"><style>#exp-1774377781637-3-0{font-fami (410.46875, 252)\"><rect class=\"basic label-container\" style=\"fill:#e8f5e9 !important;stroke:#388e3c !important\" x=\"-92.9140625\" y=\"-24\" width=\"185.828125\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-68.9140625, -12)\"><rect></rect><foreignObject width=\"137.828125\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>🎮 UsersController</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"flowchart-US-11\" transform=\"translate(346.51171875, 372)\"><rect class=\"basic label-container\" style=\"fill:#fce4ec !important;stroke:#c2185b !important\" x=\"-84.1484375\" y=\"-24\" width=\"168.296875\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-60.1484375, -12)\"><rect></rect><foreignObject width=\"120.296875\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>⚙️ UsersService</p></span></div></foreignObject></g></g></g></g></g></svg></div>\n<h2>🧱 Ролі компонентів</h2>\n<table>\n<thead>\n<tr>\n<th>Компонент</th>\n<th>Файл</th>\n<th>Роль</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><strong>Module</strong></td>\n<td><code>tasks.module.ts</code></td>\n<td>Організує та інкапсулює пов'язані компоненти</td>\n</tr>\n<tr>\n<td><strong>Controller</strong></td>\n<td><code>tasks.controller.ts</code></td>\n<td>Приймає HTTP-запити, повертає відповіді</td>\n</tr>\n<tr>\n<td><strong>Provider</strong></td>\n<td><code>tasks.service.ts</code></td>\n<td>Містить бізнес-логіку; впроваджується як залежність</td>\n</tr>\n</tbody></table>\n<div class=\"note\"><strong>📝 Принцип розподілу відповідальності</strong> <p>Розподіл на модулі, контролери та сервіси відповідає принципу <strong>Single Responsibility</strong>: кожен клас має одну чітко визначену роль. Контролер не містить бізнес-логіки, сервіс не знає про HTTP — це забезпечує незалежне тестування кожного шару.</p>\n</div>\n\n","<h1>🎨 Декоратори — основа Nest.js</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>Декоратор</strong> — це спеціальний синтаксис TypeScript (<code>@НазваДекоратора</code>), що анотує клас, метод або параметр, додаючи йому нові метадані або поведінку без зміни самого коду.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> Nest.js активно використовує декоратори TypeScript для декларативного опису того, як повинен поводитися кожен клас і метод.</p>\n<h2>📋 Основні декоратори</h2>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// 🏗️ Декоратор класу — позначає, що це контролер з базовим маршрутом '/tasks'</span>\n<span class=\"hljs-meta\">@Controller</span>(<span class=\"hljs-string\">'tasks'</span>)\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">class</span> <span class=\"hljs-title class_\">TasksController</span> {\n\n  <span class=\"hljs-comment\">// 🟢 Декоратор методу — обробляє GET /tasks</span>\n  <span class=\"hljs-meta\">@Get</span>()\n  <span class=\"hljs-title function_\">findAll</span>(<span class=\"hljs-params\"></span>) { ... }\n\n  <span class=\"hljs-comment\">// 🔵 Декоратор методу — обробляє GET /tasks/:id</span>\n  <span class=\"hljs-meta\">@Get</span>(<span class=\"hljs-string\">':id'</span>)\n  <span class=\"hljs-title function_\">findOne</span>(<span class=\"hljs-params\">\n    <span class=\"hljs-comment\">// 📌 Декоратор параметра — отримує значення ':id' з URL</span>\n    <span class=\"hljs-meta\">@Param</span>(<span class=\"hljs-string\">'id'</span>) id: <span class=\"hljs-built_in\">string</span>\n  </span>) { ... }\n\n  <span class=\"hljs-comment\">// 🟡 Декоратор методу — обробляє POST /tasks</span>\n  <span class=\"hljs-meta\">@Post</span>()\n  <span class=\"hljs-title function_\">create</span>(<span class=\"hljs-params\">\n    <span class=\"hljs-comment\">// 📦 Декоратор параметра — отримує тіло запиту (JSON)</span>\n    <span class=\"hljs-meta\">@Body</span>() createTaskDto: CreateTaskDto\n  </span>) { ... }\n\n  <span class=\"hljs-comment\">// 🟠 Декоратор методу — обробляє PATCH /tasks/:id</span>\n  <span class=\"hljs-meta\">@Patch</span>(<span class=\"hljs-string\">':id'</span>)\n  <span class=\"hljs-title function_\">update</span>(<span class=\"hljs-params\">\n    <span class=\"hljs-meta\">@Param</span>(<span class=\"hljs-string\">'id'</span>) id: <span class=\"hljs-built_in\">string</span>,\n    <span class=\"hljs-meta\">@Body</span>() updateTaskDto: UpdateTaskDto\n  </span>) { ... }\n\n  <span class=\"hljs-comment\">// 🔴 Декоратор методу — обробляє DELETE /tasks/:id</span>\n  <span class=\"hljs-meta\">@Delete</span>(<span class=\"hljs-string\">':id'</span>)\n  <span class=\"hljs-title function_\">remove</span>(<span class=\"hljs-params\"><span class=\"hljs-meta\">@Param</span>(<span class=\"hljs-string\">'id'</span>) id: <span class=\"hljs-built_in\">string</span></span>) { ... }\n}</code></pre><h2>🏷️ Категорії декораторів</h2>\n<table>\n<thead>\n<tr>\n<th>Категорія</th>\n<th>Приклади</th>\n<th>Де застосовуються</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Класові</td>\n<td><code>@Controller()</code>, <code>@Module()</code>, <code>@Injectable()</code></td>\n<td>Перед класом</td>\n</tr>\n<tr>\n<td>HTTP-методи</td>\n<td><code>@Get()</code>, <code>@Post()</code>, <code>@Put()</code>, <code>@Delete()</code>, <code>@Patch()</code></td>\n<td>Перед методом</td>\n</tr>\n<tr>\n<td>Параметри запиту</td>\n<td><code>@Body()</code>, <code>@Param()</code>, <code>@Query()</code>, <code>@Headers()</code></td>\n<td>Перед параметром</td>\n</tr>\n<tr>\n<td>Відповіді</td>\n<td><code>@HttpCode()</code>, <code>@Header()</code></td>\n<td>Перед методом</td>\n</tr>\n</tbody></table>\n","<h1>⚙️ Nest CLI: перший проєкт</h1>\n<p><strong>Головна ідея:</strong> Nest CLI — це інструмент командного рядка, що автоматизує створення проєктів і генерацію файлів, позбавляючи від написання шаблонного коду вручну.</p>\n<h2>🚀 Встановлення та створення проєкту</h2>\n<pre><code class=\"language-bash hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\"># 1. Встановити Nest CLI глобально</span>\nnpm install -g @nestjs/cli\n\n<span class=\"hljs-comment\"># 2. Створити новий проєкт</span>\nnest new task-manager-api\n\n<span class=\"hljs-comment\"># 3. Вибрати пакетний менеджер (npm)</span>\n<span class=\"hljs-comment\"># ✔ Installation in progress... ☕</span>\n\n<span class=\"hljs-comment\"># 4. Запустити в режимі розробки (з авто-перезавантаженням)</span>\n<span class=\"hljs-built_in\">cd</span> task-manager-api\nnpm run start:dev</code></pre><div class=\"tip\"><strong>💡 Що означає start:dev?</strong> <p>Команда <code>start:dev</code> запускає сервер з <strong>watch mode</strong>: кожного разу, коли ви зберігаєте файл — сервер автоматично перезавантажується. Це зручно під час розробки.</p>\n</div>\n\n\n\n<h2>📁 Структура нового проєкту</h2>\n<pre><code class=\"language-plaintext hljs\" data-highlighted=\"yes\">task-manager-api/\n├── src/\n│   ├── app.controller.ts     ← Контролер кореневого маршруту\n│   ├── app.controller.spec.ts← Тести контролера\n│   ├── app.module.ts         ← Кореневий модуль застосунку\n│   ├── app.service.ts        ← Сервіс кореневого модуля\n│   └── main.ts               ← Точка входу, запуск сервера\n├── test/                     ← E2E тести\n├── .eslintrc.js\n├── .prettierrc\n├── nest-cli.json             ← Конфігурація CLI\n├── package.json\n└── tsconfig.json</code></pre><h2>📄 Файл main.ts — точка входу</h2>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// src/main.ts</span>\n<span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">NestFactory</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"@nestjs/core\"</span>;\n<span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">AppModule</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"./app.module\"</span>;\n\n<span class=\"hljs-keyword\">async</span> <span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">bootstrap</span>(<span class=\"hljs-params\"></span>) {\n  <span class=\"hljs-comment\">// Створити екземпляр застосунку на основі кореневого модуля</span>\n  <span class=\"hljs-keyword\">const</span> app = <span class=\"hljs-keyword\">await</span> <span class=\"hljs-title class_\">NestFactory</span>.<span class=\"hljs-title function_\">create</span>(<span class=\"hljs-title class_\">AppModule</span>);\n\n  <span class=\"hljs-comment\">// Запустити HTTP-сервер (порт береться зі змінної середовища або 3000)</span>\n  <span class=\"hljs-keyword\">const</span> port = <span class=\"hljs-built_in\">parseInt</span>(process.<span class=\"hljs-property\">env</span>.<span class=\"hljs-property\">PORT</span> ?? <span class=\"hljs-string\">\"3000\"</span>, <span class=\"hljs-number\">10</span>);\n  <span class=\"hljs-keyword\">await</span> app.<span class=\"hljs-title function_\">listen</span>(port);\n\n  <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">`🚀 Server is running on http://localhost:<span class=\"hljs-subst\">${port}</span>`</span>);\n}\n\n<span class=\"hljs-title function_\">bootstrap</span>(); <span class=\"hljs-comment\">// Викликати async-функцію</span></code></pre><div class=\"note\"><strong>📝 Навіщо async/await?</strong> <p><code>NestFactory.create()</code> та <code>app.listen()</code> — це асинхронні операції (вони займають час). <code>async/await</code> дозволяє писати асинхронний код так, ніби він синхронний — без callback-пірамід.</p>\n</div>\n\n","<h1>📦 Модулі</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>Модуль</strong> — це клас з декоратором <code>@Module()</code>, що об'єднує пов'язані компоненти (контролери, сервіси) в одну логічну групу. Кожен застосунок має щонайменше один модуль — кореневий.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> Модулі забезпечують інкапсуляцію: компоненти одного модуля ізольовані від інших і доступні зовні лише через явний <code>exports</code>. Це запобігає неконтрольованим залежностям між частинами застосунку.</p>\n<h2>🔧 Генерація модуля через CLI</h2>\n<pre><code class=\"language-bash hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\"># CLI автоматично створить файли та додасть модуль до AppModule</span>\nnest generate module tasks\n<span class=\"hljs-comment\"># або скорочено:</span>\nnest g mo tasks</code></pre><p>Після виконання команди з'явиться файл <code>src/tasks/tasks.module.ts</code>:</p>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// src/tasks/tasks.module.ts</span>\n<span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">Module</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"@nestjs/common\"</span>;\n\n<span class=\"hljs-meta\">@Module</span>({\n  <span class=\"hljs-attr\">imports</span>: [], <span class=\"hljs-comment\">// Інші модулі, які потрібні цьому</span>\n  <span class=\"hljs-attr\">controllers</span>: [], <span class=\"hljs-comment\">// Контролери цього модуля</span>\n  <span class=\"hljs-attr\">providers</span>: [], <span class=\"hljs-comment\">// Сервіси та провайдери</span>\n  <span class=\"hljs-attr\">exports</span>: [], <span class=\"hljs-comment\">// Що доступно іншим модулям</span>\n})\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">class</span> <span class=\"hljs-title class_\">TasksModule</span> {}</code></pre><h2>🌳 Кореневий модуль</h2>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// src/app.module.ts</span>\n<span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">Module</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"@nestjs/common\"</span>;\n<span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">TasksModule</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"./tasks/tasks.module\"</span>;\n<span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">UsersModule</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"./users/users.module\"</span>;\n\n<span class=\"hljs-meta\">@Module</span>({\n  <span class=\"hljs-attr\">imports</span>: [<span class=\"hljs-title class_\">TasksModule</span>, <span class=\"hljs-title class_\">UsersModule</span>], <span class=\"hljs-comment\">// Реєструємо всі модулі застосунку</span>\n  <span class=\"hljs-attr\">controllers</span>: [],\n  <span class=\"hljs-attr\">providers</span>: [],\n})\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">class</span> <span class=\"hljs-title class_\">AppModule</span> {}</code></pre><div class=\"tip\"><strong>💡 Принцип єдиної відповідальності</strong> <p>Кожен модуль відповідає за одну функціональну область. <code>TasksModule</code> — лише для задач, <code>UsersModule</code> — лише для користувачів. Так легше знаходити код та тестувати його.</p>\n</div>\n\n","<h1>🎮 Контролери та маршрутизація</h1>\n<p><strong>Головна ідея:</strong> Контролер — це клас, що визначає, які HTTP-запити обробляє застосунок і що повертає у відповідь. Кожен метод контролера відповідає одному маршруту (endpoint).</p>\n<h2>🔧 Генерація контролера</h2>\n<pre><code class=\"language-bash hljs\" data-highlighted=\"yes\">nest generate controller tasks\n<span class=\"hljs-comment\"># або скорочено:</span>\nnest g co tasks</code></pre><h2>📝 Повний приклад контролера</h2>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// src/tasks/tasks.controller.ts</span>\n<span class=\"hljs-keyword\">import</span> {\n  <span class=\"hljs-title class_\">Controller</span>,\n  <span class=\"hljs-title class_\">Get</span>,\n  <span class=\"hljs-title class_\">Post</span>,\n  <span class=\"hljs-title class_\">Patch</span>,\n  <span class=\"hljs-title class_\">Delete</span>,\n  <span class=\"hljs-title class_\">Param</span>,\n  <span class=\"hljs-title class_\">Body</span>,\n  <span class=\"hljs-title class_\">HttpCode</span>,\n} <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"@nestjs/common\"</span>;\n\n<span class=\"hljs-meta\">@Controller</span>(<span class=\"hljs-string\">\"tasks\"</span>) <span class=\"hljs-comment\">// Базовий маршрут: /tasks</span>\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">class</span> <span class=\"hljs-title class_\">TasksController</span> {\n  <span class=\"hljs-comment\">// GET /tasks → отримати всі задачі</span>\n  <span class=\"hljs-meta\">@Get</span>()\n  <span class=\"hljs-title function_\">findAll</span>(<span class=\"hljs-params\"></span>) {\n    <span class=\"hljs-keyword\">return</span> [\n      { <span class=\"hljs-attr\">id</span>: <span class=\"hljs-number\">1</span>, <span class=\"hljs-attr\">title</span>: <span class=\"hljs-string\">\"Вивчити Nest.js\"</span>, <span class=\"hljs-attr\">status</span>: <span class=\"hljs-string\">\"in-progress\"</span> },\n      { <span class=\"hljs-attr\">id</span>: <span class=\"hljs-number\">2</span>, <span class=\"hljs-attr\">title</span>: <span class=\"hljs-string\">\"Написати API\"</span>, <span class=\"hljs-attr\">status</span>: <span class=\"hljs-string\">\"todo\"</span> },\n    ];\n  }\n\n  <span class=\"hljs-comment\">// GET /tasks/:id → отримати задачу за id</span>\n  <span class=\"hljs-meta\">@Get</span>(<span class=\"hljs-string\">\":id\"</span>)\n  <span class=\"hljs-title function_\">findOne</span>(<span class=\"hljs-params\"><span class=\"hljs-meta\">@Param</span>(<span class=\"hljs-string\">\"id\"</span>) id: <span class=\"hljs-built_in\">string</span></span>) {\n    <span class=\"hljs-comment\">// id завжди рядок — треба перетворити на число, якщо потрібно</span>\n    <span class=\"hljs-keyword\">return</span> { <span class=\"hljs-attr\">id</span>: <span class=\"hljs-title class_\">Number</span>(id), <span class=\"hljs-attr\">title</span>: <span class=\"hljs-string\">\"Вивчити Nest.js\"</span> };\n  }\n\n  <span class=\"hljs-comment\">// POST /tasks → створити нову задачу</span>\n  <span class=\"hljs-meta\">@Post</span>()\n  <span class=\"hljs-title function_\">create</span>(<span class=\"hljs-params\"><span class=\"hljs-meta\">@Body</span>() body: { title: <span class=\"hljs-built_in\">string</span>; description: <span class=\"hljs-built_in\">string</span> }</span>) {\n    <span class=\"hljs-comment\">// body автоматично розпарсений з JSON</span>\n    <span class=\"hljs-keyword\">return</span> { <span class=\"hljs-attr\">id</span>: <span class=\"hljs-number\">3</span>, ...body, <span class=\"hljs-attr\">status</span>: <span class=\"hljs-string\">\"todo\"</span> };\n  }\n\n  <span class=\"hljs-comment\">// PATCH /tasks/:id → оновити задачу</span>\n  <span class=\"hljs-meta\">@Patch</span>(<span class=\"hljs-string\">\":id\"</span>)\n  <span class=\"hljs-title function_\">update</span>(<span class=\"hljs-params\"><span class=\"hljs-meta\">@Param</span>(<span class=\"hljs-string\">\"id\"</span>) id: <span class=\"hljs-built_in\">string</span>, <span class=\"hljs-meta\">@Body</span>() body: { status: <span class=\"hljs-built_in\">string</span> }</span>) {\n    <span class=\"hljs-keyword\">return</span> { <span class=\"hljs-attr\">id</span>: <span class=\"hljs-title class_\">Number</span>(id), ...body };\n  }\n\n  <span class=\"hljs-comment\">// DELETE /tasks/:id → видалити задачу</span>\n  <span class=\"hljs-meta\">@HttpCode</span>(<span class=\"hljs-number\">204</span>) <span class=\"hljs-comment\">// Повернути статус 204 No Content замість 200</span>\n  <span class=\"hljs-meta\">@Delete</span>(<span class=\"hljs-string\">\":id\"</span>)\n  <span class=\"hljs-title function_\">remove</span>(<span class=\"hljs-params\"><span class=\"hljs-meta\">@Param</span>(<span class=\"hljs-string\">\"id\"</span>) id: <span class=\"hljs-built_in\">string</span></span>) {\n    <span class=\"hljs-comment\">// Нічого не повертаємо — задача видалена</span>\n  }\n}</code></pre><h2>🔍 Query-параметри</h2>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">Query</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">'@nestjs/common'</span>;\n\n<span class=\"hljs-comment\">// GET /tasks?status=todo&amp;limit=10</span>\n<span class=\"hljs-meta\">@Get</span>()\n<span class=\"hljs-title function_\">findAll</span>(<span class=\"hljs-params\">\n  <span class=\"hljs-meta\">@Query</span>(<span class=\"hljs-string\">'status'</span>) status: <span class=\"hljs-built_in\">string</span>,  <span class=\"hljs-comment\">// 'todo'</span>\n  <span class=\"hljs-meta\">@Query</span>(<span class=\"hljs-string\">'limit'</span>) limit: <span class=\"hljs-built_in\">string</span>     <span class=\"hljs-comment\">// '10'</span>\n</span>) {\n  <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(status, limit);\n  <span class=\"hljs-keyword\">return</span> [];\n}</code></pre><h2>🗂️ Реєстрація в модулі та таблиця маршрутів</h2>\n<p>Щоб Nest.js знав про контролер, його необхідно зареєструвати у відповідному модулі. CLI робить це автоматично:</p>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// src/tasks/tasks.module.ts</span>\n<span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">Module</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"@nestjs/common\"</span>;\n<span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">TasksController</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"./tasks.controller\"</span>;\n\n<span class=\"hljs-meta\">@Module</span>({\n  <span class=\"hljs-attr\">controllers</span>: [<span class=\"hljs-title class_\">TasksController</span>], <span class=\"hljs-comment\">// ← Реєструємо контролер</span>\n  <span class=\"hljs-attr\">providers</span>: [],\n})\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">class</span> <span class=\"hljs-title class_\">TasksModule</span> {}</code></pre><table>\n<thead>\n<tr>\n<th>Метод</th>\n<th>URL</th>\n<th>Дія</th>\n<th>Статус</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>GET</code></td>\n<td><code>/tasks</code></td>\n<td>Отримати всі задачі</td>\n<td>200</td>\n</tr>\n<tr>\n<td><code>GET</code></td>\n<td><code>/tasks/:id</code></td>\n<td>Отримати задачу за ID</td>\n<td>200</td>\n</tr>\n<tr>\n<td><code>POST</code></td>\n<td><code>/tasks</code></td>\n<td>Створити нову задачу</td>\n<td>201</td>\n</tr>\n<tr>\n<td><code>PATCH</code></td>\n<td><code>/tasks/:id</code></td>\n<td>Часткове оновлення задачі</td>\n<td>200</td>\n</tr>\n<tr>\n<td><code>DELETE</code></td>\n<td><code>/tasks/:id</code></td>\n<td>Видалити задачу</td>\n<td>204</td>\n</tr>\n</tbody></table>\n<div class=\"tip\"><strong>💡 Автоматичні статус-коди</strong> <p>Nest.js автоматично повертає статус <strong>200</strong> для більшості методів та <strong>201</strong> для <code>POST</code>. Щоб змінити, використовуйте <code>@HttpCode(204)</code>.</p>\n</div>\n\n","<h1>🌐 Змінні середовища та ConfigModule</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>Змінна середовища</strong> — це налаштування, яке задається поза кодом програми (в операційній системі або у файлі <code>.env</code>) і може відрізнятися між середовищами: локальна розробка, тестування, production.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> Чутливі дані (паролі, токени, порти, адреси баз даних) не можна вписувати прямо в код — вони потрапляють у Git і стають публічними. Для цього використовують <code>.env</code> файли.</p>\n<h2>⚠️ Проблема hardcoded-значень</h2>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// ❌ Погано — пароль бази даних прямо в коді!</span>\n<span class=\"hljs-keyword\">const</span> db = <span class=\"hljs-title function_\">connect</span>({\n  <span class=\"hljs-attr\">host</span>: <span class=\"hljs-string\">\"localhost\"</span>,\n  <span class=\"hljs-attr\">port</span>: <span class=\"hljs-number\">5432</span>,\n  <span class=\"hljs-attr\">password</span>: <span class=\"hljs-string\">\"my_super_secret_password\"</span>, <span class=\"hljs-comment\">// Це потрапить у Git!</span>\n  <span class=\"hljs-attr\">database</span>: <span class=\"hljs-string\">\"taskmanager\"</span>,\n});\n\n<span class=\"hljs-comment\">// ✅ Правильно — читаємо з середовища</span>\n<span class=\"hljs-keyword\">const</span> db = <span class=\"hljs-title function_\">connect</span>({\n  <span class=\"hljs-attr\">host</span>: process.<span class=\"hljs-property\">env</span>.<span class=\"hljs-property\">DB_HOST</span>,\n  <span class=\"hljs-attr\">port</span>: <span class=\"hljs-title class_\">Number</span>(process.<span class=\"hljs-property\">env</span>.<span class=\"hljs-property\">DB_PORT</span>),\n  <span class=\"hljs-attr\">password</span>: process.<span class=\"hljs-property\">env</span>.<span class=\"hljs-property\">DB_PASSWORD</span>,\n  <span class=\"hljs-attr\">database</span>: process.<span class=\"hljs-property\">env</span>.<span class=\"hljs-property\">DB_NAME</span>,\n});</code></pre><h2>📄 Файл .env</h2>\n<pre><code class=\"language-bash hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\"># .env — зберігається локально, НІКОЛИ не додається в Git</span>\nPORT=3000\nDB_HOST=localhost\nDB_PORT=5432\nDB_NAME=taskmanager\nDB_PASSWORD=my_secret_password\nJWT_SECRET=super_secret_jwt_key</code></pre><pre><code class=\"language-bash hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\"># .gitignore — обов'язково додайте .env!</span>\nnode_modules/\ndist/\n.<span class=\"hljs-built_in\">env</span>          ← Цей файл ніколи не потрапить у репозиторій</code></pre><h2>🔧 Встановлення та підключення ConfigModule</h2>\n<pre><code class=\"language-bash hljs\" data-highlighted=\"yes\">npm install @nestjs/config</code></pre><pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// src/app.module.ts</span>\n<span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">Module</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"@nestjs/common\"</span>;\n<span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">ConfigModule</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"@nestjs/config\"</span>;\n<span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">TasksModule</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"./tasks/tasks.module\"</span>;\n\n<span class=\"hljs-meta\">@Module</span>({\n  <span class=\"hljs-attr\">imports</span>: [\n    <span class=\"hljs-comment\">// isGlobal: true — ConfigModule доступний у всіх модулях без повторного імпорту</span>\n    <span class=\"hljs-title class_\">ConfigModule</span>.<span class=\"hljs-title function_\">forRoot</span>({ <span class=\"hljs-attr\">isGlobal</span>: <span class=\"hljs-literal\">true</span> }),\n    <span class=\"hljs-title class_\">TasksModule</span>,\n  ],\n})\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">class</span> <span class=\"hljs-title class_\">AppModule</span> {}</code></pre><h2>📖 Використання ConfigService</h2>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// src/main.ts</span>\n<span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">NestFactory</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"@nestjs/core\"</span>;\n<span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">AppModule</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"./app.module\"</span>;\n\n<span class=\"hljs-keyword\">async</span> <span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">bootstrap</span>(<span class=\"hljs-params\"></span>) {\n  <span class=\"hljs-keyword\">const</span> app = <span class=\"hljs-keyword\">await</span> <span class=\"hljs-title class_\">NestFactory</span>.<span class=\"hljs-title function_\">create</span>(<span class=\"hljs-title class_\">AppModule</span>);\n\n  <span class=\"hljs-comment\">// У main.ts ConfigService ще не доступний через DI —</span>\n  <span class=\"hljs-comment\">// читаємо порт безпосередньо з process.env</span>\n  <span class=\"hljs-keyword\">const</span> port = <span class=\"hljs-built_in\">parseInt</span>(process.<span class=\"hljs-property\">env</span>.<span class=\"hljs-property\">PORT</span> ?? <span class=\"hljs-string\">\"3000\"</span>, <span class=\"hljs-number\">10</span>);\n\n  <span class=\"hljs-keyword\">await</span> app.<span class=\"hljs-title function_\">listen</span>(port);\n  <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">`🚀 Server started on port <span class=\"hljs-subst\">${port}</span>`</span>);\n}\n\n<span class=\"hljs-title function_\">bootstrap</span>();</code></pre><pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// У сервісах та контролерах — через Dependency Injection</span>\n<span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">Injectable</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"@nestjs/common\"</span>;\n<span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">ConfigService</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"@nestjs/config\"</span>;\n\n<span class=\"hljs-meta\">@Injectable</span>()\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">class</span> <span class=\"hljs-title class_\">TasksService</span> {\n  <span class=\"hljs-title function_\">constructor</span>(<span class=\"hljs-params\"><span class=\"hljs-keyword\">private</span> <span class=\"hljs-keyword\">readonly</span> configService: ConfigService</span>) {}\n\n  <span class=\"hljs-title function_\">getApiVersion</span>(): <span class=\"hljs-built_in\">string</span> {\n    <span class=\"hljs-keyword\">return</span> <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">configService</span>.<span class=\"hljs-property\">get</span>&lt;<span class=\"hljs-built_in\">string</span>&gt;(<span class=\"hljs-string\">\"API_VERSION\"</span>, <span class=\"hljs-string\">\"v1\"</span>);\n  }\n}</code></pre><div class=\"warning\"><strong>⚠️ Важливо: .env.example</strong> <p>Прийнято зберігати у репозиторії файл <code>.env.example</code> з усіма змінними без реальних значень. Це допомагає новим розробникам зрозуміти, які змінні потрібні для запуску проєкту.</p>\n<pre><code class=\"language-bash hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\"># .env.example — можна додавати в Git</span>\nPORT=3000\nDB_HOST=localhost\nDB_PORT=5432\nDB_NAME=\nDB_PASSWORD=\nJWT_SECRET=</code></pre></div>\n\n","<h1>🔄 Як Nest.js обробляє запит</h1>\n<p><strong>Головна ідея:</strong> Від браузера до відповіді запит проходить чітку послідовність кроків — кожен компонент відповідає за свою частину.</p>\n<div class=\"note\"><strong>📝 Огляд наперед</strong> <p>Middleware, Guards та Pipes детально розглядатимуться в наступних лекціях. Зараз важливо зрозуміти загальну картину: де знаходиться контролер у цьому ланцюжку та яку роль він відіграє.</p>\n</div>\n\n\n\n\n<div class=\"mermaid\" data-source=\"graph LR\n    CLIENT[&quot;🌐 Клієнт (браузер)&quot;]\n    MW[&quot;🔒 Middleware&quot;]\n    GUARD[&quot;🛡️ Guard&quot;]\n    PIPE[&quot;🔧 Pipe&quot;]\n    CTRL[&quot;🎮 Controller&quot;]\n    SVC[&quot;⚙️ Service&quot;]\n    RESP[&quot;📤 Відповідь&quot;]\n    CLIENT --&gt;|&quot;HTTP запит&quot;| MW\n    MW --&gt; GUARD\n    GUARD --&gt;|&quot;перевірка доступу&quot;| PIPE\n    PIPE --&gt;|&quot;валідація та трансформація&quot;| CTRL\n    CTRL --&gt;|&quot;делегує логіку&quot;| SVC\n    SVC --&gt;|&quot;повертає дані&quot;| CTRL\n    CTRL --&gt; RESP\n    style CLIENT fill:#e3f2fd,stroke:#1565c0\n    style MW fill:#fff3e0,stroke:#ef6c00\n    style GUARD fill:#fce4ec,stroke:#c2185b\n    style PIPE fill:#f3e5f5,stroke:#7b1fa2\n    style CTRL fill:#e8f5e9,stroke:#388e3c\n    style SVC fill:#fff9c4,stroke:#f9a825\n    style RESP fill:#e3f2fd,stroke:#1565c0\"><svg id=\"exp-1774377781669-10-0\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" class=\"flowchart\" style=\"max-width: 1600.90625px;\" viewBox=\"0 0 1600.90625 170\" role=\"graphics-document document\" aria-roledescription=\"flowchart-v2\"><style>#exp-1774377781669-10-0{font-family:system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,Arial,sans-serif;font-size:16px;fill:#333;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#exp-1774377781669-10-0 .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#exp-1774377781669-10-0 .edge-animation-fast{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 20s linear infinite;stroke-linecap:round;}#exp-1774377781669-10-0 .error-icon{fill:#552222;}#exp-1774377781669-10-0 .error-text{fill:#552222;stroke:#552222;}#exp-1774377781669-10-0 .edge-thickness-normal{stroke-width:1px;}#exp-1774377781669-10-0 .edge-thickness-thick{stroke-width: px; text-align: center;\"><span class=\"nodeLabel \"><p>📤 Відповідь</p></span></div></foreignObject></g></g></g></g></g></svg></div>\n<table>\n<thead>\n<tr>\n<th>Крок</th>\n<th>Що відбувається</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><strong>Middleware</strong></td>\n<td>Виконується до маршрутизації (логування, cors)</td>\n</tr>\n<tr>\n<td><strong>Guard</strong></td>\n<td>Перевіряє чи має користувач право на дію</td>\n</tr>\n<tr>\n<td><strong>Pipe</strong></td>\n<td>Валідує та трансформує вхідні дані</td>\n</tr>\n<tr>\n<td><strong>Controller</strong></td>\n<td>Вибирає метод-обробник, повертає відповідь</td>\n</tr>\n<tr>\n<td><strong>Service</strong></td>\n<td>Виконує бізнес-логіку (буде в наступній лекції)</td>\n</tr>\n</tbody></table>\n","<h1>✅ Ключові висновки</h1>\n<div class=\"success\"><strong>✅ Підсумок лекції</strong> <p><strong>📌 Що ми вивчили:</strong></p>\n<ol>\n<li><p><strong>Nest.js</strong> — фреймворк для Node.js з TypeScript, що надає чітку архітектуру для серверних застосунків</p>\n</li>\n<li><p><strong>Архітектурні блоки:</strong> Модуль (інкапсуляція) → Контролер (HTTP-запити) → Провайдер (бізнес-логіка) — кожен має чітко визначену відповідальність</p>\n</li>\n<li><p><strong>Декоратори</strong> — ключова концепція Nest.js: <code>@Controller()</code>, <code>@Get()</code>, <code>@Post()</code>, <code>@Body()</code>, <code>@Param()</code> описують поведінку декларативно</p>\n</li>\n<li><p><strong>Nest CLI</strong> автоматизує генерацію файлів: <code>nest g mo</code>, <code>nest g co</code> — швидке створення структури</p>\n</li>\n<li><p><strong>Кожен маршрут</strong> — це метод контролера з декоратором HTTP-методу та URL-шаблоном</p>\n</li>\n<li><p><strong>ConfigModule</strong> та <code>.env</code> файли — правильний спосіб зберігати налаштування та чутливі дані поза кодом</p>\n</li>\n<li><p><strong>Запит у Nest.js</strong> проходить ланцюжок: Middleware → Guard → Pipe → Controller → Service</p>\n</li>\n</ol>\n</div>\n\n","<h1>❓ Контрольні питання</h1>\n<ol>\n<li><p>🤔 Чим Nest.js відрізняється від чистого Node.js? Яку проблему він вирішує?</p>\n</li>\n<li><p>🤔 Які три основні будівельні блоки архітектури Nest.js? Яка роль кожного з них?</p>\n</li>\n<li><p>🤔 Що таке декоратор у TypeScript? Наведіть приклад декоратора у Nest.js та поясніть, що він робить.</p>\n</li>\n<li><p>🤔 Яка різниця між <code>@Param()</code> та <code>@Query()</code> — для чого використовується кожен?</p>\n</li>\n<li><p>🤔 Навіщо використовувати <code>.env</code> файли? Чому не можна записувати паролі прямо в код?</p>\n</li>\n<li><p>🤔 Що таке <code>ConfigModule</code> і навіщо потрібен параметр <code>isGlobal: true</code>?</p>\n</li>\n<li><p>🤔 Яку послідовність кроків проходить HTTP-запит у Nest.js від отримання до відповіді?</p>\n</li>\n</ol>\n","<h1>📖 Глосарій термінів</h1>\n<table>\n<thead>\n<tr>\n<th>Термін</th>\n<th>English</th>\n<th>Визначення</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Фреймворк</td>\n<td>Framework</td>\n<td>Готова структура та набір інструментів для розробки застосунків</td>\n</tr>\n<tr>\n<td>Модуль</td>\n<td>Module</td>\n<td>Клас-контейнер, що об'єднує пов'язані компоненти застосунку</td>\n</tr>\n<tr>\n<td>Контролер</td>\n<td>Controller</td>\n<td>Клас, що обробляє вхідні HTTP-запити та формує відповіді</td>\n</tr>\n<tr>\n<td>Провайдер</td>\n<td>Provider</td>\n<td>Клас, що може бути впроваджений як залежність (сервіс, репозиторій)</td>\n</tr>\n<tr>\n<td>Декоратор</td>\n<td>Decorator</td>\n<td>Синтаксична конструкція <code>@Назва()</code>, що додає метадані або поведінку</td>\n</tr>\n<tr>\n<td>Маршрут</td>\n<td>Route / Endpoint</td>\n<td>URL-адреса та HTTP-метод, що обробляються конкретним методом</td>\n</tr>\n<tr>\n<td>Змінна середовища</td>\n<td>Environment variable</td>\n<td>Налаштування, що зберігається поза кодом у системному оточенні</td>\n</tr>\n<tr>\n<td>Точка входу</td>\n<td>Entry point</td>\n<td>Файл, з якого починається виконання застосунку (<code>main.ts</code>)</td>\n</tr>\n<tr>\n<td>Бізнес-логіка</td>\n<td>Business logic</td>\n<td>Код, що реалізує правила роботи застосунку (не HTTP, не БД)</td>\n</tr>\n<tr>\n<td>Впровадження залежностей</td>\n<td>Dependency Injection</td>\n<td>Патерн передачі залежностей через конструктор</td>\n</tr>\n</tbody></table>\n","<h1>📖 Глосарій абревіатур</h1>\n<table>\n<thead>\n<tr>\n<th>Абревіатура</th>\n<th>Розшифровка</th>\n<th>Переклад</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>API</td>\n<td>Application Programming Interface</td>\n<td>Програмний інтерфейс застосунку</td>\n</tr>\n<tr>\n<td>REST</td>\n<td>Representational State Transfer</td>\n<td>Архітектурний стиль для веб-сервісів</td>\n</tr>\n<tr>\n<td>HTTP</td>\n<td>HyperText Transfer Protocol</td>\n<td>Протокол передачі гіпертексту</td>\n</tr>\n<tr>\n<td>CLI</td>\n<td>Command Line Interface</td>\n<td>Інтерфейс командного рядка</td>\n</tr>\n<tr>\n<td>DI</td>\n<td>Dependency Injection</td>\n<td>Впровадження залежностей</td>\n</tr>\n<tr>\n<td>DTO</td>\n<td>Data Transfer Object</td>\n<td>Об'єкт передачі даних</td>\n</tr>\n<tr>\n<td>JSON</td>\n<td>JavaScript Object Notation</td>\n<td>Текстовий формат обміну даними</td>\n</tr>\n<tr>\n<td>ENV</td>\n<td>Environment</td>\n<td>Середовище / оточення</td>\n</tr>\n<tr>\n<td>CRUD</td>\n<td>Create, Read, Update, Delete</td>\n<td>Базові операції з даними</td>\n</tr>\n<tr>\n<td>URL</td>\n<td>Uniform Resource Locator</td>\n<td>Уніфікований локатор ресурсів</td>\n</tr>\n</tbody></table>\n"];let currentSlideIndex=0;
function renderMath(root){if(typeof renderMathInElement!=="function"||!root)return;try{renderMathInElement(root,{delimiters:[{left:"$$",right:"$$",display:true},{left:"\\[",right:"\\]",display:true},{left:"$",right:"$",display:false},{left:"\\(",right:"\\)",display:false}],throwOnError:false,strict:"ignore",ignoredTags:["script","noscript","style","textarea","pre","code"]});}catch(e){console.warn("Math render error:",e);}}
function showSlide(i){if(i<0||i>=slides.length)return;currentSlideIndex=i;const el=document.getElementById("current-slide");el.innerHTML=slides[i];el.scrollTop=0;renderMath(el);document.getElementById("progress-bar").style.width=((i+1)/slides.length*100)+"%";document.getElementById("slide-number").textContent=(i+1)+" / "+slides.length;updateSidebarActive();}
function nextSlide(){if(currentSlideIndex<slides.length-1)showSlide(currentSlideIndex+1);}
function previousSlide(){if(currentSlideIndex>0)showSlide(currentSlideIndex-1);}
function toggleSidebar(){document.getElementById("sidebar").classList.toggle("open");}
function toggleHelp(){document.getElementById("help-overlay").classList.toggle("hidden");}
function toggleFullscreen(){if(!document.fullscreenElement){const pc=document.getElementById("presentation-container");if(pc.requestFullscreen)pc.requestFullscreen();else if(pc.webkitRequestFullscreen)pc.webkitRequestFullscreen();else if(pc.msRequestFullscreen)pc.msRequestFullscreen();else if(pc.mozRequestFullScreen)pc.mozRequestFullScreen();}else{if(document.exitFullscreen)document.exitFullscreen();else if(document.webkitExitFullscreen)document.webkitExitFullscreen();else if(document.msExitFullscreen)document.msExitFullscreen();else if(document.mozCancelFullScreen)document.mozCancelFullScreen();}}
function generateSidebar(){const sc=document.getElementById("sidebar-content");sc.innerHTML="";slides.forEach((html,idx)=>{const t=document.createElement("div");t.className="slide-thumbnail";if(idx===0)t.classList.add("active");const tmp=document.createElement("div");tmp.innerHTML=html;const title=tmp.querySelector("h1,h2");const titleText=title?title.textContent:("Слайд "+(idx+1));const textContent=tmp.textContent.replace(/s+/g," ").trim();const preview=textContent.substring(0,100)+(textContent.length>100?"...":"");t.innerHTML="<div class=\"slide-thumbnail-number\">"+(idx+1)+"</div><div class=\"slide-thumbnail-title\">"+titleText+"</div><div class=\"slide-thumbnail-content\">"+preview+"</div>";t.onclick=()=>{showSlide(idx);if(window.innerWidth<1024)toggleSidebar();};sc.appendChild(t);});}
function updateSidebarActive(){document.querySelectorAll(".slide-thumbnail").forEach((th,idx)=>{if(idx===currentSlideIndex){th.classList.add("active");th.scrollIntoView({behavior:"smooth",block:"nearest"});}else th.classList.remove("active");});}
document.addEventListener("keydown",e=>{switch(e.key){case"ArrowLeft":previousSlide();break;case"ArrowRight":case" ":e.preventDefault();nextSlide();break;case"f":case"F":toggleFullscreen();break;case"s":case"S":toggleSidebar();break;case"?":toggleHelp();break;case"Escape":const sb=document.getElementById("sidebar");const ho=document.getElementById("help-overlay");if(sb.classList.contains("open"))toggleSidebar();else if(!ho.classList.contains("hidden"))ho.classList.add("hidden");break;}});
generateSidebar();showSlide(0);</script></body></html>
