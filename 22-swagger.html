\n<li>📚 Swagger/OpenAPI: документація API</li>\n<li>🏗️ Архітектура production-ready застосунку</li>\n<li>✅ Ключові висновки та контрольні питання</li>\n</ol>\n","<h1>🎯 Проблеми, які ми вирішуємо</h1>\n<div class=\"info\"><strong>ℹ️ Контекст</strong> <p>На цьому етапі у нас вже є робочий API із контролерами, сервісами, валідацією та базою даних. Тепер постає питання якості — як зробити застосунок передбачуваним, документованим та готовим до production.</p>\n</div>\n\n\n\n<h2>🔍 Три ключові проблеми</h2>\n<table>\n<thead>\n<tr>\n<th>№</th>\n<th>Проблема</th>\n<th>Наслідок</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>1</td>\n<td>Помилки обробляються по-різному</td>\n<td>Клієнт отримує непослідовні відповіді</td>\n</tr>\n<tr>\n<td>2</td>\n<td>Немає єдиного формату відповіді</td>\n<td>Frontend вимушений обробляти різні структури</td>\n</tr>\n<tr>\n<td>3</td>\n<td>API не документоване</td>\n<td>Споживачі API не знають, як ним користуватися</td>\n</tr>\n</tbody></table>\n<div class=\"warning\"><strong>⚠️ Без цих механізмів</strong> <p>Кожен endpoint може повертати помилки у власному форматі, логування розкидане по контролерах, а frontend-команда питає документацію в чаті.</p>\n</div>\n\n","<h1>🛡️ Exception Filters: концепція</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>Exception Filter</strong> (фільтр виключень) — компонент Nest.js, який перехоплює необроблені виключення та формує HTTP-відповідь у визначеному форматі.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> замість того щоб у кожному endpoint обробляти помилки, ми централізовано визначаємо, як виключення перетворюються у відповіді клієнту.</p>\n<h2>🔄 Як це працює</h2>\n\n<div class=\"mermaid\" data-source=\"graph LR\n    REQ[📥 Запит] --&gt; CTRL[🎮 Controller]\n    CTRL --&gt; SRV[⚙️ Service]\n    SRV --&gt;|&quot;throw Exception&quot;| FILTER[🛡️ Exception Filter]\n    FILTER --&gt;|&quot;HTTP Response&quot;| CLIENT[📤 Клієнт]\n    style REQ fill:#e3f2fd,stroke:#1565c0\n    style FILTER fill:#fce4ec,stroke:#c2185b\n    style CLIENT fill:#e8f5e9,stroke:#388e3c\"><svg id=\"exp-1778563555570-3-0\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" class=\"flowchart\" style=\"max-width: 1128.078125px;\" viewBox=\"0 0 1128.078125 64\" role=\"graphics-document document\" aria-roledescription=\"flowchart-v2\"><style>#exp-1778563555570-3-0{font-family:system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,Arial,sans-serif;font-size:16px;fill:#333;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#exp-1778563555570-3-0 .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#exp-1778563555570-3-0 .edge-animation-fast{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 20s linear infinite;stroke-linecap:round;}#exp-1778563555570-3-0 .error-icon{fill:#552222;}#exp-1778563555570-3-0 .error-text{fill:#552222;stroke:#552222;}#exp-1778563555570-3-0 .edge-thickness-normal{stroke-width:1px;}#exp-1778563555570-3-0 .edge-thickness-thick{stroke-width:3.5px;}#exp-1778563555570-3-0 .edge-pattern-solid{stroke-dasharray:0;}#exp-1778563555570-3-0 .edge-thickness-invisible{stroke-width:0;fill:none;}#exp-1778563555570-3-0 .edge-pattern-dashed{stroke-dasharray:3;}#exp-1778563555570-3-0 .edge-pattern-dotted{stroke-dasharray:2;}#exp-1778563555570-3-0 .marker{fill:#333333;stroke:#333333;}#exp-1778563555570-3-0 .marker.cross{stroke:#333333;}#exp-1778563555570-3-0 svg{font-family:system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,Arial,sans-serif;font-size:16px;}#exp-1778563555570-3-0 p{margin:0;}#exp-1778563555570-3-0 .label{font-family:system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,Arial,sans-serif;color:#333;}#exp-1778563555570-3-0 .cluster-label text{fill:#333;}#exp-1778563555570-3-0 .cluster-label span{color:#333;}#exp-1778563555570-3-0 .cluster-label span p{background-color:transparent;}#exp-1778563555570- pShadow dx=\"2\" dy=\"2\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs></svg></div>\n<div class=\"note\"><strong>📝 Важливо</strong> <p>Nest.js має <strong>вбудований глобальний фільтр</strong>, який обробляє <code>HttpException</code> та повертає стандартну відповідь. Власні фільтри потрібні, щоб <strong>розширити або змінити цю поведінку</strong>.</p>\n</div>\n\n","<h1>🛡️ Базовий Exception Filter</h1>\n<p><strong>Головна ідея:</strong> Exception Filter — це клас, позначений декоратором <code>@Catch()</code>, що реалізує інтерфейс <code>ExceptionFilter</code>.</p>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-keyword\">import</span> {\n  <span class=\"hljs-title class_\">ExceptionFilter</span>,\n  <span class=\"hljs-title class_\">Catch</span>,\n  <span class=\"hljs-title class_\">ArgumentsHost</span>,\n  <span class=\"hljs-title class_\">HttpException</span>,\n} <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"@nestjs/common\"</span>;\n<span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">Request</span>, <span class=\"hljs-title class_\">Response</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"express\"</span>;\n\n<span class=\"hljs-meta\">@Catch</span>(<span class=\"hljs-title class_\">HttpException</span>)\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">class</span> <span class=\"hljs-title class_\">HttpExceptionFilter</span> <span class=\"hljs-keyword\">implements</span> <span class=\"hljs-title class_\">ExceptionFilter</span> {\n  <span class=\"hljs-keyword\">catch</span>(<span class=\"hljs-attr\">exception</span>: <span class=\"hljs-title class_\">HttpException</span>, <span class=\"hljs-attr\">host</span>: <span class=\"hljs-title class_\">ArgumentsHost</span>) {\n    <span class=\"hljs-keyword\">const</span> ctx = host.<span class=\"hljs-title function_\">switchToHttp</span>();\n    <span class=\"hljs-keyword\">const</span> response = ctx.<span class=\"hljs-property\">getResponse</span>&lt;<span class=\"hljs-title class_\">Response</span>&gt;();\n    <span class=\"hljs-keyword\">const</span> request = ctx.<span class=\"hljs-property\">getRequest</span>&lt;<span class=\"hljs-title class_\">Request</span>&gt;();\n    <span class=\"hljs-keyword\">const</span> status = exception.<span class=\"hljs-title function_\">getStatus</span>();\n\n    response.<span class=\"hljs-title function_\">status</span>(status).<span class=\"hljs-title function_\">json</span>({\n      <span class=\"hljs-attr\">statusCode</span>: status,\n      <span class=\"hljs-attr\">timestamp</span>: <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Date</span>().<span class=\"hljs-title function_\">toISOString</span>(),\n      <span class=\"hljs-attr\">path</span>: request.<span class=\"hljs-property\">url</span>,\n      <span class=\"hljs-attr\">message</span>: exception.<span class=\"hljs-property\">message</span>,\n    });\n  }\n}</code></pre><h2>🔍 Розбір елементів</h2>\n<table>\n<thead>\n<tr>\n<th>Елемент</th>\n<th>Призначення</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>@Catch(HttpException)</code></td>\n<td>Вказує, які типи виключень перехоплює фільтр</td>\n</tr>\n<tr>\n<td><code>ArgumentsHost</code></td>\n<td>Контекст виконання (HTTP, WebSocket, GraphQL)</td>\n</tr>\n<tr>\n<td><code>host.switchToHttp()</code></td>\n<td>Отримання HTTP-специфічних об'єктів <code>request</code> / <code>response</code></td>\n</tr>\n<tr>\n<td><code>exception.getStatus()</code></td>\n<td>HTTP-код статусу виключення</td>\n</tr>\n</tbody></table>\n","<h1>🛡️ Catch-all фільтр</h1>\n<p><strong>Головна ідея:</strong> фільтр без аргументів у <code>@Catch()</code> перехоплює <strong>усі</strong> виключення, включно з тими, що не є <code>HttpException</code>.</p>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-keyword\">import</span> {\n  <span class=\"hljs-title class_\">ExceptionFilter</span>,\n  <span class=\"hljs-title class_\">Catch</span>,\n  <span class=\"hljs-title class_\">ArgumentsHost</span>,\n  <span class=\"hljs-title class_\">HttpException</span>,\n  <span class=\"hljs-title class_\">HttpStatus</span>,\n} <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"@nestjs/common\"</span>;\n<span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">Request</span>, <span class=\"hljs-title class_\">Response</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"express\"</span>;\n\n<span class=\"hljs-meta\">@Catch</span>()\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">class</span> <span class=\"hljs-title class_\">AllExceptionsFilter</span> <span class=\"hljs-keyword\">implements</span> <span class=\"hljs-title class_\">ExceptionFilter</span> {\n  <span class=\"hljs-keyword\">catch</span>(<span class=\"hljs-attr\">exception</span>: <span class=\"hljs-built_in\">unknown</span>, <span class=\"hljs-attr\">host</span>: <span class=\"hljs-title class_\">ArgumentsHost</span>) {\n    <span class=\"hljs-keyword\">const</span> ctx = host.<span class=\"hljs-title function_\">switchToHttp</span>();\n    <span class=\"hljs-keyword\">const</span> response = ctx.<span class=\"hljs-property\">getResponse</span>&lt;<span class=\"hljs-title class_\">Response</span>&gt;();\n    <span class=\"hljs-keyword\">const</span> request = ctx.<span class=\"hljs-property\">getRequest</span>&lt;<span class=\"hljs-title class_\">Request</span>&gt;();\n\n    <span class=\"hljs-keyword\">const</span> status =\n      exception <span class=\"hljs-keyword\">instanceof</span> <span class=\"hljs-title class_\">HttpException</span>\n        ? exception.<span class=\"hljs-title function_\">getStatus</span>()\n        : <span class=\"hljs-title class_\">HttpStatus</span>.<span class=\"hljs-property\">INTERNAL_SERVER_ERROR</span>;\n\n    <span class=\"hljs-keyword\">const</span> message =\n      exception <span class=\"hljs-keyword\">instanceof</span> <span class=\"hljs-title class_\">HttpException</span>\n        ? exception.<span class=\"hljs-property\">message</span>\n        : <span class=\"hljs-string\">\"Internal server error\"</span>;\n\n    response.<span class=\"hljs-title function_\">status</span>(status).<span class=\"hljs-title function_\">json</span>({\n      <span class=\"hljs-attr\">statusCode</span>: status,\n      <span class=\"hljs-attr\">timestamp</span>: <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Date</span>().<span class=\"hljs-title function_\">toISOString</span>(),\n      <span class=\"hljs-attr\">path</span>: request.<span class=\"hljs-property\">url</span>,\n      message,\n    });\n  }\n}</code></pre><div class=\"danger\"><strong>🚫 Критично важливо</strong> <p>Без catch-all фільтра будь-яка несподівана помилка (наприклад, <code>TypeError</code> через звернення до <code>undefined.property</code>) виллється у відповідь з усім stack trace — це <strong>витік внутрішньої інформації</strong> про застосунок.</p>\n</div>\n\n","<h1>🛡️ Реєстрація фільтрів та власні виключення</h1>\n<p><strong>Головна ідея:</strong> Nest.js дозволяє застосовувати фільтри на трьох рівнях — метод, контролер та глобальний рівень. Власні класи виключень роблять помилки самодокументованими.</p>\n<h2>📍 Три рівні реєстрації</h2>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// 1. На рівні методу</span>\n<span class=\"hljs-meta\">@Post</span>()\n<span class=\"hljs-meta\">@UseFilters</span>(<span class=\"hljs-title class_\">HttpExceptionFilter</span>)\n<span class=\"hljs-title function_\">create</span>(<span class=\"hljs-params\"><span class=\"hljs-meta\">@Body</span>() dto: CreateTaskDto</span>) { <span class=\"hljs-comment\">/* ... */</span> }\n\n<span class=\"hljs-comment\">// 2. На рівні контролера</span>\n<span class=\"hljs-meta\">@Controller</span>(<span class=\"hljs-string\">\"tasks\"</span>)\n<span class=\"hljs-meta\">@UseFilters</span>(<span class=\"hljs-title class_\">HttpExceptionFilter</span>)\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">class</span> <span class=\"hljs-title class_\">TasksController</span> { <span class=\"hljs-comment\">/* ... */</span> }\n\n<span class=\"hljs-comment\">// 3. Глобально через main.ts</span>\napp.<span class=\"hljs-title function_\">useGlobalFilters</span>(<span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">AllExceptionsFilter</span>());</code></pre><table>\n<thead>\n<tr>\n<th>Рівень</th>\n<th>Пріоритет</th>\n<th>Коли використовувати</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Метод</td>\n<td>Найвищий</td>\n<td>Особлива поведінка для одного route</td>\n</tr>\n<tr>\n<td>Контролер</td>\n<td>Середній</td>\n<td>Логіка специфічна для ресурсу</td>\n</tr>\n<tr>\n<td>Глобальний</td>\n<td>Базовий</td>\n<td>Загальна обробка всього застосунку</td>\n</tr>\n</tbody></table>\n<h2>🎯 Власне виключення</h2>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">class</span> <span class=\"hljs-title class_\">TaskNotFoundException</span> <span class=\"hljs-keyword\">extends</span> <span class=\"hljs-title class_ inherited__\">HttpException</span> {\n  <span class=\"hljs-title function_\">constructor</span>(<span class=\"hljs-params\">taskId: <span class=\"hljs-built_in\">number</span></span>) {\n    <span class=\"hljs-variable language_\">super</span>(\n      {\n        <span class=\"hljs-attr\">statusCode</span>: <span class=\"hljs-title class_\">HttpStatus</span>.<span class=\"hljs-property\">NOT_FOUND</span>,\n        <span class=\"hljs-attr\">error</span>: <span class=\"hljs-string\">\"TASK_NOT_FOUND\"</span>,\n        <span class=\"hljs-attr\">message</span>: <span class=\"hljs-string\">`Завдання з ID <span class=\"hljs-subst\">${taskId}</span> не знайдено`</span>,\n      },\n      <span class=\"hljs-title class_\">HttpStatus</span>.<span class=\"hljs-property\">NOT_FOUND</span>,\n    );\n  }\n}</code></pre><div class=\"success\"><strong>✅ Переваги власних виключень</strong> <p><strong>Самодокументоване</strong> — назва класу пояснює помилку. <strong>Передбачуваний формат</strong> — клієнт отримує однакову структуру. <strong>Машиночитаний код</strong> — поле <code>error</code> дозволяє frontend обробляти помилки без розбору тексту.</p>\n</div>\n\n","<h1>🔄 Interceptors: концепція</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>Interceptor</strong> (перехоплювач) — компонент, що виконує код <strong>до</strong> та <strong>після</strong> виконання обробника запиту, дозволяючи трансформувати запит, відповідь або поведінку методу.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> Interceptors реалізують паттерн <strong>AOP</strong> (Aspect-Oriented Programming) — додавання наскрізної функціональності (логування, кешування, трансформація) без зміни бізнес-логіки.</p>\n<h2>🔄 Життєвий цикл запиту</h2>\n\n<div class=\"mermaid\" data-source=\"graph LR\n    REQ[📥 Запит] --&gt; INTBEF[🔄 Interceptor до]\n    INTBEF --&gt; HANDLER[🎯 Обробник]\n    HANDLER --&gt; INTAFT[🔄 Interceptor після]\n    INTAFT --&gt; RES[📤 Відповідь]\n    style REQ fill:#e3f2fd,stroke:#1565c0\n    style INTBEF fill:#fff3e0,stroke:#ef6c00\n    style HANDLER fill:#e8f5e9,stroke:#388e3c\n    style INTAFT fill:#fff3e0,stroke:#ef6c00\n    style RES fill:#fce4ec,stroke:#c2185b\"><svg id=\"exp-1778563555593-7-0\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" class=\"flowchart\" style=\"max-width: 976.0859375px;\" viewBox=\"0 0 976.0859375 64\" role=\"graphics-document document\" aria-roledescription=\"flowchart-v2\"><style>#exp-1778563555593-7-0{font-family:system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,Arial,sans-serif;font-size:16px;fill:#333;}@keyframes edge-animation-fra erceptor після</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1778563555593-7-0-flowchart-RES-7\" data-look=\"classic\" transform=\"translate(898.078125, 32)\"><rect class=\"basic label-container\" style=\"fill:#fce4ec !important;stroke:#c2185b !important\" x=\"-70.0078125\" y=\"-24\" width=\"140.015625\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-46.0078125, -12)\"><rect></rect><foreignObject width=\"92.015625\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>📤 Відповідь</p></span></div></foreignObject></g></g></g></g></g><defs><filter id=\"exp-1778563555593-7-0-drop-shadow\" height=\"130%\" width=\"130%\"><feDropShadow dx=\"4\" dy=\"4\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs><defs><filter id=\"exp-1778563555593-7-0-drop-shadow-small\" height=\"150%\" width=\"150%\"><feDropShadow dx=\"2\" dy=\"2\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs></svg></div>\n<div class=\"note\"><strong>📝 Що можуть interceptors</strong> <p>Прив'язати додаткову логіку до виконання методу. Трансформувати результат, що повертається з методу. Трансформувати виключення. Розширити базову поведінку. Повністю перевизначити функцію залежно від умов (наприклад, для кешування).</p>\n</div>\n\n","<h1>🔄 Структура Interceptor</h1>\n<p><strong>Головна ідея:</strong> Interceptor — клас з декоратором <code>@Injectable()</code>, що реалізує інтерфейс <code>NestInterceptor</code> з методом <code>intercept</code>.</p>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-keyword\">import</span> {\n  <span class=\"hljs-title class_\">Injectable</span>,\n  <span class=\"hljs-title class_\">NestInterceptor</span>,\n  <span class=\"hljs-title class_\">ExecutionContext</span>,\n  <span class=\"hljs-title class_\">CallHandler</span>,\n} <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"@nestjs/common\"</span>;\n<span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">Observable</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"rxjs\"</span>;\n<span class=\"hljs-keyword\">import</span> { tap } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"rxjs/operators\"</span>;\n\n<span class=\"hljs-meta\">@Injectable</span>()\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">class</span> <span class=\"hljs-title class_\">LoggingInterceptor</span> <span class=\"hljs-keyword\">implements</span> <span class=\"hljs-title class_\">NestInterceptor</span> {\n  <span class=\"hljs-title function_\">intercept</span>(<span class=\"hljs-attr\">context</span>: <span class=\"hljs-title class_\">ExecutionContext</span>, <span class=\"hljs-attr\">next</span>: <span class=\"hljs-title class_\">CallHandler</span>): <span class=\"hljs-title class_\">Observable</span>&lt;<span class=\"hljs-built_in\">any</span>&gt; {\n    <span class=\"hljs-keyword\">const</span> request = context.<span class=\"hljs-title function_\">switchToHttp</span>().<span class=\"hljs-title function_\">getRequest</span>();\n    <span class=\"hljs-keyword\">const</span> { method, url } = request;\n    <span class=\"hljs-keyword\">const</span> now = <span class=\"hljs-title class_\">Date</span>.<span class=\"hljs-title function_\">now</span>();\n\n    <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">`➡️  <span class=\"hljs-subst\">${method}</span> <span class=\"hljs-subst\">${url}</span>`</span>);\n\n    <span class=\"hljs-keyword\">return</span> next.<span class=\"hljs-title function_\">handle</span>().<span class=\"hljs-title function_\">pipe</span>(\n      <span class=\"hljs-title function_\">tap</span>(<span class=\"hljs-function\">() =&gt;</span> {\n        <span class=\"hljs-keyword\">const</span> duration = <span class=\"hljs-title class_\">Date</span>.<span class=\"hljs-title function_\">now</span>() - now;\n        <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">`⬅️  <span class=\"hljs-subst\">${method}</span> <span class=\"hljs-subst\">${url}</span> — <span class=\"hljs-subst\">${duration}</span>ms`</span>);\n      }),\n    );\n  }\n}</code></pre><h2>🔍 Ключові концепції</h2>\n<table>\n<thead>\n<tr>\n<th>Концепція</th>\n<th>Опис</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>ExecutionContext</code></td>\n<td>Контекст виконання (HTTP, WebSocket тощо)</td>\n</tr>\n<tr>\n<td><code>CallHandler</code></td>\n<td>Об'єкт із методом <code>handle()</code>, що запускає основний обробник</td>\n</tr>\n<tr>\n<td><code>Observable</code></td>\n<td>Реактивний потік (RxJS) — основа асинхронної обробки в Nest.js</td>\n</tr>\n<tr>\n<td><code>tap</code> operator</td>\n<td>Виконує побічний ефект (логування) без зміни значення у потоці</td>\n</tr>\n</tbody></table>\n","<h1>🔄 Трансформація відповіді</h1>\n<p><strong>Головна ідея:</strong> найпоширеніший сценарій — обгортання усіх відповідей API в єдиний формат для зручності клієнта.</p>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-keyword\">import</span> {\n  <span class=\"hljs-title class_\">Injectable</span>,\n  <span class=\"hljs-title class_\">NestInterceptor</span>,\n  <span class=\"hljs-title class_\">ExecutionContext</span>,\n  <span class=\"hljs-title class_\">CallHandler</span>,\n} <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"@nestjs/common\"</span>;\n<span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">Observable</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"rxjs\"</span>;\n<span class=\"hljs-keyword\">import</span> { map } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"rxjs/operators\"</span>;\n\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">interface</span> <span class=\"hljs-title class_\">ApiResponse</span>&lt;T&gt; {\n  <span class=\"hljs-attr\">success</span>: <span class=\"hljs-built_in\">boolean</span>;\n  <span class=\"hljs-attr\">data</span>: T;\n  <span class=\"hljs-attr\">timestamp</span>: <span class=\"hljs-built_in\">string</span>;\n}\n\n<span class=\"hljs-meta\">@Injectable</span>()\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">class</span> <span class=\"hljs-title class_\">TransformInterceptor</span>&lt;T&gt; <span class=\"hljs-keyword\">implements</span> <span class=\"hljs-title class_\">NestInterceptor</span>&lt;\n  T,\n  <span class=\"hljs-title class_\">ApiResponse</span>&lt;T&gt;\n&gt; {\n  <span class=\"hljs-title function_\">intercept</span>(\n    <span class=\"hljs-attr\">context</span>: <span class=\"hljs-title class_\">ExecutionContext</span>,\n    <span class=\"hljs-attr\">next</span>: <span class=\"hljs-title class_\">CallHandler</span>,\n  ): <span class=\"hljs-title class_\">Observable</span>&lt;<span class=\"hljs-title class_\">ApiResponse</span>&lt;T&gt;&gt; {\n    <span class=\"hljs-keyword\">return</span> next.<span class=\"hljs-title function_\">handle</span>().<span class=\"hljs-title function_\">pipe</span>(\n      <span class=\"hljs-title function_\">map</span>(<span class=\"hljs-function\">(<span class=\"hljs-params\">data</span>) =&gt;</span> ({\n        <span class=\"hljs-attr\">success</span>: <span class=\"hljs-literal\">true</span>,\n        data,\n        <span class=\"hljs-attr\">timestamp</span>: <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Date</span>().<span class=\"hljs-title function_\">toISOString</span>(),\n      })),\n    );\n  }\n}</code></pre><h2>📊 Результат</h2>\n<pre><code class=\"language-json hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// Що повертає метод контролера:</span>\n<span class=\"hljs-punctuation\">{</span> <span class=\"hljs-attr\">\"id\"</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-number\">1</span><span class=\"hljs-punctuation\">,</span> <span class=\"hljs-attr\">\"title\"</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">\"Купити продукти\"</span> <span class=\"hljs-punctuation\">}</span>\n\n<span class=\"hljs-comment\">// Що отримує клієнт:</span>\n<span class=\"hljs-punctuation\">{</span>\n  <span class=\"hljs-attr\">\"success\"</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-literal\"><span class=\"hljs-keyword\">true</span></span><span class=\"hljs-punctuation\">,</span>\n  <span class=\"hljs-attr\">\"data\"</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-punctuation\">{</span> <span class=\"hljs-attr\">\"id\"</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-number\">1</span><span class=\"hljs-punctuation\">,</span> <span class=\"hljs-attr\">\"title\"</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">\"Купити продукти\"</span> <span class=\"hljs-punctuation\">}</span><span class=\"hljs-punctuation\">,</span>\n  <span class=\"hljs-attr\">\"timestamp\"</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">\"2026-05-11T10:30:00.000Z\"</span>\n<span class=\"hljs-punctuation\">}</span></code></pre><div class=\"tip\"><strong>💡 Єдиний контракт</strong> <p>Завдяки трансформації frontend завжди очікує <code>response.data</code> для отримання корисного навантаження, не залежно від конкретного endpoint.</p>\n</div>\n\n","<h1>🔄 Реєстрація Interceptors</h1>\n<p><strong>Головна ідея:</strong> як і фільтри, interceptors реєструються на трьох рівнях — метод, контролер, глобальний.</p>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// 1. На рівні методу</span>\n<span class=\"hljs-meta\">@Get</span>()\n<span class=\"hljs-meta\">@UseInterceptors</span>(<span class=\"hljs-title class_\">LoggingInterceptor</span>)\n<span class=\"hljs-title function_\">findAll</span>(<span class=\"hljs-params\"></span>) { <span class=\"hljs-comment\">/* ... */</span> }\n\n<span class=\"hljs-comment\">// 2. На рівні контролера</span>\n<span class=\"hljs-meta\">@Controller</span>(<span class=\"hljs-string\">\"tasks\"</span>)\n<span class=\"hljs-meta\">@UseInterceptors</span>(<span class=\"hljs-title class_\">TransformInterceptor</span>)\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">class</span> <span class=\"hljs-title class_\">TasksController</span> { <span class=\"hljs-comment\">/* ... */</span> }\n\n<span class=\"hljs-comment\">// 3. Глобально через main.ts</span>\n<span class=\"hljs-keyword\">async</span> <span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">bootstrap</span>(<span class=\"hljs-params\"></span>) {\n  <span class=\"hljs-keyword\">const</span> app = <span class=\"hljs-keyword\">await</span> <span class=\"hljs-title class_\">NestFactory</span>.<span class=\"hljs-title function_\">create</span>(<span class=\"hljs-title class_\">AppModule</span>);\n  app.<span class=\"hljs-title function_\">useGlobalInterceptors</span>(<span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">TransformInterceptor</span>());\n  <span class=\"hljs-keyword\">await</span> app.<span class=\"hljs-title function_\">listen</span>(<span class=\"hljs-number\">3000</span>);\n}</code></pre><div class=\"warning\"><strong>⚠️ Порядок виконання</strong> <p>Якщо застосовано декілька interceptors, вони виконуються у порядку реєстрації:</p>\n<ul>\n<li><strong>До обробника:</strong> глобальний → контролер → метод</li>\n<li><strong>Після обробника:</strong> метод → контролер → глобальний</li>\n</ul>\n</div>\n\n","<h1>📝 Логування у Nest.js</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>Logger</strong> — вбудований сервіс Nest.js для структурованого виведення повідомлень з підтримкою рівнів важливості та контексту.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> Nest.js надає клас <code>Logger</code>, який можна використовувати замість <code>console.log</code> для отримання структурованого, контекстного логування.</p>\n<h2>🔍 Базове використання у сервісі</h2>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">Injectable</span>, <span class=\"hljs-title class_\">Logger</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"@nestjs/common\"</span>;\n\n<span class=\"hljs-meta\">@Injectable</span>()\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">class</span> <span class=\"hljs-title class_\">TasksService</span> {\n  <span class=\"hljs-keyword\">private</span> <span class=\"hljs-keyword\">readonly</span> logger = <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Logger</span>(<span class=\"hljs-title class_\">TasksService</span>.<span class=\"hljs-property\">name</span>);\n\n  <span class=\"hljs-keyword\">async</span> <span class=\"hljs-title function_\">create</span>(<span class=\"hljs-attr\">dto</span>: <span class=\"hljs-title class_\">CreateTaskDto</span>): <span class=\"hljs-title class_\">Promise</span>&lt;<span class=\"hljs-title class_\">Task</span>&gt; {\n    <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">logger</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">`Створення завдання: <span class=\"hljs-subst\">${dto.title}</span>`</span>);\n    <span class=\"hljs-keyword\">try</span> {\n      <span class=\"hljs-keyword\">const</span> task = <span class=\"hljs-keyword\">await</span> <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">repository</span>.<span class=\"hljs-title function_\">save</span>(dto);\n      <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">logger</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">`Завдання створено з ID <span class=\"hljs-subst\">${task.id}</span>`</span>);\n      <span class=\"hljs-keyword\">return</span> task;\n    } <span class=\"hljs-keyword\">catch</span> (error) {\n      <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">logger</span>.<span class=\"hljs-title function_\">error</span>(<span class=\"hljs-string\">`Не вдалося створити завдання`</span>, error.<span class=\"hljs-property\">stack</span>);\n      <span class=\"hljs-keyword\">throw</span> error;\n    }\n  }\n}</code></pre><h2>📊 Рівні логування</h2>\n<table>\n<thead>\n<tr>\n<th>Метод</th>\n<th>Рівень</th>\n<th>Призначення</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>logger.log()</code></td>\n<td>INFO</td>\n<td>Інформаційні повідомлення про роботу</td>\n</tr>\n<tr>\n<td><code>logger.error()</code></td>\n<td>ERROR</td>\n<td>Помилки, що потребують уваги</td>\n</tr>\n<tr>\n<td><code>logger.warn()</code></td>\n<td>WARN</td>\n<td>Підозрілі ситуації, які не є помилками</td>\n</tr>\n<tr>\n<td><code>logger.debug()</code></td>\n<td>DEBUG</td>\n<td>Детальна інформація для розробки</td>\n</tr>\n<tr>\n<td><code>logger.verbose()</code></td>\n<td>VERBOSE</td>\n<td>Максимально детальне відлагодження</td>\n</tr>\n</tbody></table>\n<div class=\"success\"><strong>✅ Логування через Interceptor</strong> <p>Замість того щоб логувати у кожному методі, доцільно винести логування HTTP-запитів у глобальний interceptor (наприклад, <code>HttpLoggingInterceptor</code> з використанням <code>tap</code> та <code>catchError</code> із RxJS). Тоді кожен HTTP-запит автоматично логується з методом, URL, тривалістю та статусом.</p>\n</div>\n\n","<h1>📚 Swagger/OpenAPI: концепція</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>OpenAPI</strong> (раніше Swagger) — стандарт опису REST API у машиночитаному форматі. Документація генерується автоматично з коду та доступна як інтерактивна веб-сторінка.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> замість того щоб писати документацію вручну у Word або Notion, ми описуємо API декораторами безпосередньо в коді — і отримуємо актуальну документацію з можливістю тестування.</p>\n<h2>🎯 Що дає Swagger</h2>\n\n<div class=\"mermaid\" data-source=\"graph LR\n    CODE[💻 Код з декораторами] --&gt; GEN[⚙️ Генератор OpenAPI]\n    GEN --&gt; SPEC[📄 OpenAPI Specification JSON]\n    SPEC --&gt; UI[🌐 Swagger UI]\n    SPEC --&gt; CLIENT[🤖 Кодогенерація для клієнтів]\n    style CODE fill:#e3f2fd,stroke:#1565c0\n    style GEN fill:#fff3e0,stroke:#ef6c00\n    style UI fill:#e8f5e9,stroke:#388e3c\n    style CLIENT fill:#fce4ec,stroke:#c2185b\"><svg id=\"exp-1778563555607-12-0\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" class=\"flowchart\" style=\"max-width: 1100.5078125px;\" viewBox=\"0 0 1100.5078125 186\" role=\"graphics-document document\" aria-roledescription=\"flowchart-v2\"><style>#exp-1778563555607-12-0{font-family:system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,Arial,sans-serif;font-size:16px;fill:#333;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#exp-1778563555607-12-0 .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#exp-1778563555607-12-0 .edge-animation-fast{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 20s linear infinite;stroke-linecap:round;}#exp-1778563555607-12-0 .error-icon{fill:#552222;}#exp-1778563555607-12-0 .error-text{fill:#552222;stroke:#552222;}#exp-1778563555607-12-0 .edge-thickness-normal{stroke-width:1px;}#exp-1778563555607-12-0 .edge-thickness-thick{stroke-width:3.5px;}#exp-1778563555607-12-0 .edge-pattern-solid{stroke-dasharray:0;}#exp-17785635 \"hljs-title function_\">bootstrap</span>(<span class=\"hljs-params\"></span>) {\n  <span class=\"hljs-keyword\">const</span> app = <span class=\"hljs-keyword\">await</span> <span class=\"hljs-title class_\">NestFactory</span>.<span class=\"hljs-title function_\">create</span>(<span class=\"hljs-title class_\">AppModule</span>);\n\n  <span class=\"hljs-keyword\">const</span> config = <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">DocumentBuilder</span>()\n    .<span class=\"hljs-title function_\">setTitle</span>(<span class=\"hljs-string\">\"Task Manager API\"</span>)\n    .<span class=\"hljs-title function_\">setDescription</span>(<span class=\"hljs-string\">\"API для управління завданнями\"</span>)\n    .<span class=\"hljs-title function_\">setVersion</span>(<span class=\"hljs-string\">\"1.0\"</span>)\n    .<span class=\"hljs-title function_\">addTag</span>(<span class=\"hljs-string\">\"tasks\"</span>, <span class=\"hljs-string\">\"Операції над завданнями\"</span>)\n    .<span class=\"hljs-title function_\">build</span>();\n\n  <span class=\"hljs-keyword\">const</span> <span class=\"hljs-variable language_\">document</span> = <span class=\"hljs-title class_\">SwaggerModule</span>.<span class=\"hljs-title function_\">createDocument</span>(app, config);\n  <span class=\"hljs-title class_\">SwaggerModule</span>.<span class=\"hljs-title function_\">setup</span>(<span class=\"hljs-string\">\"api/docs\"</span>, app, <span class=\"hljs-variable language_\">document</span>);\n\n  <span class=\"hljs-keyword\">await</span> app.<span class=\"hljs-title function_\">listen</span>(<span class=\"hljs-number\">3000</span>);\n}\n<span class=\"hljs-title function_\">bootstrap</span>();</code></pre><h2>📍 Результат</h2>\n<table>\n<thead>\n<tr>\n<th>URL</th>\n<th>Що відкривається</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>http://localhost:3000/api/docs</code></td>\n<td>Інтерактивна Swagger UI</td>\n</tr>\n<tr>\n<td><code>http://localhost:3000/api/docs-json</code></td>\n<td>Сирий OpenAPI JSON</td>\n</tr>\n</tbody></table>\n<div class=\"note\"><strong>📝 Встановлення пакету</strong> <p>Для роботи Swagger потрібен пакет <code>@nestjs/swagger</code>, який встановлюється окремо до основних залежностей застосунку.</p>\n</div>\n\n","<h1>📚 Документування контролерів</h1>\n<p><strong>Головна ідея:</strong> декоратори з пакету <code>@nestjs/swagger</code> дозволяють описати кожен endpoint — параметри, тіло, відповіді та можливі помилки.</p>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">ApiTags</span>, <span class=\"hljs-title class_\">ApiOperation</span>, <span class=\"hljs-title class_\">ApiResponse</span>, <span class=\"hljs-title class_\">ApiParam</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"@nestjs/swagger\"</span>;\n\n<span class=\"hljs-meta\">@ApiTags</span>(<span class=\"hljs-string\">\"tasks\"</span>)\n<span class=\"hljs-meta\">@Controller</span>(<span class=\"hljs-string\">\"tasks\"</span>)\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">class</span> <span class=\"hljs-title class_\">TasksController</span> {\n  <span class=\"hljs-meta\">@Get</span>(<span class=\"hljs-string\">\":id\"</span>)\n  <span class=\"hljs-meta\">@ApiOperation</span>({ <span class=\"hljs-attr\">summary</span>: <span class=\"hljs-string\">\"Отримати завдання за ID\"</span> })\n  <span class=\"hljs-meta\">@ApiParam</span>({ <span class=\"hljs-attr\">name</span>: <span class=\"hljs-string\">\"id\"</span>, <span class=\"hljs-attr\">type</span>: <span class=\"hljs-title class_\">Number</span>, <span class=\"hljs-attr\">description</span>: <span class=\"hljs-string\">\"Унікальний ID завдання\"</span> })\n  <span class=\"hljs-meta\">@ApiResponse</span>({ <span class=\"hljs-attr\">status</span>: <span class=\"hljs-number\">200</span>, <span class=\"hljs-attr\">description</span>: <span class=\"hljs-string\">\"Завдання знайдено\"</span>, <span class=\"hljs-attr\">type</span>: <span class=\"hljs-title class_\">Task</span> })\n  <span class=\"hljs-meta\">@ApiResponse</span>({ <span class=\"hljs-attr\">status</span>: <span class=\"hljs-number\">404</span>, <span class=\"hljs-attr\">description</span>: <span class=\"hljs-string\">\"Завдання не знайдено\"</span> })\n  <span class=\"hljs-title function_\">findOne</span>(<span class=\"hljs-meta\">@Param</span>(<span class=\"hljs-string\">\"id\"</span>) <span class=\"hljs-attr\">id</span>: <span class=\"hljs-built_in\">number</span>): <span class=\"hljs-title class_\">Promise</span>&lt;<span class=\"hljs-title class_\">Task</span>&gt; {\n    <span class=\"hljs-keyword\">return</span> <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">tasksService</span>.<span class=\"hljs-title function_\">findOne</span>(id);\n  }\n}</code></pre><h2>📊 Основні декоратори</h2>\n<table>\n<thead>\n<tr>\n<th>Декоратор</th>\n<th>Призначення</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>@ApiTags()</code></td>\n<td>Групування endpoints у Swagger UI</td>\n</tr>\n<tr>\n<td><code>@ApiOperation()</code></td>\n<td>Короткий опис endpoint</td>\n</tr>\n<tr>\n<td><code>@ApiParam()</code></td>\n<td>Опис параметру шляху (<code>:id</code>)</td>\n</tr>\n<tr>\n<td><code>@ApiQuery()</code></td>\n<td>Опис query-параметру (<code>?status=active</code>)</td>\n</tr>\n<tr>\n<td><code>@ApiBody()</code></td>\n<td>Опис тіла запиту</td>\n</tr>\n<tr>\n<td><code>@ApiResponse()</code></td>\n<td>Опис можливої відповіді з кодом статусу</td>\n</tr>\n</tbody></table>\n","<h1>📚 Документування DTO та Entity</h1>\n<p><strong>Головна ідея:</strong> для повної документації потрібно описати не тільки endpoints, а й структури даних — DTO для запитів та entities для відповідей.</p>\n<h2>📝 DTO з декоратором <code>@ApiProperty</code></h2>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">ApiProperty</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"@nestjs/swagger\"</span>;\n<span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">IsString</span>, <span class=\"hljs-title class_\">IsOptional</span>, <span class=\"hljs-title class_\">IsEnum</span>, <span class=\"hljs-title class_\">MinLength</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"class-validator\"</span>;\n\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">class</span> <span class=\"hljs-title class_\">CreateTaskDto</span> {\n  <span class=\"hljs-meta\">@ApiProperty</span>({\n    <span class=\"hljs-attr\">description</span>: <span class=\"hljs-string\">\"Назва завдання\"</span>,\n    <span class=\"hljs-attr\">example</span>: <span class=\"hljs-string\">\"Купити продукти\"</span>,\n    <span class=\"hljs-attr\">minLength</span>: <span class=\"hljs-number\">3</span>,\n  })\n  <span class=\"hljs-meta\">@IsString</span>()\n  <span class=\"hljs-meta\">@MinLength</span>(<span class=\"hljs-number\">3</span>)\n  <span class=\"hljs-attr\">title</span>: <span class=\"hljs-built_in\">string</span>;\n\n  <span class=\"hljs-meta\">@ApiProperty</span>({ <span class=\"hljs-attr\">description</span>: <span class=\"hljs-string\">\"Детальний опис\"</span>, <span class=\"hljs-attr\">required</span>: <span class=\"hljs-literal\">false</span> })\n  <span class=\"hljs-meta\">@IsString</span>()\n  <span class=\"hljs-meta\">@IsOptional</span>()\n  description?: <span class=\"hljs-built_in\">string</span>;\n\n  <span class=\"hljs-meta\">@ApiProperty</span>({ <span class=\"hljs-attr\">description</span>: <span class=\"hljs-string\">\"Статус\"</span>, <span class=\"hljs-attr\">enum</span>: <span class=\"hljs-title class_\">TaskStatus</span> })\n  <span class=\"hljs-meta\">@IsEnum</span>(<span class=\"hljs-title class_\">TaskStatus</span>)\n  <span class=\"hljs-attr\">status</span>: <span class=\"hljs-title class_\">TaskStatus</span>;\n}</code></pre><h2>🗄️ Entity з декораторами Swagger</h2>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-meta\">@Entity</span>(<span class=\"hljs-string\">\"tasks\"</span>)\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">class</span> <span class=\"hljs-title class_\">Task</span> {\n  <span class=\"hljs-meta\">@ApiProperty</span>({ <span class=\"hljs-attr\">description</span>: <span class=\"hljs-string\">\"Унікальний ідентифікатор\"</span>, <span class=\"hljs-attr\">example</span>: <span class=\"hljs-number\">1</span> })\n  <span class=\"hljs-meta\">@PrimaryGeneratedColumn</span>()\n  <span class=\"hljs-attr\">id</span>: <span class=\"hljs-built_in\">number</span>;\n\n  <span class=\"hljs-meta\">@ApiProperty</span>({ <span class=\"hljs-attr\">description</span>: <span class=\"hljs-string\">\"Назва завдання\"</span> })\n  <span class=\"hljs-meta\">@Column</span>()\n  <span class=\"hljs-attr\">title</span>: <span class=\"hljs-built_in\">string</span>;\n\n  <span class=\"hljs-meta\">@ApiProperty</span>({ <span class=\"hljs-attr\">description</span>: <span class=\"hljs-string\">\"Дата створення\"</span> })\n  <span class=\"hljs-meta\">@CreateDateColumn</span>()\n  <span class=\"hljs-attr\">createdAt</span>: <span class=\"hljs-title class_\">Date</span>;\n}</code></pre><div class=\"success\"><strong>✅ Подвійна користь декораторів</strong> <p><code>@ApiProperty</code> працює разом із <code>class-validator</code> — одні й ті ж властивості одночасно валідуються та документуються. Це принцип <strong>DRY</strong> (Don't Repeat Yourself / Не повторюйся) у дії.</p>\n</div>\n\n","<h1>🏗️ Архітектура production-ready застосунку</h1>\n<p><strong>Головна ідея:</strong> усі компоненти, які ми вивчили, разом утворюють шари обробки запиту — кожен зі своєю чіткою відповідальністю.</p>\n<h2>🔄 Повний життєвий цикл запиту</h2>\n\n<div class=\"mermaid\" data-so -width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>🛡️ Exception Filter</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1778563555618-16-0-flowchart-RES-21\" data-look=\"classic\" transform=\"translate(254.57421875, 935.5013809204102)\"><rect class=\"basic label-container\" style=\"fill:#f3e5f5 !important;stroke:#7b1fa2 !important\" x=\"-92.63671875\" y=\"-24\" width=\"185.2734375\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-68.63671875, -12)\"><rect></rect><foreignObject width=\"137.2734375\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>📤 HTTP Відповідь</p></span></div></foreignObject></g></g></g></g></g><defs><filter id=\"exp-1778563555618-16-0-drop-shadow\" height=\"130%\" width=\"130%\"><feDropShadow dx=\"4\" dy=\"4\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs><defs><filter id=\"exp-1778563555618-16-0-drop-shadow-small\" height=\"150%\" width=\"150%\"><feDropShadow dx=\"2\" dy=\"2\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs></svg></div>\n<h2>📊 Відповідальність шарів</h2>\n<table>\n<thead>\n<tr>\n<th>Шар</th>\n<th>Відповідальність</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Middleware</td>\n<td>Парсинг, CORS, helmet</td>\n</tr>\n<tr>\n<td>Guards</td>\n<td>Авторизація: чи має право користувач</td>\n</tr>\n<tr>\n<td>Interceptors (до)</td>\n<td>Логування, метрики</td>\n</tr>\n<tr>\n<td>Pipes</td>\n<td>Валідація та трансформація вхідних даних</td>\n</tr>\n<tr>\n<td>Controller</td>\n<td>Маршрутизація, виклик сервісу</td>\n</tr>\n<tr>\n<td>Service</td>\n<td>Бізнес-логіка</td>\n</tr>\n<tr>\n<td>Interceptors (після)</td>\n<td>Трансформація відповіді, кешування</td>\n</tr>\n<tr>\n<td>Exception Filter</td>\n<td>Перетворення виключень у HTTP-відповідь</td>\n</tr>\n</tbody></table>\n","<h1>🏗️ Конфігурація main.ts</h1>\n<p><strong>Головна ідея:</strong> <code>main.ts</code> — єдина точка налаштування глобальних компонентів застосунку.</p>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">NestFactory</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"@nestjs/core\"</span>;\n<span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">ValidationPipe</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"@nestjs/common\"</span>;\n<span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">SwaggerModule</span>, <span class=\"hljs-title class_\">DocumentBuilder</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"@nestjs/swagger\"</span>;\n<span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">AppModule</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"./app.module\"</span>;\n<span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">AllExceptionsFilter</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"./filters/all-exceptions.filter\"</span>;\n<span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">TransformInterceptor</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"./interceptors/transform.interceptor\"</span>;\n<span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">HttpLoggingInterceptor</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"./interceptors/http-logging.interceptor\"</span>;\n\n<span class=\"hljs-keyword\">async</span> <span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">bootstrap</span>(<span class=\"hljs-params\"></span>) {\n  <span class=\"hljs-keyword\">const</span> app = <span class=\"hljs-keyword\">await</span> <span class=\"hljs-title class_\">NestFactory</span>.<span class=\"hljs-title function_\">create</span>(<span class=\"hljs-title class_\">AppModule</span>);\n\n  <span class=\"hljs-comment\">// Глобальна валідація</span>\n  app.<span class=\"hljs-title function_\">useGlobalPipes</span>(<span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">ValidationPipe</span>({ <span class=\"hljs-attr\">whitelist</span>: <span class=\"hljs-literal\">true</span>, <span class=\"hljs-attr\">transform</span>: <span class=\"hljs-literal\">true</span> }));\n\n  <span class=\"hljs-comment\">// Глобальні фільтри помилок</span>\n  app.<span class=\"hljs-title function_\">useGlobalFilters</span>(<span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">AllExceptionsFilter</span>());\n\n  <span class=\"hljs-comment\">// Глобальні interceptors</span>\n  app.<span class=\"hljs-title function_\">useGlobalInterceptors</span>(\n    <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">HttpLoggingInterceptor</span>(),\n    <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">TransformInterceptor</span>(),\n  );\n\n  <span class=\"hljs-comment\">// Swagger</span>\n  <span class=\"hljs-keyword\">const</span> config = <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">DocumentBuilder</span>()\n    .<span class=\"hljs-title function_\">setTitle</span>(<span class=\"hljs-string\">\"Task Manager API\"</span>)\n    .<span class=\"hljs-title function_\">setVersion</span>(<span class=\"hljs-string\">\"1.0\"</span>)\n    .<span class=\"hljs-title function_\">build</span>();\n  <span class=\"hljs-keyword\">const</span> <span class=\"hljs-variable language_\">document</span> = <span class=\"hljs-title class_\">SwaggerModule</span>.<span class=\"hljs-title function_\">createDocument</span>(app, config);\n  <span class=\"hljs-title class_\">SwaggerModule</span>.<span class=\"hljs-title function_\">setup</span>(<span class=\"hljs-string\">\"api/docs\"</span>, app, <span class=\"hljs-variable language_\">document</span>);\n\n  <span class=\"hljs-keyword\">await</span> app.<span class=\"hljs-title function_\">listen</span>(<span class=\"hljs-number\">3000</span>);\n}\n<span class=\"hljs-title function_\">bootstrap</span>();</code></pre><div class=\"warning\"><strong>⚠️ Порядок реєстрації</strong> <p>Хоча Nest.js самостійно визначає порядок виконання компонентів (pipes → interceptors → controller → interceptors → filters), кращою практикою є логічне групування налаштувань у <code>main.ts</code>: спочатку pipes, потім filters, потім interceptors, потім Swagger.</p>\n</div>\n\n","<h1>✅ Ключові висновки</h1>\n<div class=\"success\"><strong>✅ Підсумок лекції</strong> <p><strong>📌 Основні концепції:</strong></p>\n<ol>\n<li><p><strong>Exception Filters</strong> централізують обробку помилок та забезпечують єдиний формат відповіді клієнту замість розрізнених <code>try/catch</code> у контролерах.</p>\n</li>\n<li><p><strong>Catch-all фільтр</strong> є обов'язковим компонентом production застосунку — він захищає від витоку внутрішньої інформації при несподіваних помилках.</p>\n</li>\n<li><p><strong>Власні класи виключень</strong> роблять помилки самодокументованими та машиночитаними для frontend.</p>\n</li>\n<li><p><strong>Interceptors</strong> реалізують AOP-паттерн — додавання наскрізної функціональності (логування, трансформація, кешування) без зміни бізнес-логіки.</p>\n</li>\n<li><p><strong>Logger</strong> Nest.js — повноцінна заміна <code>console.log</code> зі структурованим виведенням та підтримкою контексту й рівнів важливості.</p>\n</li>\n<li><p><strong>Swagger/OpenAPI</strong> генерує живу документацію API з декораторів — вона завжди актуальна, бо є частиною коду.</p>\n</li>\n<li><p><strong>Шари Nest.js</strong> (middleware, guards, interceptors, pipes, controllers, services, filters) разом утворюють передбачувану архітектуру production-ready застосунку.</p>\n</li>\n</ol>\n</div>\n\n","<h1>❓ Контрольні питання</h1>\n<ol>\n<li><p>🤔 У чому різниця між фільтром <code>@Catch(HttpException)</code> та фільтром <code>@Catch()</code> без аргументів? Коли застосовувати кожен?</p>\n</li>\n<li><p>🤔 Чому небезпечно повертати клієнту необроблене виключення з повним stack trace?</p>\n</li>\n<li><p>🤔 Які три рівні реєстрації Exception Filter існують у Nest.js? Який пріоритет вони мають?</p>\n</li>\n<li><p>🤔 У чому полягає різниця між Pipe та Interceptor? Чи може interceptor валідувати дані?</p>\n</li>\n<li><p>🤔 Що таке AOP (Aspect-Oriented Programming) і як interceptors реалізують цей паттерн?</p>\n</li>\n<li><p>🤔 Чому варто використовувати <code>Logger</code> від Nest.js замість <code>console.log</code>?</p>\n</li>\n<li><p>🤔 Які переваги має документування API через декоратори <code>@nestjs/swagger</code> порівняно з ручним підтриманням документації?</p>\n</li>\n</ol>\n","<h1>📖 Глосарій термінів</h1>\n<table>\n<thead>\n<tr>\n<th>Термін</th>\n<th>English</th>\n<th>Визначення</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Фільтр виключень</td>\n<td>Exception Filter</td>\n<td>Компонент централізованої обробки виключень у HTTP-відповідь</td>\n</tr>\n<tr>\n<td>Перехоплювач</td>\n<td>Interceptor</td>\n<td>Компонент, що виконує код до та після обробника запиту</td>\n</tr>\n<tr>\n<td>Логування</td>\n<td>Logging</td>\n<td>Структуроване виведення інформації про роботу застосунку</td>\n</tr>\n<tr>\n<td>Документація API</td>\n<td>API documentation</td>\n<td>Опис endpoints, параметрів та відповідей для споживачів API</td>\n</tr>\n<tr>\n<td>Специфікація</td>\n<td>Specification</td>\n<td>Машиночитаний опис API у форматі OpenAPI</td>\n</tr>\n<tr>\n<td>Контекст виконання</td>\n<td>Execution Context</td>\n<td>Об'єкт із інформацією про поточний запит та його тип (HTTP, WS, GraphQL)</td>\n</tr>\n<tr>\n<td>Реактивний потік</td>\n<td>Observable</td>\n<td>Послідовність асинхронних подій у бібліотеці RxJS</td>\n</tr>\n<tr>\n<td>Наскрізна логіка</td>\n<td>Cross-cutting concern</td>\n<td>Функціональність, що зачіпає багато компонентів (логування, безпека)</td>\n</tr>\n<tr>\n<td>Власне виключення</td>\n<td>Custom exception</td>\n<td>Доменний клас виключення, що успадковується від <code>HttpException</code></td>\n</tr>\n<tr>\n<td>Рівень логування</td>\n<td>Log level</td>\n<td>Категорія важливості повідомлення (error, warn, info, debug)</td>\n</tr>\n</tbody></table>\n","<h1>📖 Глосарій абревіатур</h1>\n<table>\n<thead>\n<tr>\n<th>Абревіатура</th>\n<th>Розшифровка</th>\n<th>Переклад</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>API</td>\n<td>Application Programming Interface</td>\n<td>Програмний інтерфейс застосунку</td>\n</tr>\n<tr>\n<td>AOP</td>\n<td>Aspect-Oriented Programming</td>\n<td>Аспектно-орієнтоване програмування</td>\n</tr>\n<tr>\n<td>HTTP</td>\n<td>HyperText Transfer Protocol</td>\n<td>Протокол передачі гіпертексту</td>\n</tr>\n<tr>\n<td>JSON</td>\n<td>JavaScript Object Notation</td>\n<td>Текстовий формат обміну даними</td>\n</tr>\n<tr>\n<td>DTO</td>\n<td>Data Transfer Object</td>\n<td>Об'єкт передачі даних</td>\n</tr>\n<tr>\n<td>DRY</td>\n<td>Don't Repeat Yourself</td>\n<td>Не повторюйся</td>\n</tr>\n<tr>\n<td>REST</td>\n<td>Representational State Transfer</td>\n<td>Архітектурний стиль для веб-сервісів</td>\n</tr>\n<tr>\n<td>RxJS</td>\n<td>Reactive Extensions for JavaScript</td>\n<td>Бібліотека реактивного програмування</td>\n</tr>\n<tr>\n<td>URL</td>\n<td>Uniform Resource Locator</td>\n<td>Уніфікований локатор ресурсу</td>\n</tr>\n<tr>\n<td>UI</td>\n<td>User Interface</td>\n<td>Користувацький інтерфейс</td>\n</tr>\n<tr>\n<td>WS</td>\n<td>WebSocket</td>\n<td>Протокол двостороннього зв'язку</td>\n</tr>\n</tbody></table>\n"];let currentSlideIndex=0;
function renderMath(root){if(typeof renderMathInElement!=="function"||!root)return;try{renderMathInElement(root,{delimiters:[{left:"$$",right:"$$",display:true},{left:"\\[",right:"\\]",display:true},{left:"$",right:"$",display:false},{left:"\\(",right:"\\)",display:false}],throwOnError:false,strict:"ignore",ignoredTags:["script","noscript","style","textarea","pre","code"]});}catch(e){console.warn("Math render error:",e);}}
function showSlide(i){if(i<0||i>=slides.length)return;currentSlideIndex=i;const el=document.getElementById("current-slide");el.innerHTML=slides[i];el.scrollTop=0;renderMath(el);document.getElementById("progress-bar").style.width=((i+1)/slides.length*100)+"%";document.getElementById("slide-number").textContent=(i+1)+" / "+slides.length;updateSidebarActive();}
function nextSlide(){if(currentSlideIndex<slides.length-1)showSlide(currentSlideIndex+1);}
function previousSlide(){if(currentSlideIndex>0)showSlide(currentSlideIndex-1);}
function toggleSidebar(){document.getElementById("sidebar").classList.toggle("open");}
function toggleHelp(){document.getElementById("help-overlay").classList.toggle("hidden");}
function toggleFullscreen(){if(!document.fullscreenElement){const pc=document.getElementById("presentation-container");if(pc.requestFullscreen)pc.requestFullscreen();else if(pc.webkitRequestFullscreen)pc.webkitRequestFullscreen();else if(pc.msRequestFullscreen)pc.msRequestFullscreen();else if(pc.mozRequestFullScreen)pc.mozRequestFullScreen();}else{if(document.exitFullscreen)document.exitFullscreen();else if(document.webkitExitFullscreen)document.webkitExitFullscreen();else if(document.msExitFullscreen)document.msExitFullscreen();else if(document.mozCancelFullScreen)document.mozCancelFullScreen();}}
function generateSidebar(){const sc=document.getElementById("sidebar-content");sc.innerHTML="";slides.forEach((html,idx)=>{const t=document.createElement("div");t.className="slide-thumbnail";if(idx===0)t.classList.add("active");const tmp=document.createElement("div");tmp.innerHTML=html;const title=tmp.querySelector("h1,h2");const titleText=title?title.textContent:("Слайд "+(idx+1));const textContent=tmp.textContent.replace(/s+/g," ").trim();const preview=textContent.substring(0,100)+(textContent.length>100?"...":"");t.innerHTML="<div class=\"slide-thumbnail-number\">"+(idx+1)+"</div><div class=\"slide-thumbnail-title\">"+titleText+"</div><div class=\"slide-thumbnail-content\">"+preview+"</div>";t.onclick=()=>{showSlide(idx);if(window.innerWidth<1024)toggleSidebar();};sc.appendChild(t);});}
function updateSidebarActive(){document.querySelectorAll(".slide-thumbnail").forEach((th,idx)=>{if(idx===currentSlideIndex){th.classList.add("active");th.scrollIntoView({behavior:"smooth",block:"nearest"});}else th.classList.remove("active");});}
document.addEventListener("keydown",e=>{switch(e.key){case"ArrowLeft":previousSlide();break;case"ArrowRight":case" ":e.preventDefault();nextSlide();break;case"f":case"F":toggleFullscreen();break;case"s":case"S":toggleSidebar();break;case"?":toggleHelp();break;case"Escape":const sb=document.getElementById("sidebar");const ho=document.getElementById("help-overlay");if(sb.classList.contains("open"))toggleSidebar();else if(!ho.classList.contains("hidden"))ho.classList.add("hidden");break;}});
generateSidebar();showSlide(0);</script></body></html>
