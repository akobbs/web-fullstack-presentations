<!DOCTYPE html><html lang="uk"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Node.js: основи</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css"><style>* {

        .slide pre {

#presentation-container:fullscreen,#presentation-container:-webkit-full-screen,#presentation-container:-moz-full-screen,#presentation-container:-ms-fullscreen{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%)!important;}</style></head><body><div id="presentation-container"><div class="progress"><div class="progress-bar" id="progress-bar"></div></div><button id="sidebar-toggle" onclick="toggleSidebar()" title="Навігація слайдами (S)">☰</button><div id="sidebar"><div id="sidebar-header"><h3>📑 Слайди</h3><button id="sidebar-close" onclick="toggleSidebar()">✕</button></div><div id="sidebar-content"></div></div><div class="slide-container"><div class="slide" id="current-slide"></div></div><div class="controls"><button class="control-btn" onclick="previousSlide()" title="Попередній (←)">←</button><button class="control-btn" onclick="nextSlide()" title="Наступний (→)">→</button><button class="control-btn" onclick="toggleFullscreen()" title="Повноекранний режим (F)">⛶</button><button class="control-btn" onclick="toggleHelp()" title="Допомога (?)">?</button></div><div class="slide-number" id="slide-number">1 / 17</div><div id="help-overlay" class="hidden"><strong>Гарячі клавіші:</strong><br><kbd>←</kbd> <kbd>→</kbd> Навігація<br><kbd>F</kbd> Повноекранний режим<br><kbd>S</kbd> Sidebar<br><kbd>?</kbd> Допомога<br><kbd>Esc</kbd> Закрити</div></div><script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script><script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script><script>const slides=["<h1>Node.js: основи</h1>\n<p><strong>Сучасні технології Internet-програмування</strong></p>\n<p>Лектор: Кобилянський Антон</p>\n","<h1>📋 План лекції</h1>\n<ol>\n<li>🌍 Що таке Node.js і навіщо він потрібен</li>\n<li>⚙️ Як працює Node.js: Event Loop та неблокуюче I/O</li>\n<li>🔧 Встановлення: nvm та управління версіями</li>\n<li>📦 npm — менеджер пакетів</li>\n<li>🗂️ Модульна система: CommonJS та ESM</li>\n<li>🛠️ Вбудовані модулі Node.js</li>\n<li>🌐 HTTP-сервер та асинхронна обробка запитів</li>\n<li>✅ Ключові висновки та контрольні питання</li>\n</ol>\n","<h1>🌍 Що таке Node.js</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>Node.js</strong> — крос-платформне середовище виконання JavaScript поза браузером, побудоване на рушії <strong>V8</strong> від Google. Дозволяє запускати JavaScript на сервері, у CLI-інструментах та в будь-якому середовищі, де є операційна система.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> до Node.js JavaScript існував виключно у браузері. Node.js зробив мову універсальною — один розробник може писати frontend і backend спільною мовою, використовуючи одні й ті самі типи, утиліти та підходи.</p>\n<h2>📅 Ключові віхи розвитку</h2>\n<table>\n<thead>\n<tr>\n<th>Рік</th>\n<th>Подія</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>2009</td>\n<td>Раян Дал (Ryan Dahl) презентує Node.js на JSConf EU</td>\n</tr>\n<tr>\n<td>2010</td>\n<td>Офіційний реліз npm — менеджера пакетів</td>\n</tr>\n<tr>\n<td>2015</td>\n<td>Node.js Foundation та перехід до відкритого governance</td>\n</tr>\n<tr>\n<td>2019</td>\n<td>Об'єднання з JS Foundation → OpenJS Foundation</td>\n</tr>\n<tr>\n<td>2024</td>\n<td>Node.js 22 (\"Jod\") — Active LTS</td>\n</tr>\n<tr>\n<td>2025</td>\n<td>Node.js 24 — Active LTS з жовтня 2025</td>\n</tr>\n</tbody></table>\n<div class=\"tip\"><strong>💡 Чому V8?</strong> <p><strong>V8</strong> — рушій Google Chrome, який компілює JavaScript безпосередньо у машинний код через <strong>JIT-компіляцію</strong> (Just-In-Time). Це забезпечує продуктивність, порівняну з компільованими мовами.</p>\n</div>\n\n","<h1>🆚 Node.js vs браузерне середовище</h1>\n<p><strong>Головна ідея:</strong> Node.js і браузер запускають однаковий JavaScript, але мають принципово різні можливості — різне оточення, різний глобальний об'єкт, різний набір API.</p>\n<h2>🔍 Порівняльна таблиця</h2>\n<table>\n<thead>\n<tr>\n<th>Можливість</th>\n<th>🌐 Браузер</th>\n<th>🟢 Node.js</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Робота з DOM</td>\n<td>✅ <code>document</code>, <code>window</code></td>\n<td>❌ DOM відсутній</td>\n</tr>\n<tr>\n<td>Доступ до файлової системи</td>\n<td>❌ Обмежено (File API)</td>\n<td>✅ Повний доступ (<code>fs</code>)</td>\n</tr>\n<tr>\n<td>Мережеві запити</td>\n<td>✅ <code>fetch</code>, WebSocket</td>\n<td>✅ <code>http</code>, <code>https</code>, <code>fetch</code></td>\n</tr>\n<tr>\n<td>Змінні середовища</td>\n<td>❌ Недоступні</td>\n<td>✅ <code>process.env</code></td>\n</tr>\n<tr>\n<td>Глобальний об'єкт</td>\n<td><code>window</code> / <code>globalThis</code></td>\n<td><code>global</code> / <code>globalThis</code></td>\n</tr>\n<tr>\n<td>Модульна система</td>\n<td>ES Modules (браузерний ESM)</td>\n<td>CommonJS + ES Modules</td>\n</tr>\n<tr>\n<td>TypeScript (нативно)</td>\n<td>❌ Потрібен транспайлер</td>\n<td>✅ з Node.js 22+ (стрипінг типів без компіляції)</td>\n</tr>\n</tbody></table>\n<div class=\"warning\"><strong>⚠️ Типова помилка</strong> <p>Починаючи Node.js-проект, розробники-початківці намагаються звернутись до <code>window</code> або <code>document</code>. У Node.js ці об'єкти не існують — замість <code>window</code> є <code>global</code>, замість <code>localStorage</code> — файлова система або бази даних.</p>\n</div>\n\n","<h1>⚙️ Однопотоковість та неблокуюче I/O</h1>\n<div class=\"info\"><strong>ℹ️ Ключова концепція</strong> <p>Node.js виконує JavaScript в <strong>одному потоці</strong> операційної системи. Проте I/O-операції (читання файлів, мережеві запити, звернення до БД) делегуються операційній системі через <strong>libuv</strong> і виконуються асинхронно, не блокуючи головний потік.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> вузьке місце серверних застосунків — не обчислення, а <strong>очікування</strong>. Типовий запит до API витрачає ~95% часу на очікування відповіді від БД або файлової системи, і лише ~5% — на виконання JavaScript-коду. Node.js перетворює цей простій на корисну роботу: поки один запит очікує відповіді від БД, потік обробляє наступний.</p>\n<h2>🔄 Конкурентна обробка запитів</h2>\n\n<div class=\"mermaid\" data-source=\"gantt\n    dateFormat SSS\n    axisFormat %Lмс\n    section Запит 1\n    JS-обробка      :active, q1a, 000, 020\n    Читання файлу (ОС) :crit, q1b, 020, 120\n    Відповідь       :active, q1c, 120, 140\n    section Запит 2\n    JS-обробка      :active, q2a, 025, 045\n    Запит до БД (ОС) :crit, q2b, 045, 130\n    Відповідь       :active, q2c, 130, 150\n    section Запит 3\n    JS-обробка      :active, q3a, 050, 070\n    Обчислення (ОС) :crit, q3b, 070, 110\n    Відповідь       :active, q3c, 110, 130\"><svg id=\"exp-1774291614703-4-0\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 1920 316\" style=\"max-width: 1920px;\" role=\"graphics-document document\" aria-roledescription=\"gantt\"><style>#exp-1774291614703-4-0{font-family:system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,Arial,sans-serif;font-size:16px;fill:#333;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#exp-1774291614703-4-0 .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#exp-1774291614703-4-0 .edge-animation-fast{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 20s linear infinite;stroke-linecap:round;}#exp-1774291614703-4-0 .error-icon{fill:#552222;}#exp-1774291614703-4-0 .error-text{fill:#552222;stroke:#552222;}#exp-1774291614703-4-0 .edge-thickness-normal{stroke-width:1px;}#exp-1774291614703-4-0 .edge-thickness-thick{stroke-width:3.5px;}#exp-1774291614703-4-0 .edge-pattern-solid{stroke-dasharray:0;}#exp-1774291614703-4-0 .edge-thickness-invisible{stroke-width:0;fill:none;}#exp-1774291614703-4-0 .edge-pattern-dashed{stroke-dasharray:3;}#exp-1774291614703-4-0 .edge-pattern-dotted{stroke-dasharray:2;}#exp-1774291614703-4-0 .marker{fill:#333333;stroke:#333333;}#exp-1774291614703-4-0 .marker.cro vg></div>\n<div class=\"info\"><strong>ℹ️ Як це читати</strong> <p>Сині блоки — Node.js активно виконує JavaScript. Червоні блоки — операційна система виконує I/O, а Node.js у цей час <strong>вільний</strong> і обробляє наступні запити. Всі три запити обробляються паралельно в одному потоці завдяки асинхронності.</p>\n</div>\n\n","<h1>⚙️ Event Loop — механізм роботи</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>Event Loop</strong> (цикл подій) — механізм, який безперервно перевіряє чергу завдань. Він виконує синхронний код у <strong>Call Stack</strong>, а асинхронні операції делегує <strong>libuv</strong> (бібліотека C++). Після завершення I/O результат повертається через чергу зворотних викликів.</p>\n</div>\n\n\n\n<h2>🔄 Схема роботи Event Loop</h2>\n\n<div class=\"mermaid\" data-source=\"graph LR\n    CODE[&quot;📝 JS-код&quot;] --&gt; CALLSTACK[&quot;📚 Call Stack&quot;]\n    CALLSTACK --&gt; SYNC{&quot;Тип операції?&quot;}\n    SYNC --&gt;|&quot;Синхронна&quot;| EXEC[&quot;✅ Виконати&quot;]\n    SYNC --&gt;|&quot;Асинхронна (I/O, таймер)&quot;| LIBUV[&quot;⚙️ libuv / ОС&quot;]\n    LIBUV --&gt; QUEUE[&quot;📬 Черга завдань&quot;]\n    QUEUE --&gt;|&quot;Call Stack порожній&quot;| CALLSTACK\n    style CODE fill:#fff9c4,stroke:#f9a825\n    style CALLSTACK fill:#e3f2fd,stroke:#1565c0\n    style LIBUV fill:#e8f5e9,stroke:#388e3c\n    style QUEUE fill:#fce4ec,stroke:#c2185b\"><svg id=\"exp-1774291614712-5-0\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" class=\"flowchart\" style=\"max-width: 1157.59375px;\" viewBox=\"0 0 1157.59375 235.8984375\" role=\"graphics-document document\" aria-roledescription=\"flowchart-v2\"><style>#exp-1774291614712-5-0{font-family:system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,Arial,sans-serif;font-size:16px;fill:#333;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#exp-1774291614712-5-0 .edge-animation-slow{stroke-dasharray:9,5!important;stroke dth=\"142.890625\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-47.4453125, -12)\"><rect></rect><foreignObject width=\"94.890625\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>⚙️ libuv / ОС</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"flowchart-QUEUE-9\" transform=\"translate(1058.6328125, 187.3984375)\"><rect class=\"basic label-container\" style=\"fill:#fce4ec !important;stroke:#c2185b !important\" x=\"-90.9609375\" y=\"-24\" width=\"181.921875\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-66.9609375, -12)\"><rect></rect><foreignObject width=\"133.921875\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>📬 Черга завдань</p></span></div></foreignObject></g></g></g></g></g></svg></div>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">'1: синхронно'</span>);\n\n<span class=\"hljs-built_in\">setTimeout</span>(<span class=\"hljs-function\">() =&gt;</span> <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">'3: макротаск'</span>), <span class=\"hljs-number\">0</span>);\n\n<span class=\"hljs-title class_\">Promise</span>.<span class=\"hljs-title function_\">resolve</span>().<span class=\"hljs-title function_\">then</span>(<span class=\"hljs-function\">() =&gt;</span> <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">'2: мікротаск'</span>));\n\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">'4: синхронно'</span>);\n\n<span class=\"hljs-comment\">// Виведе: 1 → 4 → 2 → 3</span>\n<span class=\"hljs-comment\">// Мікротаски (Promise) виконуються раніше макротасків (setTimeout)</span></code></pre><div class=\"warning\"><strong>⚠️ Блокування Event Loop</strong> <p>Якщо у синхронному коді виконується важке обчислення (наприклад, обробка великого масиву без поділу на частини), весь сервер \"зависає\" — жодний інший запит не буде оброблений до завершення обчислення.</p>\n</div>\n\n","<h1>🔧 Управління версіями: nvm</h1>\n<div class=\"info\"><strong>ℹ️ Проблема</strong> <p>У реальній розробці доводиться паралельно підтримувати кілька проектів з різними вимогами до версії Node.js. Ручне перевстановлення — незручне і ризиковане.</p>\n</div>\n\n\n\n\n\n<div class=\"info\"><strong>ℹ️ Рішення: nvm</strong> <p><strong>nvm</strong> (Node Version Manager) — інструмент для встановлення та перемикання між версіями Node.js без ризику пошкодити систему.</p>\n</div>\n\n\n\n<pre><code class=\"language-bash hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\"># Встановлення nvm (macOS / Linux)</span>\ncurl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.1/install.sh | bash\n\n<span class=\"hljs-comment\"># Перегляд доступних LTS-версій</span>\nnvm ls-remote --lts\n\n<span class=\"hljs-comment\"># Встановлення конкретної версії</span>\nnvm install 24          <span class=\"hljs-comment\"># Node.js 24 (Active LTS)</span>\nnvm install 22          <span class=\"hljs-comment\"># Node.js 22 (Maintenance LTS)</span>\n\n<span class=\"hljs-comment\"># Перемикання між версіями</span>\nnvm use 24\nnvm <span class=\"hljs-built_in\">alias</span> default 24    <span class=\"hljs-comment\"># версія за замовчуванням</span>\n\n<span class=\"hljs-comment\"># Перевірка</span>\nnode --version          <span class=\"hljs-comment\"># v24.x.x</span>\nnpm --version           <span class=\"hljs-comment\"># 11.x.x</span></code></pre><h2>📋 Актуальні версії Node.js (березень 2026)</h2>\n<table>\n<thead>\n<tr>\n<th>Версія</th>\n<th>Кодова назва</th>\n<th>Статус</th>\n<th>EOL</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><strong>24.x</strong></td>\n<td>Jod</td>\n<td>✅ Active LTS</td>\n<td>квітень 2028</td>\n</tr>\n<tr>\n<td><strong>22.x</strong></td>\n<td>Jod</td>\n<td>🔧 Maintenance</td>\n<td>квітень 2027</td>\n</tr>\n<tr>\n<td>20.x</td>\n<td>Iron</td>\n<td>⚠️ EOL</td>\n<td>квітень 2026</td>\n</tr>\n</tbody></table>\n<div class=\"tip\"><strong>💡 <code>.nvmrc</code></strong> <p>Додай файл <code>.nvmrc</code> з номером версії (<code>24</code>) до кореня проекту. Тоді команда <code>nvm use</code> без аргументів автоматично застосує потрібну версію — зручно для командної роботи.</p>\n</div>\n\n","<h1>📦 npm — менеджер пакетів</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>npm</strong> (Node Package Manager) — офіційний менеджер пакетів Node.js. Реєстр <strong>npmjs.com</strong> містить понад 2,5 мільйони пакетів. npm встановлюється разом з Node.js.</p>\n</div>\n\n\n\n<h2>🛠️ Ключові команди</h2>\n<pre><code class=\"language-bash hljs\" data-highlighted=\"yes\">npm init -y                        <span class=\"hljs-comment\"># створити package.json з дефолтами</span>\nnpm install express                <span class=\"hljs-comment\"># встановити залежність (runtime)</span>\nnpm install --save-dev typescript  <span class=\"hljs-comment\"># встановити devDependency</span>\nnpm install                        <span class=\"hljs-comment\"># відновити залежності з package.json</span>\nnpm update                         <span class=\"hljs-comment\"># оновити пакети відповідно до semver-діапазону</span>\nnpm run build                      <span class=\"hljs-comment\"># запустити скрипт \"build\"</span>\nnpm list --depth=0                 <span class=\"hljs-comment\"># переглянути встановлені пакети</span></code></pre><h2>📄 Структура <code>package.json</code></h2>\n<pre><code class=\"language-json hljs\" data-highlighted=\"yes\"><span class=\"hljs-punctuation\">{</span>\n  <span class=\"hljs-attr\">\"name\"</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">\"task-manager-api\"</span><span class=\"hljs-punctuation\">,</span>\n  <span class=\"hljs-attr\">\"version\"</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">\"1.0.0\"</span><span class=\"hljs-punctuation\">,</span>\n  <span class=\"hljs-attr\">\"type\"</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">\"module\"</span><span class=\"hljs-punctuation\">,</span>\n  <span class=\"hljs-attr\">\"engines\"</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-punctuation\">{</span> <span class=\"hljs-attr\">\"node\"</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">\"&gt;=24.0.0\"</span> <span class=\"hljs-punctuation\">}</span><span class=\"hljs-punctuation\">,</span>\n  <span class=\"hljs-attr\">\"scripts\"</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-punctuation\">{</span>\n    <span class=\"hljs-attr\">\"start\"</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">\"node dist/index.js\"</span><span class=\"hljs-punctuation\">,</span>\n    <span class=\"hljs-attr\">\"dev\"</span><span class=\"hljs-punctuation\">:</span>   <span class=\"hljs-string\">\"node --watch src/index.js\"</span><span class=\"hljs-punctuation\">,</span>\n    <span class=\"hljs-attr\">\"build\"</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">\"tsc\"</span>\n  <span class=\"hljs-punctuation\">}</span><span class=\"hljs-punctuation\">,</span>\n  <span class=\"hljs-attr\">\"dependencies\"</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-punctuation\">{</span>\n    <span class=\"hljs-attr\">\"express\"</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">\"^5.0.0\"</span>\n  <span class=\"hljs-punctuation\">}</span><span class=\"hljs-punctuation\">,</span>\n  <span class=\"hljs-attr\">\"devDependencies\"</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-punctuation\">{</span>\n    <span class=\"hljs-attr\">\"typescript\"</span><span class=\"hljs-punctuation\">:</span>      <span class=\"hljs-string\">\"^5.8.0\"</span><span class=\"hljs-punctuation\">,</span>\n    <span class=\"hljs-attr\">\"@types/express\"</span><span class=\"hljs-punctuation\">:</span>  <span class=\"hljs-string\">\"^5.0.0\"</span>\n  <span class=\"hljs-punctuation\">}</span>\n<span class=\"hljs-punctuation\">}</span></code></pre><div class=\"tip\"><strong>💡 <code>node --watch</code> та REPL</strong> <p><code>node --watch src/index.js</code> — вбудований аналог <code>nodemon</code> починаючи з Node.js 18: перезапускає процес при зміні файлів. <strong>REPL</strong> (Read-Eval-Print Loop) — інтерактивна консоль, запускається командою <code>node</code> без аргументів; зручна для швидкого тестування виразів.</p>\n</div>\n\n\n\n\n\n<div class=\"warning\"><strong>⚠️ <code>node_modules</code> та <code>.gitignore</code></strong> <p>Папка <code>node_modules</code> містить десятки тисяч файлів і <strong>ніколи</strong> не додається до git. До репозиторію комітять лише <code>package.json</code> та <code>package-lock.json</code>. Відновлення залежностей: <code>npm install</code>.</p>\n</div>\n\n","<h1>🗂️ Модулі: CommonJS</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>Модуль</strong> — файл з власною ізольованою областю видимості. Змінні, функції та класи, оголошені в модулі, недоступні ззовні без явного експорту.</p>\n</div>\n\n\n\n<h2>CommonJS — класична система Node.js</h2>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// tasks.repository.js</span>\n<span class=\"hljs-keyword\">const</span> tasks = [];\n<span class=\"hljs-keyword\">let</span> nextId = <span class=\"hljs-number\">1</span>;\n\n<span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">findAll</span>(<span class=\"hljs-params\"></span>) {\n  <span class=\"hljs-keyword\">return</span> [...tasks];\n}\n\n<span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">findById</span>(<span class=\"hljs-params\">id</span>) {\n  <span class=\"hljs-keyword\">return</span> tasks.<span class=\"hljs-title function_\">find</span>(<span class=\"hljs-function\"><span class=\"hljs-params\">task</span> =&gt;</span> task.<span class=\"hljs-property\">id</span> === id) ?? <span class=\"hljs-literal\">null</span>;\n}\n\n<span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">create</span>(<span class=\"hljs-params\">data</span>) {\n  <span class=\"hljs-keyword\">const</span> task = { <span class=\"hljs-attr\">id</span>: nextId++, ...data, <span class=\"hljs-attr\">createdAt</span>: <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Date</span>() };\n  tasks.<span class=\"hljs-title function_\">push</span>(task);\n  <span class=\"hljs-keyword\">return</span> task;\n}\n\n<span class=\"hljs-variable language_\">module</span>.<span class=\"hljs-property\">exports</span> = { findAll, findById, create };</code></pre><pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// tasks.service.js</span>\n<span class=\"hljs-keyword\">const</span> repository = <span class=\"hljs-built_in\">require</span>(<span class=\"hljs-string\">'./tasks.repository'</span>);\n\n<span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">getTask</span>(<span class=\"hljs-params\">id</span>) {\n  <span class=\"hljs-keyword\">const</span> task = repository.<span class=\"hljs-title function_\">findById</span>(id);\n  <span class=\"hljs-keyword\">if</span> (!task) <span class=\"hljs-keyword\">throw</span> <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Error</span>(<span class=\"hljs-string\">`Task <span class=\"hljs-subst\">${id}</span> not found`</span>);\n  <span class=\"hljs-keyword\">return</span> task;\n}\n\n<span class=\"hljs-variable language_\">module</span>.<span class=\"hljs-property\">exports</span> = { getTask, <span class=\"hljs-attr\">getAllTasks</span>: repository.<span class=\"hljs-property\">findAll</span> };</code></pre><div class=\"note\"><strong>📝 Як працює <code>require</code></strong> <p>При першому виклику <code>require('./module')</code> Node.js завантажує та виконує файл, а результат <strong>кешує</strong>. Повторні виклики з тим самим шляхом повертають кешований експорт без повторного виконання файлу.</p>\n</div>\n\n","<h1>🗂️ Модулі: ES Modules</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>ES Modules (ESM)</strong> — стандартна модульна система JavaScript (ES2015+). Підтримується і Node.js, і браузером. Рекомендований підхід для нових проектів.</p>\n</div>\n\n\n\n<p>Щоб увімкнути ESM у Node.js: <code>\"type\": \"module\"</code> у <code>package.json</code>.</p>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// tasks.repository.js</span>\n<span class=\"hljs-keyword\">const</span> tasks = [];\n<span class=\"hljs-keyword\">let</span> nextId = <span class=\"hljs-number\">1</span>;\n\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">findAll</span>(<span class=\"hljs-params\"></span>) {\n  <span class=\"hljs-keyword\">return</span> [...tasks];\n}\n\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">create</span>(<span class=\"hljs-params\">data</span>) {\n  <span class=\"hljs-keyword\">const</span> task = { <span class=\"hljs-attr\">id</span>: nextId++, ...data, <span class=\"hljs-attr\">createdAt</span>: <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Date</span>() };\n  tasks.<span class=\"hljs-title function_\">push</span>(task);\n  <span class=\"hljs-keyword\">return</span> task;\n}</code></pre><pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// tasks.service.js</span>\n<span class=\"hljs-keyword\">import</span> { findAll, create } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">'./tasks.repository.js'</span>;\n<span class=\"hljs-comment\">// У ESM розширення файлу (.js) — обов'язкове</span>\n\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">createTask</span>(<span class=\"hljs-params\">title, priority = <span class=\"hljs-string\">'medium'</span></span>) {\n  <span class=\"hljs-keyword\">if</span> (!title?.<span class=\"hljs-title function_\">trim</span>()) <span class=\"hljs-keyword\">throw</span> <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Error</span>(<span class=\"hljs-string\">'Title is required'</span>);\n  <span class=\"hljs-keyword\">return</span> <span class=\"hljs-title function_\">create</span>({ <span class=\"hljs-attr\">title</span>: title.<span class=\"hljs-title function_\">trim</span>(), priority, <span class=\"hljs-attr\">status</span>: <span class=\"hljs-string\">'todo'</span> });\n}\n\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">const</span> getAllTasks = findAll;</code></pre><h2>🆚 CommonJS vs ES Modules</h2>\n<table>\n<thead>\n<tr>\n<th>Ознака</th>\n<th>CommonJS</th>\n<th>ES Modules</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Синтаксис</td>\n<td><code>require</code> / <code>module.exports</code></td>\n<td><code>import</code> / <code>export</code></td>\n</tr>\n<tr>\n<td>Завантаження</td>\n<td>Синхронне</td>\n<td>Асинхронне, статично аналізоване</td>\n</tr>\n<tr>\n<td>Top-level <code>await</code></td>\n<td>❌</td>\n<td>✅</td>\n</tr>\n<tr>\n<td>Tree-shaking</td>\n<td>❌</td>\n<td>✅</td>\n</tr>\n<tr>\n<td>Рекомендація</td>\n<td>Legacy-проекти</td>\n<td>Нові проекти</td>\n</tr>\n</tbody></table>\n","<h1>🛠️ Вбудовані модулі: <code>fs</code>, <code>path</code>, <code>process</code></h1>\n<h2>📁 <code>node:fs/promises</code> — асинхронна файлова система</h2>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-keyword\">import</span> { readFile, writeFile, mkdir } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">'node:fs/promises'</span>;\n<span class=\"hljs-keyword\">import</span> { join } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">'node:path'</span>;\n\n<span class=\"hljs-comment\">// Префікс node: явно вказує, що це вбудований модуль (рекомендовано з Node.js 14+)</span>\n<span class=\"hljs-keyword\">const</span> <span class=\"hljs-variable constant_\">DATA_DIR</span> = <span class=\"hljs-title function_\">join</span>(<span class=\"hljs-keyword\">import</span>.<span class=\"hljs-property\">meta</span>.<span class=\"hljs-property\">dirname</span>, <span class=\"hljs-string\">'data'</span>);\n\n<span class=\"hljs-keyword\">async</span> <span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">loadTasks</span>(<span class=\"hljs-params\"></span>) {\n  <span class=\"hljs-keyword\">try</span> {\n    <span class=\"hljs-keyword\">const</span> content = <span class=\"hljs-keyword\">await</span> <span class=\"hljs-title function_\">readFile</span>(<span class=\"hljs-title function_\">join</span>(<span class=\"hljs-variable constant_\">DATA_DIR</span>, <span class=\"hljs-string\">'tasks.json'</span>), <span class=\"hljs-string\">'utf8'</span>);\n    <span class=\"hljs-keyword\">return</span> <span class=\"hljs-title class_\">JSON</span>.<span class=\"hljs-title function_\">parse</span>(content);\n  } <span class=\"hljs-keyword\">catch</span> (error) {\n    <span class=\"hljs-keyword\">if</span> (error.<span class=\"hljs-property\">code</span> === <span class=\"hljs-string\">'ENOENT'</span>) <span class=\"hljs-keyword\">return</span> []; <span class=\"hljs-comment\">// файл не існує — повертаємо порожній масив</span>\n    <span class=\"hljs-keyword\">throw</span> error;\n  }\n}\n\n<span class=\"hljs-keyword\">async</span> <span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">saveTasks</span>(<span class=\"hljs-params\">tasks</span>) {\n  <span class=\"hljs-keyword\">await</span> <span class=\"hljs-title function_\">mkdir</span>(<span class=\"hljs-variable constant_\">DATA_DIR</span>, { <span class=\"hljs-attr\">recursive</span>: <span class=\"hljs-literal\">true</span> }); <span class=\"hljs-comment\">// створити директорію, якщо не існує</span>\n  <span class=\"hljs-keyword\">await</span> <span class=\"hljs-title function_\">writeFile</span>(\n    <span class=\"hljs-title function_\">join</span>(<span class=\"hljs-variable constant_\">DATA_DIR</span>, <span class=\"hljs-string\">'tasks.json'</span>),\n    <span class=\"hljs-title class_\">JSON</span>.<span class=\"hljs-title function_\">stringify</span>(tasks, <span class=\"hljs-literal\">null</span>, <span class=\"hljs-number\">2</span>),\n    <span class=\"hljs-string\">'utf8'</span>\n  );\n}</code></pre><h2>⚙️ <code>process</code> — змінні середовища та завершення роботи</h2>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-keyword\">const</span> config = {\n  <span class=\"hljs-attr\">port</span>:    <span class=\"hljs-built_in\">parseInt</span>(process.<span class=\"hljs-property\">env</span>.<span class=\"hljs-property\">PORT</span> ?? <span class=\"hljs-string\">'3000'</span>, <span class=\"hljs-number\">10</span>),\n  <span class=\"hljs-attr\">dbUrl</span>:   process.<span class=\"hljs-property\">env</span>.<span class=\"hljs-property\">DATABASE_URL</span>,\n  <span class=\"hljs-attr\">nodeEnv</span>: process.<span class=\"hljs-property\">env</span>.<span class=\"hljs-property\">NODE_ENV</span> ?? <span class=\"hljs-string\">'development'</span>,\n};\n\n<span class=\"hljs-comment\">// Graceful shutdown — коректне завершення роботи</span>\nprocess.<span class=\"hljs-title function_\">on</span>(<span class=\"hljs-string\">'SIGTERM'</span>, <span class=\"hljs-function\">() =&gt;</span> {\n  <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">'Завершення процесу...'</span>);\n  server.<span class=\"hljs-title function_\">close</span>(<span class=\"hljs-function\">() =&gt;</span> {       <span class=\"hljs-comment\">// close() приймає колбек, а не повертає Promise</span>\n    <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">'Сервер зупинено'</span>);\n    process.<span class=\"hljs-title function_\">exit</span>(<span class=\"hljs-number\">0</span>);\n  });\n});</code></pre><div class=\"warning\"><strong>⚠️ Змінні середовища</strong> <p>Паролі, ключі API, рядки підключення до БД <strong>ніколи</strong> не записують у код. Їх зберігають у файлі <code>.env</code> (локально) або у секретах хмарної платформи. <code>.env</code> обов'язково додається до <code>.gitignore</code>.</p>\n</div>\n\n","<h1>🌐 HTTP-сервер з поверненням JSON</h1>\n<div class=\"info\"><strong>ℹ️ Модуль <code>node:http</code></strong> <p>Вбудований модуль <code>http</code> дозволяє створювати HTTP-сервери без зовнішніх залежностей. Це фундамент, на якому побудовані Express, Fastify та інші фреймворки.</p>\n</div>\n\n\n\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-keyword\">import</span> http <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">'node:http'</span>;\n\n<span class=\"hljs-keyword\">const</span> tasks = [\n  { <span class=\"hljs-attr\">id</span>: <span class=\"hljs-number\">1</span>, <span class=\"hljs-attr\">title</span>: <span class=\"hljs-string\">'Розробити API'</span>, <span class=\"hljs-attr\">status</span>: <span class=\"hljs-string\">'in-progress'</span>, <span class=\"hljs-attr\">priority</span>: <span class=\"hljs-string\">'high'</span> },\n  { <span class=\"hljs-attr\">id</span>: <span class=\"hljs-number\">2</span>, <span class=\"hljs-attr\">title</span>: <span class=\"hljs-string\">'Написати тести'</span>, <span class=\"hljs-attr\">status</span>: <span class=\"hljs-string\">'todo'</span>,        <span class=\"hljs-attr\">priority</span>: <span class=\"hljs-string\">'medium'</span> },\n];\n\n<span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">sendJson</span>(<span class=\"hljs-params\">res, statusCode, data</span>) {\n  res.<span class=\"hljs-title function_\">writeHead</span>(statusCode, { <span class=\"hljs-string\">'Content-Type'</span>: <span class=\"hljs-string\">'application/json; charset=utf-8'</span> });\n  res.<span class=\"hljs-title function_\">end</span>(<span class=\"hljs-title class_\">JSON</span>.<span class=\"hljs-title function_\">stringify</span>(data));\n}\n\n<span class=\"hljs-keyword\">const</span> server = http.<span class=\"hljs-title function_\">createServer</span>(<span class=\"hljs-function\">(<span class=\"hljs-params\">req, res</span>) =&gt;</span> {\n  <span class=\"hljs-keyword\">const</span> { method, url } = req;\n\n  <span class=\"hljs-keyword\">if</span> (method === <span class=\"hljs-string\">'GET'</span> &amp;&amp; url === <span class=\"hljs-string\">'/tasks'</span>) {\n    <span class=\"hljs-keyword\">return</span> <span class=\"hljs-title function_\">sendJson</span>(res, <span class=\"hljs-number\">200</span>, tasks);\n  }\n\n  <span class=\"hljs-keyword\">const</span> match = url.<span class=\"hljs-title function_\">match</span>(<span class=\"hljs-regexp\">/^\\/tasks\\/(\\d+)$/</span>);\n  <span class=\"hljs-keyword\">if</span> (method === <span class=\"hljs-string\">'GET'</span> &amp;&amp; match) {\n    <span class=\"hljs-keyword\">const</span> task = tasks.<span class=\"hljs-title function_\">find</span>(<span class=\"hljs-function\"><span class=\"hljs-params\">t</span> =&gt;</span> t.<span class=\"hljs-property\">id</span> === <span class=\"hljs-built_in\">parseInt</span>(match[<span class=\"hljs-number\">1</span>], <span class=\"hljs-number\">10</span>));\n    <span class=\"hljs-keyword\">return</span> task\n      ? <span class=\"hljs-title function_\">sendJson</span>(res, <span class=\"hljs-number\">200</span>, task)\n      : <span class=\"hljs-title function_\">sendJson</span>(res, <span class=\"hljs-number\">404</span>, { <span class=\"hljs-attr\">error</span>: <span class=\"hljs-string\">'Task not found'</span> });\n  }\n\n  <span class=\"hljs-title function_\">sendJson</span>(res, <span class=\"hljs-number\">404</span>, { <span class=\"hljs-attr\">error</span>: <span class=\"hljs-string\">'Route not found'</span> });\n});\n\nserver.<span class=\"hljs-title function_\">listen</span>(process.<span class=\"hljs-property\">env</span>.<span class=\"hljs-property\">PORT</span> ?? <span class=\"hljs-number\">3000</span>, <span class=\"hljs-function\">() =&gt;</span> {\n  <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">`🚀 Сервер: http://localhost:<span class=\"hljs-subst\">${process.env.PORT ?? <span class=\"hljs-number\">3000</span>}</span>`</span>);\n});</code></pre><div class=\"note\"><strong>📝 Навіщо потрібен Express або Fastify?</strong> <p>Ручна маршрутизація через регулярні вирази стає некерованою вже при 5–10 ендпоінтах. Фреймворки надають декларативний синтаксис маршрутів, middleware, обробку помилок та багато іншого.</p>\n</div>\n\n","<h1>🌐 Читання тіла запиту (POST)</h1>\n<p><strong>Головна ідея:</strong> тіло HTTP-запиту надходить частинами у вигляді <strong>потоку даних</strong> (stream). Його необхідно зібрати повністю перед обробкою.</p>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// Утиліта для читання тіла запиту як потоку</span>\n<span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">readRequestBody</span>(<span class=\"hljs-params\">req</span>) {\n  <span class=\"hljs-keyword\">return</span> <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Promise</span>(<span class=\"hljs-function\">(<span class=\"hljs-params\">resolve, reject</span>) =&gt;</span> {\n    <span class=\"hljs-keyword\">const</span> chunks = [];\n    req.<span class=\"hljs-title function_\">on</span>(<span class=\"hljs-string\">'data'</span>,  <span class=\"hljs-function\"><span class=\"hljs-params\">chunk</span> =&gt;</span> chunks.<span class=\"hljs-title function_\">push</span>(chunk));\n    req.<span class=\"hljs-title function_\">on</span>(<span class=\"hljs-string\">'end'</span>,   <span class=\"hljs-function\">()    =&gt;</span> <span class=\"hljs-title function_\">resolve</span>(<span class=\"hljs-title class_\">Buffer</span>.<span class=\"hljs-title function_\">concat</span>(chunks).<span class=\"hljs-title function_\">toString</span>(<span class=\"hljs-string\">'utf8'</span>)));\n    req.<span class=\"hljs-title function_\">on</span>(<span class=\"hljs-string\">'error'</span>, reject);\n  });\n}\n\n<span class=\"hljs-comment\">// Обробник POST /tasks</span>\n<span class=\"hljs-keyword\">const</span> server = http.<span class=\"hljs-title function_\">createServer</span>(<span class=\"hljs-keyword\">async</span> (req, res) =&gt; {\n  <span class=\"hljs-keyword\">if</span> (req.<span class=\"hljs-property\">method</span> === <span class=\"hljs-string\">'POST'</span> &amp;&amp; req.<span class=\"hljs-property\">url</span> === <span class=\"hljs-string\">'/tasks'</span>) {\n    <span class=\"hljs-keyword\">try</span> {\n      <span class=\"hljs-keyword\">const</span> body = <span class=\"hljs-keyword\">await</span> <span class=\"hljs-title function_\">readRequestBody</span>(req);\n      <span class=\"hljs-keyword\">const</span> { title, priority = <span class=\"hljs-string\">'medium'</span> } = <span class=\"hljs-title class_\">JSON</span>.<span class=\"hljs-title function_\">parse</span>(body);\n\n      <span class=\"hljs-keyword\">if</span> (!title?.<span class=\"hljs-title function_\">trim</span>()) {\n        <span class=\"hljs-keyword\">return</span> <span class=\"hljs-title function_\">sendJson</span>(res, <span class=\"hljs-number\">400</span>, { <span class=\"hljs-attr\">error</span>: <span class=\"hljs-string\">'Field \"title\" is required'</span> });\n      }\n\n      <span class=\"hljs-keyword\">const</span> newTask = {\n        <span class=\"hljs-attr\">id</span>: <span class=\"hljs-title class_\">Date</span>.<span class=\"hljs-title function_\">now</span>(),\n        <span class=\"hljs-attr\">title</span>: title.<span class=\"hljs-title function_\">trim</span>(),\n        priority,\n        <span class=\"hljs-attr\">status</span>: <span class=\"hljs-string\">'todo'</span>,\n        <span class=\"hljs-attr\">createdAt</span>: <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Date</span>().<span class=\"hljs-title function_\">toISOString</span>(),\n      };\n      tasks.<span class=\"hljs-title function_\">push</span>(newTask);\n      <span class=\"hljs-keyword\">return</span> <span class=\"hljs-title function_\">sendJson</span>(res, <span class=\"hljs-number\">201</span>, newTask);\n\n    } <span class=\"hljs-keyword\">catch</span> {\n      <span class=\"hljs-keyword\">return</span> <span class=\"hljs-title function_\">sendJson</span>(res, <span class=\"hljs-number\">400</span>, { <span class=\"hljs-attr\">error</span>: <span class=\"hljs-string\">'Invalid JSON body'</span> });\n    }\n  }\n});</code></pre><div class=\"tip\"><strong>💡 <code>async/await</code> в обробниках</strong> <p>Node.js підтримує <code>async</code> у колбеках <code>createServer</code>. Проте відхилені проміси без <code>try/catch</code> можуть звалити весь процес — завжди обробляй помилки явно.</p>\n</div>\n\n","<h1>✅ Ключові висновки</h1>\n<div class=\"success\"><strong>✅ Що ми вивчили</strong> <p><strong>Node.js</strong> — середовище виконання JavaScript на основі V8, що забезпечує роботу поза браузером. Завдяки <strong>Event Loop</strong> та неблокуючому I/O через <strong>libuv</strong>, один потік ефективно обслуговує тисячі одночасних підключень.</p>\n<p><strong>nvm</strong> дозволяє керувати версіями Node.js: встановлювати, перемикати та фіксувати версію для проекту через <code>.nvmrc</code>. Для виробничих застосунків — виключно LTS-версії (зараз Node.js 24).</p>\n<p><strong>npm</strong> — менеджер пакетів з реєстром 2,5+ млн пакетів. <code>package.json</code> фіксує залежності та скрипти. <code>node_modules</code> — поза git, відновлюється через <code>npm install</code>.</p>\n<p><strong>CommonJS</strong> (<code>require</code>) — legacy-система Node.js. <strong>ES Modules</strong> (<code>import/export</code>) — сучасний стандарт, рекомендований для нових проектів; вмикається через <code>\"type\": \"module\"</code> у <code>package.json</code>.</p>\n<p>Вбудовані модулі з префіксом <code>node:</code> (<code>node:fs/promises</code>, <code>node:path</code>, <code>node:http</code>) покривають базові потреби серверної розробки. Для реальних проектів — фреймворки (Express, Fastify, Nest.js).</p>\n</div>\n\n","<h1>❓ Контрольні питання</h1>\n<ol>\n<li>🤔 Що таке Node.js і яка принципова відмінність між браузерним і Node.js-середовищем виконання JavaScript?</li>\n<li>🔄 Поясніть роботу Event Loop: як Node.js обробляє I/O-операції в одному потоці та в якому порядку виконуються мікро- і макротаски?</li>\n<li>⚠️ Що відбудеться з сервером, якщо в обробнику запиту виконати важке синхронне обчислення?</li>\n<li>🔧 Навіщо використовувати <code>nvm</code> замість прямого встановлення Node.js? Що таке <code>.nvmrc</code> і яка його роль у командній розробці?</li>\n<li>📦 Яка різниця між <code>dependencies</code> та <code>devDependencies</code> у <code>package.json</code>? Наведіть приклади обох категорій.</li>\n<li>🗂️ Чим відрізняються CommonJS та ES Modules за механізмом завантаження, можливостями та рекомендованим застосуванням?</li>\n<li>🌐 Чому тіло HTTP-запиту в Node.js читається асинхронно через події <code>data</code> та <code>end</code>, а не одразу як єдиний об'єкт?</li>\n</ol>\n","<h1>📖 Глосарій термінів</h1>\n<table>\n<thead>\n<tr>\n<th>Термін</th>\n<th>Визначення</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><strong>Node.js</strong></td>\n<td>Крос-платформне середовище виконання JavaScript на основі V8, незалежне від браузера</td>\n</tr>\n<tr>\n<td><strong>Event Loop</strong></td>\n<td>Механізм безперервної обробки черги асинхронних подій в одному потоці виконання</td>\n</tr>\n<tr>\n<td><strong>libuv</strong></td>\n<td>Бібліотека C++, що реалізує асинхронне I/O та пул потоків для Node.js</td>\n</tr>\n<tr>\n<td><strong>Мікротаск</strong></td>\n<td>Завдання з найвищим пріоритетом у Event Loop (Promise, <code>queueMicrotask</code>); виконується до макротасків</td>\n</tr>\n<tr>\n<td><strong>Макротаск</strong></td>\n<td>Завдання у черзі Event Loop (setTimeout, setInterval, I/O-колбеки)</td>\n</tr>\n<tr>\n<td><strong>Модуль</strong></td>\n<td>Файл з ізольованою областю видимості; публічний інтерфейс визначається через <code>export</code></td>\n</tr>\n<tr>\n<td><strong>Залежність</strong></td>\n<td>Зовнішній пакет, необхідний для роботи застосунку (<code>dependencies</code>) або розробки (<code>devDependencies</code>)</td>\n</tr>\n<tr>\n<td><strong>Stream (потік)</strong></td>\n<td>Послідовність даних, що передається частинами, без необхідності завантажувати все в пам'ять</td>\n</tr>\n<tr>\n<td><strong>Graceful shutdown</strong></td>\n<td>Коректне завершення роботи сервера з очікуванням завершення активних запитів перед виходом</td>\n</tr>\n<tr>\n<td><strong>Серіалізація</strong></td>\n<td>Перетворення структури даних у формат для передачі (наприклад, JavaScript-об'єкт → JSON-рядок)</td>\n</tr>\n</tbody></table>\n","<h1>🔤 Глосарій абревіатур</h1>\n<table>\n<thead>\n<tr>\n<th>Абревіатура</th>\n<th>Розшифрування</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><strong>npm</strong></td>\n<td>Node Package Manager / Менеджер пакетів Node.js</td>\n</tr>\n<tr>\n<td><strong>nvm</strong></td>\n<td>Node Version Manager / Менеджер версій Node.js</td>\n</tr>\n<tr>\n<td><strong>LTS</strong></td>\n<td>Long-Term Support / Версія з тривалою підтримкою</td>\n</tr>\n<tr>\n<td><strong>REPL</strong></td>\n<td>Read-Eval-Print Loop / Інтерактивна консоль виконання коду</td>\n</tr>\n<tr>\n<td><strong>I/O</strong></td>\n<td>Input/Output / Введення та виведення даних</td>\n</tr>\n<tr>\n<td><strong>ESM</strong></td>\n<td>ECMAScript Modules / Стандартна модульна система JavaScript</td>\n</tr>\n<tr>\n<td><strong>CJS</strong></td>\n<td>CommonJS / Модульна система, розроблена для Node.js</td>\n</tr>\n<tr>\n<td><strong>JIT</strong></td>\n<td>Just-In-Time / Компіляція коду безпосередньо під час виконання</td>\n</tr>\n<tr>\n<td><strong>JSON</strong></td>\n<td>JavaScript Object Notation / Текстовий формат обміну даних</td>\n</tr>\n<tr>\n<td><strong>API</strong></td>\n<td>Application Programming Interface / Інтерфейс програмування застосунків</td>\n</tr>\n<tr>\n<td><strong>HTTP</strong></td>\n<td>HyperText Transfer Protocol / Протокол передачі гіпертексту</td>\n</tr>\n<tr>\n<td><strong>EOL</strong></td>\n<td>End of Life / Завершення підтримки версії</td>\n</tr>\n<tr>\n<td><strong>CLI</strong></td>\n<td>Command Line Interface / Інтерфейс командного рядка</td>\n</tr>\n</tbody></table>\n"];let currentSlideIndex=0;
function renderMath(root){if(typeof renderMathInElement!=="function"||!root)return;try{renderMathInElement(root,{delimiters:[{left:"$$",right:"$$",display:true},{left:"\\[",right:"\\]",display:true},{left:"$",right:"$",display:false},{left:"\\(",right:"\\)",display:false}],throwOnError:false,strict:"ignore",ignoredTags:["script","noscript","style","textarea","pre","code"]});}catch(e){console.warn("Math render error:",e);}}
function showSlide(i){if(i<0||i>=slides.length)return;currentSlideIndex=i;const el=document.getElementById("current-slide");el.innerHTML=slides[i];el.scrollTop=0;renderMath(el);document.getElementById("progress-bar").style.width=((i+1)/slides.length*100)+"%";document.getElementById("slide-number").textContent=(i+1)+" / "+slides.length;updateSidebarActive();}
function nextSlide(){if(currentSlideIndex<slides.length-1)showSlide(currentSlideIndex+1);}
function previousSlide(){if(currentSlideIndex>0)showSlide(currentSlideIndex-1);}
function toggleSidebar(){document.getElementById("sidebar").classList.toggle("open");}
function toggleHelp(){document.getElementById("help-overlay").classList.toggle("hidden");}
function toggleFullscreen(){if(!document.fullscreenElement){const pc=document.getElementById("presentation-container");if(pc.requestFullscreen)pc.requestFullscreen();else if(pc.webkitRequestFullscreen)pc.webkitRequestFullscreen();else if(pc.msRequestFullscreen)pc.msRequestFullscreen();else if(pc.mozRequestFullScreen)pc.mozRequestFullScreen();}else{if(document.exitFullscreen)document.exitFullscreen();else if(document.webkitExitFullscreen)document.webkitExitFullscreen();else if(document.msExitFullscreen)document.msExitFullscreen();else if(document.mozCancelFullScreen)document.mozCancelFullScreen();}}
function generateSidebar(){const sc=document.getElementById("sidebar-content");sc.innerHTML="";slides.forEach((html,idx)=>{const t=document.createElement("div");t.className="slide-thumbnail";if(idx===0)t.classList.add("active");const tmp=document.createElement("div");tmp.innerHTML=html;const title=tmp.querySelector("h1,h2");const titleText=title?title.textContent:("Слайд "+(idx+1));const textContent=tmp.textContent.replace(/s+/g," ").trim();const preview=textContent.substring(0,100)+(textContent.length>100?"...":"");t.innerHTML="<div class=\"slide-thumbnail-number\">"+(idx+1)+"</div><div class=\"slide-thumbnail-title\">"+titleText+"</div><div class=\"slide-thumbnail-content\">"+preview+"</div>";t.onclick=()=>{showSlide(idx);if(window.innerWidth<1024)toggleSidebar();};sc.appendChild(t);});}
function updateSidebarActive(){document.querySelectorAll(".slide-thumbnail").forEach((th,idx)=>{if(idx===currentSlideIndex){th.classList.add("active");th.scrollIntoView({behavior:"smooth",block:"nearest"});}else th.classList.remove("active");});}
document.addEventListener("keydown",e=>{switch(e.key){case"ArrowLeft":previousSlide();break;case"ArrowRight":case" ":e.preventDefault();nextSlide();break;case"f":case"F":toggleFullscreen();break;case"s":case"S":toggleSidebar();break;case"?":toggleHelp();break;case"Escape":const sb=document.getElementById("sidebar");const ho=document.getElementById("help-overlay");if(sb.classList.contains("open"))toggleSidebar();else if(!ho.classList.contains("hidden"))ho.classList.add("hidden");break;}});
generateSidebar();showSlide(0);</script></body></html>
