            margin: 0;

        .btn-primary {
            background: #667eea;
            color: white;

            background: #5568d3;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #4a5568;
            color: white;
        }

        .btn-secondary:hover {
            background: #2d3748;

            resize: none;
        }

        #markdown-input:focus {
            outline: none;
        }

        .slide-container {

            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1000px;
        }

        .slide {
            background: white;

            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);

            padding: 3rem;
            position: relative;

        @keyframes slideIn {

            to {
                opacity: 1;

        .slide::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        .slide::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }

        .slide h1 {
            color: #667eea;
            font-size: 2.5rem;

            border-bottom: 3px solid #667eea;

        }

        }

            margin-bottom: 1rem;
        }

        .slide li {
            color: #2d3748;
            font-size: 1.1rem;
            line-height: 1.8;

        }

        .slide pre {

        .slide pre code {

        .slide code {

        .slide h1 code, .slide h2 code, .slide h3 code {

            margin: 1.5rem 0;
        }

        .slide th {
            background: #667eea;
            color: white;

        .slide tr:nth-child(even) {

        }

        .warning {
            background: #fffaf0;
            border-left: 4px solid #f6ad55;
            padding: 1rem;
            margin: 1.5rem 0;

        .warning strong {

            margin: 1.5rem 0;
            border-radius: 5px;

        }

        .success {
            background: #f0fff4;
            border-left: 4px solid #48bb78;
            padding: 1rem;
            margin: 1.5rem 0;
            border-radius: 5px;
        }

        .success strong {
            color: #22543d;
        }

        .danger {
            background: #fff5f5;

            padding: 1rem;
            margin: 1.5rem 0;
            border-radius: 5px;

            color: #742a2a;
        }

            margin: 1.5rem 0;

            color: #744210;

            align-items: center;

            border-radius: 3px;

            border-radius: 8px;

            max-height: 4.2rem;

        .slide-thumbnail.active .slide-thumbnail-content::after {

        }

        .slide-thumbnail-title {
            font-weight: 600;
            color: #667eea;
            margin-bottom: 0.25rem;
        }

#presentation-container:fullscreen,#presentation-container:-webkit-full-screen,#presentation-container:-moz-full-screen,#presentation-container:-ms-fullscreen{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%)!important;}</style></head><body><div id="presentation-container"><div class="progress"><div class="progress-bar" id="progress-bar"></div></div><button id="sidebar-toggle" onclick="toggleSidebar()" title="Навігація слайдами (S)">☰</button><div id="sidebar"><div id="sidebar-header"><h3>📑 Слайди</h3><button id="sidebar-close" onclick="toggleSidebar()">✕</button></div><div id="sidebar-content"></div></div><div class="slide-container"><div class="slide" id="current-slide"></div></div><div class="controls"><button class="control-btn" onclick="previousSlide()" title="Попередній (←)">←</button><button class="control-btn" onclick="nextSlide()" title="Наступний (→)">→</button><button class="control-btn" onclick="toggleFullscreen()" title="Повноекранний режим (F)">⛶</button><button class="control-btn" onclick="toggleHelp()" title="Допомога (?)">?</button></div><div class="slide-number" id="slide-number">1 / 20</div><div id="help-overlay" class="hidden"><strong>Гарячі клавіші:</strong><br><kbd>←</kbd> <kbd>→</kbd> Навігація<br><kbd>F</kbd> Повноекранний режим<br><kbd>S</kbd> Sidebar<br><kbd>?</kbd> Допомога<br><kbd>Esc</kbd> Закрити</div></div><script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script><script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script><script>const slides=["<h1>Аутентифікація: основи</h1>\n<p><strong>Сучасні технології Internet-програмування</strong></p>\n<p>Лектор: Кобилянський Антон</p>\n","<h1>📋 План лекції</h1>\n<ol>\n<li>🔐 Аутентифікація vs Авторизація</li>\n<li>🔑 Способи аутентифікації у веб-застосунках</li>\n<li>🧂 Хешування паролів: bcrypt та argon2</li>\n<li>🎫 JWT: структура та принцип роботи</li>\n<li>🛂 Passport.js та архітектура auth-модуля</li>\n<li>🏗️ Реалізація Au lay: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>Без стану</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1777481891912-3-0-flowchart-AS-13\" data-look=\"classic\" transform=\"translate(523.0234375, 274)\"><rect class=\"basic label-container\" style=\"\" x=\"-89.125\" y=\"-24\" width=\"178.25\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-65.125, -12)\"><rect></rect><foreignObject width=\"130.25\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>Машина-машина</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1777481891912-3-0-flowchart-OS-15\" data-look=\"classic\" transform=\"translate(748.4375, 274)\"><rect class=\"basic label-container\" style=\"\" x=\"-86.2890625\" y=\"-24\" width=\"172.578125\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-62.2890625, -12)\"><rect></rect><foreignObject width=\"124.578125\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>Google, GitHub...</p></span></div></foreignObject></g></g></g></g></g><defs><filter id=\"exp-1777481891912-3-0-drop-shadow\" height=\"130%\" width=\"130%\"><feDropShadow dx=\"4\" dy=\"4\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs><defs><filter id=\"exp-1777481891912-3-0-drop-shadow-small\" height=\"150%\" width=\"150%\"><feDropShadow dx=\"2\" dy=\"2\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs></svg></div>\n<h2>📊 Session vs Token</h2>\n<table>\n<thead>\n<tr>\n<th>Критерій</th>\n<th>Session-based</th>\n<th>Token-based (JWT)</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Зберігання стану</td>\n<td>На сервері (БД, Redis)</td>\n<td>На клієнті</td>\n</tr>\n<tr>\n<td>Що передає клієнт</td>\n<td>sessionId у cookie</td>\n<td>JWT у заголовку Authorization</td>\n</tr>\n<tr>\n<td>Масштабованість</td>\n<td>Складніше</td>\n<td>Легка (stateless)</td>\n</tr>\n<tr>\n<td>Підходить для SPA та API</td>\n<td>Менш зручно</td>\n<td>Так — основний вибір</td>\n</tr>\n</tbody></table>\n","<h1>🧂 Чому паролі не можна зберігати у відкритому вигляді</h1>\n<div class=\"danger\"><strong>🚫 Критична помилка</strong> <p>Збереження паролів у вигляді звичайного тексту в базі даних — одна з найгрубіших помилок безпеки. Якщо база буде скомпрометована, усі акаунти користувачів стануть доступні зловмиснику.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> сервер ніколи не повинен мати можливість дізнатися пароль користувача. Він повинен мати лише можливість <em>перевірити</em> правильність наданого пароля.</p>\n<h2>⚠️ Хешування ≠ Шифрування</h2>\n<table>\n<thead>\n<tr>\n<th>Характеристика</th>\n<th>Шифрування</th>\n<th>Хешування</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Зворотність</td>\n<td>Так (є ключ дешифрування)</td>\n<td>Ні (одностороннє)</td>\n</tr>\n<tr>\n<td>Призначення</td>\n<td>Передача даних</td>\n<td>Перевірка ідентичності</td>\n</tr>\n<tr>\n<td>Підхід для паролів</td>\n<td>Неправильний</td>\n<td>Правильний</td>\n</tr>\n</tbody></table>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>Хеш-функція</strong> (Hash function) — математична функція, що перетворює дані будь-якої довжини на рядок фіксованої довжини. Зворотне відновлення вхідних даних з хешу обчислювально неможливе.</p>\n</div>\n\n\n\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// ❌ КРИТИЧНА ПОМИЛКА</span>\n<span class=\"hljs-keyword\">const</span> user = { <span class=\"hljs-attr\">email</span>: <span class=\"hljs-string\">\"user@example.com\"</span>, <span class=\"hljs-attr\">password</span>: <span class=\"hljs-string\">\"mySecret123\"</span> };\n<span class=\"hljs-keyword\">await</span> userRepository.<span class=\"hljs-title function_\">save</span>(user);</code></pre>","<h1>🧂 Сіль: навіщо вона потрібна</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>Сіль</strong> (Salt) — випадковий унікальний рядок, що додається до пароля перед хешуванням. Кожен користувач отримує власну сіль, яка зберігається разом з хешем у базі даних.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> сіль робить хеш кожного користувача унікальним навіть тоді, коли двоє користувачів обрали однаковий пароль.</p>\n<h2>🔧 Як використовується сіль</h2>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// При реєстрації:</span>\n<span class=\"hljs-comment\">// 1. Генеруємо випадкову сіль для користувача</span>\n<span class=\"hljs-keyword\">const</span> salt = <span class=\"hljs-title function_\">generateRandomSalt</span>(); <span class=\"hljs-comment\">// 'x7Kp9aQ2mN'</span>\n\n<span class=\"hljs-comment\">// 2. Об'єднуємо пароль із сіллю та хешуємо</span>\n<span class=\"hljs-keyword\">const</span> hash = <span class=\"hljs-title function_\">hashFunction</span>(<span class=\"hljs-string\">\"password123\"</span> + salt);\n\n<span class=\"hljs-comment\">// 3. Зберігаємо в базу і хеш, і сіль</span>\ndb.<span class=\"hljs-title function_\">save</span>({ email, hash, salt });\n\n<span class=\"hljs-comment\">// При логіні:</span>\n<span class=\"hljs-comment\">// 1. Знаходимо користувача та беремо його сіль з бази</span>\n<span class=\"hljs-comment\">// 2. Хешуємо введений пароль з тією самою сіллю</span>\n<span class=\"hljs-comment\">// 3. Порівнюємо результат із збереженим хешем</span></code></pre><h2>📊 Без солі vs З сіллю</h2>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// ❌ БЕЗ солі: однакові паролі → однакові хеші</span>\n<span class=\"hljs-title function_\">hash</span>(<span class=\"hljs-string\">\"password123\"</span>); <span class=\"hljs-comment\">// 'a1b2c3d4...'</span>\n<span class=\"hljs-title function_\">hash</span>(<span class=\"hljs-string\">\"password123\"</span>); <span class=\"hljs-comment\">// 'a1b2c3d4...' — той самий!</span>\n\n<span class=\"hljs-comment\">// ✅ З сіллю: однакові паролі → різні хеші</span>\n<span class=\"hljs-title function_\">hash</span>(<span class=\"hljs-string\">\"password123\"</span> + <span class=\"hljs-string\">\"salt_user_A\"</span>); <span class=\"hljs-comment\">// 'e5f6g7h8...'</span>\n<span class=\"hljs-title function_\">hash</span>(<span class=\"hljs-string\">\"password123\"</span> + <span class=\"hljs-string\">\"salt_user_B\"</span>); <span class=\"hljs-comment\">// 'z9y8x7w6...' — різний!</span></code></pre><div class=\"note\"><strong>📝 Це спрощена ілюстрація</strong> <p>Реальні алгоритми (bcrypt, argon2) не просто конкатенують пароль із сіллю — вони використовують її як параметр складнішої функції. Але ідея однакова: однаковий пароль з різною сіллю дає різний результат.</p>\n</div>\n\n","<h1>🌈 Rainbow Tables: атака, від якої захищає сіль</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>Rainbow table</strong> (райдужна таблиця) — заздалегідь обчислена база даних з мільярдами пар \"пароль → його хеш\". Дозволяє зловмиснику миттєво знайти пароль за відомим хешем без перебору.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> без солі зловмисник може зламати тисячі акаунтів за секунди, просто шукаючи хеші у готовій таблиці.</p>\n<h2>🔍 Як працює атака без солі</h2>\n<pre><code class=\"language-plaintext hljs\" data-highlighted=\"yes\">1. Зловмисник заздалегідь готує таблицю:\n   ┌────────────────┬──────────────────────┐\n   │ Пароль         │ Хеш                  │\n   ├────────────────┼──────────────────────┤\n   │ 123456         │ e10adc3949ba59...    │\n   │ password       │ 5f4dcc3b5aa765...    │\n   │ qwerty         │ d8578edf8458ce...    │\n   │ ...            │ ...                  │\n   └────────────────┴──────────────────────┘\n\n2. Здобуває витік бази з хешами\n3. Шукає кожен хеш у таблиці → миттєво знає пароль</code></pre><h2>🛡️ Чому сіль все ламає</h2>\n<p>З сіллю зловмиснику довелось би будувати окрему rainbow table <em>для кожного користувача</em> — це обчислювально неможливо. Готові таблиці з інтернету стають марними.</p>\n<div class=\"warning\"><strong>⚠️ Сіль не є секретом</strong> <p>Сіль зберігається відкрито разом з хешем — це нормально. Її роль не в тому, щоб її приховати, а в тому, щоб зробити хеш кожного користувача унікальним.</p>\n</div>\n\n","<h1>🧂 bcrypt: алгоритм хешування паролів</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>bcrypt</strong> — алгоритм хешування паролів з вбудованою підтримкою солі та налаштовуваним фактором складності (cost factor). Навмисно повільний, що робить атаки повним перебором економічно недоцільними.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> bcrypt автоматично генерує сіль, вбудовує її у вихідний хеш та сам використовує її при перевірці. Розробнику не потрібно зберігати сіль окремо.</p>\n<h2>💻 Використання</h2>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-keyword\">import</span> * <span class=\"hljs-keyword\">as</span> bcrypt <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"bcrypt\"</span>;\n\n<span class=\"hljs-keyword\">const</span> <span class=\"hljs-variable constant_\">SALT_ROUNDS</span> = <span class=\"hljs-number\">10</span>;\n\n<span class=\"hljs-comment\">// Хешування при реєстрації — сіль генерується автоматично</span>\n<span class=\"hljs-keyword\">const</span> hashedPassword = <span class=\"hljs-keyword\">await</span> bcrypt.<span class=\"hljs-title function_\">hash</span>(<span class=\"hljs-string\">\"mySecret123\"</span>, <span class=\"hljs-variable constant_\">SALT_ROUNDS</span>);\n<span class=\"hljs-comment\">// '$2b$10$N9qo8uLOickgx2ZMRZoMye...'</span>\n\n<span class=\"hljs-comment\">// Перевірка при логіні — сіль витягується з хешу автоматично</span>\n<span class=\"hljs-keyword\">const</span> isMatch = <span class=\"hljs-keyword\">await</span> bcrypt.<span class=\"hljs-title function_\">compare</span>(<span class=\"hljs-string\">\"mySecret123\"</span>, hashedPassword);\n<span class=\"hljs-comment\">// true або false</span></code></pre><h2>🔍 Структура хешу bcrypt</h2>\n<pre><code class=\"language-plaintext hljs\" data-highlighted=\"yes\">$2b$10$N9qo8uLOickgx2ZMRZoMyeIjZAgcfl7p92ldGxad68LJZdL17lhWy\n │   │  │                      │\n │   │  │                      └── Хеш (31 символ)\n │   │  └── Сіль (22 символи)\n │   └── Cost factor (2^10 ітерацій)\n └── Версія алгоритму</code></pre><div class=\"note\"><strong>📝 Що таке salt rounds</strong> <p>Параметр <code>SALT_ROUNDS</code> визначає, скільки разів буде застосовано алгоритм. Кожне збільшення на 1 подвоює час обчислення. Значення 10–12 — золота середина між безпекою та продуктивністю.</p>\n</div>\n\n\n\n\n\n<div class=\"tip\"><strong>💡 argon2 — сучасна альтернатива</strong> <p><strong>argon2</strong> (2015) — переможець конкурсу Password Hashing Competition та рекомендація OWASP для нових проєктів. На відміну від bcrypt, він налаштовує не лише час, а й споживання пам'яті, що робить його стійкішим до атак на спеціалізованому обладнанні (GPU). Обидва алгоритми вважаються безпечними у навчальних проєктах.</p>\n</div>\n\n","<h1>🎫 JWT: загальне знайомство</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>JWT</strong> (JSON Web Token) — відкритий стандарт RFC 7519 для передачі інформації між сторонами у вигляді компактного, самодостатнього JSON-об'єкта, підписаного криптографічним підписом.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> JWT — це підписаний контейнер з даними. Сервер може довіряти його вмісту, бо підпис гарантує, що токен не був змінений.</p>\n<h2>🔄 Як працює JWT-аутентифікація</h2>\n\n<div class=\"mermaid\" data-source=\"sequenceDiagram\n    participant C as 👤 Клієнт\n    participant S as 🖥️ Сервер\n    participant DB as 🗄️ База\n    C-&gt;&gt;S: POST /auth/login (email, password)\n    S-&gt;&gt;DB: Знайти користувача\n    DB--&gt;&gt;S: Користувач + хеш пароля\n    S-&gt;&gt;S: bcrypt.compare(password, hash)\n    S-&gt;&gt;S: Згенерувати JWT\n    S--&gt;&gt;C: { access_token: &quot;eyJ...&quot; }\n    Note over C,S: Наступні запити\n    C-&gt;&gt;S: GET /tasks&lt;br/&gt;Authorization: Bearer eyJ...\n    S-&gt;&gt;S: Перевірити підпис JWT\n    S--&gt;&gt;C: Дані користувача\"><svg id=\"exp-1777481891936-8-0\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" style=\"max-width: 834px;\" viewBox=\"-50 -10 834 760\" role=\"graphics-document document\" aria-roledescription=\"sequence\"><g><rect x=\"584\" y=\"674\" fill=\"#eaeaea\" stroke=\"#666\" width=\"150\" height=\"65\" name=\"DB\" rx=\"3\" ry=\"3\" class=\"actor actor-bottom\"></rect><text x=\"659\" y=\"706.5\" dominant-baseline=\"central\" alignment-baseline=\"central\" class=\"actor actor-box\" style=\"text-anchor: middle; font-size: 16px; font-weight: 400;\"><tspan x=\"659\" dy=\"0\">🗄️ База</tspan></text></g><g><rect x=\"322\" y=\"674\" fill=\"#eaeaea\" stroke=\"#666\" width=\"150\" height=\"65\" name=\"S\" rx=\"3\" ry=\"3\" class=\"actor actor-bottom\"></rect><text x=\"397\" y=\"706.5\" dominant-baseline=\"central\" alignment-baseline=\"central\" class=\"actor actor-box\" style=\"text-anchor: middle; font-size: 16px; font-weight: 400;\"><tspan x=\"397\" dy=\"0\">🖥️ Сервер</tspan></text></g><g><rect x=\"0\" y=\"674\" fill=\"#eaeaea\" stroke=\"#666\" width=\"150\" height=\"65\" name=\"C\" rx=\"3\" ry=\"3\" class=\"actor actor-bottom\"></rect><text x=\"75\" y=\"706.5\" dominant-baseline=\"central\" alignment-baseline=\"central\" class=\"actor actor-box\" style=\"text-anchor: middle; font-size: 16px; font-weight: 400;\"><tspan x=\"75\" dy=\"0\">👤 Клієнт</tspan></text></g><g><line id=\"actor2\" x1=\"659\" y1=\"65\" x2=\"659\" y2=\"674 \"</span> + <span class=\"hljs-title function_\">base64UrlEncode</span>(payload),\n  secretKey\n)</code></pre>","<h1>🔍 Payload, claims та цілісність</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>Claim</strong> (твердження) — пара \"ключ-значення\" всередині payload, що описує певний факт про користувача чи токен.</p>\n</div>\n\n\n\n<h2>📋 Стандартні claims</h2>\n<table>\n<thead>\n<tr>\n<th>Claim</th>\n<th>Розшифровка</th>\n<th>Призначення</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>sub</code></td>\n<td>Subject</td>\n<td>Ідентифікатор користувача</td>\n</tr>\n<tr>\n<td><code>iat</code></td>\n<td>Issued At</td>\n<td>Час видачі токена (Unix timestamp)</td>\n</tr>\n<tr>\n<td><code>exp</code></td>\n<td>Expiration</td>\n<td>Час закінчення дії токена</td>\n</tr>\n<tr>\n<td><code>iss</code></td>\n<td>Issuer</td>\n<td>Хто видав токен</td>\n</tr>\n</tbody></table>\n<h2>🛡️ Як підпис захищає від підробки</h2>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// 1. Атакуючий змінює payload</span>\n<span class=\"hljs-comment\">// Було:    { \"sub\": \"123\", \"role\": \"user\" }</span>\n<span class=\"hljs-comment\">// Стало:   { \"sub\": \"123\", \"role\": \"admin\" }  ❌ підробка</span>\n\n<span class=\"hljs-comment\">// 2. Сервер при перевірці заново обчислює signature</span>\n<span class=\"hljs-keyword\">const</span> newSig = <span class=\"hljs-title class_\">HMACSHA256</span>(header + <span class=\"hljs-string\">\".\"</span> + modifiedPayload, <span class=\"hljs-variable constant_\">SECRET_KEY</span>);\n\n<span class=\"hljs-comment\">// 3. Новий signature НЕ збігається з тим, що в токені</span>\n<span class=\"hljs-comment\">// → Сервер відхиляє токен</span></code></pre><div class=\"danger\"><strong>🚫 Не зберігайте чутливі дані</strong> <p>Payload <strong>не зашифрований</strong>, лише закодований Base64Url. Будь-хто може прочитати його вміст. Ніколи не кладіть у JWT паролі, повні дані карток, паспортні дані тощо.</p>\n</div>\n\n\n\n\n\n<div class=\"warning\"><strong>⚠️ SECRET_KEY — основа безпеки</strong> <p>Якщо секретний ключ потрапить у руки зловмисника, він зможе видавати валідні токени з будь-яким payload. Зберігайте секрет лише у <code>.env</code>, ніколи не комітьте його у репозиторій.</p>\n</div>\n\n","<h1>⏰ Час життя токенів</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>Access token</strong> — короткоживучий JWT, що використовується для доступу до захищених ресурсів API.</p>\n<p><strong>Refresh token</strong> — довгоживучий токен, що використовується лише для отримання нового access token без повторного введення пароля.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> короткий час життя access token обмежує вікно, протягом якого викрадений токен можна використовувати.</p>\n<h2>📊 Дві стратегії токенів</h2>\n\n<div class=\"mermaid\" data-source=\"graph TD\n    LOGIN[🔑 Логін] --&gt; PAIR[Видача пари токенів]\n    PAIR --&gt; AT[🎫 Access Token&lt;br/&gt;15 хв]\n    PAIR --&gt; RT[🔄 Refresh Token&lt;br/&gt;7 днів]\n    AT --&gt; API[📡 Запити до API]\n    AT -.-&gt;|&quot;Закінчився&quot;| EXPIRED[❌ 401]\n    EXPIRED --&gt; USE_RT[Використати&lt;br/&gt;Refresh Token]\n    USE_RT --&gt; NEW[🆕 Новий Access Token]\n    style LOGIN fill:#e3f2fd,stroke:#1565c0\n    style AT fill:#e8f5e9,stroke:#388e3c\n    style RT fill:#fff3e0,stroke:#ef6c00\n    style NEW fill:#e8f5e9,stroke:#388e3c\"><svg id=\"exp-1777481891972-11-0\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" class=\"flowchart\" style=\"max-width: 510.1015625px;\" viewBox=\"0 0 510.1015625 624\" role=\"graphics-document document\" aria-roledescription=\"flowchart-v2\"><style>#exp-1777481891972-11-0{font-family:system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,Arial,sans-serif;font-size:16px;fill:#333;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#exp-1777481891972-11-0 .edge-animation-slow{stroke-dasharray:9,5!i ad>\n<tr>\n<th>Тип токена</th>\n<th>Типовий час життя</th>\n<th>Куди передається</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Access token</td>\n<td>15 хв – 1 година</td>\n<td>Authorization header</td>\n</tr>\n<tr>\n<td>Refresh token</td>\n<td>7 – 30 днів</td>\n<td>HTTP-only cookie або БД</td>\n</tr>\n</tbody></table>\n<div class=\"tip\"><strong>💡 Простий підхід для навчання</strong> <p>У базових проєктах часто обмежуються лише access token зі строком життя 1–24 години. Це спрощує реалізацію і є прийнятним для навчальних задач.</p>\n</div>\n\n","<h1>🛂 Passport.js та архітектура auth-модуля</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>Passport.js</strong> — найпопулярніший фреймворк аутентифікації для Node.js. Надає єдиний інтерфейс для безлічі способів аутентифікації через систему модулів — <em>стратегій</em>.</p>\n<p><strong>Стратегія</strong> (Strategy) — модуль Passport, що інкапсулює конкретний механізм перевірки ідентичності. Має метод <code>validate</code>, який Passport викликає для перевірки облікових даних.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> Passport не вирішує, <em>як</em> аутентифікувати. Він надає каркас, у який підключаються готові стратегії — JWT, локальна (логін+пароль), OAuth тощо. У Nest.js інтеграція з Passport реалізується через пакет <code>@nestjs/passport</code>.</p>\n<h2>🧩 Архітектура та стратегії</h2>\n\n<div class=\"mermaid\" data-source=\"graph TD\n    APP[🏗️ Застосунок Nest.js] --&gt; PP[🛂 Passport]\n    PP --&gt; ST1[📋 Local Strategy&lt;br/&gt;email + пароль]\n    PP --&gt; ST2[🎫 JWT Strategy&lt;br/&gt;токен з заголовка]\n    PP --&gt; ST3[🌐 Google Strategy&lt;br/&gt;OAuth 2.0]\n    style APP fill:#e3f2fd,stroke:#1565c0\n    style PP fill:#fff9c4,stroke:#f9a825\n    style ST1 fill:#e8f5e9,stroke:#388e3c\n    style ST2 fill:#e8f5e9,stroke:#388e3c\n    style ST3 fill:#fce4ec,stroke:#c2185b\"><svg id=\"exp-1777481891982-12-0\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" class=\"flowchart\" style=\"m !important;stroke:#388e3c !important\" x=\"-91.9296875\" y=\"-36\" width=\"183.859375\" height=\"72\"></rect><g class=\"label\" style=\"\" transform=\"translate(-67.9296875, -24)\"><rect></rect><foreignObject width=\"135.859375\" height=\"48\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>🎫 JWT Strategy<br>токен з заголовка</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1777481891982-12-0-flowchart-ST3-7\" data-look=\"classic\" transform=\"translate(563.359375, 240)\"><rect class=\"basic label-container\" style=\"fill:#fce4ec !important;stroke:#c2185b !important\" x=\"-95\" y=\"-36\" width=\"190\" height=\"72\"></rect><g class=\"label\" style=\"\" transform=\"translate(-71, -24)\"><rect></rect><foreignObject width=\"142\" height=\"48\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>🌐 Google Strategy<br>OAuth 2.0</p></span></div></foreignObject></g></g></g></g></g><defs><filter id=\"exp-1777481891982-12-0-drop-shadow\" height=\"130%\" width=\"130%\"><feDropShadow dx=\"4\" dy=\"4\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs><defs><filter id=\"exp-1777481891982-12-0-drop-shadow-small\" height=\"150%\" width=\"150%\"><feDropShadow dx=\"2\" dy=\"2\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs></svg></div>\n<table>\n<thead>\n<tr>\n<th>Стратегія</th>\n<th>Звідки бере дані</th>\n<th>Що перевіряє</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>local</code></td>\n<td>Тіло запиту (email, password)</td>\n<td>Користувач існує + пароль збігається</td>\n</tr>\n<tr>\n<td><code>jwt</code></td>\n<td>Заголовок <code>Authorization</code></td>\n<td>Підпис JWT валідний + токен не прострочений</td>\n</tr>\n</tbody></table>\n<h2>📦 Необхідні пакети</h2>\n<pre><code class=\"language-bash hljs\" data-highlighted=\"yes\">npm install @nestjs/passport passport @nestjs/jwt passport-jwt passport-local bcrypt\nnpm install -D @types/passport-jwt @types/passport-local @types/bcrypt</code></pre><h2>📁 Типова структура auth-модуля</h2>\n<pre><code class=\"language-plaintext hljs\" data-highlighted=\"yes\">src/\n├── auth/\n│   ├── auth.module.ts          # модуль\n│   ├── auth.controller.ts      # ендпоінти /register, /login\n│   ├── auth.service.ts         # бізнес-логіка\n│   ├── strategies/\n│   │   ├── local.strategy.ts   # стратегія email + пароль\n│   │   └── jwt.strategy.ts     # стратегія перевірки JWT\n│   └── dto/\n└── users/</code></pre><div class=\"tip\"><strong>💡 Розділення відповідальності</strong> <p><code>AuthModule</code> відповідає за процеси входу та видачі токенів. <code>UsersModule</code> — за CRUD-операції з користувачами. <code>AuthService</code> використовує <code>UsersService</code>, але не реалізує логіку зберігання користувачів самостійно.</p>\n</div>\n\n","<h1>💻 AuthService: реєстрація, перевірка пароля та видача JWT</h1>\n<p><strong>Головна ідея:</strong> сервіс реалізує три операції — реєстрацію (з хешуванням пароля), перевірку облікових даних при логіні та видачу JWT. Логіка зберігання користувачів делегується <code>UsersService</code>.</p>\n<h2>📝 Реєстрація та перевірка пароля</h2>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">Injectable</span>, <span class=\"hljs-title class_\">ConflictException</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"@nestjs/common\"</span>;\n<span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">JwtService</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"@nestjs/jwt\"</span>;\n<span class=\"hljs-keyword\">import</span> * <span class=\"hljs-keyword\">as</span> bcrypt <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"bcrypt\"</span>;\n\n<span class=\"hljs-meta\">@Injectable</span>()\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">class</span> <span class=\"hljs-title class_\">AuthService</span> {\n  <span class=\"hljs-title function_\">constructor</span>(<span class=\"hljs-params\">\n    <span class=\"hljs-keyword\">private</span> <span class=\"hljs-keyword\">readonly</span> usersService: UsersService,\n    <span class=\"hljs-keyword\">private</span> <span class=\"hljs-keyword\">readonly</span> jwtService: JwtService,\n  </span>) {}\n\n  <span class=\"hljs-keyword\">async</span> <span class=\"hljs-title function_\">register</span>(<span class=\"hljs-params\">dto: RegisterDto</span>) {\n    <span class=\"hljs-keyword\">const</span> existing = <span class=\"hljs-keyword\">await</span> <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">usersService</span>.<span class=\"hljs-title function_\">findByEmail</span>(dto.<span class=\"hljs-property\">email</span>);\n    <span class=\"hljs-keyword\">if</span> (existing) <span class=\"hljs-keyword\">throw</span> <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">ConflictException</span>(<span class=\"hljs-string\">\"Email вже зареєстровано\"</span>);\n\n    <span class=\"hljs-keyword\">const</span> hashedPassword = <span class=\"hljs-keyword\">await</span> bcrypt.<span class=\"hljs-title function_\">hash</span>(dto.<span class=\"hljs-property\">password</span>, <span class=\"hljs-number\">10</span>);\n    <span class=\"hljs-keyword\">const</span> user = <span class=\"hljs-keyword\">await</span> <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">usersService</span>.<span class=\"hljs-title function_\">create</span>({\n      <span class=\"hljs-attr\">email</span>: dto.<span class=\"hljs-property\">email</span>,\n      <span class=\"hljs-attr\">password</span>: hashedPassword,\n    });\n\n    <span class=\"hljs-keyword\">const</span> { <span class=\"hljs-attr\">password</span>: _, ...result } = user;\n    <span class=\"hljs-keyword\">return</span> result;\n  }\n\n  <span class=\"hljs-keyword\">async</span> <span class=\"hljs-title function_\">validateUser</span>(<span class=\"hljs-params\">email: <span class=\"hljs-built_in\">string</span>, password: <span class=\"hljs-built_in\">string</span></span>) {\n    <span class=\"hljs-keyword\">const</span> user = <span class=\"hljs-keyword\">await</span> <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">usersService</span>.<span class=\"hljs-title function_\">findByEmail</span>(email);\n    <span class=\"hljs-keyword\">if</span> (!user) <span class=\"hljs-keyword\">return</span> <span class=\"hljs-literal\">null</span>;\n\n    <span class=\"hljs-keyword\">const</span> isPasswordValid = <span class=\"hljs-keyword\">await</span> bcrypt.<span class=\"hljs-title function_\">compare</span>(password, user.<span class=\"hljs-property\">password</span>);\n    <span class=\"hljs-keyword\">if</span> (!isPasswordValid) <span class=\"hljs-keyword\">return</span> <span class=\"hljs-literal\">null</span>;\n\n    <span class=\"hljs-keyword\">const</span> { <span class=\"hljs-attr\">password</span>: _, ...result } = user;\n    <span class=\"hljs-keyword\">return</span> result;\n  }\n}</code></pre><h2>📝 Видача JWT</h2>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-keyword\">async</span> <span class=\"hljs-title function_\">login</span>(<span class=\"hljs-params\">user: { id: <span class=\"hljs-built_in\">number</span>; email: <span class=\"hljs-built_in\">string</span> }</span>) {\n  <span class=\"hljs-keyword\">const</span> payload = { <span class=\"hljs-attr\">sub</span>: user.<span class=\"hljs-property\">id</span>, <span class=\"hljs-attr\">email</span>: user.<span class=\"hljs-property\">email</span> };\n  <span class=\"hljs-keyword\">return</span> {\n    <span class=\"hljs-attr\">access_token</span>: <span class=\"hljs-keyword\">await</span> <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">jwtService</span>.<span class=\"hljs-title function_\">signAsync</span>(payload),\n  };\n}</code></pre><div class=\"warning\"><strong>⚠️ Однакова відповідь при помилках</strong> <p><code>validateUser</code> повертає <code>null</code> і коли користувача не знайдено, і коли пароль невірний. Контролер повертає ту саму помилку в обох випадках, щоб не дозволити зловмиснику дізнатися, які email-и зареєстровані у системі.</p>\n</div>\n\n","<h1>💻 Стратегії: Local та JWT</h1>\n<p><strong>Головна ідея:</strong> обидві стратегії визначають метод <code>validate</code>, який Passport викликає автоматично після первинного розбору запиту.</p>\n<h2>📝 Local Strategy</h2>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">Strategy</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"passport-local\"</span>;\n<span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">PassportStrategy</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"@nestjs/passport\"</span>;\n<span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">Injectable</span>, <span class=\"hljs-title class_\">UnauthorizedException</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"@nestjs/common\"</span>;\n\n<span class=\"hljs-meta\">@Injectable</span>()\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">class</span> <span class=\"hljs-title class_\">LocalStrategy</span> <span class=\"hljs-keyword\">extends</span> <span class=\"hljs-title class_ inherited__\">PassportStrategy</span>(<span class=\"hljs-title class_\">Strategy</span>) {\n  <span class=\"hljs-title function_\">constructor</span>(<span class=\"hljs-params\"><span class=\"hljs-keyword\">private</span> <span class=\"hljs-keyword\">readonly</span> authService: AuthService</span>) {\n    <span class=\"hljs-comment\">// За замовчуванням стратегія шукає поле 'username'.</span>\n    <span class=\"hljs-comment\">// Перевизначаємо його на 'email'.</span>\n    <span class=\"hljs-variable language_\">super</span>({ <span class=\"hljs-attr\">usernameField</span>: <span class=\"hljs-string\">\"email\"</span> });\n  }\n\n  <span class=\"hljs-keyword\">async</span> <span class=\"hljs-title function_\">validate</span>(<span class=\"hljs-params\">email: <span class=\"hljs-built_in\">string</span>, password: <span class=\"hljs-built_in\">string</span></span>) {\n    <span class=\"hljs-keyword\">const</span> user = <span class=\"hljs-keyword\">await</span> <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">authService</span>.<span class=\"hljs-title function_\">validateUser</span>(email, password);\n    <span class=\"hljs-keyword\">if</span> (!user) <span class=\"hljs-keyword\">throw</span> <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">UnauthorizedException</span>(<span class=\"hljs-string\">\"Невірні облікові дані\"</span>);\n    <span class=\"hljs-keyword\">return</span> user; <span class=\"hljs-comment\">// потрапить у request.user</span>\n  }\n}</code></pre><h2>📝 JWT Strategy</h2>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">Strategy</span>, <span class=\"hljs-title class_\">ExtractJwt</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"passport-jwt\"</span>;\n<span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">PassportStrategy</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"@nestjs/passport\"</span>;\n<span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">ConfigService</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"@nestjs/config\"</span>;\n\n<span class=\"hljs-meta\">@Injectable</span>()\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">class</span> <span class=\"hljs-title class_\">JwtStrategy</span> <span class=\"hljs-keyword\">extends</span> <span class=\"hljs-title class_ inherited__\">PassportStrategy</span>(<span class=\"hljs-title class_\">Strategy</span>) {\n  <span class=\"hljs-title function_\">constructor</span>(<span class=\"hljs-params\"><span class=\"hljs-keyword\">private</span> <span class=\"hljs-keyword\">readonly</span> configService: ConfigService</span>) {\n    <span class=\"hljs-variable language_\">super</span>({\n      <span class=\"hljs-attr\">jwtFromRequest</span>: <span class=\"hljs-title class_\">ExtractJwt</span>.<span class=\"hljs-title function_\">fromAuthHeaderAsBearerToken</span>(),\n      <span class=\"hljs-attr\">ignoreExpiration</span>: <span class=\"hljs-literal\">false</span>,\n      <span class=\"hljs-attr\">secretOrKey</span>: configService.<span class=\"hljs-property\">get</span>&lt;<span class=\"hljs-built_in\">string</span>&gt;(<span class=\"hljs-string\">\"JWT_SECRET\"</span>),\n    });\n  }\n\n  <span class=\"hljs-keyword\">async</span> <span class=\"hljs-title function_\">validate</span>(<span class=\"hljs-params\">payload: { sub: <span class=\"hljs-built_in\">number</span>; email: <span class=\"hljs-built_in\">string</span> }</span>) {\n    <span class=\"hljs-keyword\">return</span> { <span class=\"hljs-attr\">id</span>: payload.<span class=\"hljs-property\">sub</span>, <span class=\"hljs-attr\">email</span>: payload.<span class=\"hljs-property\">email</span> };\n  }\n}</code></pre><div class=\"note\"><strong>📝 Що Passport робить автоматично</strong> <p>Passport сам витягує дані з запиту, перевіряє підпис JWT та <code>exp</code> claim. Метод <code>validate</code> викликається, лише якщо усі попередні перевірки пройдені.</p>\n</div>\n\n\n\n\n\n<div class=\"warning\"><strong>⚠️ LocalStrategy наразі показано як концепцію</strong> <p><code>LocalStrategy</code> — це опис, <em>як</em> Passport міг би перевіряти логін. Щоб ця стратегія справді спрацьовувала на маршруті, до нього застосовується <code>@UseGuards(AuthGuard('local'))</code>. Доти у нашому контролері ми викликаємо <code>validateUser</code> напряму — це дасть тотожний результат.</p>\n</div>\n\n","<h1>💻 AuthModule та AuthController</h1>\n<p><strong>Головна ідея:</strong> модуль об'єднує усі компоненти і налаштовує <code>JwtModule</code> із секретом та строком життя токена. Контролер реалізує два ендпоінти — реєстрацію та логін.</p>\n<h2>📝 AuthModule</h2>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">Module</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"@nestjs/common\"</span>;\n<span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">JwtModule</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"@nestjs/jwt\"</span>;\n<span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">PassportModule</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"@nestjs/passport\"</span>;\n<span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">ConfigModule</span>, <span class=\"hljs-title class_\">ConfigService</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"@nestjs/config\"</span>;\n\n<span class=\"hljs-meta\">@Module</span>({\n  <span class=\"hljs-attr\">imports</span>: [\n    <span class=\"hljs-title class_\">UsersModule</span>,\n    <span class=\"hljs-title class_\">PassportModule</span>,\n    <span class=\"hljs-title class_\">JwtModule</span>.<span class=\"hljs-title function_\">registerAsync</span>({\n      <span class=\"hljs-attr\">imports</span>: [<span class=\"hljs-title class_\">ConfigModule</span>],\n      <span class=\"hljs-attr\">inject</span>: [<span class=\"hljs-title class_\">ConfigService</span>],\n      <span class=\"hljs-attr\">useFactory</span>: <span class=\"hljs-function\">(<span class=\"hljs-params\">config: ConfigService</span>) =&gt;</span> ({\n        <span class=\"hljs-attr\">secret</span>: config.<span class=\"hljs-property\">get</span>&lt;<span class=\"hljs-built_in\">string</span>&gt;(<span class=\"hljs-string\">\"JWT_SECRET\"</span>),\n        <span class=\"hljs-attr\">signOptions</span>: { <span class=\"hljs-attr\">expiresIn</span>: <span class=\"hljs-string\">\"1h\"</span> },\n      }),\n    }),\n  ],\n  <span class=\"hljs-attr\">controllers</span>: [<span class=\"hljs-title class_\">AuthController</span>],\n  <span class=\"hljs-attr\">providers</span>: [<span class=\"hljs-title class_\">AuthService</span>, <span class=\"hljs-title class_\">LocalStrategy</span>, <span class=\"hljs-title class_\">JwtStrategy</span>],\n})\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">class</span> <span class=\"hljs-title class_\">AuthModule</span> {}</code></pre><h2>📝 AuthController</h2>\n<pre><code class=\"language-typescript hljs\" data-highlighted=\"yes\"><span class=\"hljs-keyword\">import</span> {\n  <span class=\"hljs-title class_\">Controller</span>,\n  <span class=\"hljs-title class_\">Post</span>,\n  <span class=\"hljs-title class_\">Body</span>,\n  <span class=\"hljs-title class_\">HttpCode</span>,\n  <span class=\"hljs-title class_\">HttpStatus</span>,\n  <span class=\"hljs-title class_\">UnauthorizedException</span>,\n} <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"@nestjs/common\"</span>;\n<span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">AuthService</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"./auth.service\"</span>;\n<span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">RegisterDto</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"./dto/register.dto\"</span>;\n<span class=\"hljs-keyword\">import</span> { <span class=\"hljs-title class_\">LoginDto</span> } <span class=\"hljs-keyword\">from</span> <span class=\"hljs-string\">\"./dto/login.dto\"</span>;\n\n<span class=\"hljs-meta\">@Controller</span>(<span class=\"hljs-string\">\"auth\"</span>)\n<span class=\"hljs-keyword\">export</span> <span class=\"hljs-keyword\">class</span> <span class=\"hljs-title class_\">AuthController</span> {\n  <span class=\"hljs-title function_\">constructor</span>(<span class=\"hljs-params\"><span class=\"hljs-keyword\">private</span> <span class=\"hljs-keyword\">readonly</span> authService: AuthService</span>) {}\n\n  <span class=\"hljs-meta\">@Post</span>(<span class=\"hljs-string\">\"register\"</span>)\n  <span class=\"hljs-keyword\">async</span> <span class=\"hljs-title function_\">register</span>(<span class=\"hljs-params\"><span class=\"hljs-meta\">@Body</span>() dto: RegisterDto</span>) {\n    <span class=\"hljs-keyword\">return</span> <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">authService</span>.<span class=\"hljs-title function_\">register</span>(dto);\n  }\n\n  <span class=\"hljs-meta\">@Post</span>(<span class=\"hljs-string\">\"login\"</span>)\n  <span class=\"hljs-meta\">@HttpCode</span>(<span class=\"hljs-title class_\">HttpStatus</span>.<span class=\"hljs-property\">OK</span>)\n  <span class=\"hljs-keyword\">async</span> <span class=\"hljs-title function_\">login</span>(<span class=\"hljs-params\"><span class=\"hljs-meta\">@Body</span>() dto: LoginDto</span>) {\n    <span class=\"hljs-keyword\">const</span> user = <span class=\"hljs-keyword\">await</span> <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">authService</span>.<span class=\"hljs-title function_\">validateUser</span>(dto.<span class=\"hljs-property\">email</span>, dto.<span class=\"hljs-property\">password</span>);\n    <span class=\"hljs-keyword\">if</span> (!user) <span class=\"hljs-keyword\">throw</span> <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">UnauthorizedException</span>(<span class=\"hljs-string\">\"Невірні облікові дані\"</span>);\n    <span class=\"hljs-keyword\">return</span> <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">authService</span>.<span class=\"hljs-title function_\">login</span>(user);\n  }\n}</code></pre><div class=\"warning\"><strong>⚠️ Секрет — у .env</strong> <p>Файл <code>.env</code> повинен містити <code>JWT_SECRET=&lt;довгий-випадковий-рядок&gt;</code>. Цей файл ніколи не комітиться у репозиторій — він додається у <code>.gitignore</code>.</p>\n</div>\n\n","<h1>✅ Ключові висновки</h1>\n<div class=\"success\"><strong>✅ Підсумок лекції</strong> <p><strong>📌 Головні ідеї:</strong></p>\n<ol>\n<li><p><strong>Аутентифікація</strong> відповідає на питання \"хто ти\", <strong>авторизація</strong> — \"що тобі дозволено\". Завжди в такому порядку.</p>\n</li>\n<li><p><strong>Паролі</strong> ніколи не зберігаються у відкритому вигляді — лише як хеш, отриманий через bcrypt або argon2 з сіллю.</p>\n</li>\n<li><p><strong>Сіль</strong> робить однакові паролі такими, що дають різні хеші, і захищає від атак за rainbow tables.</p>\n</li>\n<li><p><strong>JWT</strong> — самодостатній підписаний токен з трьох частин: header, payload, signature. Підпис гарантує цілісність.</p>\n</li>\n<li><p><strong>Payload</strong> не зашифрований, тому в нього не кладуть чутливі дані. Стандартні claims: <code>sub</code>, <code>iat</code>, <code>exp</code>.</p>\n</li>\n<li><p><strong>Passport.js</strong> надає каркас для аутентифікації, а конкретну логіку інкапсулюють стратегії (Local, JWT, OAuth тощо).</p>\n</li>\n<li><p><strong>AuthModule</strong> у Nest.js об'єднує <code>AuthService</code>, контролер та стратегії, налаштовуючи <code>JwtModule</code> через ConfigService.</p>\n</li>\n</ol>\n</div>\n\n","<h1>❓ Контрольні питання</h1>\n<ol>\n<li><p>🤔 Яка різниця між аутентифікацією та авторизацією? Який процес виконується першим і чому?</p>\n</li>\n<li><p>🤔 Чому не можна зберігати паролі у відкритому вигляді? Чим хешування відрізняється від шифрування?</p>\n</li>\n<li><p>🤔 Що таке сіль (salt) і яку проблему вона вирішує? Чи потрібно зберігати її окремо від хешу при використанні bcrypt?</p>\n</li>\n<li><p>🤔 З яких трьох частин складається JWT? Що містить кожна з них?</p>\n</li>\n<li><p>🤔 Чому в payload JWT не можна класти чутливі дані, навіть якщо токен підписаний?</p>\n</li>\n<li><p>🤔 Що таке стратегія в Passport.js? Чим відрізняються Local та JWT стратегії?</p>\n</li>\n<li><p>🤔 Яку роль відіграє <code>JWT_SECRET</code> і чому його не можна тримати у вихідному коді?</p>\n</li>\n</ol>\n","<h1>📖 Глосарій термінів</h1>\n<table>\n<thead>\n<tr>\n<th>Термін</th>\n<th>English</th>\n<th>Визначення</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Аутентифікація</td>\n<td>Authentication</td>\n<td>Процес перевірки ідентичності користувача</td>\n</tr>\n<tr>\n<td>Авторизація</td>\n<td>Authorization</td>\n<td>Процес перевірки прав доступу до ресурсів</td>\n</tr>\n<tr>\n<td>Хешування</td>\n<td>Hashing</td>\n<td>Одностороннє перетворення даних у рядок фіксованої довжини</td>\n</tr>\n<tr>\n<td>Сіль</td>\n<td>Salt</td>\n<td>Випадковий рядок, що додається до пароля перед хешуванням</td>\n</tr>\n<tr>\n<td>Токен</td>\n<td>Token</td>\n<td>Рядок, що засвідчує ідентичність у наступних запитах</td>\n</tr>\n<tr>\n<td>Stateless</td>\n<td>Stateless</td>\n<td>Підхід, при якому сервер не зберігає стан сесії</td>\n</tr>\n<tr>\n<td>Claim</td>\n<td>Claim</td>\n<td>Пара \"ключ-значення\" всередині JWT payload</td>\n</tr>\n<tr>\n<td>Підпис</td>\n<td>Signature</td>\n<td>Криптографічний хеш, що гарантує цілісність даних</td>\n</tr>\n<tr>\n<td>Стратегія</td>\n<td>Strategy</td>\n<td>Модуль Passport з логікою конкретного способу аутентифікації</td>\n</tr>\n<tr>\n<td>Bearer-токен</td>\n<td>Bearer Token</td>\n<td>Токен у заголовку <code>Authorization: Bearer &lt;token&gt;</code></td>\n</tr>\n</tbody></table>\n","<h1>📖 Глосарій абревіатур</h1>\n<table>\n<thead>\n<tr>\n<th>Абревіатура</th>\n<th>Розшифровка</th>\n<th>Переклад</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>JWT</td>\n<td>JSON Web Token</td>\n<td>JSON Web Token</td>\n</tr>\n<tr>\n<td>RFC</td>\n<td>Request for Comments</td>\n<td>Документ-стандарт інтернет-технологій</td>\n</tr>\n<tr>\n<td>HMAC</td>\n<td>Hash-based Message Authentication Code</td>\n<td>Код автентифікації повідомлень на основі хешу</td>\n</tr>\n<tr>\n<td>SHA</td>\n<td>Secure Hash Algorithm</td>\n<td>Захищений алгоритм хешування</td>\n</tr>\n<tr>\n<td>OAuth</td>\n<td>Open Authorization</td>\n<td>Відкритий стандарт авторизації</td>\n</tr>\n<tr>\n<td>API</td>\n<td>Application Programming Interface</td>\n<td>Програмний інтерфейс застосунку</td>\n</tr>\n<tr>\n<td>HTTPS</td>\n<td>HyperText Transfer Protocol Secure</td>\n<td>Захищений протокол передачі гіпертексту</td>\n</tr>\n<tr>\n<td>OWASP</td>\n<td>Open Web Application Security Project</td>\n<td>Відкритий проєкт з безпеки веб-застосунків</td>\n</tr>\n<tr>\n<td>GPU</td>\n<td>Graphics Processing Unit</td>\n<td>Графічний процесор</td>\n</tr>\n<tr>\n<td>DTO</td>\n<td>Data Transfer Object</td>\n<td>Об'єкт передачі даних</td>\n</tr>\n</tbody></table>\n"];let currentSlideIndex=0;
function renderMath(root){if(typeof renderMathInElement!=="function"||!root)return;try{renderMathInElement(root,{delimiters:[{left:"$$",right:"$$",display:true},{left:"\\[",right:"\\]",display:true},{left:"$",right:"$",display:false},{left:"\\(",right:"\\)",display:false}],throwOnError:false,strict:"ignore",ignoredTags:["script","noscript","style","textarea","pre","code"]});}catch(e){console.warn("Math render error:",e);}}
function showSlide(i){if(i<0||i>=slides.length)return;currentSlideIndex=i;const el=document.getElementById("current-slide");el.innerHTML=slides[i];el.scrollTop=0;renderMath(el);document.getElementById("progress-bar").style.width=((i+1)/slides.length*100)+"%";document.getElementById("slide-number").textContent=(i+1)+" / "+slides.length;updateSidebarActive();}
function nextSlide(){if(currentSlideIndex<slides.length-1)showSlide(currentSlideIndex+1);}
function previousSlide(){if(currentSlideIndex>0)showSlide(currentSlideIndex-1);}
function toggleSidebar(){document.getElementById("sidebar").classList.toggle("open");}
function toggleHelp(){document.getElementById("help-overlay").classList.toggle("hidden");}
function toggleFullscreen(){if(!document.fullscreenElement){const pc=document.getElementById("presentation-container");if(pc.requestFullscreen)pc.requestFullscreen();else if(pc.webkitRequestFullscreen)pc.webkitRequestFullscreen();else if(pc.msRequestFullscreen)pc.msRequestFullscreen();else if(pc.mozRequestFullScreen)pc.mozRequestFullScreen();}else{if(document.exitFullscreen)document.exitFullscreen();else if(document.webkitExitFullscreen)document.webkitExitFullscreen();else if(document.msExitFullscreen)document.msExitFullscreen();else if(document.mozCancelFullScreen)document.mozCancelFullScreen();}}
function generateSidebar(){const sc=document.getElementById("sidebar-content");sc.innerHTML="";slides.forEach((html,idx)=>{const t=document.createElement("div");t.className="slide-thumbnail";if(idx===0)t.classList.add("active");const tmp=document.createElement("div");tmp.innerHTML=html;const title=tmp.querySelector("h1,h2");const titleText=title?title.textContent:("Слайд "+(idx+1));const textContent=tmp.textContent.replace(/s+/g," ").trim();const preview=textContent.substring(0,100)+(textContent.length>100?"...":"");t.innerHTML="<div class=\"slide-thumbnail-number\">"+(idx+1)+"</div><div class=\"slide-thumbnail-title\">"+titleText+"</div><div class=\"slide-thumbnail-content\">"+preview+"</div>";t.onclick=()=>{showSlide(idx);if(window.innerWidth<1024)toggleSidebar();};sc.appendChild(t);});}
function updateSidebarActive(){document.querySelectorAll(".slide-thumbnail").forEach((th,idx)=>{if(idx===currentSlideIndex){th.classList.add("active");th.scrollIntoView({behavior:"smooth",block:"nearest"});}else th.classList.remove("active");});}
document.addEventListener("keydown",e=>{switch(e.key){case"ArrowLeft":previousSlide();break;case"ArrowRight":case" ":e.preventDefault();nextSlide();break;case"f":case"F":toggleFullscreen();break;case"s":case"S":toggleSidebar();break;case"?":toggleHelp();break;case"Escape":const sb=document.getElementById("sidebar");const ho=document.getElementById("help-overlay");if(sb.classList.contains("open"))toggleSidebar();else if(!ho.classList.contains("hidden"))ho.classList.add("hidden");break;}});
generateSidebar();showSlide(0);</script></body></html>
