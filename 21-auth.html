www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>🌐 Браузер додає<br>cookie bank.com</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1777958730783-19-0-flowchart-BANK-7\" data-look=\"classic\" transform=\"translate(1136.453125, 56)\"><rect class=\"basic label-container\" style=\"fill:#fff3e0 !important;stroke:#ef6c00 !important\" x=\"-124\" y=\"-48\" width=\"248\" height=\"96\"></rect><g class=\"label\" style=\"\" transform=\"translate(-100, -36)\"><rect></rect><foreignObject width=\"200\" height=\"72\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;\"><span class=\"nodeLabel \"><p>🏦 bank.com:<br>cookie валідний -- приймає запит</p></span></div></foreignObject></g></g></g></g></g><defs><filter id=\"exp-1777958730783-19-0-drop-shadow\" height=\"130%\" width=\"130%\"><feDropShadow dx=\"4\" dy=\"4\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs><defs><filter id=\"exp-1777958730783-19-0-drop-shadow-small\" height=\"150%\" width=\"150%\"><feDropShadow dx=\"2\" dy=\"2\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs></svg></div>\n<h2>🛡️ Захист</h2>\n<table>\n<thead>\n<tr>\n<th>Захід</th>\n<th>Деталі</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>JWT у заголовку <code>Authorization</code></td>\n<td>Браузер не додає його автоматично — атака через форму неможлива</td>\n</tr>\n<tr>\n<td><code>SameSite=Lax</code> або <code>Strict</code> cookie</td>\n<td>Браузер не передає cookie у крос-сайтових запитах</td>\n</tr>\n<tr>\n<td>CSRF-токен</td>\n<td>Випадковий токен, що передається окремо від cookie</td>\n</tr>\n</tbody></table>\n<div class=\"note\"><strong>📝 Стратегія для нашого API</strong> <p>У застосунках з JWT у заголовку <code>Authorization</code> CSRF за дизайном неможливий — зловмисник не може примусити браузер додати такий заголовок. Цей підхід нативно безпечний для SPA та мобільних клієнтів.</p>\n</div>\n\n","<h1>✅ Ключові висновки</h1>\n<div class=\"success\"><strong>✅ Підсумок лекції</strong> <p><strong>📌 Головні ідеї:</strong></p>\n<ol>\n<li><p><strong>Захист ресурсів</strong> реалізується через два механізми: <strong>Guards</strong> (авторизаційна логіка) та <strong>Middleware</strong> (інфраструктурні задачі). Guards мають доступ до метаданих маршруту, Middleware — ні.</p>\n</li>\n<li><p><strong>Guard</strong> реалізує <code>CanActivate</code> і повертає <code>true</code>/<code>false</code>. Якщо повертає <code>false</code>, Nest.js автоматично кидає <code>ForbiddenException</code>.</p>\n</li>\n<li><p><strong>AuthGuard('jwt')</strong> з пакету <code>@nestjs/passport</code> — готовий Guard, що використовує <code>JwtStrategy</code> для перевірки токена та заповнює <code>request.user</code>.</p>\n</li>\n<li><p><strong>Guards можна застосовувати</strong> на трьох рівнях: метод, контролер, глобально. Глобальний підхід зручний, коли більшість ендпоінтів захищені.</p>\n</li>\n<li><p><strong>Кастомні декоратори</strong> через <code>SetMetadata</code> дозволяють позначати методи (наприклад, <code>@Public()</code>, <code>@Roles('admin')</code>); Guards читають ці метадані через <code>Reflector</code>.</p>\n</li>\n<li><p><strong>RBAC</strong> реалізується через зв'язку <code>@Roles(...)</code> + <code>RolesGuard</code>. <code>JwtAuthGuard</code> повинен виконатися першим, бо <code>RolesGuard</code> спирається на <code>request.user</code>.</p>\n</li>\n<li><p><strong>XSS</strong> запобігається валідацією та екрануванням значень. <strong>CSRF</strong> для нашого API не актуальний, оскільки JWT передається у заголовку <code>Authorization</code>, який браузер не додає автоматично; для cookie-based аутентифікації роль аналогічного захисту виконують прапорці <code>SameSite</code> та CSRF-токени.</p>\n</li>\n</ol>\n</div>\n\n","<h1>❓ Контрольні питання</h1>\n<ol>\n<li><p>🤔 Чим Middleware відрізняється від Guard у Nest.js? Який механізм краще для авторизаційної логіки і чому?</p>\n</li>\n<li><p>🤔 Що повинен повернути метод <code>canActivate</code>? Що відбувається, якщо він повертає <code>false</code>?</p>\n</li>\n<li><p>🤔 Яку роль виконує <code>ExecutionContext</code>? Які три об'єкти можна з нього отримати і навіщо?</p>\n</li>\n<li><p>🤔 Як працює <code>AuthGuard('jwt')</code>? Що він поміщає у <code>request.user</code> і звідки бере цю інформацію?</p>\n</li>\n<li><p>🤔 Навіщо потрібен декоратор <code>@Public()</code> при глобальному застосуванні <code>JwtAuthGuard</code>? Як Guard про нього дізнається?</p>\n</li>\n<li><p>🤔 Чому <code>JwtAuthGuard</code> повинен виконуватися перед <code>RolesGuard</code>? Що відбудеться при зворотному порядку?</p>\n</li>\n<li><p>🤔 У чому різниця між XSS і CSRF? Чому використання JWT у заголовку <code>Authorization</code> робить CSRF неможливим?</p>\n</li>\n</ol>\n","<h1>📖 Глосарій термінів</h1>\n<table>\n<thead>\n<tr>\n<th>Термін</th>\n<th>English</th>\n<th>Визначення</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Захист ресурсів</td>\n<td>Resource protection</td>\n<td>Обмеження доступу до ендпоінтів API</td>\n</tr>\n<tr>\n<td>Проміжне ПЗ</td>\n<td>Middleware</td>\n<td>Функція, що виконується між запитом та обробником</td>\n</tr>\n<tr>\n<td>Охоронець</td>\n<td>Guard</td>\n<td>Клас з логікою дозволу/заборони виконання обробника</td>\n</tr>\n<tr>\n<td>Контекст виконання</td>\n<td>Execution Context</td>\n<td>Об'єкт з інформацією про поточний запит та обробник</td>\n</tr>\n<tr>\n<td>Метадані маршруту</td>\n<td>Route metadata</td>\n<td>Довільні дані, прикріплені до методу декораторами</td>\n</tr>\n<tr>\n<td>Кастомний декоратор</td>\n<td>Custom decorator</td>\n<td>Декоратор, створений розробником для багаторазового використання</td>\n</tr>\n<tr>\n<td>Авторизація за ролями</td>\n<td>Role-Based Access Control</td>\n<td>Модель авторизації через призначення ролей користувачам</td>\n</tr>\n<tr>\n<td>Міжсайтовий скриптинг</td>\n<td>Cross-Site Scripting</td>\n<td>Впровадження шкідливого JS-коду у веб-сторінку</td>\n</tr>\n<tr>\n<td>Підробка міжсайтового запиту</td>\n<td>Cross-Site Request Forgery</td>\n<td>Виконання небажаних дій від імені аутентифікованого користувача</td>\n</tr>\n<tr>\n<td>Політика безпеки контенту</td>\n<td>Content Security Policy</td>\n<td>HTTP-заголовок, що обмежує джерела виконуваних ресурсів на сторінці</td>\n</tr>\n</tbody></table>\n","<h1>📖 Глосарій абревіатур</h1>\n<table>\n<thead>\n<tr>\n<th>Абревіатура</th>\n<th>Розшифровка</th>\n<th>Переклад</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>RBAC</td>\n<td>Role-Based Access Control</td>\n<td>Контроль доступу на основі ролей</td>\n</tr>\n<tr>\n<td>XSS</td>\n<td>Cross-Site Scripting</td>\n<td>Міжсайтовий скриптинг</td>\n</tr>\n<tr>\n<td>CSRF</td>\n<td>Cross-Site Request Forgery</td>\n<td>Підробка міжсайтового запиту</td>\n</tr>\n<tr>\n<td>CSP</td>\n<td>Content Security Policy</td>\n<td>Політика безпеки контенту</td>\n</tr>\n<tr>\n<td>JWT</td>\n<td>JSON Web Token</td>\n<td>JSON Web Token</td>\n</tr>\n<tr>\n<td>DI</td>\n<td>Dependency Injection</td>\n<td>Впровадження залежностей</td>\n</tr>\n<tr>\n<td>DTO</td>\n<td>Data Transfer Object</td>\n<td>Об'єкт передачі даних</td>\n</tr>\n<tr>\n<td>API</td>\n<td>Application Programming Interface</td>\n<td>Програмний інтерфейс застосунку</td>\n</tr>\n<tr>\n<td>HTTP</td>\n<td>HyperText Transfer Protocol</td>\n<td>Протокол передачі гіпертексту</td>\n</tr>\n<tr>\n<td>SPA</td>\n<td>Single Page Application</td>\n<td>Односторінковий застосунок</td>\n</tr>\n</tbody></table>\n"];let currentSlideIndex=0;
function renderMath(root){if(typeof renderMathInElement!=="function"||!root)return;try{renderMathInElement(root,{delimiters:[{left:"$$",right:"$$",display:true},{left:"\\[",right:"\\]",display:true},{left:"$",right:"$",display:false},{left:"\\(",right:"\\)",display:false}],throwOnError:false,strict:"ignore",ignoredTags:["script","noscript","style","textarea","pre","code"]});}catch(e){console.warn("Math render error:",e);}}
function showSlide(i){if(i<0||i>=slides.length)return;currentSlideIndex=i;const el=document.getElementById("current-slide");el.innerHTML=slides[i];el.scrollTop=0;renderMath(el);document.getElementById("progress-bar").style.width=((i+1)/slides.length*100)+"%";document.getElementById("slide-number").textContent=(i+1)+" / "+slides.length;updateSidebarActive();}
function nextSlide(){if(currentSlideIndex<slides.length-1)showSlide(currentSlideIndex+1);}
function previousSlide(){if(currentSlideIndex>0)showSlide(currentSlideIndex-1);}
function toggleSidebar(){document.getElementById("sidebar").classList.toggle("open");}
function toggleHelp(){document.getElementById("help-overlay").classList.toggle("hidden");}
function toggleFullscreen(){if(!document.fullscreenElement){const pc=document.getElementById("presentation-container");if(pc.requestFullscreen)pc.requestFullscreen();else if(pc.webkitRequestFullscreen)pc.webkitRequestFullscreen();else if(pc.msRequestFullscreen)pc.msRequestFullscreen();else if(pc.mozRequestFullScreen)pc.mozRequestFullScreen();}else{if(document.exitFullscreen)document.exitFullscreen();else if(document.webkitExitFullscreen)document.webkitExitFullscreen();else if(document.msExitFullscreen)document.msExitFullscreen();else if(document.mozCancelFullScreen)document.mozCancelFullScreen();}}
function generateSidebar(){const sc=document.getElementById("sidebar-content");sc.innerHTML="";slides.forEach((html,idx)=>{const t=document.createElement("div");t.className="slide-thumbnail";if(idx===0)t.classList.add("active");const tmp=document.createElement("div");tmp.innerHTML=html;const title=tmp.querySelector("h1,h2");const titleText=title?title.textContent:("Слайд "+(idx+1));const textContent=tmp.textContent.replace(/s+/g," ").trim();const preview=textContent.substring(0,100)+(textContent.length>100?"...":"");t.innerHTML="<div class=\"slide-thumbnail-number\">"+(idx+1)+"</div><div class=\"slide-thumbnail-title\">"+titleText+"</div><div class=\"slide-thumbnail-content\">"+preview+"</div>";t.onclick=()=>{showSlide(idx);if(window.innerWidth<1024)toggleSidebar();};sc.appendChild(t);});}
function updateSidebarActive(){document.querySelectorAll(".slide-thumbnail").forEach((th,idx)=>{if(idx===currentSlideIndex){th.classList.add("active");th.scrollIntoView({behavior:"smooth",block:"nearest"});}else th.classList.remove("active");});}
document.addEventListener("keydown",e=>{switch(e.key){case"ArrowLeft":previousSlide();break;case"ArrowRight":case" ":e.preventDefault();nextSlide();break;case"f":case"F":toggleFullscreen();break;case"s":case"S":toggleSidebar();break;case"?":toggleHelp();break;case"Escape":const sb=document.getElementById("sidebar");const ho=document.getElementById("help-overlay");if(sb.classList.contains("open"))toggleSidebar();else if(!ho.classList.contains("hidden"))ho.classList.add("hidden");break;}});
generateSidebar();showSlide(0);</script></body></html>
